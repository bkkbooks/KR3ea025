body:
  text: 卷七逆順第五十五黃帝問於伯高曰余聞氣有逆順脈有盛衰刺有大約可得聞乎伯高曰氣之逆順者所以應天地陰陽四時五行也脈之盛衰者所以候血氣之虛實有餘不足也刺之大約者必明知病之可刺與其未可刺與其已不可刺也余伯榮曰此論病氣亦隨血氣出入於皮膚經脈之外內而刺之有法也氣有逆順者謂經脈外內之氣交相逆順而行所以應天地陰陽四時五行之升降出入脈有盛衰者謂經脈外內之血氣有出有入是以有虛有實有有餘有不足也刺之大約者必明知病之方來之可刺也與其方盛之未可刺也與其已過之不可刺也黃帝曰候之奈何伯高曰兵法曰無迎逢逢之氣無擊堂堂之陳刺法曰無刺熇熇之熱無刺漉漉之汗無刺渾渾之脈無刺病與脈相逆者黃帝曰候其可刺奈何伯高曰上工刺其未生者也其次刺其未盛者也其次刺其已衰者也下工刺其方襲者也與其形之盛者也與其病之與脈相逆者也故曰方其盛也勿敢毀傷刺其已衰事必大昌故曰上工治未病不治已病此之謂也逢葉彭此言刺法有如兵法當避其來鋭擊其惰歸按史記軒轅之時神農時世衰諸侯相侵伐及蚩尤作亂軒轅乃習用干戈以徵不享故即以用兵之法而為刺之大約夫戰勇氣也一鼓作氣再而衰三而竭是以無迎逢逢之氣無擊堂堂之陳俟其氣衰陳亂然後擊之無有不克者矣熇熇之熱熱盛於皮膚也漉漉之汗邪盛在肌腠也渾渾之脈邪入於經脈也病與脈相逆者真邪相攻也離合真邪論曰夫邪去絡入於經也舍於血脈之中其寒溫未相得如湧波之起也時來時去方其來也必按而止之無逢其沖而瀉之知機之道不可掛以發蓋邪之方盛不可迎邪之以往不可追俟其來去之時如發機之速不可差之毫髮者也刺其未生者未生於脈中也未盛者邪來之未盛已衰者邪去之已衰故曰方其盛也勿敢毀傷謂邪氣方盛則真氣大虛故勿敢瀉邪以傷正氣刺其已衰事必大昌上工治未病者未病於脈中也蓋傳溜於血脈則有入腑干臟之患矣余伯榮曰按此篇篇名逆順而伯高曰氣之逆順所以應天地陰陽四時五行也是雖論刺之大約而重在氣之逆順夫天道右遷地道左轉四時之氣寒往則暑來暑往則寒來升降出入於天地之外內者也五臟者生長化收藏之氣此皆陰陽相貫環轉無端夫人皮以應天肌肉應地血脈應地之經水氣之逆順謂氣之環轉於經脈皮膚之外內交相逆順而行以應天地陰陽四時五行之氣是以下工刺其方襲者謂病之方襲於脈中也與其形之盛者謂病之盛於皮腠而為熇熇之熱漉漉之汗也與其病之與脈相逆者謂病邪始入於脈也蓋脈氣之出於皮膚從經而脈脈而絡絡而孫孫絡絶而後出於氣街邪之入於經脈去皮膚而入於絡去絡而入於經是以病與脈之相逆也夫邪去絡入於經也如湧波之起時來時去無有常在其病氣已衰則順脈而行矣故曰刺其已衰事必大昌此篇重在知人氣之逆順應天地四時五行則知邪病之盛虛出入矣五味第五十六黃帝曰願聞穀氣有五味其入五臟分別奈何伯高曰胃者五臟六腑之海也水穀皆入於胃五臟六腑皆稟氣於胃五味各走其所喜穀味酸先走肝穀味苦先走心穀味甘先走脾穀味辛先走肺穀味咸先走腎穀氣津液已行營衛大通乃化糟粕以次傳下任谷庵曰此章論五臟六腑津液營衛皆秉氣於胃腑水穀之所生養夫谷入於口其味有五各歸所喜津液各走其道穀氣津液已行營衛大通所化之糟粕乃傳於小腸大腸循下焦而滲入膀胱也黃帝曰營衛之行奈何伯高曰谷始入於胃其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道其大氣之摶而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入天地之精氣其大數常出三入一故谷不入半日則氣衰一日則氣少矣摶音團任氏曰此言入胃水穀所生之精氣先出於胃之兩焦以溉五臟兩焦上焦中焦也上焦出胃上口中焦亦並胃中故曰胃之兩焦谷入於胃以傳於肺五臟六腑皆以受氣別出兩行營衛之道其清者為營濁者為衛營行脈中衛行脈外大氣宗氣也胸中膻中也其宗氣之摶而不行者積於胸中命曰氣海上出於肺循喉咽以司呼吸呼則氣出吸則氣入也天食人以五氣地食人以五味谷入於胃化其精微有五氣五味故為天地之精氣五穀入於胃也其糟粕津液宗氣分為三隧故其大數常出三入一蓋所入者谷而所出者乃化糟粕以次傳下其津液溉五臟而生營衛其宗氣積於胸中以司呼吸其所出有三者之隧道故谷不入半日則氣衰一日則氣少矣余伯榮曰按本篇言大氣之摶而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入此宗氣之行於脈外也蓋肺主皮毛人一呼則氣出而八萬四千毛竅皆闔一吸則氣入而八萬四千毛竅皆開此應呼吸而司開闔者也邪客篇云宗氣積於胸中出於喉嚨以貫心脈而行呼吸此宗氣之行於脈中也一呼一吸脈行六寸晝夜一萬三千五百息脈行八百十丈為一周此應呼吸而脈行循度環轉者也故曰宗氣流於海其下者注於氣街其上者走於息道蓋行於脈外者直下注於氣街而充遍於皮毛也黃帝曰谷之五味可得聞乎伯高曰謂盡言之五穀粳米甘麻酸大豆咸麥苦黃黍辛五果棗甘李酸栗咸杏苦桃辛五畜牛甘犬酸豬咸羊苦雞辛五菜葵甘韭酸藿咸薤苦蔥辛五色黃色宜甘青色宜酸黑色宜咸赤色宜苦白色宜辛凡此五者各有所宜所謂五色者脾病者宜食粳米飯牛肉棗葵心病者宜食麥羊肉杏薤腎病者宜食大豆黃卷豬肉栗藿肝病者宜食麻犬肉李韭肺病者宜食黃黍雞肉桃蔥粳粳同余伯榮曰五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣是以五色合五味而各有所宜也五臟內合五行外合五色五味入胃各歸所喜津液各走其道以養五臟故五臟病者隨五味所宜也五禁肝病禁辛心病禁咸脾病禁酸腎病禁甘肺病禁苦余氏曰五味五氣有生有克有補有瀉故五臟有病禁服勝克之味肝色青宜食甘粳米飯牛肉棗葵皆甘心色赤宜食酸犬肉麻李韭皆酸脾色黃宜食鹹大豆豕肉栗藿皆咸肺色白宜食苦麥羊肉杏薤皆苦腎色黑宜食辛黃黍雞肉桃蔥皆辛藏氣法時論曰肝苦急急食甘以緩之心苦緩急食酸以收之脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之腎苦燥急食辛以潤之夫色者氣之華也緩急燥濕臟氣之不和也五臟有五氣之苦故宜五味以調之用陰而和陽也愚按脾苦濕急食苦以燥之而又曰脾色黃宜食鹹大豆豕肉栗藿皆咸蓋脾為陰中之至陰而主濕土之氣乃喜燥而惡寒濕者也故宜食苦以燥之然灌溉於四臟土氣潤濕而後乃流行故又宜食鹹以潤之是以玉機真藏論曰脾者土也孤臟以灌四旁者也其來如水之流者此謂太過病在外故宜急食苦以燥之如鳥之喙者此謂不及病在中謂如黔喙之屬艮止而不行是以食鹹以滋其潤濕而灌溉也蓋脾為土臟位居中央不得中和之氣則有太過不及之分是以食味之有兩宜也水脹第五十七黃帝問於岐伯曰水與膚脹鼓脹腸覃石瘕石水何以別之覃音盡余伯榮曰此章論寒水之邪而為水是膚脹鼓脹腸覃石瘕諸證經云太陽之上寒水主之寒者水之氣也腎與膀胱皆積水也故曰石水石水者腎水也如水溢於皮間則為皮水寒乘於肌膚則為膚脹留於空郭則為鼓脹客於腸外則為腸覃客於子門則為石瘕皆水與寒氣之為病也夫邪之所湊其正必虛外之皮膚肌腠內之臟腑募原腸胃空郭皆正氣之所循行氣化則水行氣傷則水凝聚而為病是以凡論水病當先體認其正氣知正氣之循行出入則知所以治之之法矣岐伯答曰水始起也目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也余氏曰此太陽膀胱之水溢於皮膚而為水脹也太陽之氣運行於膚表此水隨氣溢而為病也太陽之脈起於目內眥上額交巔循頸而下目窠上微腫水循經而溢於上也其頸脈動水傷氣而及於脈也咳者水邪上乘於肺也陰股寒足脛腫太陽之氣虛而水流於下也腹大者水泛而土虛也水在皮中故按之隨手而起如裹水之狀此其候也黃帝曰膚脹何以候之岐伯曰膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也𪔣音空鼓聲窅音杳余氏曰寒者水之氣也此無形之氣客於皮膚而為虛脹也無形之氣故𪔣𪔣然不堅氣脹故腹大身盡腫也寒氣在於肌腠故皮厚窅深也夫水在皮中故按之即起此病在氣故按其腹窅而不起腹色不變者寒氣在皮膚而脾土未傷也鼓脹何如岐伯曰腹脹身皆大大與膚脹等也色蒼黃腹筋起此其候也余氏曰此寒氣乘於空郭之中所謂臟寒生滿病也臟寒者水臟之寒氣盛而火土之氣衰也身皆大者脾主肌肉也色蒼黃腹筋起者土敗而木氣乘之也腸覃何如岐伯曰寒氣客於腸外與衛氣相搏氣不得營因有所繫癖而內著惡氣乃起息肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離臟按之則堅推之則移月事以時下此其候也臟舊文歲今改正此寒氣客於腸外而生覃也夫衛氣夜循臟腑之募原行陰二十五度寒氣客於腸外與衛氣相搏則衛氣不得營行矣因有所繫癖而內著者此無形之氣相搏於腸外空郭之中而著於有形之膏募也是以血肉之惡氣乃起息肉乃生而成此覃久則離於臟腑之脂膜如懷子之虛懸按之則堅推之則移不涉於臟腑故月事以時下此其候也石瘕何如岐伯曰石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下余氏曰胞中血海也在少腹內男子之血上唇口而生髭鬚女子月事以時下寒氣客於子門則衃門閉而胞中之血當瀉不瀉留積而成衃塊日以益大狀如懷子血留胞中故月事不以時下覃瘕皆生於女子治之者可導下之黃帝曰膚脹鼓脹可刺耶岐伯曰先瀉其脹之血絡後調其經刺去其血絡也余氏曰膚脹者寒氣客於外鼓脹者寒氣客於內故先瀉其脹之血絡後調其經刺去其血絡蓋先瀉其外後調其內而復治其外外內之相通也任氏曰腸覃石瘕乃有形之血積可從氣分而導之膚脹鼓脹乃無形之氣脹可從血絡而瀉之血氣之相通也賊風第五十八黃帝曰夫子言賊風邪氣之傷人也令人病焉今有其不離屏蔽不出室穴之中卒然病者非不離賊風邪氣其故何也岐伯曰此皆嘗有所傷於濕氣藏於血脈之中分肉之間久留而不去若有所墮墜惡血在內而不去卒然喜怒不節飲食不適寒溫不時腠理閉而不通其開而遇風寒則血氣凝結與故邪相襲則為寒痹其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發焉此篇論病形而傷其精氣神也三邪雜至合而為痹在內而傷其精氣神者有似乎鬼神可祝由而已也篇名賊風者言往古之人恬憺虛無精神內守邪不能深入故可移精祝由而已當今之世不然憂患緣其內苦形傷其外賊風數至虛邪朝夕內至五臟骨髓外傷空竅肌膚故祝由不能已也夫心主脈諸血者皆屬於心嘗有所傷於濕氣藏於血脈之中則傷心藏之神矣分肉者三焦通會元真之處留於分肉之間則傷其氣矣若有所墮墜則有傷於筋骨筋即為肝骨即為腎血即為心惡血在內則傷心藏之神有傷於筋則傷肝藏之魂有傷於骨則傷腎藏之精卒然喜怒不節則更傷所藏之神魂飲食不適則更傷水穀之精液寒溫不時則傷在外之形氣形氣傷則腠理閉而不通其開而遇風寒則血氣凝結與故之濕邪相襲則風寒濕三氣雜合而為痹矣其開而遇風者以有熱則汗出蓋熱乃火之氣汗乃精血之液因傷其精神是以熱則氣弛汗出而開也汗出則受風雖不遇賊風邪氣必有因加於風寒而發焉任谷庵曰賊風邪氣不正之邪氣也風寒天之正氣也因有故邪開而汗出故因加而合為邪病焉王子方曰風傷氣寒傷神濕傷精蓋風傷衛寒傷營而寒水之氣又傷心火也濕乃土之邪氣故傷腎藏之精是以傷於濕者則為痿厥痿者骨痿厥者腎臟之生氣厥逆而四肢清冷也黃帝曰夫子之所言者皆病人之所自知也其毋所遇邪氣又無怵惕之所志卒然而病者其故何也惟有因鬼神之事乎岐伯曰此亦有故邪留而未發因而志有所惡及有所慕血氣內亂兩氣相搏其所從來者微視之不見聽而不聞故似鬼神毋無同惡去聲此言病在內而傷其精氣神也故邪留而未發者留於臟腑募原之間則有傷於氣矣水之精為志火之精為神志有所惡則傷腎藏之精心有所慕則傷心藏之神血氣內亂真邪相搏其所由來者漸矣此病氣而不病形故視之不見聽而不聞若有似乎鬼神夫魂遊為神魄降為鬼隨神往來謂之魂並精而出謂之魄精神內傷則魂魄飛揚而有似乎鬼神也黃帝曰其祝而已者其故何也岐伯曰先巫者因知百病之勝先知其病之所從生者可祝而已也知百病之勝者知精氣神三者能勝其百病也知其病之所從生者知先傷其精氣神而病之所由生也可祝而已者先巫之能移精變氣而通神明也王子方曰上古有十三科祝由乃其一也先巫者言上古之能祝由而愈病者謂之巫醫故古之醫字從巫非與師巫之賤役比也南人有言曰人而無恆不可以作巫醫即上古祝而已病之醫非醫巫之有二也衛氣失常第五十九黃帝曰衛氣之留於腹中蓄積不行菀蘊不得常所使人股脅胃中滿喘呼逆息者何以去之伯高曰其氣積於胸中者上取之積於腹中者下取之上下皆滿者旁取之黃帝曰取之奈何伯高對曰積於上瀉大迎天突喉中積於下者瀉三里與氣街上下皆滿者上下取之與季脅之下一寸重者雞足取之診視其脈大而弦急及絶不至者及腹皮急甚者不可刺也黃帝曰善菀音郁此篇論衛氣失常以明衛氣所出所主之常所有浮沉淺深及太過不及之別按第七十六之衛氣行章論衛氣晝行於陽夜行於陰外內出入之循度此篇論衛氣始生始出之道路主於皮肉筋骨之間所以溫分肉充皮膚肥腠理而司開闔者也夫衛氣者陽明水穀之悍氣也谷入於胃其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道營行脈中衛行脈外所謂別出者與谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始之營氣所出之道路各別也衛氣與宗氣所出之道路各別也兩行者謂營氣出於氣分而行於脈中衛氣出於脈中而散於脈外此陰陽血氣交互之妙道也夫精專者行於經隧之營血始於手太陰肺終於足厥陰肝臟腑相通外內相貫環轉無端終而復始與營行脈中一呼一吸脈行六寸日行二十五度夜行二十五度之道路各別也所謂營行脈中以應呼吸漏下者乃中焦所生之津液隨三焦出氣外注於皮膚溪谷之氣分滲入於孫脈絡脈化而為赤者也五癃篇之所謂三焦出氣以溫肌肉充皮膚為其津其流而不行者為液決氣章之所謂糟粕津液宗氣分為三隧營氣者泌其津液注之於脈化而為血以營四末內注五臟六腑以應刻數癰疽章之所謂中焦出氣如露上注溪谷而滲孫脈津液和調變化而赤為血血和則孫脈先滿溢乃注於絡脈皆盈乃注於經脈陰陽已張因息乃行行有經紀周有道理與天合同不得休止是行於脈中以應呼吸之營氣乃中焦所生之津液隨三焦之出氣注於皮膚分肉之氣分滲於孫絡變化而赤為血因息乃行行有經紀與營氣篇之始於手太陰肺終於足厥陰肝之道路各別也宗氣積於胸中上出於肺循喉咽呼則出吸則入夫肺主皮毛人一呼則氣出而八萬四千毛竅皆闔一吸則氣入而八萬四千毛竅皆開此宗氣之應呼吸而司開闔者也衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間晝日行於陽夜行於陰司晝夜之開闔者也呼吸之開闔人之開闔也晝夜之開闔應天之開闔也是以營氣衛氣之所出所行各有其道故曰別出兩行營衛之道此篇論衛氣之始生始出從陽明之脈絡分行於上下四旁而布散於形身之外蓄積菀蘊者猶草木之生長茂盛於內也不得常所者不得所出所主之常處也故內積於上者取之大迎天突蓋衛氣之上出者從胃之大迎任之天突而外出於皮膚也積於下者取之三里蓋衛氣之下出者從胃之三里而外出於皮膚也積於中者取之氣街與季脅之帶脈蓋衛氣之布於四旁者從腹之氣街帶脈之章門而外出於四旁也夫衛氣乃胃腑水穀所生之氣足陽明與任脈會於中脘上會於承漿與帶脈會於臍之左右而出於腹氣之街是陽明所生之氣從陽明之經脈而出散於皮膚此衛氣始出之常所也夫衛為陽從脈而出由內而外自陰而出於陽營為陰從溪谷氣分而入於孫脈經脈自外而內由陽而入於陰此陰陽血氣外內交互之妙道也雞足者以足緩伸緩縮如雞足之踐地蓋以疏陽明之經脈以通衛氣之所出也疹視其脈大而弦急及絶不至者及腹皮急甚者此衛氣留滯於始生之處非蓄蘊於所以所出之道路故不可取之外穴也此論衛氣始生始出之常所與行陽行陰之度數不同故反論其失常以證明之黃帝問於伯高曰何以知皮肉氣血筋骨之病也伯高曰色起兩眉薄澤者病在皮唇色青黃赤白黑者病在肌肉營氣濡然者病在血氣目色青黃赤白黑者病在筋耳焦枯受塵垢病在骨此言衛氣從內之脈絡布散於皮肉筋骨之間而各有所在也色者氣之章也兩眉間即關中乃肺之部肺合於皮故色起兩眉薄澤知衛氣之病在皮也肌肉者脾土之外合土灌四臟故觀唇色青黃赤白黑者知衛氣之病在肌肉也營者血之氣也濡潤也血之液為汗汗出而濡然者知衛氣之病在血氣也肝主筋而開竅在目視目色之青黃赤白黑者知衛氣之病在筋也筋合於三陰三陽十二經脈故五色之並見也耳者腎之竅耳焦枯受塵垢者知衛氣之病在骨也夫皮肉筋骨脈外之氣分衛氣出於形身而各在其處也黃帝曰病形何如取之奈何伯高曰夫百病變化不可勝數然皮有部肉有柱血氣有輸骨有屬黃帝曰願聞其故伯高曰皮之部輸於四末肉之柱在臂脛諸陽分肉之間與足少陰分間血氣之輸輸於諸絡氣血留居則盛而起筋部無陰無陽無左無右候病所在骨之屬者骨空之所以受益而益腦髓者也黃帝曰取之奈何伯高曰夫病變化浮沉深淺不可勝窮各在其處病間者淺之甚之深之間者少之甚之衆之隨變而調氣故曰上工數上聲勝平聲間去聲此承上文而言衛氣行於皮肉筋骨之間各有所主之部屬也衛氣行於皮輸於四末為所主之部蓋衛氣出於陽從頭目而下注於手足之五指故以四末為部也行於肌肉在臂脛諸陽分肉之間為肉之柱柱之為言主也蓋肉之大分為谷小分為溪分肉之間溪谷之會以行營衛以會大氣臂脛之大肉肉之大分也營衛大氣先會於大分之間故以臂脛之肉為主猶屋宇之有四柱也足少陰分間乃足少陰出於氣街行於分肉之間衛氣者後天水穀之所生也會少陰先天之氣於分間此氣之大會也諸絡者孫脈絡脈也營氣從絡而行於經脈衛氣從絡而出於皮膚血氣輸轉於諸絡之間故氣血留居則絡脈盛而起矣衛氣之行於骨者在骨空之所以受益而益腦髓者也骨空者津液淖澤注於骨骨屬屈伸補益腦髓髓空在腦後三分顱際鋭骨之下蓋髓之所以補益腦者從尾骶而滲於脊骨從脊骨而上滲於髓空以入腦衛氣一日一夜大會於風府其明日日下一節二十一日下至尾骶二十二日入脊內其行九日出於缺盆故衛氣之行於骨者以脊骨為所屬也衛氣之行於筋者無分陰陽左右如留滯於手足某結之筋即為病之所在蓋衛氣者應天之氣也筋者厥陰風氣之所生也風者大塊之噫氣充滿於天地之間故於衛氣相合陰陽左右無處不有若夫皮之部肉之柱猶天之四方骨之屬猶天之道也百病變化者審察衛氣為百病母行於皮肉筋骨之間是以浮沉淺深各在其處余伯榮曰衛氣司晝夜之開闔以應天之氣也一日一夜大會於風府明日日下一節二十一日下至尾骶二十二日入脊內其行九日上出缺盆一月而環轉一周是又應月之一月而一周天也是以月郭空則海水東盛衛氣去形獨居蓋水與天氣上下相通日月運行隨天道環轉日日行一度故一歲而一周天月行十三度有奇故一月而一周天此陰陽之運行無息者也人與天地相參一息不運則失其旋轉之機而為奇恆之病學者玩索而有得焉非惟臨病人以觀死生更可以通玄門為養生之祕要黃帝問於伯高曰人之肥瘦大小寒溫有老壯少小別之奈何伯高對曰人年五十以上為老二十以上為壯十八以上為少六歲以上為小此論衛氣之有盛衰也年少小者衛氣始長年壯者衛氣正盛五十以上衛氣漸衰蓋應天之氣而有四時生長收藏之盛衰也方盛衰論曰老從上少從下老者應秋冬之氣從上而方衰於下少者應春夏之氣從下而方盛於上王子方曰數始於一成於三三而兩之為六三而三之成九十八者二九之數也二十者陰陽之生數始也五十者五行之生數終也馬玄臺曰十八以上六歲以上俱當作以下黃帝曰何以度知其肥瘦伯高曰人有肥有膏有肉黃帝曰別此奈何伯高曰膕肉堅皮滿者肥膕肉不堅皮緩者膏皮肉不相離者肉膕音國此以下論衛氣之所以溫分肉充皮膚肥腠理者也腠理者肌肉之紋理如豕之精肉條分而有理路理中之白膜曰脂肉外連皮之肥肉曰肥故曰膕肉堅而皮滿者肥蓋肥在皮之內肉之外故肉堅而皮滿也膏者即肥之脂膏謂如豕肉之紅白相間而有數層者為膏蓋肥膏之間於肉內故肉不堅而皮緩也此論衛氣之肥腠理故只論膏而不論肥然先言人有肥者以明膏肥之有別也皮肉不相離者謂肉勝而連於皮內無膏而外無肥此亦衛氣之盛於肉理者也任谷庵曰膕肉者俗名腿肚也蓋肉之柱在臂脛諸陽分肉之間故膕肉堅則通體之肉堅矣又只言脛而不言臂者氣從下而上也黃帝曰身之寒溫何如伯高曰膏者其肉淖而粗理者身寒細理者身熱脂者其肉堅細理者熱粗理者寒任谷庵曰此言衛氣之所以溫分肉也膏者肉不堅故其肉淖淖和也言膏與肉之相間而相和者也脂者腠理固密故其肉堅粗理者衛氣外泄故身寒細理者衛氣收藏故身熱黃帝曰其肥瘦大小奈何伯高曰膏者多氣而皮縱緩故能縱腹垂腴肉者身體容大脂者其身收小任氏曰此復申明衛氣之所以肥腠理溫分肉也衛氣盛則腠理肥是以膏者多氣而皮縱緩故能縱腹垂腴腴者臍下之少腹也肉者身體容大此衛氣盛而滿於分肉也脂者其身收小此衛氣深沉不能充於分肉以致脂膜相連而肌肉緊充故其身收小也余伯榮曰衛氣之所以溫分肉者充實於肉之理路所謂血氣盛則充膚熱肉蓋非只溫肌肉而能使肌肉盛滿身體容大故反復以申明之黃帝曰三者之氣血多少何如伯高曰膏者多氣多氣者熱熱者耐寒肉者多血多血則充形充形則平脂者其血清氣滑少故不能大此別於衆人者也任谷庵曰此言衛氣與營血相將充盈於分肉之紋理其膏肥之內只有衛氣而血不營也膏者衛氣盛故熱而耐寒肉者肌肉隆盛故多血血氣盛則充膚熱肉故充形血隨氣行血氣皆盛是為營衛和平脂者肌肉緊密是以血清氣少故不能大此三者有肥瘦大小之不同故與平人之有別也王子方曰脂者衛氣不充於分肉是以血亦清少血氣相將而行者也黃帝曰衆人奈何伯高曰衆人皮肉脂膏不能相加也血與氣不能相多故其形不小不大各自稱其身命曰衆人余伯榮曰此言衛氣之浮沉淺深而各有常所者其形不大不小也衆人者平常之大衆也不能相加者謂血氣和平則皮肉脂膏不能相加於肥大也血氣之浮沉淺深各有常所不能相多於肌肉間也皮肉筋骨各自稱其身故其形不大不小也黃帝曰善治之奈何伯高曰必先別其三形血之多少氣之清濁而後調之治無失常經是故膏人縱腹垂腴肉人者上下容大脂人者雖脂不能大也此言人之血氣當使之無過不及也三者人之有肥大之太過瘦小之不及故當審其血之多少氣之清濁而後調之無失衛氣之常經期為平和之人矣此因衛氣失常是故膏人縱腹垂腴肉人者上下容大脂人者雖脂不能大也蓋衛氣主於皮肉筋骨之間浮沉淺深各在其處若獨充盛於皮膚分肉之間而使縱腹垂腴上下容大或深沉於筋骨之間以致脂不能大皆衛氣之失常也是以浮沉深淺不可勝窮隨變而調其氣命曰上工此篇論衛氣失常以明衛氣所出所循之常所使後學知陰陽血氣之生始出入為治道之張本也玉版篇第六十黃帝曰余以小針為細物也夫子乃言上合之於天下合之於地中合之於人余以為過針之意矣願聞其故岐伯曰何物大於天乎夫大於針者惟五兵者焉五兵者死之備也非生之具且夫人者天地之鎮也其不可不參乎夫治民者亦惟針焉夫針之與五兵其孰小乎此章論充溢於皮膚分肉之氣血從臟腑之大絡而出於孫絡皮膚應天氣之出於地中而布散於天下逆之則傷其所出之機勝五兵之殺人矣大絡者手太陰之絡名曰列缺手少陰之絡名曰通里手心主之絡名曰內關手太陽之絡名曰支正手陽明之絡名曰偏歷手少陽之絡名曰外關足太陽之絡名曰飛揚足少陽之絡名曰光明足陽明之絡名曰豐隆足太陰之絡名曰公孫足少陰之絡名曰大鐘足厥陰之絡名曰蠡溝此十二臟腑之大絡陽走陰而陰走陽左注右而右注左與經脈繆處其氣血布散於四末溢於皮膚分肉間不入於經俞以應天氣之運行於天表故曰所謂奪其天氣夫九針之道一者天二者地三者人小針微針也亦所以合於天地人者也且夫人者天地之鎮也其不可不參乎故治天下之萬民者亦惟針道所合之三才而已余伯榮曰上章論衛氣從陽明之脈絡而出於皮肉筋骨之間此章論皮膚分肉之血氣從胃之經隧臟腑之大絡而出於外即與衛氣相將之營氣也營衛血氣雖皆生於胃腑水穀之精然外內出入之道路不一學者非潛心玩索不易得也按管子曰蚩尤受盧山之銅而作五兵是黃帝時即有五兵矣一弓二殳三矛四戈五戟一云東方矛南方弩中央劍西方戈北方鍛黃帝曰病之生時有喜怒不測飲食不節陰氣不足陽氣有餘營氣不行乃發為癰疽陰陽不通兩熱相搏乃化為膿小針能取之乎岐伯曰聖人不能使化者為其邪不可留也故兩軍相當旗幟相望白刃陳於中野者此非一日之謀也能使其民令行禁止士卒無白刃之難者非一日之教也須臾之得也夫至使身被癰疽之病膿血之聚者不亦離道遠乎夫癰疽之生膿血之成也不從天下不從地出積微之所生也故聖人自治於未有形也愚者遭其已成也黃帝曰其已形不豫遭膿已成不豫見為之奈何岐伯曰膿已成十死一生故聖人勿使已成而明為良方著之竹帛使能者踵而傳之後世無有終時者為其不豫遭也此言皮膚分肉之氣血從內而出於外少有留滯則漸積而成癰膿如發於外而小者易愈大者多害若留積在內成癰膿而不見者十死一生也喜怒不測飲食不節內因之所傷也是以癰疽之生膿血之成不從天地之風寒暑濕乃積微之所生也是猶兩軍相當旗幟相望白刃陳於中野者此非一日之謀也能使其民令行禁止士卒無白刃之難者非一日之教也非須臾之可得也故聖人勿使已成而明為良方著之竹帛使後學之能者踵而傳之後世無有終時者為其不豫遭而成十死一生之證也遭遇也言其已形而不豫遭膿已成而不豫見此癰生於臟腑之間而不與我見乃多死少生之候也余伯榮曰按本經及素問論所生癰膿多因於風寒外邪有傷營衛留積而成癰膿此因內傷喜怒飲食故曰不從天下不從地出黃帝曰其已有膿血而後遭乎不道之以小針治乎岐伯曰以小治小者其功小以大治大者多害故其已成膿血者其惟砭石鈹鋒之所取也余伯榮曰此言癰發於外而豫見者有大小之難易也癰小而以小針治之者其功小而易成癰大而以大針治之者多有逆死之害故其已成膿血者其惟砭石鈹鋒之所取也蓋小而淺者以砭石取膿大而深者以鈹鋒取之鈹鋒大針也黃帝曰多害者其不可全乎岐伯曰其在逆順焉黃帝曰願聞逆順岐伯曰以為傷者其白眼青黑眼小是一逆也內藥而嘔者是二逆也腹痛渴甚是三逆也肩項中不便是四逆也音嘶色脫是五逆也除此五者為順矣內葉訥此言癰發於外而大者有逆順死生之分焉夫皮脈肉筋骨五臟之外合也癰發於皮肉筋骨之間其氣外行者為順若反逆於內則逆傷其臟矣如白眼青黑眼小肺肝腎三臟之氣傷也內藥而嘔胃氣敗也脾主為胃行其津液腹痛渴甚脾氣絶也外陽為諸陽主氣肩項中不便陽氣傷也在心主言心之合脈也其榮色也音嘶色脫心臟傷也犯此五逆者死除此五者為順矣黃帝曰諸病皆有逆順可得聞乎岐伯曰腹脹身熱脈大是一逆也腹鳴而滿四肢清泄其脈大是二逆也衄而不止脈大是三逆也咳且溲血脫形其脈小徑是四逆也咳脫形身熱脈小以疾是謂五逆也如是者不過十五日而死矣此言血氣之逆於經脈者不過半月而死也夫血氣留滯而成癰膿者積微之所生其所由來者漸矣若失其旋轉之機又不待成癰而有遄死之害諸病者謂凡病多生於營衛血氣之不調非獨癰膿也如腹脹身熱脈大者逆傷於脾也腹鳴而滿四肢清泄其脈大者逆傷於腎也肝主藏血衄而不止逆傷肝也肺朝百脈輸精於皮毛咳而溲血形脫其脈小徑逆傷肺也夫心主血脈肺者心之蓋咳形脫身熱脈小以疾逆傷心也夫血脈者五臟之所生也血氣逆則失其旋轉之機而反傷其臟真矣經脈應地之經水水以應月不過十五日而死者隨月之盈虛而死不能終周天之數矣王子方曰堪輿家鑿井度月影以取泉其腹大脹四末清形脫泄甚是一逆也腹脹便血其脈大時絶是二逆也咳溲血形肉脫脈搏是三逆也嘔血胸滿引背脈小而疾是四逆也咳嘔腹脹且飧泄其脈絶是五逆也如是者不過一時而死矣工不察此者而刺之是謂逆治飧葉孫此言氣血之逆於氣分者不過一周時而死矣夫皮膚分肉之氣血從胃腑而注於臟腑之大絡從大絡而出於孫絡從孫絡而外滲於皮膚如腹大脹四肢清形脫泄甚是逆於胃之大絡不得出於皮膚充於四體也腹脹便血其脈大時絶逆於腎絡也咳溲血形肉脫脈搏逆於肺絡也嘔血胸滿引背脈小而疾逆於心絡也咳嘔腹脹且飧泄其脈絶逆於肝脾之絡也夫胃者水穀血氣之海也五臟之大絡海之所以行雲氣於天下之道路也水天之氣上下相通一晝一夜繞地環轉一周如逆而不行則開闔已息是以不過一周而死矣夫人皮以應天皮膚之氣血逆而不行不過一周而死工不察此天運之大道如逆傷其氣遲則死於家中速則死於堂上矣任谷庵曰以上論人之氣血參合天地之道運行無息者也少有留滯或漸積而成癰膿或一息不續即為霄壤之判黃帝曰夫子之言針甚駿以配天地上數天文下度地紀內則五臟外次六腑經脈二十八會盡有周紀能殺生人不能起死者子能反之乎岐伯曰能殺生人不能起死者也黃帝曰余聞之則為不仁然願聞其道弗行於人岐伯曰是明道也其必然也其如刀劍之可以殺人如飲酒使人醉也雖勿疹猶可知矣黃帝曰願卒聞之岐伯曰人之所受氣者谷也谷之所注者胃也胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也迎而奪之而已矣黃帝曰上下有數乎岐伯曰迎之五里中道而止五至而已五往而臟之氣盡矣故五五二十五而竭其輸矣此所謂奪其天氣者也非能絶其命而傾其壽者也黃帝曰願卒聞之岐伯曰窺門而刺之者死於家中入門而刺之者死於堂上黃帝曰善乎方明哉道請著之玉版以為重寶傳之後世以為刺禁令民勿敢犯也窺窺同此言胃腑所生之氣血如雲氣之布散於天下者從臟腑之經隧布於四末充於皮膚分肉之間不入於經俞者也駿大也言針道之大配乎天地也上數天文應天之數也下度地紀應地之經也內別五臟應五運之在中也外次六腑應六氣之在外也經脈二十八會脈度之十六丈二尺也此言小針者上合於天下合於地中合於人通其經脈調其血氣營其順逆出入之會可傳於後世無有終時者若不察此三才之大道反逆傷其旋轉之機又勝五兵之殺人矣大絡者十二臟腑之經別也五里者手陽明之穴在肘上三寸蓋臟腑之大絡與經相干而布於四末手陽明之大絡與手陽明之經相干循五里而散於尺膚夫臟為陰腑為陽經脈為陰皮膚為陽手陽明者手太陰之腑也五臟之血氣行於脈中者因胃氣而至於手太陰以應尺寸之脈五臟之氣血行於脈外者因胃氣而出於手陽明之絡以應於尺膚是以脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩善調尺者不待於寸此十二臟腑之血氣行於經脈皮膚之外內者大會於手太陰陽明也故迎之五里中道而止至者迎其氣之至也往者追其氣之行也故五至而迎其五臟之氣至即已若五往而追之則五臟之氣盡泄於外矣五臟各有五輸五五二十五輸若皆取之則竭其輸矣此所謂奪其天氣者也非由命之自絶壽之自傾實所以殺生人也窺者窺俟其所出也門者衛氣篇之所謂契紹之門戶乃氣血從孫絡而出於皮膚之門也故俟其氣之出門而刺之者稍緩而死於家中入門而逆刺於絡內者即死於醫者之堂上也夫天氣一日一夜繞地環轉一周逆則不過一周而死況針刺之傷乎是以著之玉版以為重寶傳之後世以為刺禁令民勿敢犯也任谷庵曰人之皮表以應天經脈應地之經水天氣運行於地之外而復通貫於地中升降出入環轉無端而人亦應之膚表之氣血從五臟之大絡而出於皮膚分肉之外復從手足之指井而溜於滎注於輸行於經而與經脈中之血氣相合於肘膝之間此人合天地陰陽環轉出入之大道也故曰五往而臟之氣盡矣謂迎之五里復五往而追之則五臟之氣盡泄於外蓋謂皮膚之氣血由五臟之所出也五五二十五而竭其輸此謂奪其天氣謂手足五輸之氣血從皮膚之所入也若盡取其五臟之五輸則竭其輸中之血而奪其皮表之天氣也血氣之生始出入參合天地陰陽乃端本澄源之學大有裨於治道學者當以為首務焉余伯榮曰按內經論經脈之血氣曰藏之金匱論皮膚分肉之血氣曰著之玉版蓋因金玉之黃白而分血氣之陰陽也類而推之如金銀花王不留行花開黃白陶隱君即用之以行氣血張仲祖以雞卵黃治血卵白治氣此皆體先聖之遺意學者引而伸之觸類而長之天下事物之理用之不窮矣五禁第六十一黃帝問於岐伯曰余聞刺有五禁何謂五禁岐伯曰禁其不可刺也黃帝曰余聞刺有五奪岐伯曰無瀉其不可奪者也黃帝曰余聞刺有五過岐伯曰補瀉無過其度黃帝曰余聞刺有五逆岐伯曰病與脈相逆命曰五逆黃帝曰余聞刺有九宜岐伯曰明知九針之論是謂九宜余伯榮曰此承上章復論刺有五禁五奪五過五逆以為刺禁令民勿犯者也五過者五臟外合之皮脈肉筋骨有邪正虛實宜平調之如補瀉過度是為五過九宜者九針之論各有所宜神而明之是為九宜黃帝曰何為五禁願聞其不可刺之時岐伯曰甲乙日自乘無刺頭無發矇於耳內丙丁日自乘無振埃於肩喉廉泉戊己日自乘四季無刺腹去爪通水庚辛日自乘無刺關節於股膝壬癸日自乘無刺足脛是謂五禁余氏曰天之十干始於甲乙終於壬癸故甲乙以應頭壬癸以應足丙丁應身半以上庚辛應身半以下配天之四時也戊己屬土故乘於四季夫甲為陽木乙為陰木自乘者陰陽自合非化氣也發矇振埃者所以通氣也天之十干化生地之五行通氣者通五運之化氣此天干自乘故為取氣之禁黃帝曰何謂五奪岐伯曰形肉已奪是一奪也大奪血之後是二奪也大汗出之後是三奪也大泄之後是四奪也新産及大血是五奪也此病不可瀉余氏曰形肉血氣已虛脫者雖有實邪皆不可瀉黃帝曰何謂五逆岐伯曰熱病脈靜汗已出脈盛躁是一逆也病泄脈洪大是二逆也著痹不移䐃肉破身熱脈偏絶是三逆也淫而奪形身熱色夭然白及後下血衃血衃篤重是謂四逆也寒熱奪形脈堅搏是謂五逆也余氏曰熱病脈靜者陽病見陰脈也汗已出脈盛躁者陽熱之邪不從汗解陰液去而邪反盛也病泄者脈宜沉弱反洪大者陰泄於下陽盛於上陰陽上下之相離也著痹不移䐃肉破身熱者濕邪傷形久而化熱脈偏絶者脾胃之氣敗也淫者酷虐之邪奪形者邪傷形也如但熱不寒之瘧氣內藏於心而外淫於分肉之間令人消鑠脫肉夫心主血而血脈榮於色色夭然白及後下衃血篤重者形氣消於外血液脫於內血液外內之離脫也寒熱奪形脈堅搏者寒熱之邪盛而正氣傷也此為五逆皆不可刺也動輸第六十二黃帝曰經脈十二而手太陰足少陰陽明獨動不休何也岐伯曰是明胃脈也胃為五臟六腑之海其清氣上注於肺肺氣從太陰而行之其行也以息往來故人一呼脈再動一吸脈亦再動呼吸不已故動而不止黃帝曰氣之過於寸口也上十焉息下八焉伏何道從還不知其極岐伯曰氣之離臟也卒然如弓弩之發如水之下岸上於魚以反衰其餘氣衰散以上逆故其行微此章論營衛宗氣循度行於經脈之外內衝脈行於足少陰陽明之經而出於腹氣脛氣之街以明血氣之行於經脈皮膚之間交相和平俞應者也帝問手太陰足少陰陽明獨動不休者謂手太陰之太淵經渠足陽明之人迎衝陽足少陰太溪之動脈也伯言是明胃脈者謂胃為五臟六腑之海其營衛宗氣皆胃腑穀精之所生也清氣上注於肺者營氣宗氣也肺氣從太陰而行之者脈氣隨三陰三陽之氣而行也其行也以息往來者人一呼一吸脈行六寸日夜一萬三千五百息脈行八百十丈為一周也帝問氣之過於寸口上十焉息者乃營氣衛氣宗氣盡走於息道而變見於寸口也下八焉伏者謂流溢於中之營血下伏於胞中故如水之下岸也按本經營氣篇曰營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始夫帝言下伏之營血有八是精專而行於經隧之營止二分矣夫營氣行於脈中衛氣行於脈外宗氣兩行營衛之道此經脈外內之氣相為和平而有形之營血分行於外內亦相為勻等者也夫衝脈起於胞中上循背裡為經絡之海其浮而外者循腹右上行至胸中而散充膚熱肉淡滲皮毛此下伏於胞中之血半隨衝脈而行於脈內半隨衝脈而散於皮膚又足陽明之脈與衝脈於臍左右之動脈而出於腹氣之街衝脈與少陰之大絡循陰股而下出於脛氣之街夫精專者二分行於經隧隨衝脈者二分出於氣街是經脈外內之氣血相為勻等矣皮膚之氣血從指井而溜注於滎輸脈中之血氣從本標而外出於膚表從道往還莫知其極矣伯言氣之離臟卒然如弓弩之發者謂五臟之氣至於手太陰而變見於寸口者應手而動若弓弩之發弦上於魚際則動氣衰而無動脈矣其餘氣衰散以逆上者謂餘氣分散而上注於手陽明大腸之經故其脈上魚而其行微緩也此言五臟之氣因胃氣而至於手太陰腹走手而手走頭頭走足而足走腹常營無已終而復始環轉之無端也黃帝曰足之陽明何因而動岐伯曰胃氣上注於肺其悍氣上衝頭者循咽上走空竅循眼系入絡腦出顑下客主人循牙車合陽明並下人迎此胃氣別走於陽明者也故陰陽上下其動也若一故陽病而陽脈小者為逆陰病而陰脈大者為逆故陰陽俱靜俱動若引繩相傾者病顑音坎此言陽明之氣盛而獨動不休者也陰陽系日月論曰兩陽合於前故曰陽明又曰兩火合併故為陽明是陽明主氣金之氣而又有悍熱之火氣也胃氣上注於肺者胃腑所生之營氣宗氣上注於肺而行於經脈之外內以應呼吸漏下其悍熱之氣上衝頭者循咽上走空竅循眼系入絡腦出顑下客主人循牙車此陽明之悍氣上走空竅行於皮膚之氣分而下合於陽明之脈中並下人迎此胃腑所生之悍氣別走於陽明者也故陰陽上下其動也若一蓋身半以上為陽身半以下為陰謂在上之人迎在下之衝陽其動之相應也故陽病而陽脈小陰脈大者為逆陰病而陰脈大陽脈小者為逆故陰陽上下靜則俱靜動則俱動若引繩墨如相傾而不相應者則為病矣按上章曰胸氣有街腹氣有街頭氣有街脛氣有街氣在腹者止之背俞與衝脈於臍左右之動脈間夫足陽明之脈其支者下人迎入缺盆從缺盆下乳內廉挾臍入氣街中其支者下循腹裡至氣街中而合以下髀關循股外廉至足跗上夫胃之悍氣合陽明之脈而下人迎挾臍入氣街中則與衝脈相合而出於腹氣之街矣其下行而出於足跗者動於衝陽而上與人迎之相應也黃帝曰足少陰何因而動岐伯曰衝脈者十二經之海也與少陰之大絡起於腎下出於氣街循陰股內廉邪入膕中循脛骨內廉並少陰之經下入內踝之後入足下其別者邪入踝出屬跗上入大趾之間注諸絡以溫足脛此脈之常動者也邪斜同此言流溢於中之血氣一從衝脈與足少陰之大絡而下出於足脛之氣街循陰股內廉者血氣出於皮膚仍循少陰之經而行也斜入膕中者與太陽之承山踝上以下也其別者乃少陰之支絡別走於踝跗上入大趾之間而散於十趾之絡是以陽氣起於足五趾之表陰氣起於足五趾之裡蓋陰陽二氣本於先天之水火藏於腎臟出於下而升於上也夫衛氣者陽明所生之氣也上節論衛氣之別走陽明合於人迎是從膺胸臍腹而下至跗上如左右之動脈與衝脈會於臍間則陽明之血氣隨衝脈而出於腹氣之街矣此節論衝脈與少陰出於脛氣之街蓋手足十二經之本標只出於頭氣之街胸氣之街營衛之行從本而入從標而出上下相貫如環無端其腹氣之街脛氣之街乃別出陽明少陰之血氣不在十二經脈本標之內故別提出陽明少陰之動輸焉黃帝曰營衛之行也上下相貫如環之無端今有其卒然遇邪氣及逢大寒手足懈惰其脈陰陽之道相輸之會行相失也氣何由還岐伯曰夫四末陰陽之會者此氣之大絡也四街者氣之徑路也故絡絶則徑通四末解則氣從合相輸如環黃帝曰善此所謂如環無端莫知其紀此之謂也此申明經脈之血氣從四街而出行於脈外皮膚分肉之氣血從四末而入行於脈中上下相貫環轉之無端也四末者四肢之杪末手足之指井也其脈者謂手足三陰三陽之經輸陰陽之道者血氣從此所行之道路也相輸之會氣從合者謂皮膚之氣血從四末而溜於脈中輸行於經而與脈中之血氣相會入於肘膝之間而與脈中之血氣相合故曰四末解則氣從合蓋假風寒之邪以明四末乃陰陽之會氣從此而所入之大絡也如因邪氣所阻則手足懈惰而道路不通氣何由而環轉如四末和解則氣血輸會於脈中而還轉於氣街矣夫經脈者內連於臟腑外絡於形身外內出入常營無已絡脈者乃經脈之支別如江河之支流至梢杪而有盡也四街者氣之徑路也故絡絶則徑通手足十二經之本標出於頭氣之街胸氣之街陽明所生之血氣復出於腹氣之街少陰所藏之血氣復出於脛氣之街此經脈中之血氣復從絡脈之盡處出於氣街而行於皮膚分肉之外也此營衛之行於皮膚經脈之外內上下相貫如環無端莫知其紀也王子方曰本經云營行脈中衛行脈外又曰浮氣之不循經者為衛氣精氣之營於經者為營氣今復言營衛之行環轉於經脈之外內豈經義自相矛盾與曰衛氣晝行於陽夜行於陰應天氣之晦明天道右旋地道左轉天運於地之外交相逆順而行應營氣行於脈中衛氣行於脈外外內清濁之不相干也然天氣運行於地之外而復通貫於地中有四時之寒暑往來生長收藏此天地陰陽之氣上下升降外內出入有分有合環轉無端是以營衛之行環轉於皮膚經脈之外內者應天地之氣交也夫所謂營行脈中者始於手太陰肺終於足厥陰肝腹走手而手走頭頭走足而足走腹一脈流通終而復始此營血之行於脈中也又別出兩行營衛之道清者為營濁者為衛營行脈中衛行脈外營於脈中者循手足之十二經脈及陰蹺陽蹺任脈督脈合十六丈二尺為一周晝行二十五度夜行二十五度應呼吸漏下者此營氣之行於脈中也衛氣晝行陽二十五度夜行陰二十五度此營氣衛氣各走其道清濁外內之不相干也若夫手足之三陰三陽十二經脈皆從指井所出而營於五臟之二十五輸六腑之三十六輸夫指井離爪甲如韭許乃血肉筋骨之盡處血氣皆從何來而曰所出為井耶蓋受皮膚之氣血從此而溜注於脈中十二經脈之血氣始從此而生出故曰所出為井所溜為滎所注為輸所行為經也充膚熱肉之氣血婦隨夫唱相將而行同溜於經脈之中故曰營衛之行也上下相貫四末陰陽之會者此氣之大絡也夫宗氣半行於脈中半行於脈外營血半營於經隧半營於皮膚營氣行於脈中衛氣行於脈外陰中有陽陽中有陰猶兩儀四象之定體血氣貫通於外內應天地之氣交一息不運則生化滅矣夫皮膚氣分為陽經脈血分為陰陽走陽而陰走陰此陰陽之相離也陰出於陽陽入於陰此陰陽之相合也陰陽之道有離而有合也若行於陽者只行於陽行於陰者只行於陰無外內出入之神機而生化亦滅矣陰陽之奧會心者明之余伯榮曰五亂脹論言衛氣亂脈是謂大悗衛氣逆為脈脹衛氣並脈循分為膚脹若衛氣行於脈內豈非亂脈乎曰衛氣之在路也常然並脈循分肉行有逆順陰陽相隨乃得天和謂脈內之血氣順行而脈外之氣血逆轉行有逆順乃得天地之和衛氣亂脈者謂衛氣順脈而行也若夫環轉於皮膚經脈之外內正所謂交相逆順而行又何亂之有五味第六十三黃帝問於少俞曰五味入於口也各有所走各有所病酸走筋多食之令人癃咸走血多食之令人渴辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人悗心余知其然也不知其何由願聞其故悗悶同任谷庵曰按五運行大論云東方生風風生木木生酸酸生肝肝生筋南方生熱熱生火火生苦苦生心心生血是五臟本於五味之所生而生外合之筋骨血肉也是以五味入口而各有所走夫心主血腎主骨苦乃火之味咸乃水之味苦走骨而咸走血者陰陽水火之交濟也肺主氣故辛走氣少俞答曰酸入於胃其氣澀以收上之兩焦弗能出入也不出即留於胃中胃中和溫則下注膀胱膀胱之脆薄以懦得酸則縮綣約而不通水道不行故癃陰者積筋之所終也故酸入而走筋矣任氏曰五味陰陽之用辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或軟或堅是發散湧泄之中而又有收散緩急之性矣上焦開發宣五穀味中焦出氣如露以行水穀之津酸氣收澀故弗能出於上之兩焦不出則留於胃而溜於下焦注於膀胱矣膀胱為脬之室脬居於中故膀胱之體質脆薄以懦得酸則易於縮綣縮則約而不通水道不行故為癃閉陰者前陰積筋骨宗筋也宗筋者筋之主也酸入於宗筋故走筋也按經筋章云足厥陰之筋上循陰股結於陰器絡諸筋其病陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收是足厥陰肝經主宗筋而外合於通體之筋黃帝曰咸走血多食之令人渴何也少俞曰鹹入於胃其氣上走中焦注於脈則血氣走之血與咸相得則凝凝則胃中汁注之注之則胃中竭竭則咽路焦故舌本干而善渴血脈者中焦之道也故鹹入而走血矣任氏曰中焦並胃中出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血鹹入於胃其氣上走中焦注於脈者咸性之上湧也注於脈則走於血氣矣血者中焦之汁奉心神而化赤咸乃寒水之味故血與咸相得則凝凝則燥結而胃中之汁以滋之胃中汁竭則咽路焦枯故舌本乾而善渴血脈者中焦之道路咸氣上走於中焦故走血王子方曰胃腑水穀之精汁化而為赤營於脈中人一呼一吸脈行六寸者血氣之流行也呼吸不已血氣之行無少停息故血凝則胃中之汁注之以資其流行黃帝曰辛走氣多食之令人洞心何也少俞曰辛入於胃其氣走於上焦上焦者受氣而營諸陽者也姜韭之氣熏之營衛之氣不時受之久留心下故洞心辛與氣俱行故辛入而與汗俱出任氏曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣辛走氣故其氣走於上焦上焦者受中焦之氣而營諸表陽者也夫營衛之氣生於中焦皆從上而出故姜韭之氣上熏則營衛之氣不時受之久留心下則為洞心辛與上焦之氣俱行於表陽則開發皮腠而汗出余伯榮曰辛氣留於心下而上熏則為洞心與氣俱行則與汗共並而出蓋汗乃中焦水穀之液也王子方曰論五味而曰氣者味之性也黃帝曰苦走骨多食之令人變嘔何也少俞曰苦入於胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔齒者骨之所終也故苦入而走骨故入而復出知其走骨也任谷庵曰炎上作苦君主之味也故五穀之氣皆不能勝之苦性下泄故入於下脘三焦者少陽相火也苦性寒故三焦之道皆閉塞不通三焦不通則入胃之水穀不得通調布散故變而為嘔也夫腎主骨腎為寒水之臟苦性寒故走骨同氣相感也然苦乃火味故入於下而復出於上以其性下泄而上湧也余伯榮曰少陰之上君火主之標陽而本寒也炎上作苦而苦寒下泄此少陰之味也故能從本從標天食人以五氣地食人以五味地之五行上呈天之六味是以味合五行氣合三陰三陽之六氣黃帝曰甘走肉多食之令人悗心何也少俞曰甘入於胃其氣弱小不能上至於上焦而與谷留於胃中者令人柔潤者也胃柔則緩緩則蠱動蠱動則令人悗心其氣外通於肉故甘走肉任谷庵曰稼穡作甘坤土之味也坤德柔順故其氣弱小太陰濕土主氣故令人柔潤柔者土之性潤乃濕之氣也夫蟲乃陰類胃秉陽明燥熱之氣胃若柔而緩則蟲動而上入於胃矣蟲上食故令人悗心土氣外主於肌肉故甘走肉馬玄臺曰蠱當作蟲
