body:
  text: 卷一九針十二原第一黃帝問於岐伯曰餘子萬民養百姓而收其租稅余哀其不給而屬有疾病余欲勿使被毒藥無用砭石欲以微針通其經脈調其血氣榮其逆順出入之會令可傳於後世必明為之法令終而不滅久而不絶易用難忘為之經紀異其章別其表裡為之終始令各有形先立針經願聞其情岐伯答曰臣請推而次之令有綱紀始於一終於九焉按本紀帝經土設井立步制畝藝五穀養萬民而收其租稅設有疾病則不能力田以供餘食矣故帝欲立九針微針之法傳於後世令終而不滅焉毒藥所以攻疾也砭石所以泄邪也二者皆攻瀉之法微針能通調血氣者也逆順出入者皮膚經脈之血氣有逆順之行有出入之會蓋人秉天地之氣所生陰陽血氣參合天地之道運行無息少有留滯則為疾病故帝以天地人之道而立九針用九針之法以順人之陰陽血氣而合於天道焉明其理則易用持於心則難忘經徑紀維也按篇名九針而帝曰微針伯曰小針是九針之外又立小針也九針者聖人起天地之數始於一而終於九九而九之九九八十一以起黃鐘之數用九針而合小針者以陽數五陰數五五位相得而各有合以應河圖之數也帝繼伏羲神農氏而作即以兩儀四象河圖奇偶之數用法於針所以修身治國平天下蓋國以民為本也請言其道小針之要易陳而難入粗守形上守神神乎神客在門未觀其疾惡知其原刺之微在遲速粗守關上守機機之動不離其空空中之機清靜而微其來不可逢其往不可追知機之道者不可掛以發不知機道扣之不發知其往來要與之期粗之暗乎妙哉工獨有之往者為逆來者為順明知逆順正行無間迎而奪之惡得無虛追而濟之惡得無實迎之隨之以意和之針道畢矣易陳難入者易言而難著於人也粗守形者守皮脈肉筋骨之刺上守神者守血氣之虛實而行補瀉也神乎神甚贊其得神之妙門者正氣出入之門客在門者邪循正氣出入之所也未睹其何經之疾惡知其受病之原言當先察其邪之所在而取之也遲速用針出入之疾徐也粗守關者守四肢之關節上守機者守其空而當刺之時如發弩機之速也不離其空者乘空而發也夫邪正之氣各有盛衰之時宜補宜瀉當靜守其空中之微不可差之毫髮如其氣方來乃邪氣正盛邪氣盛則正氣大虛不可乘其氣來即迎而補之當避其邪氣之來鋭其氣已往則邪氣已衰而正氣將復不可乘其氣往追而瀉之恐傷其正氣在於方來方去之微而發其機也離合真邪論曰俟邪不審大氣已過瀉之則真氣脫脫則不復邪氣復至而病益蓄故曰其往不可追此之謂也是以其來不可逢其往不可追靜守於來往之間而補瀉之少差毫髮之間則失矣粗工不知機道叩之不發補瀉失時則血氣盡傷而邪氣不下知其往來者知邪正之盛衰要與之可取之期而取之也粗工之暗而良工獨知之是故工之所以異也若氣往則邪正之氣虛小而補瀉之為逆氣來則形氣邪氣相平而行補瀉為順是以明知順逆正行無間知往來所處之時而取之也迎而奪之者瀉也故惡得無虛追而濟之者補也故惡得無實迎之隨之以意和之針道畢矣凡用針者虛則實之滿則泄之宛陳則除之邪勝則虛之大要曰徐而疾則實疾而徐則虛言實與虛若有若無察後與先若存若亡為虛為實若得若失所謂虛則實之者氣口虛而當補之也滿則泄之者氣口盛而當瀉之也宛陳則除之者去脈中之蓄血也邪勝則虛之者言諸經有盛者皆瀉其邪也徐而疾則實者徐內而疾出也疾而徐則虛者疾內而徐出也言實與虛若有若無者實者有氣虛者無氣也察後與先若亡若存者言氣之虛實補瀉之先後也察其氣之以下與常存也為虛為實若得若失者言補者佖然若有得也瀉則恍然若有失也此以上論小針之法虛實之要九針最妙補瀉之時以針為之瀉曰必持內之放而出之排陽得針邪氣得泄按而引針是謂內溫血不得散氣不得出也補曰隨之隨之意若妄之若行若按如蚊虻止如留而還去如弦絶令左屬右其氣故止外門已閉中氣乃實必無留血急取誅之持針之道堅者為寶正指直刺無針左右神在秋毫囑意病者審視血脈刺之無殆方刺之時必在懸陽及與兩衛神屬勿去知病存亡血脈者在腧橫居視之獨澄切之獨堅九針之名各不同形一曰鑱針長一寸六分二曰員針長一寸六分三曰匙針長三寸半四曰鋒針長一寸六分五曰鈹針長四寸廣二分半六曰圓利針長一寸六分七曰毫針長三寸六分八曰長針長七寸九曰大針長四寸鑱針者頭大末鋭去瀉陽氣員針者形如卵形揩摩分間不得傷肌肉以瀉分氣匙針者鋒如黍粟之鋭主按脈勿陷以致其氣鋒針者刃三隅以發錮疾鈹針者末如劍鋒以取大膿圓利針者大如犛且圓且鋭中身微大以取暴氣毫針者尖如蚊虻喙靜以徐往微以久留之而養以取痛痹長針者鋒利身薄可以取遠痹大針者尖如挺其鋒微圓以瀉機關之水也九針畢矣此節論九針之法蓋首篇統論小針及九針之道是以前後論小針而詳釋於小針解中此節論九針故詳釋於九針論內而小針解中不與也虛實之要九針最妙為其各有所宜也補瀉之時以針為之者與氣開合相得也排陽得針者排針而得陽氣也得其正氣則邪氣去矣內溫者針下熱也謂邪氣去而正氣不出也此論瀉邪而養其正也隨之者追而濟之也之往也若妄之者雖追之而若無有所往若行若按如蚊虻止如留而還也去如弦絶者疾出其針也令左手按痏右手出針其正氣故得止於內而外門已閉中氣乃實矣此補正運邪之法故必無留血設有留血急取而誅之堅者手如握虎也正指直刺者義無邪下欲端以正也神在秋毫審視病者靜志觀病人無左右視也懸陽心也心藏神方刺之時得之於心則神屬於病者而知病之存亡矣經云取血於榮取氣於衛衛氣行陽行陰者也故於兩衛間以取陰陽之氣衛氣行篇曰是故謹候氣之所在而刺之是謂逢時在於三陽必候其氣在陽分而刺之病在於三陰必候其氣在陰分而刺之腧經腧也刺節真邪篇曰六經調者謂之不病一經上實下虛而不通者此必有橫絡盛加於大經令之不通視而瀉之此所謂解結也故有血絡橫在於經腧者當視之獨清切之獨確而去之也九針者有九者之名有九者之形各隨其所宜而用之九針之論畢矣夫氣之在脈也邪氣在上濁氣在中清氣在下故針陷脈則邪氣出針中脈則濁氣出針太深則邪氣反沉病益故曰皮肉筋脈各有所處病各有所宜各不同形各以任其所宜無實無虛損不足而益有餘是謂甚病病益甚取五脈者死取三脈者恇奪陰者死奪陽者狂針害畢矣此復論小針刺邪之法而並論其要害焉風雨寒暑之中人也高故邪氣在上也水穀入胃其精氣上注於肺濁溜於腸胃寒溫不適飲食不節病生於腸胃故濁氣在中也清濕地氣之中人也必從足始故清氣在下也陷脈額顱之脈顯陷於骨中故針陷脈則陽之表邪去矣中脈足陽明之合三里穴也針太深則邪氣反沉者言浮淺之病不欲深刺也深則邪氣從之入故曰反沉也皮肉筋骨各有所處者言經絡各有所主也故病各有淺深之所宜形有皮肉筋脈之不同各隨任其所宜而刺之無實實無虛虛若損不足而益有餘則病益甚矣五脈五臟諸陰之脈也如中氣不足則血脈之生原已虛再大瀉其諸陰之脈是虛於中而脫於外也三脈三陽之脈恇怯也言盡瀉三陽之氣令病人怯然不復也奪陰者死言取人之五里五往者也玉版篇曰迎之五里中道而止五至而已五往而臟之氣盡矣奪陽者狂正言取之五里而或奪其陽也此論針之為害畢矣張開之曰取尺之五里取皮膚陽分之氣血也而曰奪陰者謂陽分之氣血生於五臟之陰也病在中氣不足而大瀉諸陰之脈者死謂諸陰之脈生於中焦之陽明陽生於陰而陰生於陽也刺之而氣不至無問其數刺之而氣至乃去之勿復針針各有所宜各不同形各任其所為刺之要氣至而有效效之信若風之吹雲明乎若見蒼天刺之道畢矣此言刺之效以得氣為要也上文言病各有所宜此言針各有宜而有大小長短之形不同各任其所宜而用之也若風之吹雲明乎若見青天邪散而正氣光明也黃帝曰願聞五臟六腑所出之處岐伯曰五臟五輸五五二十五輸六腑六輸六六三十六輸經脈十二絡脈十五凡二十七氣以上下所出為井所溜為滎所注為輸所行為經所入為合二十七氣所行皆在五輸也此言用針者當知臟腑經脈之血氣生始出入夫榮衛氣血皆生於胃腑水穀之精榮行脈中衛行脈外血行脈中氣行脈外然脈內之血氣從絡脈而滲灌於脈外脈外之氣血從絡脈而溜注於脈中外內出入相通也五臟內合五行故其輸五六腑外合六氣故其輸六蓋六氣生於五行而有二火也經脈十二六臟六腑之經脈也絡脈十五臟腑之十二大絡及督脈之長強任脈之尾翳脾之大包凡二十七脈之血氣出入於上下手足之間所出為井所溜為滎所注為輸所行為經所入為合此二十七氣之所行皆在於五輸蓋十二經脈之血氣本於五臟五行之所生而脈外皮膚之氣血出於五臟之大絡溜注於滎輸而與脈內之血氣相合於肘膝之間此論臟腑經脈之血氣出入節之交三百六十五會知其要者一言而終不知其要流散無窮所言節者神氣之所遊行出入也非皮肉筋骨也此言刺節者當知神氣之所出入也神氣者真氣也所受於天與穀氣並而充身者也故知其要一言而終不知其要流散無窮此絡脈之滲灌諸節非皮肉筋骨也觀其色察其目知其散復一其形聽其動靜知其邪正右主推之左持而御之氣至而去之此言上工觀五色於目知色之散復即知病之散復矣知其邪正者知論虛邪與正邪之風也右主推之左持而御之者言持針而出入也氣至而去之者言補瀉氣調而去之也凡將用針必先診脈視氣之劇易乃可以治也五臟之氣已絶於內而用針者反實其外是謂重竭重竭必死其死也靜治之者輒反其氣取腋與膺五臟之氣已絶於外而用針者反實其內是謂逆厥逆厥則必死其死也躁治之者反取四末此言用針者必先診脈視五臟之氣劇易乃可以治也所謂五臟之氣已絶於內者脈口氣內絶不至反取其外之病處與陽經之合有留針以致陽氣陽氣至則內重竭重竭則死矣無氣以動故靜此言五臟之陰生於中焦之陽故外致其陽則內重竭矣五臟之氣已絶於外者脈口氣外絶不至反取其四末之輸有留針以致其陰氣陰氣至則陽氣反入入則逆逆則死矣其死也陰氣有餘故躁此言陰內而陽外陽氣內入則為逆矣刺之害中而不去則精泄害中而去則致氣精泄則病益甚而恇致氣則生為癰瘍此言取氣之太過不及而皆能為害也夫氣生於精故刺之害中病而不去其針則過傷其氣而致泄其生原故病益甚而恇刺之害中而即去其針邪未盡而正氣未復則致氣留聚而為癰瘍癰疽篇曰經脈流行不止與天同度與地合紀天宿失度日月薄蝕地經失紀水道流溢血脈榮衛周流不休氣血不通故為癰腫蓋榮衛氣血運行於外內上下之不息也是以首篇與第八十一篇始終論精氣之生始出入若陰陽不調血氣留滯則為癰瘍矣五臟有六腑六腑有十二原十二原出於四關四關主治五臟五臟有疾當取之十二原十二原者五臟之所以稟三百六十五節氣味也五臟有疾也應出十二原十二原各有所出明知其原睹其應而知五臟之害矣陽中之少陰肺也其原出於太淵太淵二陽中之太陽心也其原出於大陵大陵二陰中之少陽肝也其原出於太衝太衝二陰中之至陰脾也其原出於太白太白二陰中之太陰腎也其原出於太溪太溪二膏之原出於鳩尾鳩尾一肓之原出於脖胦脖胦一凡此十二原者主治六腑五臟之有疾者也脹取三陽飧泄取三陰肓音荒此論氣味所生之津液從臟腑之膏肓外滲於皮膚絡脈化赤為血榮於經俞注於臟腑外內出入之相應也津液者水穀氣味之所生也中焦之氣蒸津液化其精微發泄於腠理淖澤注於骨補益腦髓潤澤皮膚是津液注於三百六十五節而滲灌於皮膚肌腠者也溢於外則皮肉膏肥余於內則膏肓豐滿蓋膏者臟腑之膏膜肓者腸胃之募原也氣味所生之津液從內之膏肓而淖澤於外是以膏肥之人其肉淖而皮縱緩故能縱腹垂腴外內之相應也癰疽章曰中焦出氣如露上注溪谷而滲孫脈津液和調變化而赤為血血和則孫脈先滿溢乃注於絡脈皆盈乃注於經脈陰陽已張因息乃行行有經紀周有道理與天合同不得休止夫溪谷者皮膚之分肉是津液外注於皮膚從孫絡化赤而注於臟腑之原經故曰十二原者五臟之所以稟三百六十五節氣味也四關者兩肘兩腋兩髀兩膕皆機關之室真氣之所過血絡之所遊行者也十二原出於四關四關主治五臟者謂臟合腑而腑有原原有關而關應臟臟腑陰陽相合外內出入之相通也故曰明知其原睹其應而知五臟之害矣肝心脾肺腎內之五臟也陽中之少陰陰中之少陽五臟之氣也故臟腑有病取之經脈之原脹取三陽飧泄取三陰此病在三陰三陽之氣而取之氣也此節論血氣生始出入之原故篇名九針十二原謂九針之道與陰陽血氣之相合也今夫五臟之有疾也譬猶刺也猶汙也猶結也猶柿也刺雖久猶可拔也汙雖久猶可雪也結雖久猶可解也柿雖久猶可決也或言久疾之不可取者非其說也夫善用針者取其疾也猶拔刺也猶雪汙也猶解結也猶決柿也疾雖久猶可畢也言不可治者未得其術也柿音卞摶也張開之曰百病之始生也皆生於風雨寒暑陰陽喜怒飲食居處大驚卒恐則血氣分離陰陽破散經絡厥絶脈道不通夫風雨寒暑大驚卒恐猶刺猶汙病從外入者也陰陽喜怒飲食居處猶結猶柿病由內生者也千般疢難不出外內二因是以拔之雪之仍從外解解之決之從內解也知斯二者病雖久猶可畢也言不可治者不得其因也張玉師曰汙在皮毛刺在膚肉結在血脈柿在筋骨刺諸熱者如以手探湯血寒清者如人不欲行陰有陽疾者取之下陵三里正往無殆氣下乃止不下復始也疾高而內者取之陰之陵泉疾高而外者取之陽之陵泉也寒熱風雨寒暑外襲也故刺諸熱者如以手探湯謂熱在皮膚所當淺取之也寒清者內因之虛寒宜深取之靜以守氣故如人不欲行也陰有陽疾者陽邪而入於內也下陵三里在膝下三寸足陽明之經陽明之主闔也正往無殆氣下乃止使即從下解也疾高而內者里陰之病見於上也陰陵泉乃太陰之經太陰之主開也使在內之病從開而上出也蓋言陽病之入於內者即從下解陰病之出於上者即從外解也疾高而外者外邪高而病在外之下也陽陵泉乃少陽之經少陽之主樞也蓋邪在高而欲下入於內故使從樞外出勿使之內入也玉師曰疾高而取陰之陵泉陽之陵泉應司天在泉上下相通從氣而上出也本輸第二黃帝問於岐伯曰凡刺之道必通十二經絡之所終始絡脈之所別處五輸之所留六腑之所與合四時之所出入五臟之所溜處闊數之度淺深之狀高下所至願聞其解按經脈之終始手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹手之三陰從腹走手始於肺而終於肝常榮無已終而復始此血氣循行之終始也本篇論五臟六腑之脈皆出於指井溜於滎注於輸行於經入於合從四肢而通於臟腑此經脈之終始也絡脈之所別處者臟腑之經別大絡與經脈繆處通血脈於孫絡滲出於皮膚者也五臟之所留六腑之所與合謂五臟之五輸六腑之六輸也四時之所出入血氣隨四時之氣而生長收藏也五臟之所溜處謂五臟之血氣溜於脈中變見於氣口五臟之氣血溜於脈外從五里而變見於尺膚此五臟之血氣溜於皮膚經脈之外內者也闊數寬窄也夫經脈有三百六十五穴會絡脈有三百六十五穴會孫絡亦有三百六十五穴會經脈寬大孫絡窄小故有闊數之度也淺深者絡淺而經深也高下所至者血氣之上下循行也岐伯曰請言其次也肺出於少商少商者手大指端內側也為井水溜於魚際魚際者手魚也為滎注於太淵太淵魚後一寸陷者中也為輸行於經渠經渠寸口中也動而不居為經入於尺澤尺澤肘中之動脈也為合手太陰經也次序也井者木上有水乃淡滲皮膚之血從井木而溜於脈中注於輸行於經動而不居行至於肘膝而與經脈中之血氣相合者也肺心肝脾腎內之五臟也膽胃大腸小腸三焦膀胱內之六腑也手足太陰少陰太陽少陽外之經氣也肺出於少商者謂臟腑之血氣從大絡而注於孫絡皮膚之間肺臟所出之血氣從少商而合於手太陰之經也少商在手大指內側去爪甲如韭葉許為井木魚際在大指下高起之白肉際為滎火有如魚腹因以名之太淵在魚後陷中為輸土經渠寸口中動脈為經金尺澤在肘中為合水心出於中衝中衝手中指之端也為井木溜於勞宮勞宮掌中中指本節之內間也為滎注於大陵大陵掌後高骨之間方下者也為輸行於間使間使之道兩筋之間三寸之中也有過則至無過則止為經入於曲澤曲澤肘內廉下陷者之中也屈而得之為合手少陰也手少陰心脈也中衝包絡之經也心主血而包絡主脈君相之相合也心出於中衝者心臟所出之血氣滲於皮膚之間從中衝之井而行於手厥陰之經也間使者君相間行之使道如心臟之血氣有過於包絡之中則至無過於包絡之脈中則止謂止於經處而不行過於肘中與包絡之血脈相合乃自入於手少陰之經也故始曰心末復曰手少陰也然其中皆手厥陰心主包絡之五輸蓋血者心神之化心與胞絡血脈相通心臟所出之血氣間行於手少陰之經手厥陰之經也肝出於大敦大敦者足大趾之端及三毛之中也為井木溜於行間行間足大趾間也為滎注於太衝太衝行間上二寸陷者之中也為輸行於中封中封內踝之前一寸半陷者之中使逆則宛使和則通搖足而得之為經入於曲泉曲泉輔骨之下大筋之上也屈膝而得之為合足厥陰也踝胡瓦切後同宛郁也所行為經者如經行之道路所以通往來之行使故所行之血氣厥逆則鬱滯其間而不行如往來之血氣相和則通行於經脈中矣玉師曰此二句證明脈內之氣血從井而行於合脾出於隱白隱白者足大趾之端內側也為井木溜於大都大都本節之後下陷者之中也為滎注於太白太白腕骨之下也為輸行於商丘商丘內踝之下陷者之中也為經入於陰之陵泉陰之陵泉輔骨之下陷者之中也伸而得之為合足太陰也夫天氣在上水泉在下地居於中脾為陰中之至陰而主坤土不曰陰陵泉而曰陰之陵泉謂地下之泉水也腎出於湧泉湧泉者足心也為井木溜於然谷然谷然骨之下者也為滎注於太溪太溪內踝之後跟之骨上陷者中也為輸行於復溜復溜上內踝二寸動而不休為經入於陰谷陰谷輔骨之後大筋之下小筋之上也按之應手屈膝而得之為合足少陰經也地下之泉水天一之所生也故少陰之始出名曰湧泉復溜者復溜於地中故合穴曰陰谷愚錯綜釋穴名者以明人合天地陰陽五運六氣之道如經穴之部位分寸須詳考銅人圖像即順文添注無補於事反為贅瘤至於刺之留呼灸之壯數更不可執一者也膀胱出於至陰至陰者足小趾之端也為井金溜於通谷通谷本節之前外側也為滎注於束骨束骨本節之後陷者中也為輸過於京骨京骨足外側大骨之下為原行於崑崙崑崙在外踝之後跟骨之上為經入於委中委中膕中央為合委而取之足太陽也太陽之上寒水主之故所出為至陰至陰者盛水也肺者天也水中之生陽上合於天水隨氣而運行於膚表是以首論肺與膀胱應司天在泉之氣運行之無息也通谷通於腎之然谷崑崙水之發源星宿海也膽出於竅陰竅陰者足小趾次趾之端也為井金溜於俠溪俠溪足小趾次趾之間也為滎注於臨泣臨泣上行一寸半陷者中也為輸過於丘墟丘墟外踝之前下陷者中也為原行於陽輔陽輔外踝之上輔骨之前及絶骨之端也為經入於陽之陵泉陽之陵泉在膝外陷者中也為合伸而得之是少陽也五臟合五行六腑應六氣六氣之中有二火故多火之原而原附於經也五臟之輸出於井木者五臟合地之五行以應生長化收藏之氣故從木火土金水而順行六腑之輸出於井金者六腑應天之六氣六氣生於陰而初於地故從秋冬而春夏此陰陽逆順之氣也按本經八十一篇凡論陰陽血氣上下表里左右前後皆逆順而行若順則反逆矣秦越人曰陰井乙木陽井庚金陽井庚者乙之剛也陰井乙乙者庚之柔也乙為木故言陰井木也庚為金故言陽井金也余皆仿此胃出於厲兌厲兌者足大趾內次趾之端也為井金溜於內庭內庭次趾外間也為滎注於陷谷陷谷者上中趾內間上行二寸陷者中也為輸過於衝陽衝陽足胕上五寸陷者中也為原搖足而得之行於解溪解溪上衝陽一寸半陷者中也為經入於下陵下陵膝下三寸胻骨外三里也為合復下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉也大腸屬上小腸屬下足陽明胃脈也大腸小腸皆屬於胃是足陽明也陰陽離合論曰未出地者命曰陰中之陰已出地者命曰陰中之陽太陽根起於至陰名曰陰中之陽陽明根起於厲兌名曰陰中之陽少陽根起於竅陰名曰陰中之少陽是三陽之氣皆生於陰而出於地自下而升從足而上無分手與足也以手足之六經合三陽之氣而後有手足之分焉然論手足之六經非三陽之氣也故曰六腑皆出足之三陽上合於手者也黃載華曰大腸小腸受盛胃腑水穀之餘濟泌別汁而生津液故皆屬於胃是以大腸受胃腑之經氣而屬於巨虛上廉小腸屬巨虛下廉三焦者上合手少陽出於關衝關衝者手小指次指之端也為井金溜於液門液門小指次指之間也為滎注於中渚中渚本節之後陷者中也為輸過於陽池陽池在腕上陷者之中也為原行於支溝支溝上腕三寸兩骨之間陷者中也為經入於天井天井在肘外大骨之上陷者中也為合屈肘乃得之三焦下輸在於足大趾之前少陽之後出於膕中外廉名曰委陽是太陽絡也手少陽經也三焦者足少陽太陰之所將太陽之別也上踝五寸別入貫腨腸出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺遺溺則補之閉癃則瀉之黃載華曰三焦為決瀆之府故下輸出於太陽之絡入絡膀胱約下焦氣閉則癃氣虛則遺溺三焦之主氣也三焦之氣出於腎遊行於上中下而各歸其部出於手少陽之經故曰三焦者上合手少陽夫直行者為經斜絡者為絡此太陽之別絡間於足少陽太陰之間故曰少陽太陰之所將太陽之別也馬玄臺曰腨腸即足腹手太陽小腸者上合手太陽出於少澤少澤小指之端也為井金溜於前谷前谷在手外廉本節前陷者中也為滎注於後溪者在手外側本節之後也為輸過於腕骨腕骨在手外側腕骨之前為原行於陽谷陽谷在鋭骨之下陷者中也為經入於小海小海在肘內大骨之外去端半寸陷者中也伸臂而得之為合手太陽經也黃載華曰大腸小腸皆屬於胃出於陽明之巨虛上下廉故曰手太陽小腸者上合手太陽大腸上合手陽明出於商陽商陽大指次指之端也為井金溜於本節之前二間為滎注於本節之後三間為輸過於合谷合谷在大指歧骨之間為原行於陽溪陽溪在兩筋間陷者中也為經入於曲池在肘外輔骨陷者中屈臂而得之為合手陽明也是謂五臟六腑之輸五五二十五輸六六三十六輸也六腑皆出足之三陽上合於手者也張開之曰大腸小腸皆屬於胃三焦出於足太陽之絡而上合於手少陽之經故六腑皆低於足之三陽上合於手者也夫身半以上為天身半以下為地六腑出於足之三陽者本於足而出於地也缺盆之中任脈也名曰天突一次任脈側之動脈足陽明也名曰人迎二次脈手陽明也名曰扶突三次脈手太陽也名曰天窗四次脈足少陽也名曰天容五次脈手少陽也名曰天牖六次脈足太陽也名曰天柱七次脈頸中央之脈督脈也名曰風府腋內動脈手太陰也名曰天府腋下三寸手心主也名曰天池手足十二經脈合於三陰三陽三陰三陽天之六氣也運行於地之外臟腑雌雄相合地之五行也內居於天之中本篇論三陰三陽之經氣從四方而內榮於臟腑應天氣之貫乎地中此復論三陽之脈循序而上於頸項應陽氣之出於地外任督二脈並出於腎主通先天之陰陽手太陰心主並出於中焦主行後天之氣血陰陽血氣又從下而上中而外也玉師曰經脈應地之經水上通於天故有天突天窗天容天牖天柱天府天池及風府之名刺上關者呿不能缺刺下關者缺不能呿刺犢鼻者屈不能伸刺兩關者伸不能屈呿音區呿大張口貌缺撮口出氣也上關即客主人穴系足少陽經刺上關者必開口有空故呿不能缺下關足陽明經穴必合口乃得之故刺下關者缺不能呿犢鼻系足陽明胃經穴必屈足以取之故屈不能伸兩關係手厥陰經之內關必伸手以取之故伸不能屈夫口者元氣出入之門戶手足者陰陽之上下也呿缺者應開闔之變屈伸者應往來之不窮孔子曰屈伸相感而利生焉足陽明挾喉之動脈也其輸在膺中手陽明次在其輸外不至曲頰一寸手太陽當曲頰足少陽在耳下曲頰之後手少陽出耳後上加完骨之上足太陽挾項大筋之中髮際陰前節論三陽之經氣從下而上此復論從上而下所謂陽氣者上行極而下也動輸篇曰足之陽明胃氣上注於肺其悍氣上衝頭者循咽上走空竅循眼系入絡腦出顑下客主人循牙車合陽明並下人迎此陽明之氣從下而上至於腦復從上而下合陽明之經從人迎而下於膺胸之輸而三陽之氣亦復循次而在其輸外此陽氣之上下以應天氣之升降也尺動脈在五里五輸之禁也此論臟腑之陰陽血氣循手太陰陽明之經從內而外外而內往來逆順之不息也尺動脈手太陰之兩脈口五里手陽明之經穴在肘上三寸五輸五臟之井滎輸經合也夫五臟之血氣行於脈中者變見於手太陰之兩脈口五臟之氣血從經別而行於脈外者循手陽明變見於尺膚手太陰脈中之血氣從指腕而行於肘臂手陽明脈外之氣血從臂肘而行於尺膚往來逆順於皮膚經脈之外內蓋手太陰主周身之氣而朝百脈手陽明乃其腑也腑為陽故行氣血於脈外臟為陰主行血氣於脈中充於周身皮膚經脈之血氣往來逆順之不息者從手太陰陽明始也是以迎之五里中道而止若五往而取之則五輸之血氣皆絶故曰尺動脈在五里五輸之禁也謂尺中所動之氣血從五里之脈外而來者也上節論陽氣之上下以應天氣之升降此論血氣之出入以應天地之精水布雲氣於天下復通貫於地中按皮膚之氣血從手足之指井溜注於脈中而合於肘膝間故曰尺動脈在五里五輸之禁也肺合大腸大腸者傳道之府心合小腸小腸者受盛之府肝合膽膽者中精之府脾合胃胃者五穀之府腎合膀胱膀胱者津液之府也少陽屬腎腎上連肺故將兩臟三焦者中瀆之府也水道出焉屬膀胱是孤之腑也是六腑之所與合者盛葉成道同導此論六臟六腑陰陽相合藏貨物曰腑六腑受盛水穀傳化糟粕受藏精汁故名曰腑大腸者傳道之官變化出焉故為傳道之府小腸者受盛之官化物出焉故為受盛之府膽主藏精汁故為中精之府胃為倉廩之官主受納水穀故為五穀之府膀胱者州都之官津液藏焉故為津液之府少陽三焦也水熱穴論曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其脈在肺皆積水也是一腎配少陽而主火一腎上連肺而主水故腎將兩臟也三焦之脈出於中胃入絡膀胱約下焦而主決瀆故為中瀆之府水道出焉而下屬膀胱夫三焦者少陽之氣水中之生陽也手厥陰包絡之相火出於右腎歸於心下之包絡而為一臟三焦為之腑是兩腎以膀胱為腑三焦歸於中胃為包絡之腑故為孤之腑也夫兩腎者主天一之水地二之火分而論之猶兩儀也故少陽屬腎腎上連肺而為兩臟合而論之陰陽相貫水火互交並主藏精而為生氣之原故皆以膀胱為腑三焦上合包絡而為孤之腑也再按三焦乃少陽之氣發於腎臟遊行於上下通會於腠理乃無形之氣也上焦出胃上口中焦亦並胃中下焦者別回腸此三焦所歸之部署也故平脈篇曰三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消穀引食下焦不歸者則遺溲是三焦之氣生於腎臟而歸於中胃之間本經論三焦所出之處即平脈篇所歸之部署也本無形之氣故能遊行出入歸於有形之部故為一腑而有經穴也手厥陰包絡之氣地二之陰火也發原於腎臟而歸於包絡包絡正在心下包裹心主所生之血為君主之相代君行血於脈中其氣本於腎心下有形之包絡亦所歸之部署也故以先天之氣論之則少陽屬腎腎將兩臟以後天有形之臟腑論之包絡正在心下三焦居中胃之間而為一臟一腑也春取絡脈諸滎大筋分肉之間甚者深取之間者淺取之夏取諸輸孫絡肌肉皮膚之上秋取諸合余如春法冬取諸井諸輸之分故深而留之此四時之序氣之所處病之所舍臟之所宜轉筋者立而取之可令遂已痿厥者張而刺之可令立快也此論陰陽氣血又隨四時之生長收藏而淺深出入者也春時天氣始開人氣在脈故宜取絡脈夏氣在孫絡長夏氣在肌肉故宜取孫絡肌肉皮膚之上此春夏之氣從內而外也秋氣降收故如春法蓋復從孫絡而入於絡脈也冬氣收藏故欲深而留之此四時出入之序人氣之所處病之所舍五臟應五時之所宜也春取滎夏取輸秋取合冬取井皆從子以行母氣也轉筋者病在筋痿者兩臂不舉厥者兩足厥逆也張者仰臥而張大其四肢立之張之應天地之上下四旁四時之氣得以往來流行而無阻滯矣故伸舒其四體則筋脈血氣之厥逆者可令立快也此言人之氣血隨四時之氣流行阻則為攣厥之病故當伸舒四體以順四時之氣焉小針解第三所謂易陳者易言也難入者難著於人也粗守形者守刺法也上守神者守人之血氣有餘不足可補瀉也神客者正邪共會也神者正氣也客者邪氣也在門者邪循正氣之所出入也未睹其疾者先知邪正何經之疾也惡知其原者先知何經之病所取之處也刺之微在數遲者徐疾之意也粗守關者守四肢而不知血氣正邪之往來也上守機者知守氣也機之動不離其空中者知氣之虛實用針之徐疾也空中之機清靜以微者針以得氣密意守氣勿失也其來不可逢者氣盛不可補也其往不可追者氣虛不可瀉也不可掛以發者言氣易失也扣之不發者言不知補瀉之意也血氣已盡而氣不下也知其往來者知氣之逆順盛虛也要與之期者知氣之可取之時也粗之暗者冥冥不知氣之微密也妙哉工獨有之者盡知針意也往者為逆者言氣之虛而小小者逆也來者為順者言形氣之平平者順也明知逆順正行無間者言知所取之處也迎而奪之者瀉也追而濟之者補也所謂虛則實之者氣口虛而當補之也滿則泄之者氣口盛而當瀉之也宛陳則除之者去血脈也邪勝則虛之者言諸經有盛者皆瀉其邪也徐而疾則實者言徐內而疾出也疾而徐則虛者言疾內而徐出也言實與虛若有若無者言實者有氣虛者無氣也察後與先若存若亡者言氣之虛實補瀉之先後也察其氣之已下與常存也為虛為實若得若失者言補者佖然若有得也瀉則恍然若有失也夫氣之在脈也邪氣在上者言邪氣之中人也高故邪氣在上也濁氣在中者言水穀皆入於胃其精氣上注於肺濁溜於腸胃言寒溫不適飲食不節而病生於腸胃故命曰濁氣在中也清氣在下者言清濕地氣之中人也必從足始故曰清氣在下也針陷脈則邪氣出者取之上針中脈則邪氣出者取之陽明合也針太深則邪氣反沉者言淺浮之病不欲深刺也深則邪氣從之入故曰反沉也皮肉筋脈各有所處者言經絡各有所主也取五脈者死言病在中氣不足但用針盡大瀉其諸陰之脈也取三陽之脈者唯言盡瀉三陽之氣令病人恇然不復也奪陰者死言取尺之五里五往者也奪陽者狂正言也睹其色察其目知其散復一其形聽其動靜者言上工知相五色於目有知調尺寸小大緩急滑澀以言所病也知其邪正者知論虛邪與正邪之風也右主推之左持而御之者言持針而出入也氣出而去之者言補瀉氣調而去之也調氣在於終始一者持心也節之交三百六十五會者絡脈之滲灌諸節者也所謂五臟之氣已絶於內者脈口氣內絶不至及取其外之病處與陽經之合有留針以致陽氣陽氣至則內重竭重竭則死矣其死也無氣以動故靜所謂五臟之氣已絶於外者脈口氣外絶不至反取其四末之輸有留針以致其陰氣陰氣至則陽氣反入入則逆逆則死矣其死也陰氣有餘故躁所以察其目者五臟使五色循明循明則聲章聲章者則言聲與平生異也佖音弼張開之曰此解小針之義而九針之論不與焉佖滿也恍惚也所以察其目者承上文而言也目色者五臟之血色聲章者五臟之氣也五色循明則聲章者血氣之相應也言聲與平生異者散敗之聲也蓋言五臟之氣已絶於內不宜重取之陽五臟之氣已絶於外不宜再取之陰陰陽外內相資宜藏而不宜盡章著於外也邪氣臟腑病形第四黃帝問於岐伯曰邪氣之中人也奈何岐伯答曰邪氣之中人高也黃帝曰高下有度乎岐伯曰身半以上者邪中之也身半以下者濕中之也故曰邪之中人也無有常中於陰則溜於腑中於陽則溜於經此篇論臟腑陰陽色脈氣血皮膚經脈外內相應能參合而行之可為上工邪氣者風雨寒暑天之邪也故中人也高濕乃水土之氣故中於身半以下此天地之邪中於人身而有上下之分然邪之中人又無有恆常或中於陰或中於陽或溜於腑或入於臟黃帝曰陰之與陽也異名同類上下相會經絡之相貫如環無端邪之中人或中於陰或中於陽上下左右無有恆常其故何也岐伯曰諸陽之會皆在於面中人也方乘虛時及新用力若飲食汗出腠理開而中於邪中於面則下陽明中於項則下太陽中於頰則下少陽其中於膺背兩脅亦中其經黃帝曰其中於陰奈何岐伯答曰中於陰者常從臂胻始夫臂與胻其陰皮薄其肉淖澤故俱受於風獨傷其陰黃帝曰此故傷其臟乎岐伯答曰身之中於風也不必動臟故邪入於陰經則其臟氣實邪氣入而不能客故還之於腑故中陽則溜於經中陰則溜於腑胻音行此論皮膚之氣血與經絡相通而內連臟腑也陰之與陽者謂臟腑之血氣雖有陰陽之分然總屬一氣血耳故異名而同類上下相會者標本之出入也經絡之相貫謂榮血之循行從手太陰出注手陽明始於肺而終於肝從肝復上注於肺環轉之無端也上下左右頭面手足也或在於頭面而中於陽或在臂胻而中於陰故無有恆常也諸陽之會皆在於面者精陽之氣皆上於面而走空竅也中於面則下陽明中於項則下太陽中於頰則下少陽此手足三陽之絡皆循項頸而上於頭面膺背兩脅者復循頭項而下於胸脅肩背也此三陽絡脈所循之處外之皮膚即三陽之分部邪之客於人也必先舍於皮毛留而不去入舍於絡脈下者謂三陽皮部之邪下入於三陽之經故曰中於陽則溜於經臂胻者手臂足胻之內側乃三陰絡脈所循之處外側為陽內側為陰其陰皮薄其肉淖澤故中於陰者嘗從臂胻始始者始於三陰之皮部而入於三陰之絡脈也繆刺篇曰邪之客於形也必先舍於皮毛留而不去入舍於孫脈留而不去入舍於絡脈留而不去入舍於經脈內連五臟散於腸胃蓋五臟之脈屬臟絡腑六腑之脈屬腑絡臟臟腑經脈之相通也夫血脈為陰五臟之所主也故邪入於經其臟氣實邪氣入而不能客故還之於腑散於腸胃陽明居中土為萬物之所歸邪歸於陽明之腸胃而無所復傳矣黃帝曰邪之中人臟奈何岐伯曰愁憂恐懼則傷心形寒飲冷則傷肺以其兩寒相感中外皆傷故氣逆而上行有所墮墜惡血留內若有所大怒氣上而不下積於脅下則傷肝有所擊僕若醉入房汗出當風則傷脾有所用力舉重若入房過度汗出浴水則傷腎黃帝曰五臟之中風奈何岐伯曰陰陽俱感邪乃得往黃帝曰善哉此論臟氣傷而邪中於臟也夫邪中於陰而溜腑者臟氣實也臟氣者神氣也神氣內藏則血脈充盛若臟氣內傷則邪乘虛而入矣風為百病之長善行而數變陰陽俱感外內皆傷也本經云八風從其虛之鄉來乃能病人三虛相搏則為暴病卒死此又不因內傷五臟而邪中於臟也故聖人避風如避矢石焉上節論內養神志下節論外避風邪黃帝問於岐伯曰首面與身形也屬骨連筋同血合於氣耳天寒則裂地凌冰其卒寒或手足懈惰然而其面不衣何也岐伯答曰十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為睛其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上熏於面而皮又厚其肉堅故天熱甚寒不能勝之也此論臟腑經絡之氣血滲於脈外而上注於空竅也屬骨連筋者謂首面與形身之筋骨血氣相同也夫太陰為陰中之至陰在地主土在人屬於四肢天寒則裂地凌冰其卒寒或手足懈惰此脾土之應地也其血氣皆上於面天熱甚寒不能勝之謂陰陽寒暑之氣皆從下而上身半以上之應天也夫十二經脈三百六十五絡之血氣始於足少陰腎生於足陽明胃主於手少陰心朝於手太陰肺精陽氣者心腎神精之氣上走於目而為睛彆氣者心腎之氣別走於耳而為聽也宗氣者胃腑所生之大氣積於胸中上出於肺以司呼吸故出於鼻而為臭濁氣者水穀之精氣故出於胃走唇舌而為味氣之津液上熏於面者津液隨氣上行熏膚澤毛而注於空竅也夫肺主皮而屬天脾主肉而應地皮厚肉堅天之寒熱不能勝之人氣之勝天也此章論頭面為諸陽之會是以三陽之脈上循於頭然陰陽寒熱之氣皆從下而升於上故復論諸脈之精氣焉黃帝曰邪之中人其病形何如岐伯曰虛邪之中身也灑淅動形正邪之中人也微先見於色不知於身若有若無若亡若存有形無形莫知其情黃帝曰善哉此論人氣與天氣之相合也風寒暑濕燥火天之六氣也而人亦有此六氣是以正邪之中人也微見於色色氣色也中於氣故微見於色不知於身若有若無若亡若存夫天之六氣有正有邪如虛邪之中於身也灑淅動形虛者八正之虛邪氣形者皮肉筋脈之有形此節論天地之氣中於人也有病在氣而見於色者有病在形而見於脈者有病在氣而見於尺膚者有病在形而見於尺脈者有病在氣而應於形者有病在形而應於氣者邪之變化無有恆常而此身之有形無形亦莫知其情故能參合而行之者斯可為上工也玉師曰天之正氣而偏寒偏熱偏濕偏燥故曰正邪黃帝問於岐伯曰余聞之見其色知其病名曰明按其脈知其病命曰神問其病知其處命曰工余願聞見而知之按而得之問而極之為之奈何岐伯答曰夫色脈與尺之相應也如鼓桴影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為工知二則為神知三則神且明矣黃帝曰願卒聞之岐伯答曰色青者其脈弦也赤者其脈鉤也黃者其脈代也白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣此論色脈與尺之相應如桴鼓影響不得相失者也夫精明五色者氣之華也乃五臟五行之神氣而見於色也脈者榮血之所循行也尺者謂脈外之氣血循手陽明之絡而變見於尺膚脈內之血氣從手太陰之經而變見於尺寸此皆胃腑五臟所生之氣血本末根葉之出候也形肉謂尺膚也知色脈與尺之三者則神且明矣青黃赤白黑五臟五行之氣色也弦鉤代毛石五臟五行之脈象也如影響之相應者也故色青者其脈弦色赤者其脈鉤見其色而得脈之相應猶坤道之順承天也如色青而反見毛脈色赤而反見石脈此陰陽五行之反勝故死如色青而得石脈色赤而得代脈此色生於脈陽生於陰得陽生陰長之道故其病已矣黃帝問於岐伯曰五臟之所生變化之病形何如岐伯答曰先定其五色五脈之應其病乃可別也黃帝曰色脈已定別之奈何岐伯曰調其脈之緩急大小滑澀而病變定矣黃帝曰調之奈何岐伯答曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六此論五臟所生之病別其變化先當調其五色五脈色脈已定而後調其尺膚與尺寸之脈夫尺膚之氣血出於胃腑水穀之精注於臟腑之經隧而外布於皮膚寸口尺脈之血氣出於胃腑水穀之精榮行於臟腑經脈之中變見於手太陰之兩脈口皆五臟之血氣所注故脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩如桴鼓之相應也故善調尺者不待於寸口之脈善調脈者不待於五者之色能參合而行之斯可為上工矣夫數始於一奇二偶合而為三三而兩之成六三而三之成九此三才三極之道也生於一而成於十陰陽相得而各有合此河圖之數也知者知天地陰陽始終變化之道故能全九十之大數水數成於六火數成於七水即是精血火即是神氣中工僅知血氣之診故能全水火之成下工血氣之診亦不能全知矣故曰能參合而行之者可以為上工行者謂色脈應天地陰陽之理數賢者則而行之黃帝曰請問脈之緩急大小滑澀之病形何如岐伯曰臣請言五臟之病變也心脈急甚者為瘈瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行時唾血大甚為喉吤微大為心痹引背善淚出小甚為善噦微小為消疸滑甚為善渴微滑為心疝引臍小腹鳴澀甚為喑微澀為血溢維厥耳鳴顛疾噦音誨如車驚聲而有節此論五臟各有六者之變病本於寒熱血氣之不和與外受邪氣內傷憂恐之不同也緩急大小滑澀陰陽寒熱血氣之綱領也下章曰諸急多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱澀者多血少氣微有寒心為火臟故寒甚則為瘈瘲蓋手足諸節神氣之所遊行出入寒傷神氣故瘈瘲也微急為心痛引背蓋甚則心臟之神氣受傷微則薄於宮城之分也食氣入胃濁氣歸心心氣逆故食不下緩甚則心氣有餘心藏神神有餘則笑不休伏梁乃心下有餘之積故微主邪薄於心下也心主血熱則上溢而時唾血也喉吤者喉中吤然有聲宗氣積於胸中上出喉嚨以貫心脈而行呼吸心氣盛故喉中有聲也心氣微盛則逆於心下而為心痹引背行於上則心精隨氣上湊於目而淚出矣心臟虛則火土之氣弱故為善噦噦厄逆也夫五臟主藏精者也五臟之血氣皆少則津液枯竭而為消疸消疸者三消之證心肺主上消脾胃主中消肝腎主下消也滑則陽氣盛而有熱盛於上則善渴微在下則少腹當有形也心主言心氣少故為喑血多故溢於上也維四維也心為陽中之太陽陽氣少故手足厥冷也南方赤色入通於心開竅於耳心氣虛故耳鳴顛疾按金匱要略曰五臟病各有十八合為九十病蓋一臟有六變三六而變引十八病玉師曰緩急大小滑澀五臟之六變也五六而變為三十三而三之合為九十惟智者明之故曰上工十全九肺脈急甚為癲疾微急為肺寒熱怠惰咳唾血引腰背胸若鼻息肉不通緩甚為多汗微緩為痿瘻偏風頭以下汗出不可止大甚為脛腫微大為肺痹引胸背起惡日光小甚為泄微小為消疸滑盛為息賁上氣微滑為上下出血澀甚為嘔血微澀為鼠瘻在頸支腋之間下不勝其上其應善痠矣賁音奔痠音酸肺主清金而畏寒寒甚則為癲疾所謂重陰則癲也肺寒熱者皮寒熱也寒在皮毛故微急也主肺氣怠惰咳唾血引腰背胸鼻若有息肉而氣不通皆肺氣虛寒之所致緩則熱甚故多汗肺熱葉焦則為痿也鼠瘻寒熱病也其本在臟其末在脈肺主百脈是以微澀之有熱微澀之有寒皆為鼠瘻在頸腋之間本經曰偏枯身偏不用病在分腠之間蓋病在皮膚為肺寒熱病在血脈為寒熱鼠瘻在分腠則為偏風肺主周身之氣而朝百脈也腠理開故頭以下汗出不可止頭以下者頸項胸背之間肺之外部也大主多氣少血氣盛於下則為脛腫微盛於上則為肺痹引胸背蓋氣從下而上也日光太陽之火陰血少故惡日光金畏火也小則氣血皆虛而為泄肺與大腸為表裡也微小則為消疸肺主津水之生原也滑主陽氣盛故為息賁上氣微則上下出血血隨氣行者也澀主多血少氣血多氣少則血留不行故為嘔血痠者陰寒而痠削不能行肺主氣而發原在下少氣有寒則下不勝其上矣肝脈急甚者為惡言微急為肥氣在脅下若覆杯緩甚為善嘔微緩為水瘕痹也大甚為內癰善嘔衄微大為肝痹陰縮咳引小腹小甚為多飲微小為消疸滑甚為㿉疝微滑為遺溺澀甚為溢飲澀微為瘈攣筋痹㿉音頽肝主語在志為怒肝苦急故急甚為惡言微急為肥氣在脅下若覆杯皆有餘之氣也食氣入胃散精於肝緩主多熱熱則肝氣逆故善嘔水瘕痹者亦食飲之所積也本經曰喜怒不測飲食不節陰氣不足陽氣有餘榮氣不行乃發為癰大主肝氣盛盛則鬱怒而不得疏達故為內癰嘔衄肝氣逆於上也陰縮肝氣逆於下也肝脈抵少腹上注肺咳引小腹者經氣逆於上下也小者血氣皆少少則木火盛故多飲及為消疸也滑主氣盛而熱故為㿉疝肝主疏泄肝氣盛而熱故遺溺也溢飲者飲留於四肢則經脈阻滯故脈澀肝氣虛而有寒故為瘈攣筋痹肝主筋也脾脈急甚為瘈瘲微急為膈中食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無病大甚為擊僕微大為疝氣腹裡大膿血在腸胃之外小甚為寒熱微小為消疸滑甚為㿉癃微滑為蟲毒蛔蠍腹熱澀甚為腸㿉微澀為內㿉多下膿血蛔音回同蛔瘈者急而收引瘲者縱而懈弛脾主四肢故急甚為瘈瘲脾有寒不能運化飲食故為膈中食飲入而還出後沃沫蓋不能遊溢津液上歸於肺四布於皮毛故涎沫之從口出也痿厥風痿皆四肢癱瘓而不為所用甚則從中而病見於外微則病在外而不及於中故心慧然若無病也大乃太過之脈脾為孤臟中央土以灌四旁太過則令人四肢不舉故為擊僕若擊之而仆地也疝氣腹裡大膿血在腸胃之外皆有餘之積聚也寒熱者血氣虛也脾虛而不能為胃行其津液故為消疸脾為陰濕之土濕熱則為疝㿉為小便閉癃濕熱則生蟲也脾氣虛而有寒則為腸㿉多血少氣故下膿血也腎脈急甚為骨癲疾微急為沉厥奔豚足不收不得前後緩甚為折脊微緩為洞洞者食不化下嗌還出大甚為陰痿微大為石水起臍以下至小腹腄腄然上至胃脘死不治小甚為洞泄微小為消疸滑盛為癃㿉微滑為骨痿坐不能起起則目無所見澀甚為大癰微澀為不月沉痔腎為陰臟而主骨陰寒太甚故為骨癲疾腎為生氣之原正氣虛寒則為沉厥虛氣反逆故為奔豚陰寒在下故足不收腎開竅於二陰氣虛不化故不得前後也督脈屬腎貫脊緩則督脈懈弛故脊折也戊癸合而化生火土以消入胃之食飲腎氣緩故食不化而還出也陰痿者陰器痿而不舉石水腎水也上至胃脘水泛而土敗也腎氣虛則為洞泄精血不足則為消疸腎有熱則為小便閉癃為睪丸腫㿉骨痿坐不能起熱傷腎氣也目無所見熱傷骨精也血氣皆始於腎澀則血氣阻滯故為大癰氣血不行故為女子不月為沉痔黃帝曰病之六變者刺之奈何岐伯答曰諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱澀者多血少氣微有寒是故刺急者深內而久留之刺緩者淺內而疾髮針以去其熱刺大者微瀉其氣無出其血刺滑者疾髮針而淺內之以瀉其陽氣而去其血刺澀者必中其脈隨其逆順而久留之必先按而循之已髮針疾按其痏無令其出血以和其脈諸小者陰陽形氣俱不足勿取以針而調以甘藥也內葉訥瀉本作寫去聲痏音委六變者五臟之所生變化之病形有緩急大小滑澀之六脈此緣陰陽血氣寒熱之不和而變見於脈也寒氣收徑故脈急熱氣散弛故脈緩宗氣榮氣行於脈中衛氣行於脈外故大主多氣如血氣皆少則脈小也陽氣盛而微有熱則脈行滑利氣少則脈行澀滯血隨氣行者也深內而久留之者俟陽氣至而針下熱也淺內而疾髮針者去其熱也氣盛者微瀉其氣無出其血使陰陽血氣之和調也滑者疾髮針而淺內之瀉脈外之陽熱也針者必中其脈隨其逆順而久留之調經脈外內之血氣也必先按而循之致脈外之氣也疾按其痏無令其出血以和其脈無令皮膚之血出使脈外之氣以和於脈中也夫針者所以調陰陽血氣之不和若血氣皆少者必須調以甘藥非針之可能資生也按刺澀者曰必中其脈要知刺急刺緩取脈外之氣也刺大刺滑瀉脈外之陽以和脈內之血也刺澀者必中其血隨其逆順必先按而循之調脈內之血以致脈外之氣也勿取以針調以甘藥者血氣之生於陽明也當知血氣乃胃腑水穀之精有行於皮膚之外者有行於經脈之內者外內貫通環轉不息故善調尺者不待於寸善調脈者不待於色能參合而行之可為上工上工者知陰陽血氣之終始出入者也黃帝曰余聞五臟六腑之氣滎輸所入為合令何道從入入安連過願聞其故岐伯答曰此陽脈之別入於內屬於腑者也按臟腑之十二經脈出於指井者受皮膚之氣血溜於滎注於輸入於肘膝而為合故帝問五臟六腑之氣滎輸所入為合令何道從入入安連過謂從滎輸所入為合之氣血從何道而入入安所連而為合安所行過而相連帝總問五臟六腑者蓋欲訪明臟之五輸腑之六輸所出所入之原流然此已論於本輸篇內故伯只答六腑之合皆在於足之原因再按脈外之衛氣出於足之陽明上衝於頭面散行於三陽脈外之氣血從手陽明之五里布散於膚表是手足諸陽之氣皆從上而下復從足趾井入於脈中從足而交於手故曰六腑之經脈皆出於足之三陽上合於手也此陽氣之出於地中運行於天表復從下而貫於地脈經水之中黃帝曰滎輸與合各有名乎岐伯答曰滎輸治外經合治內腑黃帝曰治內腑奈何岐伯曰取之於合黃帝曰合各有名乎岐伯答曰胃合於三里大腸合入於巨虛上廉小腸合入於巨虛下廉三焦合入於委陽膀胱合入於委中央膽合入於陽陵泉黃帝曰取之奈何岐伯答曰取之三里者低跗取之巨虛者舉足取之委陽者屈伸而索之委中者屈而取之陽陵泉者正豎膝豫之臍下至委陽之陽取之取諸外經者揄申而從之揄音於引也抒也此申明三陽之氣外合於三陽之經三陽之經內合於六腑也所謂太陽少陽陽明者三陽之氣也運行於脈外與六腑之經脈相合脈外之氣與經脈合於滎輸之間是以滎輸治外經治在外之經脈也脈內之血氣與三陽之氣合於肘膝之間是以合治內腑蓋脈中之血氣六腑之所出也三里巨虛皆足陽明之經巨虛上下廉乃手太陽陽明之合故取三里者低跗取之以足經之在下也巨虛者舉足取之欲其伸舒於上也委陽者足太陽之經三焦之合屈伸而索之者索三焦之氣往來於上下也膀胱主水故屈而取之少陽屬木故豎膝豫之使木氣之條達也臍下至委陽之陽取之者謂膽與三焦總屬少陽之氣也蓋言在經脈則有手足之分合於三陰三陽之氣又無分手與足也取諸外經者取五臟六腑之滎輸也揄申而取之者伸舒其四體使經脈之流通也帝始問五臟六腑之滎輸伯只答六腑之合而未言取諸外經君臣反復問答蓋以詳明陰陽血氣之出入經脈外內之貫通黃帝曰願聞六腑之病岐伯答曰面熱者足陽明病魚絡血者手陽明病兩跗之上脈堅陷者足陽明病此胃脈也此復申明脈外之氣血從手足陽明之所出也衛氣者乃陽明之悍氣上衝於頭循目眥耳前散行於三陽復循牙車合陽明並下人迎合於頷脈注足陽明以下行至跗上故曰面熱者足陽明病蓋以徵衛氣之悍熱太過而上行於面也兩跗之上脈堅陷者足陽明病蓋以徵陽明之氣合於頷脈以下行至跗上也陽明之氣下合於胃脈故曰此胃脈也夫五臟六腑之經脈外合於六氣則為陽明為太陽為太陰內合於臟腑則為胃脈為心脈腎脈也蓋臟腑之氣內合五行五行外合於六氣者也胃腑所出之血氣別走於脈外者注臟腑之大絡從大絡而外滲於孫絡皮膚循手陽明之經大會於尺膚以上魚猶脈內之血氣大會於手太陰之尺寸也故曰魚絡血者手陽明病蓋以徵脈外之氣血大會於手陽明也是以帝問六腑之病而伯先答手足之陽明然後論及六腑蓋以申明脈外之氣血出於手足之陽明也本經多因病假針以明陰陽血氣之生始出入臟腑經脈之外內貫通學者識之無忽大腸病者腸中切痛而鳴濯濯冬日重感於寒即泄當臍而痛不能久立與胃同候取巨虛上廉大腸者傳道之官故病則腸中切痛而鳴濯濯陽明秉清金之氣故冬日重感於寒即瀉當臍而痛大腸主津液津液者淖澤注於骨故病而不能久立也大腸屬胃故與胃同候取胃經之巨虛上廉胃病者腹䐜脹胃脘當心而痛上肢兩足膈咽不通食飲不下取之三里也腹者腸胃之郛郭胃脘在鳩尾內正當心處故病則腹䐜脹胃脘當心而痛上肢心肺之分兩脅肝之分也食飲入胃散精於肝濁氣歸心輸布於肺胃病則氣逆而不能轉輸是以上肢兩脅膈咽不通食飲不下當取之三里也小腸病者小腹痛腰脊控睪而痛時窘之後當耳前熱若寒甚若獨肩上熱甚及手小指次指之間熱若脈陷者此其候也手太陽病也取之巨虛下廉睪音皋陰丸也小腸病者謂病小腸之腑氣也小腸名赤腸為受盛之府上接於胃下通大腸從闌門濟泌別汁而滲入膀胱其氣與膀胱相通是以小腹痛腰脊控睪而痛時窘之後當耳前熱者病腑氣而痛窘之後則入於手之經脈矣手太陽之脈起於小指之端循臂出肩解上頰入耳中至目眥脈陷者此太陽之經脈病也故首提曰小腸病末結曰手太陽病是腑氣之從下而上合於手太陽之經故當取之巨虛下廉三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹候在足太陽之外大絡大絡在太陽少陽之間亦見於脈取委陽三焦者下約膀胱為決瀆之府病則氣不輸化是以膈氣滿而不得小便也不得小便則窘急而水溢於上留於腹中而為脹候在足太陽經外之大絡大絡在太陽少陽經脈之間其脈亦見於皮部當取之委陽此言六腑之氣皆從足三陽之別絡而通於經脈者也開之曰按足三陽之脈循於足者亦皆系支別膀胱病者小腹偏腫而痛以手按之即欲小便而不得肩上熱若脈陷及足小趾外廉及脛踝後皆熱若脈陷取委中央踝葉瓦去聲膀胱者津液之府氣化則出腑氣病故小腹腫痛而不得小便也肩上足小趾外廉及脛踝後乃足太陽經脈之所循若熱而脈陷此病腑而及於經矣故當取委中之中央膽病者善太息口苦嘔宿汁心下淡淡恐人將捕之嗌中吤吤然數唾在足少陽之本末亦視其脈之陷下者灸之其寒熱者取陽陵泉膽病則膽氣不升故太息以伸出之口苦嘔宿汁者膽汁也心下淡淡恐人將捕之者膽氣虛也嗌中吤吤然數唾者少陽之脈病也足少陽經脈之本在下其末在頸嗌之間宜灸之以起陷下之脈氣其寒熱者少陽之樞證也當以經取之少陽之經氣外內出入者也黃帝曰刺之有道乎岐伯答曰刺此者必中氣穴無中肉節中氣穴則針遊於巷中肉節則皮膚痛補瀉反則病益篤中筋則筋緩邪氣不出與其真相搏亂而不去反還內著用針不審以順為逆也中去聲著音著氣穴者腑氣所注之經穴故中氣穴則針遊於巷即氣穴論之所謂遊針之居言針入有間恢恢乎有餘地矣此言腑邪之從經脈而出於氣穴即上章面熱者足陽明病魚絡血者手陽明病謂腑氣之從經脈而出於皮膚也皮肉筋骨脈外之氣分也若中肉節即皮膚痛中筋則筋緩邪氣不出與其真氣相亂而不去反還內著言刺皮肉筋骨使腑邪不能從氣穴而出元真之氣反內著而與邪相亂蓋言脈外之氣血合於經脈而復通於內腑即上章所謂兩跗之上脈堅陷者足陽明病余故曰本經多因病假針以明陰陽血氣之生始出入宜順而不宜逆也張開之曰有邪處瀉邪無邪處補正邪在經脈而不在肉節故當瀉氣穴以去之反補其肌腠之元真則真氣入而與邪相搏故曰補瀉反則病益篤根結第五岐伯曰天地相感寒暖相移陰陽之道孰少孰多陰道偶陽道奇發於春夏陰氣少陽氣多陰陽不調何補何瀉發於秋冬陽氣少陰氣多陰氣盛而陽氣衰故莖葉枯槁濕雨下歸陰陽相移何瀉何補奇邪離經不可勝數不知根結五臟六腑折關敗樞開闔而走陰陽大失不可復取九針之玄要在終始故能知終始一言而畢不知終始針道咸絶奇音箕此章論三陰三陽之氣主開主闔主樞乃無形之氣出入於外內而合於有形之經也夫人之陰陽應天之六氣天之六氣合於四時春夏主陽故發於春夏陰氣少陽氣多秋冬主陰故發於秋冬陽氣少陰氣多發者謂人之陰陽開闔應天地之四時是以春夏人迎微大秋冬寸口微大如是者是為平人奇邪離經者邪不入於經流於大絡而生奇病言邪之變易不可勝數也根結者六氣合六經之本標也開闔樞者臟腑陰陽之六氣也終始者經脈血氣之始終也太陽根於至陰結於命門命門者目也陽明根於厲兌結於顙大顙大者鉗耳也少陽根於竅陰結於蔥籠蔥籠者耳中也太陽為開陽明為闔少陽為樞故樞折則肉節瀆而暴疾起矣故暴病者取之太陽視有餘不足瀆者皮膚宛焦而弱也闔折則氣無所止息而痿疾起矣故痿疾者取之陽明視有餘不足無所止息者真氣稽留邪氣居之也樞折即骨徭而不安於地故骨徭者取之少陽視有餘不足骨徭者節緩而不收也所謂骨徭者搖故也當窮其本也徭與皋陶陶字同音太陽太陰為開陽明厥陰為闔少陽少陰為樞者三陰三陽之氣也太者氣之盛故主開陽明者兩陽合明厥陰者兩陰交盡故主闔少者初生之氣故主樞此陰陽之六氣內合臟腑外合六經應司天在泉之氣運行環轉之不息而復通貫於地道經水之中外內出入者也夫外合於六經有循經而合者如傷寒之病在六氣相傳雖見六經之證而氣不入於經也有入於經而合者根結是也根者經氣相合而始生結者經氣相將而歸結於命門蔥籠之間復從此而出於氣街走空竅而仍行於脈外也命門者太陽為水火生命之原目竅乃經氣所出之門也顙大者頏顙也在上齶之中兩耳之間故曰鉗耳蔥籠者耳中也如蔥之通氣於上也此三陽之氣隨經而歸結於此復出於氣街也行於氣分故能為開為闔為樞出入於形身臟腑之外內開闔如戶扉樞猶轉紐舍樞則不能開闔舍開闔則無從運樞此三陽之氣互相出入於經脈皮膚形身臟腑之外內者也太陽之氣主皮膚故開折則肉節瀆而暴疾起矣宗氣者陽明之所生上出於喉以司呼吸而行於四肢故闔折則氣無所止息而痿疾起矣少陽主骨故樞折則骨節緩而不收也陰陽離合論曰太陽根起於至陰名曰陰中之陽陽明根起於厲兌名曰陰中之陽少陽根起於竅陰名曰陰中之少陽三陰三陽之氣皆從陰而生自下而上故當窮其本也玉師曰三陽之氣循經而出於氣街上於面而走空竅太陽精陽之氣上走於目而為睛少陽之彆氣走於耳而為聽陽明之宗氣上出於鼻而為臭目之開闔耳之聽聞鼻之呼吸是三陽之氣上走於空竅而為開闔樞也宗氣者陽明之所生上出於肺以司呼吸頏顙者鼻之內竅通於喉嚨故頏顙不開則洞涕不收是陽明之氣上出於鼻而為臭太陰根於隱白結於太倉少陰根於湧泉結於廉泉厥陰根於大敦結於玉英絡於膻中太陰為開厥陰為闔少陰為樞故開折則倉廩無所輸膈洞膈洞者取之太陰視有餘不足故開折者氣不足而生病也闔折則氣絶而喜悲悲者取之厥陰視有餘不通樞折則脈有所結而不通不通者取之少陰視有餘不通有結者皆取之不足太倉者舌本也脾為倉廩之官其脈連舌本散舌下使之迎糧故結於舌本名曰太倉廉泉任脈穴在喉上四寸中央任脈發原於腎故結於腎之廉泉衛氣篇曰厥陰標為背俞是玉英當在背俞之間絡於膻中者肝脈貫膈也脾為倉廩之居故開折則氣不足而為膈洞膈者上不開而不受納洞者下關折而飧泄也厥陰為兩陰交盡陰盡而一陰始生故闔折則生氣絶而喜悲一陽之氣發於腎臟志不舒故喜悲也少陰主脈故樞折則脈有所結而不通不通者取之少陰視有餘不足有結者皆取之不足蓋有餘者邪結之有餘不足者正氣之不足通其正氣則結自解矣按九針篇缺盆之中任脈也頸中央之脈督脈也腋內動脈手太陰也腋下三寸手心主也蓋手太陰心主出於胸氣之街少陰厥陰從任督二脈出於頭氣之街也玉師曰廉泉玉英上液之道也玉英謂唇內之齦交蓋腎臟之精液一從任脈而出於舌下之廉泉一從脊骨髓空而上通於腦腦空在腦後三分顱際鋭骨之下一在齦基下一在項後伏骨下一在脊骨上空在風府上是骨之精髓從脊骨上空上通於腦而下滲於齦基督脈循於脊骨厥陰肝脈與督脈上會於巔而下玉英英木而人也謂齒白如玉木而人也足太陽根於至陰溜於筋骨注於崑崙入於天柱飛揚也足少陽根於竅陰溜於丘墟注於陽輔入於天容光明也足陽明根於厲兌溜於衝陽注於大陵入於人迎豐隆也手太陽根於少澤溜於陽谷注於少海入於天窗支正也手少陽根於關衝溜於陽池注於支溝入於天牖外關也手陽明根於商陽溜於合谷注於陽溪入於扶突偏歷也此所謂十二經者盛絡皆當取之上章統論三陰三陽之氣合於六經根於下而結於上此復分論三陽之氣入於手足之經皆循頸項而上出故曰此十二經者盛絡皆當取之蓋氣留於脈絡則絡盛取而瀉之使三陽之氣仍上出於脈外也飛揚光明豐隆支正外關偏歷在經穴合穴兩者之間夫曰所入為合者謂脈外之氣血從井而溜於脈中至肘膝而與脈內之血氣相合故曰脈入為合此論三陽之氣從井而入於脈中上入於頸項之天柱天容人迎天窗天牖扶突而上出於頭面與血氣之溜於滎注於輸行於經入於合者之不同故另提曰飛揚光明豐隆支正蓋以分別陽氣與榮血出入於經脈外內之不同也是以所論一次脈二次脈者謂手足之十二經脈皆從四肢之五輸而歸於中復從中而上出頸項此章論三陰三陽之氣合於六經而復出於脈外五十二篇論榮氣七十一篇論宗氣蓋三陰三陽榮氣宗氣相將而行於經脈皮膚形身臟腑外內出入環轉無端是以數篇辭句相同而所論者各別學者分而論之合而參之人之陰陽血氣有形無形應天地之五運六氣寒暑往來如桴鼓應響之相合也一日一夜五十營以營五臟之精不應數者名曰狂生所謂五十營者五臟皆受氣持其脈口數其至也五十動而不一代者五臟皆受氣四十動一代者一臟無氣三十動一代者二臟無氣二十動一代者三臟無氣十動一代者四臟無氣不滿十動一代者五臟無氣豫之短期要在終始所謂五十動而不一代者以為常也以知五臟之期豫之短期者乍數乍疏也首數字去聲次數字上聲末數字葉朔豫與同此言三陰三陽之氣外循於經脈內榮於五臟五臟主藏精者也氣營五臟之精五臟皆以受氣精氣之相合也夫五臟生於五行五行之氣本於十干合化是以五臟五十動而不一代者以為常也代者止而不還也乍數乍疏者死脈見也要在終始者大要在終始篇之生於六氣而死於六經也黃帝曰逆順五體者言人骨節之大小肉之堅脆皮之厚薄血之清濁氣之滑澀脈之長短血之多少經絡之數余已知之矣此皆布衣匹夫之事也夫王公大人血食之君身體柔脆肌肉軟弱血氣慓悍滑利其刺之徐疾淺深多少可得同之乎岐伯答曰膏粱菽藿之味何可同也氣滑即出疾其氣澀則出遲氣滑則針小而入淺氣澀則針大而入深深則欲留淺則欲遲以此觀之刺布衣者深以留之刺大人者微以徐之此皆因氣慓悍滑利也此言三陰三陽本於五谷五畜五菜五味之所生也逆順五體者謂三陰三陽之氣出入於皮膚經脈之外內交相逆順而行有疾有徐也夫行於脈外之皮薄肉脆者則行疾皮厚肉堅者則行遲行於脈中之血清脈短者則出疾血濁脈長者則出遲此因有形之皮肉血脈而疾遲也然又有因於無形而為之疾遲者氣之滑澀也膏謂膏肥之厚味粱稻也王公貴人美其食厚其味則肌肉柔弱血氣滑利而行疾山野之人啜菽茹藿則其氣澀而行遲此貴賤所秉之氣不同而氣生於味也黃載華曰皮厚肉堅血氣和緩者多壽皮薄肉弱血氣慓悍者少壽王公大人膏粱厚味則身體柔脆肌肉軟弱血氣慓悍滑利不若田野之人飲食淡薄之多壽也此勉富貴之人當節飲食不宜過於厚味黃帝曰形氣之逆順奈何岐伯曰形氣不足病氣有餘是邪勝也急瀉之形氣有餘病氣不足急補之形氣不足病氣不足此陰陽氣俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絶滅少者不復矣形氣有餘病氣有餘此謂陰陽俱有餘也當瀉其邪調其虛實故曰有餘者瀉之不足者補之此之謂也故曰刺不知逆順真邪相搏滿而補之則陰陽四溢腸胃充郭肝肺內䐜陰陽相錯虛而瀉之則經脈空虛血氣竭枯腸胃㒤闢皮膚薄著毛腠夭焦豫之死期故曰用針之要在於知調陰與陽調陰與陽精氣乃光合神與氣使神內藏故曰上工平氣中工亂脈下工絶氣危生故曰下工不可不慎也必審五臟變化之病五脈之應經絡之實虛皮之柔脆而後取之也形氣謂皮肉筋骨之形氣病氣謂三陰三陽之經氣為邪所病也病氣之有餘不足者陰陽血氣之實虛也邪氣勝者急瀉之血氣虛者急補之刺者所以取氣也故陰陽氣俱不足者不可刺之血氣皆盡五臟空虛者血氣之內榮於五臟也筋骨髓枯者血氣之外濡於筋骨也陰陽俱有餘者當瀉其邪調其虛實蓋邪之所湊其正必虛故當瀉其邪而兼調正氣之虛實也滿而補之則陰陽四溢溢於外也腸胃充郭肝肺內䐜溢於內也外內皆溢則陰陽相錯矣㒤虛怯也闢僻積也血氣盛則充膚熱肉血獨盛則淡滲皮膚生毫毛經脈空虛血氣竭枯是以腸胃㒤闢皮膚薄著毛腠夭焦而可與之死期矣調陰與陽精氣乃光陰陽精氣之相合也合形與氣使神內藏形氣為神之外固也言能調其陰陽則精神形氣外華而內藏矣夫三陰三陽之經氣有因於外邪所傷者有因於五臟之病而變應於脈者故當審其外內虛實而調之斯可為上工也壽夭剛柔第六黃帝問於少師曰余聞人之生也有剛有柔有弱有強有短有長有陰有陽願聞其方此章論人秉天地陰陽而生在天為氣在地成形形與氣相任則壽不相任則夭剛柔陰陽之道也立天之道曰陰與陽立地之道曰柔與剛是故陰中有陰陽中有陽內有陰陽外亦有陰陽玉師曰強弱短長即如四時有寒暑晝夜有長短蓋人與萬物皆稟此天地陰陽之形氣與時相應故各有剛柔長短之不同少師答曰陰中有陰陽中有陽審知陰陽刺之有方得病所始刺之有理謹度病端與時相應內合於五臟六腑外合於筋骨皮膚是故內有陰陽外亦有陰陽在內者五臟為陰六腑為陽在外者筋骨為陰皮膚為陽故曰病在陰之陰者刺陰之滎輸病在陽之陽者刺陽之合病在陽之陰者刺陰之經病在陰之陽者刺絡脈故曰病在陽者名曰風病在陰者名曰痹陰陽俱病命曰風痹病有形而不痛者陽之類也無形而痛者陰之類也無形而痛者其陽完而陰傷之也急治其陰無攻其陽有形而不痛者其陰完而陽傷之也急治其陽無攻其陰陰陽俱動乍有形乍無形加以煩心命曰陰勝其陽此謂不表不里其形不久夫陽者天氣也主外陰者地氣也主內然天地陰陽之氣上下升降外內出入是故內有陰陽外亦有陰陽皮肉筋骨五臟六腑外內相合與時相應者也五臟為陰六腑為陽在內之陰陽也筋骨為陰皮膚為陽在外之陰陽也病在陰之陰者病內之五臟故當刺陰之滎輸病在陽之陽者病在外之皮膚故當刺陽之合謂六腑外合於皮膚故當取腑經之合穴也病在陽之陰者病在外之筋骨故當刺陰之經謂五臟外合於筋骨故當取陰之經也病在陰之陽者病在內之六腑故當刺絡脈故曰病在陽者名曰風病在陰者名曰痹蓋風者天之陽氣痹者人之陰邪陰陽俱病名曰風痹外內之相合也有形者皮肉筋骨之有形無形者五臟六腑之氣也病有形而不痛者病在外之陽也病無形而痛者氣傷痛也陰完陽完者臟腑陰陽之氣不傷也夫天地者萬物之上下也動靜者天地之體用也水火者陰陽之徵兆也天氣下降氣流於地地氣上升氣騰於天天地之氣交也離中有虛坎中有滿水火之相濟也如陰陽俱動乍有形乍無形乃陰陽之不表不里矣心為陽而主火水為陰而居下加以煩心此陰勝其陽矣陰陽外內不交水火上下相剋此天地陰陽之氣不調故其形不久形氣之相應也開之曰針合天地人三才之道此篇論人合天地陰陽故用針以調其不和經中大義當於針病之外求之黃帝問於伯高曰余聞形氣病之先後外內之應奈何伯高答曰風寒傷形憂恐忿怒傷氣氣傷臟乃臟病寒傷形乃應形風傷筋脈筋脈乃應此形氣內外之相應也黃帝曰刺之奈何伯高答曰病九日者三刺而已病一月者十刺而已多少遠近以此衰之久痹不去身者視其血絡盡出其血黃帝曰外內之病難易之治奈何伯高答曰形先病而未入臟者刺之半其日臟先病而形乃應者刺之倍其日此月內難易之應也此論外因之病從外而內內因之病從內而外形氣外內之相應也風寒者外受之邪故病形憂恐忿怒在內之氣故病臟夫外為陽內為陰病九日者病發於陽故用三之奇病一月者病發於陰故用十之偶此以針之奇偶應病之陰陽也出絡血者通地之脈道也形先病而未入臟者病發於陽而未入於裡也故刺三時而可愈矣臟先病而形乃應者病發於陰而出於外也刺之倍其日而愈矣夫病發於陰而出於外者易愈留於內者難已故刺有十日者有倍其日而刺兩日者此一月之病在內者有難易之應也黃帝問於伯高曰余聞形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄其以立壽夭奈何伯高答曰形與氣相任則壽不相任則夭皮與肉相果則壽不相果則夭血氣經絡勝形則壽不勝形則夭黃帝曰何謂形之緩急伯高答曰形充而皮膚緩者則壽形充而皮膚急者則夭形充而脈堅大者順也形充而脈小以弱者氣衰衰則危矣若形充而顴不起者骨小骨小則夭矣形充而大肉䐃堅而有分者肉堅肉堅則壽矣形充而大肉無分理不堅者肉脆肉脆則夭矣此天之生命所以立形定氣而視壽夭者必明乎此立形定氣而後以臨病人決死生黃帝曰余聞壽夭然以度之伯高答曰牆基卑高不及其地者不滿三十而死其有因加疾者不及二十而死也黃帝曰形氣之相勝以至壽夭奈何伯高答曰平人而氣勝形者壽病而形肉脫氣勝形者死形勝氣者危矣顴音權䐃音窘度入聲此論人秉天地陰陽生成此形氣有壽夭之不同也任當也果成也此天之生命立形定氣故形與氣相任則壽不相任則夭夫人皮應天人肉應地故皮與肉相果則壽不相果則夭形謂皮肉筋骨血氣經絡應經水氣脈通貫於地中故勝形則壽不勝形則夭人之形氣天命所生皮膚緩者天道之元亨也是以緩則壽而急則夭脈乃精血神氣之所遊行故形充而脈堅大者為順脈小以弱者榮衛宗氣俱衰衰則危矣夫腎秉先天之陰陽而主骨顴乃腎之外候故顴不起者骨小骨小則夭此先天之氣薄也脾主地而主肉肉堅者壽不堅者夭此後天之土基有厚薄也此天之生命所以立形定氣而視壽夭者必明乎此先立形定氣而後以臨病人決死生天年篇曰以母為基以父為楯人之壽百歲者使道隧以長牆基高以方牆基者面部之四方也地地閣也牆基卑高不及地者四方之平陷也此人秉母氣之薄蓋坤道之成形也天年篇曰人生三十歲五臟大定不滿三十而死者不能終地之五行也其有因加疾者不及二十而死不能終地之生數也平人氣勝形者壽謂地基固宜博厚而氣更宜勝形蓋萬物資始於天而天包乎地之外也病而形肉脫氣勝形者邪氣勝也形勝氣者正氣脫也黃帝曰余聞刺有三變何謂三變伯高答曰有刺營者有刺衛者有刺寒痹之留經者黃帝曰刺三變者奈何伯高答曰刺營者出血刺衛者出氣刺寒痹者內熱黃帝曰營衛寒痹之為病奈何伯高答曰營之生病也寒熱少氣血上下行衛之生病也氣痛時來時去怫愾賁響風寒客於腸胃之中寒痹之為病也留而不去時痛而皮不仁愾音戲夫形舍氣氣歸形形氣之相任也然下焦所藏之精水中焦所生之榮衛所以溫分肉充皮膚濡筋骨利關節水隨氣而運行於膚表環轉無端如營衛留阻水道不行則形氣消索矣故刺有三變變者使之運行而變化也榮之血衛之氣道之出行於外寒之痹使之熱散於內夫營衛血氣主出入於外內故病則止上下行而為寒熱氣痛矣若怫愾賁響此乃風寒客於腸胃之中蓋以分別營衛之生病寒痹之為病本於自生非外因之邪也痹者閉也寒痹者寒水之為病也腎為水臟而主骨在外者皮膚為陽筋骨為陰病在陰者名曰痹留而不去時痛而皮不仁者謂腎臟寒水之痹痛在於外合之骨而及於皮之不仁病從內而外也玉師曰風寒客於腸胃之中照應病而形肉脫氣勝形者句蓋本篇先論秉氣之壽夭後復論病氣之壽夭然病氣有二一因於風寒之病氣所謂氣勝形者是也一因於營衛稽留水道不行之病氣所謂形勝氣者是也黃帝曰刺寒痹內熱奈何伯高答曰刺布衣者以火焠之刺大人者以藥尉之黃帝曰藥尉奈何伯高答曰用醇酒二十斤蜀椒一斤乾薑一斤桂心一斤凡四種皆㕮咀清酒中用綿絮一斤細白布四丈並納酒中置酒馬矢熅中蓋封塗勿使泄五日五夜出布綿絮曝乾之干復漬以盡其汁每漬必晬其日乃出干干並用滓與綿絮復布為復巾長六七尺為六七則用之生桑炭炙巾以尉寒痹所刺之處令熱入至於病所寒復炙巾以尉之三十遍而止汗出以巾拭身亦三十遍而止起步內中無見風每刺必尉如此病已矣此所謂內熱也矢屎同熅音氳焠音歲痹者留而不行也寒痹者腎臟寒水之氣也夫人秉先天之水火以化生五行腎受天一之精氣而交通於四臟如水火不濟五行不交則留而為寒痹疾故以火焠之者以火益水也夫肺主皮毛飲酒者先行皮膚先充絡脈用醇酒者使肺腎之相通者蜀椒形色像心皮紅子黑具中虛之象用蜀椒者使心腎之相通也脾為陰中之至陰乾薑主理中之君品用乾薑者使脾腎之相通也桂為百木之長用桂心者使肝腎之相通也蠶食桑而成綿三者皆白肺之品也用綿絮一斤白布四丈十遍者使在地之陰邪從天表以終散所謂熱於內而使之外散也夫王公大人固不可以火焠而布衣獨不可以藥尉乎此蓋假大人布衣以明臟腑相通陰陽交互是以治法之有通變也學者當體法先聖之用意周密取法精微不可圖安苟簡也張開之曰上古用分兩品數湯丸散劑各有精義君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也近者奇之遠者偶之汗者不以奇下者不以偶近而奇偶制小其服遠而偶奇制大其服大則數少小則數多多則九之少則二之此品數奇偶多少之有法也凡治中土者多用五數欲下行者多用三數欲從陰而上升有用至一兩一分者又如芫花亂髮熬如雞子石脂戎鹽大如彈丸此分兩用法之精微也夫理中者用丸行散者用散行於臟腑經絡皮膚者用湯又如抵當丸陷胸丸乾薑散敗醬散之類搗為丸為散而復以水煎服此湯丸散劑之各有所取也官針第七凡刺之要官針最妙九針之宜各有所為長短大小各有所施也不得其用病弗能移疾淺針深內傷良肉皮膚為癰病深針淺病氣不瀉支大為膿病小針大氣瀉太甚疾必為害病大針小氣不泄瀉亦復為敗失針之宜大者瀉小者不移已言其過請言其所施病在皮膚無常處者取以鑱針於病所膚白勿取病在分肉間取以圓針於病所病在經絡痼痹者取以鋒針病在脈氣少當補之者取之匙針於井滎分輸病為大膿者取之鈹針病痹氣暴發者取以圓利針病痹氣痛而不去者取以毫針病在中者取以長針病水腫不能通關節者取以大針病在五臟固居者取以鋒針瀉於井滎分輸取以四時官法也九針之法有大小長短之制有淺深補瀉之宜有三五九十二刺之法各有所施也如不得其用病勿能移而反為害焉凡刺有九以應九變一曰輸刺輸刺者刺諸經滎輸臟輸也二曰遠道刺遠道刺者病在上取之下刺腑輸也三曰經刺經刺者刺大經之結絡經分也四曰絡刺絡刺者刺小絡之血脈也五曰分刺分刺者刺分肉之間也六曰大瀉刺大瀉刺者刺大膿以鈹針也七曰毛刺毛刺者刺浮痹皮膚也八曰巨刺巨刺者左取右右取左九曰焠刺焠刺者刺燔針則取痹也輸腧俞互用焠音萃燔音煩上節論針有九者之宜此論刺有九者之變一曰輸刺刺五臟之經輸所謂滎輸治外經也遠道刺者病在上而取下之合穴所謂合治六腑也蓋手足三陽之脈其原皆在足而上循於頸項也大經者五臟六腑之大絡也邪客於皮毛入舍於孫絡留而不去閉結不通則流溢於大經之分而生奇病故刺大經之結絡以通之絡刺者見於皮膚之小絡也分刺者分肉之間溪谷之會亦有三百六十五穴會邪在肌肉者取之大瀉刺者瀉大膿血也毛刺者邪閉於皮毛之間浮淺取之所謂刺毫毛無傷皮刺皮無傷肉也巨刺者邪客於十二經別宜巨刺之左取右右取左也焠刺者燔針劫刺以取筋痹也大經刺巨刺詳素問繆刺論凡刺有十二節以應十二經一曰偶刺偶刺者以手直心若背直痛所一刺前一刺後以治心痹刺此者旁針之也二曰報刺報刺者刺痛無常處也上下行者直內無拔針以左手隨病所按之乃出針復刺之也三日恢刺恢刺者直刺傍之舉之前後恢筋急以治筋痹也四曰齊刺齊刺者直入一旁入二以治寒氣小深者或曰三刺三刺者治痹氣小深者也五曰揚刺揚刺者正內一旁內四而浮之以治寒氣之博大者也六曰直針刺直針刺者引皮乃刺之以治寒氣之淺者也七曰輸刺輸刺者直入直出稀髮針而深之以治氣盛而熱者也八曰短刺短刺者刺骨痹稍搖而深之致針骨所以上下摩骨也九曰浮刺浮刺者旁入而浮之以治肌急而寒者也十曰陰刺陰刺者左右率刺之以治寒厥中寒厥足踝後少陰也十一曰旁針刺旁針刺者直入旁刺各一以治留痹久居者也十二曰贊刺贊刺者直入直出數髮針而淺之出血是謂治癰腫也節制也言針有十二節制以應十二經也偶刺者一刺胸一刺背前後陰陽之相偶也旁取之恐中傷心氣也報刺者刺痛無常處出針而復刺故曰報刺恢大之也前後恢蕩其筋之急以治筋痹也齊刺者中正以取之故直入一以取中旁入二以為佐故又曰三刺治寒痹小深者也揚刺者從中而發揚於四旁也直刺者以亳針刺在皮毛得氣而直豎也輸刺者直入直出如轉輸也短刺者用短針深入而至骨所以便上下摩之而取骨痹也浮刺者旁入而浮淺也陰刺者刺少陰之寒厥也旁針刺者直刺旁刺治留痹之久居者也贊助也數髮針而淺之出血助癰腫之外散也按十二刺中獨提少陰者少陰主先天之陰陽水火五運六氣之生原也脈之所居深不見者刺之微納針而久留之以致其空脈氣也脈淺者勿刺按絶其脈乃刺之無令精出獨出其邪氣耳此言經脈內合五行之化運外應六氣之司天用針者不可不知也夫經脈內連臟腑外合六氣五臟內合五行應五運之在中命曰神機而主出入六氣旋轉於外命曰氣立而主升降六氣之司天在泉應人之精水隨氣而運行於膚表故脈之所居深不見者內連五臟也微納針而久留之以致其空脈氣者致五臟之神氣運行於外也脈淺者見於皮膚之脈外合於六氣也精水隨氣行於膚表故脈淺者勿刺按絶其脈乃刺之是使六氣運行而無令精出也玉師曰致五臟之神機非榮衛血氣故曰空脈氣所謂三刺則穀氣出者先淺刺絶皮以出陽邪再刺則陰邪出者少益深絶皮致肌肉未入分肉間也已入分肉之間則穀氣出故刺法曰始刺淺之以逐邪氣而來血氣後刺深之以致陰氣之邪最後刺極深之以下穀氣此之謂也故用針者不知年之所加氣之盛衰虛實之所起不可以為工也此申明三陰三陽之氣運行於皮表也穀氣者通會於肌腠之元真脾胃之所主也故曰穀氣陰邪陽邪者謂邪在陰陽之氣分也少益深絶皮致肌肉未入分肉間者在皮肉相交之間仍在皮之絶處未入於分肉也蓋言三陰三陽之氣運行於皮表以應天之六氣故用針者不知年之所加氣之盛衰虛實之所起不可以為工也年之所加者六氣之加臨氣之盛衰者五運之氣有太過不及也運有太少氣有盛衰則人之虛實所由起矣凡刺有五以應五臟一曰半刺半刺者淺納而疾髮針無針傷肉如拔毛狀以取皮氣此肺之應也二曰豹文刺豹文刺者左右前後針之中脈為故以取經絡之血者此心之應也三曰關刺關刺者直刺左右盡筋上以取筋痹慎無出血此肝之應也或曰淵刺一曰豈刺四曰合谷刺合谷刺者左右雞足針於分肉之間以取肌痹此脾之應也五曰輸刺輸刺者直入直出深納之至骨以取骨痹此腎之應也此言五臟之氣外合於皮脈肉筋骨五臟主中故取之外合而應於五臟也夫血者神氣也故五臟之神機運行於血脈以應五運之化五臟之氣外合於皮肉筋骨以應天之四時玉師曰九宜九變應地之九野九州人之九臟九竅十二節應十二月三刺應三陰三陽五刺應五行五時針道配天地人而人合天地者也本神第八黃帝問於岐伯曰凡刺之法必先本於神血脈營氣精神此五臟之所藏也至於淫泆離臟則精失魂魄飛揚志意恍亂智慮去身者何因而然乎天之罪與人之過乎何謂德氣生精神魂魄心意志思智慮請問其故岐伯答曰天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精兩精相搏謂之神隨神往來者謂之魂並精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智故智者之養生也必順四時而適寒暑和喜怒而安居處節陰陽而調剛柔如是則邪僻不至長生久視此言人之德氣受天地之德氣所生以生精氣魂魄志意智慮故智者能全此神智以順天地之性而得養生之道焉德者所得乎天虛靈不昧具衆理應萬事者也目之視耳之聽鼻之臭口之味手之舞足之蹈在地所生之形氣也乾知大始坤作成物德流氣薄而生者也決氣篇曰常先身生是謂精蓋未成形而先受天一之精故所生之來謂之精平人絶谷篇曰神者水穀之精氣也蓋本於先天所生之精後天水穀之精而生此神故曰兩精相搏謂之神火之精為神水之精為精肝為陽臟而藏魂肺為陰臟而藏魄故魂隨神而往來魄並精而出入心為君主之官神明出焉天地之萬物皆吾心之所任心有所憶者意也意之所存者志也志有所變者思也思有所慕者慮也慮有所處者智也此皆心神之運用故智者順承天地之性而得養生之道也是故怵惕思慮者則傷神神傷則恐懼流淫而不止因悲哀動中者竭絶而失生喜樂者神憚散而不藏愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者神蕩憚而不收此承上文而言思慮志意皆心之所生是以思慮喜怒悲憂恐懼皆傷其心臟之神氣心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬此分論七情傷五臟之神志思慮脾之情也如心因怵惕思慮則傷心藏之神神傷則不能主持而恐懼自失矣脾主土而主肌肉肺主氣而主皮毛肉之膏肥曰䐃色者氣之華也䐃肉者地所成之形也毛色者天所生之氣也破䐃脫肉毛悴色夭天地所生之命絶矣死於冬者五行之氣死於四時之勝克也開之曰心思慮傷神者脾志並於心也餘臟同脾憂愁而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春悗音悶憂愁肺之情也如脾因憂愁不解則傷脾臟之意意傷則悗亂而四肢不舉蓋意乃心之所生而脾主四肢也肝悲哀動中則傷魂魂傷則狂忘不精不精則不正當人陰縮而攣筋兩脅骨不舉毛悴色夭死於秋悲哀肺之情也如肝因悲哀動中則傷肝臟所藏之魂魂傷則狂忘不精蓋肝者將軍之官謀慮出焉肝志傷則不能處事精詳矣膽為中正之官決斷出焉臟氣傷則腑志亦不正而無決斷矣肝主筋而脈絡陰器陰縮筋攣脅骨不舉情志傷而及於形也玉師曰膽附於肝臟腑相通惟肝膽最為親切肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏喜樂心之情也如肺因喜樂無極則傷肺臟之魄魄傷則狂狂者意不存意者心之發蓋喜樂無極則神亦憚散而不存矣肺主皮毛故人皮革焦腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俯仰屈伸毛悴色夭死於季夏怒者肝之情也如腎盛怒不止則傷腎臟之志志傷則喜忘其前言夫神志相合喜忘者神志皆傷也腰者腎之府故腰脊不可以俯仰屈伸夫脾志並於心肺志並於脾肝志並於腎乃子氣並於母也肺志並於肝心志並於肺受所不勝之相乘也平脈篇曰水行乘火金行乘木名曰縱水行乘金火行乘木名曰逆蓋母乘子者順子乘母者逆也相生者順相剋者逆逆則傷矣恐懼而不解則傷精精傷則骨痠痿厥精時自下是故五臟主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣是故用針者察觀病人之態以知精神魂魄之存忘得失之意五者已傷針不可以治之也恐傷腎故恐懼不解則傷腎臟之精腎主骨故精傷則骨痠痿厥精時自下者臟氣傷而不能藏也火之精為神水之精為志上節論傷腎臟之志此論傷腎臟之精蓋魂魄智意本於心腎精神之所生故首言怵惕思慮者則傷神末言恐懼而不解則傷精神生於精而精歸於神也夫水穀入胃津液各走其道酸先入肝苦先入心甘先入脾辛先入肺咸先入腎五臟主藏水穀之精者也神氣生於精故五臟之精不可傷傷則失守而陰虛陰虛則神氣絶而死矣是故用針者察觀病人之態以知精神魂魄之存亡意之得失如五者已傷針不可以治之矣故當順天之性以調養其精氣神焉玉師曰恐懼不解則傷精先天之精也五臟主藏精者後天水穀之精也神氣皆生於精故曰陰虛則無氣肝藏血血舍魂肝氣虛則恐實則怒脾藏榮榮舍意脾氣虛則四肢不用五臟不安實則腹脹經溲不利心藏脈脈舍神心氣虛則悲實則笑不休肺藏氣氣舍魄肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息腎藏精精舍志腎氣虛則厥實則脹五臟不安必審五臟之病形以知其氣之虛實謹而調之也此言五臟之氣各有虛有實而見證之不同也五臟各有所藏五志各有所舍如五志受傷則有五志之病如臟氣不平則見臟氣之證故必審五臟之病形以知其氣之虛實也肝者將軍之官故氣虛則恐氣實則怒脾主四肢故虛則四肢不用土灌四臟是以五臟不安腹乃脾土之郛郭故實則腹脹經溲不利者不轉輸其水也夫神慈則悲喜為心志故心氣虛則悲盛實則笑不休肺主氣以司呼吸故肺氣虛則鼻塞不利少氣實則喘喝胸滿而不得偃息也腎為生氣之原故虛則手足厥冷腎者胃之關也故實則關門不利而為脹矣此五臟之氣各有太過不及而不得安和當審其所見之氣而調之也終始第九凡刺之道畢於終始明知終始五臟為紀陰陽定矣陰者主臟陽者主腑陽受氣於四末陰受氣於五臟故瀉者迎之補者隨之知迎知隨氣可令和和氣之方必通陰陽五臟為陰六腑為陽傳之後世以血為盟敬之者昌慢之者亡無道行私必得夭殃此篇論人之臟腑陰陽經脈氣血本於天地之所生有始而有終也五運行論曰東方生風風生木木生酸酸生肝南方生熱熱生火火生苦苦生心夫風寒暑濕燥熱天之六氣也木火土金水地之五行也天食人以五氣地食人以五味是天之六氣化生地之五行五味五行五味以生人之五臟五臟內合六腑以應地之五行外合六經以應天之六氣故曰明知終始五臟為紀謂人之五臟本應五行之化也請言終始經脈為紀平與不平天道畢矣謂人之經脈應天之六氣也末結曰太陽之脈其終也戴眼反折太陰終者腹脹不得息是人之陰陽血氣始於地之五行天之六氣所生而終於地之六經天之六氣也故曰其生五其數三謂生於五行而終於三陰三陽之數也陰者主臟陽者主腑臟腑陰陽之相合也陽受氣於四末陽受天氣於外也陰受氣於五臟陰受地氣於內也故瀉者迎之迎陰氣之外出也補者隨之追陽氣之內交也故曰知迎知隨氣可令和和氣之方必通陰陽謹奉天道請言終始終始者經脈為紀持其脈口人迎以知陰陽有餘不足平與不平天道畢矣所謂平人者不病不病者脈口人迎應四時也上下相應而俱往來也六經之脈不結動也本末之寒溫之相守司也形肉血氣必相稱也是謂平人少氣者脈口人迎俱少而不稱尺寸也如是者則陰陽俱不足補陽則陰竭瀉陰則陽脫如是者可將以甘藥不可飲以至劑如是者弗灸不已者因而瀉之則五臟氣壞矣謹奉天道請言終始者謂陰陽經脈應天之六氣也夫血脈本於五臟五行之所生而外合於陰陽之六氣有生始而有經終故曰終始者經脈為紀也持其脈口人迎以知陰陽有餘不足平與不平蓋診其脈以候其氣也應四時者春夏之氣從左而右秋冬之氣從右而左是以春夏人迎微大秋冬氣口微大是謂平人上下相應者應天之六氣上下環轉往來不息六經之脈隨氣流行不結動也本末者有本標之出入寒溫者應寒暑之往來各相守司也形肉血氣謂脈外之血氣與六經之脈必相稱也脈口人迎以候三陰三陽之氣是以少氣者脈口人迎俱少尺以候陰寸以候陽不稱尺寸者陰陽氣虛而又應於尺寸之脈也甘藥者調胃之藥謂三陰三陽之氣本於中焦胃腑所生宜補其生氣之原道之流行故不可飲以至劑謂甘味太過反留中也弗灸者謂陰陽之氣不足於外非經脈之陷下也因而瀉之則五臟氣壞者六氣化生五行五行上呈六氣五六相得而各有合也人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明人迎四盛且大且數名曰溢陽溢陽為外格脈口一盛病在足厥陰厥陰一盛而躁在手心主脈口二盛病在足少陰二盛而躁在手少陰脈口三盛病在足太陰三盛而躁在手太陰脈口四盛且大且數者名曰溢陰溢陰為內關內關不通死不治人迎與太陰脈口俱盛四部以上命曰關格關格者與之短期左為人迎右為氣口以候三陰三陽之氣聖人南面而立前曰廣明後曰太衝左東而右西天道右旋地道左遷故以左候陽而右候陰也躁者陰中之動象蓋六氣皆由陰而生從地而出故只合足之六經其有躁者在手以合六臟六腑十二經脈蓋十二經脈以應三陰三陽之氣非六氣之分手與足也外格者謂陽盛於外而無陰氣之和內關者陰盛於內而無陽氣之和關格者陰關於內陽格於外也開之曰脈口太陰也人迎陽明也蓋臟氣者不能自至於手太陰必因於胃氣乃至於手太陰是左右皆屬太陰而皆有陽明之胃氣以陽氣從左而右陰氣從右而左故以左候三陽右候三陰非左主陽而右主陰也陰中有陽陽中有陰是為平人若左獨主陽右獨主陰是為關陰格陽之死候矣人迎一盛瀉足少陽而補足厥陰二瀉一補日一取之必切而驗之疏取之上氣和乃止人迎二盛瀉足太陽補足少陰二瀉一補二日一取之必切而驗之疏取之上氣和乃止人迎三盛瀉足陽明而補足太陰二瀉一補日二取之必切而驗之疏取之上氣和乃止脈口一盛瀉足厥陰而補足少陽二補一瀉日一取之必切而驗之疏而取上氣和乃止脈口二盛瀉足少陰而補足太陽二補一瀉二日一取之必切而驗之疏取之上氣和乃止脈口三盛瀉足太陰而補足陽明二補一瀉日二取之必切而驗之疏而取之上氣和乃止所以日二取之者陽明主胃大富於穀氣故可日二取之也人迎與脈口俱盛三倍以上命曰陰陽俱溢如是者不開則血脈閉塞氣無所行流淫於中五臟內傷如此者因而灸之則變易而為他病矣補瀉者和調陰陽之氣平也陽二瀉而陰一瀉者陽常有餘而陰常不足也陽補二而陰補一者陽可盛而陰不可盛也故溢陽不曰死溢陰者死不治矣必切而驗之者切其人迎氣口以驗三陰三陽之氣也疏當作躁謂一盛而躁二盛而躁當取手之陰陽也陽明主胃大富於穀氣故可日二取之蓋三陰三陽之氣乃陽明水穀之所生也人迎與脈口俱盛命曰陰陽俱溢蓋陰盛於內則陽盛於外矣陽盛於左則陰盛於右矣如是者若不以針開之則血脈閉塞氣無所行流溢於中則內傷五臟矣夫盛則瀉之虛則補之陷下則灸之此陰陽之氣偏盛不和非陷下也故灸之則生他病矣凡刺之道氣調而止補陰瀉陽音氣益彰耳目聰明反此者氣血不行此言三陰三陽之氣從五臟之所生故曰明知終始五臟為紀凡刺之道氣調而止謂陰陽之氣偏盛刺之和調則止矣然又當補陰瀉陽補陰者補五臟之裡陰瀉陽者導六氣之外出六節藏象論曰五氣入鼻藏於心肺上使五色修明音聲能彰順氣篇曰五者音也音主長夏是補其臟陰則心肺脾臟之氣和而音聲益彰矣肝開竅於目腎開竅於耳肝腎之氣盛則耳目聰明矣補其臟陰導其氣出則三陰三陽之氣和調而無偏盛之患矣夫陰陽血氣本於胃腑五臟之所生胃者水穀血氣之海也海之所以行雲氣者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也故不補陰瀉陽則氣血不行所謂氣至而有效者瀉則益虛虛者脈大如其故而不堅也堅如其故者適雖言故病未去也補則益實瀉者脈大如其故而益堅也夫如其故而不堅者適雖言快病未去也故補則實瀉則虛痛雖不隨針病必衰去必先通十二經脈之所生病而後可得傳於終始矣故陰陽不相移虛實不相傾取之其經此言補瀉三陰三陽之氣必俟經脈和調所謂終始者經脈為紀也瀉者瀉其盛而益其虛也堅實也虛者脈大如其故而不堅也若堅如其故者適雖言故已和調而所生之病未去也補者所以益實也實者脈大如其故而益堅也夫如其故而不堅者適雖言快乃陰陽之氣和而快然經脈之病未去也蓋始在三陰三陽之是動漸及於經脈之所生故所謂氣至而有效者針在三陰三陽之氣分經脈雖不隨針而經脈之病必衰去經氣之相應也故必先通十二經脈之所生病而後可傳於終始矣故陰陽不相移虛實不相傾言陰陽之氣無虛實之傾移則當取之其經所謂不虛不實以經取之蓋言陰陽之氣已無虛實則脈應和調矣脈不調者所生病也故當取之其經故曰脈大如其故者謂陰陽之氣已如其故而無盛虛堅不堅者經脈所生之病尚未平也開之曰先為是動後病所生此因氣以及經凡刺之屬三刺至穀氣邪僻妄合陰陽易居逆順相反沉浮異處四時不得稽留淫泆須針而去故一刺則陽邪出再刺則陰邪出三刺則穀氣至穀氣至而止所謂穀氣至者已補而實已瀉而虛故已知穀氣至也邪氣獨去者陰與陽未能調而病知愈也故曰補則實瀉則虛痛雖不隨針病必衰去矣此承上文而言去陰陽偏盛之邪又當調其經脈也穀氣者榮衛血氣生於水穀之精謂經脈之氣也陽邪陰邪者陰陽偏盛之氣也蓋因邪僻妄合於氣分使陰陽之氣不和而易居也逆順者謂皮膚之氣血從臂肘而行於手腕之前經脈之血氣從指井而行於手腕之後病則逆順相反矣浮沉異處者陰陽之氣與經脈不相合也四時不得者不得其升降浮沉也此因邪僻淫泆於陰陽之氣分而致經脈之不調也故一刺則陽邪出再刺則陰邪出而陰陽之氣調矣三刺則穀氣至而經脈之血氣和矣故已補其三陽之虛則陽脈實矣已瀉其三陰之實則陰脈虛矣已補其三陰之虛則陰脈實矣已瀉其三陽之實則陽脈虛矣故已知穀氣至而脈已調矣如氣分之邪獨去而陰與陽之經脈雖未能調而病知愈也故曰補則實瀉則虛痛雖不隨針病必衰去矣按官針篇曰先淺刺絶皮以出陽邪再刺則陰邪出者少益深絶皮致肌肉未入分肉間也已入分肉之間則穀氣出蓋在皮膚分腠之間以致穀氣不在脈也故曰痛雖不隨針謂針在皮膚而痛應於脈非針在脈而痛於脈也開之曰經脈之血氣水穀之所生也病在三陰三陽之氣故補之瀉之則陰陽之氣和而經脈未調也穀氣至而後經脈和調故曰凡刺之屬三陰盛而陽虛先補其陽後瀉其陰而和之陰虛而陽盛先補其陰後瀉其陽而和之此復論調和經脈之陰陽所謂盛則瀉之虛則補之者調和三陰三陽之氣也不虛不實以經取之者謂陰陽之氣已調無虛實之偏僻而經所不調者又當取之於經也夫經脈之血氣本於臟腑所生故當先補其正虛而後瀉其邪實開之曰前節論調氣而經脈不調上節論在皮膚以致穀氣此節論取之其經三脈動於足大趾之間必審其實虛虛而瀉之是謂重虛重虛病益甚凡刺此者以指按之脈動而實且疾者疾瀉之虛而徐者則補之反此者病益甚其動也陽明在上厥陰在中少陰在下此篇論三陰三陽之氣本於五臟五行之所生而五臟之氣生於後天水穀之精始於先天之水火蓋水生木而火生土金也以上數節論三陰三陽之氣候於人迎氣口謂本於陽明水穀之所生從五臟之經隧出於皮膚而見於尺寸此復論五行之氣本於先天之腎藏下出於脛氣之街散於皮膚復從下而上本經動腧篇曰衝脈者十二經之海也與少陰之大絡起於腎下出於氣街循陰股內廉斜入膕中循脛骨內廉並少陰之經下入內踝之後入足下其別者斜入踝出屬跗上入大趾之間注諸絡以溫足脛是先天水火之氣下出於脛氣之街故陽氣起於足五趾之表陰氣起於足五趾之裡此水火陰陽之氣出氣街而散於足五趾也其別者斜入踝出屬跗上入大趾之間是先天之水火化生五行之氣隨衝脈與少陰之大絡注於足大趾之間而復上行故少陰在下者謂天一之水地二之火厥陰在中者謂天三之木陽明居中土而主秋金之氣陽明在上者謂地四生金天五生土也此言五臟五行之氣生主中焦之陽明始於下焦之少陰其上行者出於陽明而走尺膚其下行者出於少陰而動於足大趾之間膺俞中膺背俞中背肩膊虛者取之上重舌刺舌柱以鈹針也手屈而不伸者其病在筋伸而不屈者其病在骨在骨守骨在筋守筋夫皮肉筋骨五臟之外合脈外之氣分也此承上文而言五行之氣從足上行如有虛者取之取者謂迎其氣之外出也胃俞在膺中脾俞在膺旁肺俞在背肩心之竅在舌肝之氣在筋腎之氣在骨是五臟之氣虛者各隨其所在而取之玉師曰此論脈外之氣故在心只言舌而不言脈本篇重在五行六氣之生始出入故篇名終始而論刺則曰虛者取之曰以鈹針也曰在骨守骨在筋守筋讀者味之其義自得張開之曰上節曰少陰在下陽明在上謂數之始於一而終於五氣從下而上也此節先言膺俞而末言其病在骨謂數之成於五而歸於一復從上而下也補須一方實深取之稀按其痏以極出其邪氣一方虛淺刺之以養其脈疾按其痏無使邪氣得入邪氣來也緊而疾穀氣來也徐而和脈實者深刺之以泄其氣脈虛者淺刺之使精氣得出以養其脈獨出其邪氣刺諸痛者其脈皆實此論身形之應四方也一方實深取之一方虛淺刺之脈實者深刺之脈虛者淺刺之此論四方之虛實也經雲氣傷痛諸痛者其脈皆實言四方之氣歸於中央而為實也故曰從腰以上者手太陰陽明皆主之從腰以下者足太陰陽明皆主之手太陰陽明主天足太陰陽明主地身半以上為天身半以下為地故曰承上文而言言人之形氣生於六合之內應天地之上下四旁故曰天地為生化之宇病在上者下取之病在下者高取之病在頭者取之足病在腰者取之膕此言形身之上下應天地之氣交六微旨論曰天氣下降氣流於地地氣上升氣騰於天上下相召升降相因是以病在上者下取之病在下者高取之因氣之上下升降也邪客篇曰天圓地方人頭圓足方以應之病在頭者取之足以頭足之應天地也病在腰者取之膕以腎臟膀胱之水氣應天泉之上下也夫謹奉天道請言終始知血氣之生始出入應天地之五運六氣上下四旁天道畢矣病生於頭者頭重生於手者臂重生於足者足重治病者先刺其病所從生者也上節論上下之氣交此論天地之定位頭以應天足以應地手足應四旁蓋天地四方之氣各有所生之本位故生於頭者頭重生於足者足重隨其所生而取之重者守而不動也開之曰前節論四方之氣流行故有一方實一方虛如金行乘木則東方實而西方虛矣此論上下四方之定位故生於手者臂重生於足者足重春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨刺此病者各以其時為齊故刺肥人者以秋冬之齊刺瘦人者以春夏之齊此言三陰三陽之氣應天地之四時皮肉筋骨脈外之氣分也陰陽之氣始於膚表從外而內與經脈之出入不同故春氣在毛夏氣在皮膚秋氣在分肉冬氣就筋骨蓋始於皮毛而入於筋骨自外而內也肥人之皮膚澀分肉不解氣留於陰久故刺肥人者以秋冬之齊深取之也瘦人之皮膚滑分肉解氣留於陽久故刺瘦人者以春夏之齊淺取之也齊者與時一之也開之曰首六句論四時謂氣之從外而入後四句論肥瘦謂氣之從內而出蓋六氣雖運行於膚表然本於內之所生張應略曰從外而內天之氣也從內而生人之氣也人與天地相合故或從外或從內外內出入者也病痛者陰也痛而以手按之不得者陰也深刺之病在上者陽也病在下者陰也癢者陽也淺刺之此論表裡上下之陰陽夫表為陽里為陰身半以上為陽身半以下為陰病在陽者名曰風故癢者陽也病在皮膚之表陽也病在陰者名曰痹痹者痛也故病痛者陰也以手按之不得者留痹之在內也此言表裡之為陰陽也病在上者為陽病在下者為陰以形身之上下分陰陽也病先起陰者先治其陰而後治其陽病先起陽者先治其陽而後治其陰此承上文而言表裡上下陰陽之氣交相貫通故有先後之分焉內經云陽病者上行極而下陰病者下行極而上從內之外者先調其內從外之內者先治其外刺熱厥者留針反為寒刺寒厥者留針反為熱刺熱厥者二陰一陽刺寒厥者二陽一陰所謂二陰者二刺陰也一陽者一刺陽也此論寒熱之陰陽厥熱也刺熱厥者留針俟針下寒乃去針也刺寒厥者留針俟針下熱乃去針也二陰一陽二陽一陰者謂寒熱陰陽之氣互相交通故不獨取陽而獨取陰也開之曰一二者陰陽水火之生數久病者邪氣入深刺此病者深納而久留之間日而復刺之必先調其左右去其血脈刺道畢矣納訥同間去聲人之衛氣晝行於陽夜行於陰應天道之繞地一周晝明夜晦病久者邪氣入深邪與正爭則氣留於陰間日而後出於陽是以間日復刺之者俟氣至而取之也左右者陰陽之道路也經脈者所以行氣血而榮陰陽也此篇論終始之道本於五行六氣五行應神機之出入六氣應天道之右旋行針之士能順上下之運行並左右之間氣去血脈之宛陳刺道畢矣凡刺之法必察其形氣形肉未脫少氣而脈又躁躁厥者必為繆刺之散氣可收聚氣可布深居靜處占神往來閉戶塞牖魂魄不散此言針刺之法必察其病者之形氣占其精神而後乃行針也形肉未脫形氣相得也夫氣生於下脈從足而手少氣者氣聚於下也躁者陰之動象厥逆也脈又躁厥者血氣不調和而反躁逆於上也繆刺者左刺右右刺左陽取陰陰取陽和其血氣調其陰陽使經脈之散氣可收在下之聚氣可布深居靜處養其氣也閉戶塞牖無外其志也魂魄不散精神內守也此言治病者必使病人之血氣調和精神內守而後可以行針專意一神精氣之分毋聞人聲以守其精必一其神令志在針淺而留之微而浮之以移其神氣至乃休男內女外堅拒勿出謹守勿納是謂得氣此言醫者當自守其神令志在針也夫腎主藏精開竅於耳精氣之分惑於聽聞是以毋聞人聲以收其精必一其神令志在針神志之專一也淺而留之微而浮之以移其病者之神候針下之氣至而休蓋以己之精神合病者之神氣也男為陽女為陰陽在外故使之內陰在內故引之外謂和調外內陰陽之氣也堅拒其正氣而勿使之出謹守其邪氣而勿使之入是謂得氣凡刺之禁新內勿刺已刺勿內已醉勿刺已刺勿醉新怒勿刺已刺勿怒新勞勿刺已刺勿勞已飽勿刺已刺勿飽已飢勿刺已刺勿飢已渴勿刺已刺勿渴大驚大恐必定其氣乃刺之乘車來者臥而休之如食頃乃刺之出行來者坐而休之如行十里頃乃刺之凡此十二禁者其脈亂氣散逆其榮衛經氣不次因而刺之則陽病入於陰陰病出於陽則邪氣復生粗工勿察是謂伐身形體淫泆乃消腦髓津液不化脫其五味是謂失氣也此論刺有十二禁也內者入房也新內則失其精矣酒者熱谷之液其氣慓悍已醉則氣亂矣肝主藏血怒則氣上新怒則氣上逆而血妄行矣煩勞則神氣外張精氣內絶矣脈要精微論曰飲食未進經脈未盛絡脈調勻血氣未亂故乃可診有過之脈是以已飽勿刺平脈篇曰谷入於胃脈道乃行水入於經其血乃成是又已飢勿刺已渴勿刺也驚傷神恐傷精故必定其氣乃刺之則存養其精氣神矣久坐傷肉故乘車來者臥而休之久行傷筋故出行來者坐而休之凡此十二禁者其脈亂氣散榮衛逆行經氣不次因而刺之則陽病入於陰陰病出於陽邪氣復生是謂戕伐其身而形體淫泆矣腦為精髓之海津液者補益腦髓潤澤皮膚濡養筋骨犯此禁者則津液不化而腦髓消鑠矣五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生針刺之道貴在得神致氣犯此禁者則脫其五味所生之神氣是謂失氣也太陽之脈其終也戴眼反折瘈瘲其色白絶皮乃絶汗絶汗則終矣少陽終者耳聾百節盡縱目系絶目系絶一日半則死矣其死也色青白乃死陽明終者口目動作喜驚妄言色黃其上下之經盛而不行則終矣少陰終者面黑齒長而垢腹脹閉塞上下不通而終矣厥陰終者中熱嗌乾喜溺心煩甚則舌卷卵上縮而終矣太陰終者腹脹柿不得息氣噫善嘔嘔則逆逆則面赤不逆則上下不通上下不通則面黑皮毛焦而終矣柿閉同此歸結終始之道始於五行而終於六氣也太陽之脈起目內眥上額交巔從巔入絡腦還出別下項挾脊抵腰中太陽乃津液之府而為諸陽主氣血氣絶而不能榮養筋脈則筋脈急而戴眼反折也精明五色者氣之華也太陽之氣主皮毛氣絶於皮則色白而絶汗出也少陽之脈起目鋭眥入耳中耳聾者少陽之脈絶也少陽主骨百節盡縱少陽之氣絶也少陽屬腎腎藏志目系絶者志先死志先死則一日半死矣陽明之脈起於鼻交頞中入齒中還出挾口環唇下交承漿口目動作者陽明之經氣欲絶也喜驚妄言色黃陽明之神氣外出也上下經者謂手足陽明之經盛者盛於外而絶於內也夫陽明太陰之言上下者謂從腰以上手太陰陽明皆主之從腰以下足太陰陽明皆主之上下之經盛而不通則終者天地陰陽之氣不交而絶也少陰之脈屬腎絡膀胱上貫肝膈入肺中從肺出絡心腹脹閉塞者少陰之脈絶不通也面黑者氣色外脫也齒長者骨氣不藏也上下不通者水火不交也夫少陰之言上下者少陰之上君火主之謂水火陰陽之氣絶也厥陰之脈循陰股入毛中通陰器循喉嚨入頏顙舌卷卵縮厥陰之脈絶也厥陰從中見少陽之火化中熱嗌乾心煩者化氣上出也肝主疏泄喜溺者肝氣下泄也太陰之脈上陰股入腹上膈挾咽連舌本散舌下復從胃注心中太陰之脈絶不通是以腹脹不得息太陰之氣上走心為噫氣噫善嘔嘔則逆逆則面赤者從胃而心心而外脫也夫上逆於心則見此證如不逆則手足二經皆絶而上下不通矣上下不通則土敗而水氣乘之而色黑矣手太陰之氣絶而皮毛夭焦矣此六氣終而經脈絶也蓋氣終則脈終脈絶則氣絶譬如人之兄弟生則俱生急則俱死矣夫經脈本於臟腑五行之所生而外合陰陽之六氣故首言終始之道五臟為紀末結六經之終謂生於五行而終於六氣也張開之曰神在天為風風生木木生肝是天之六氣化生地之五行五行生五臟五臟生六經六經合六氣蓋原本於天之六氣所生故終於六經而復歸於天也
