body:
  text: 卷八陰陽二十五人第六十四黃帝曰余聞陰陽之人何如伯高曰天地之間六合之內不離於五人亦應之故五五二十五人之政而陰陽之人不與焉其態又不合於衆者五余已知之矣願聞二十五人之形血氣之所生別而以候從外知內何如岐伯曰悉乎哉問也此先師之祕也雖伯高猶不能明之也黃帝避席遵循而卻曰余聞之得其人弗教是謂重失得而泄之天將厭之余願得而明之金匱藏之不敢揚之岐伯曰先立五形金木水火土別其五色異其五行之人而二十五人具矣黃帝曰願卒聞之岐伯曰慎之慎之臣請言之仇汝霖曰天地之間不審於五者天有五色五氣五時五音地有五方五行五運五味也五運行論曰東方生風風生木木生酸酸生肝在臟為肝在體為筋南方生熱熱生火火生苦苦生心在臟為心在體為脈中央生濕濕生土土生甘甘生脾在臟為脾在體為肉西方生燥燥生金金生辛辛生肺在臟為肺在體為皮毛北方生寒寒生水水生咸咸生腎在臟為腎在體為骨風寒熱濕燥天之五氣也木火土金水地之五行也在天成氣在地成形天地合氣命之曰人人之形體秉在地五行之所生然本於天之五氣是以形合五行而氣合五色五音也五陰而合五陽者在地之陰而合天之陽也五五二十五者合天之數也陰陽之人不與者通天論之所謂少陰太陰少陽太陽之人也其態又不合於衆者不合五行全備之人也夫三陰三陽者天之陰陽也五人之形者地之所成也是以此章論形合五行而上應天之五氣下章論陰陽之人應天氣之所生故篇名通天論木形之人比於上角似於蒼帝其為人蒼色小頭長面大肩背直身小手足好有才勞心少力多憂勞於事能春夏不能秋冬感而病生足厥陰他他然太角之人比於左足少陽少陽之上遺遺然左角之人比於右足少陽少陽之下隨隨然釱角之人比於右足少陽少陽之上推推然判角之人比於左足少陽少陽之下栝栝然能葉耐義同釱音大馬仲化曰木主東方其音角其色蒼故木形之人當比之上角似於上天之蒼帝色蒼者木之色蒼也頭小者木之巔小也面長者木之體長也肩背大者木之枝葉繁生其近肩之所闊大也身直者木之體直也小手足者木之枝細而根之分生者小也此自其體而言耳好有材者木隨用而可成材也力少者木易動搖也內多憂而外勞於事者木不能靜也耐春夏者木春生而夏長也不耐秋冬者木至秋冬而凋落也故感而病生焉此自其性而言耳足厥陰風木主氣他他美也如木之美材也比量也和也夫五音主五運之化氣三陽應六氣之司天五音之合於三陽者應歲運之干支相合也足厥陰與足少陽皆合以一陰而合左右太少之四陽者應地居天之中而天運於上下左右也大謂之釱即太角也太角之人比於左足少陽釱角之人比於右足少陽少陽之上遺遺推推然者下文之所謂足少陽之上血氣盛則通髯美長也遺遺謙下之態如枝葉之下垂也推推上進之態如枝葉之上達也半謂之判即少角也左角之人比於右足少陽判角之人比於左足少陽少陽之下隨隨栝栝然者下文之所謂足少陽之下血氣盛則脛毛美長外踝肥也隨隨從順之態如木體之委曲也栝栝正直之態如木體之梃直也仇汝霖曰左右手足即陰陽系日月論之手合十干足合十二支也火形之人比於上徵似於赤帝其為人赤色廣䏖鋭面小頭好肩背髀腹小手足行安地疾心行搖肩背肉滿有氣輕財少信多慮見事明好顏急心不壽暴死能春夏不能秋冬秋冬感而病生手少陰核核然質徵之人比於左手太陽太陽之上肌肌然少徵之人比於右手太陽太陽之下慆慆然右徵之人比於右手太陽太陽之上鮫鮫然質判之人比於左手太陽太陽之下支支頤頤然火主南方其音徵其色赤故火形之人似於上天之赤帝色赤者火之色赤也䏖脊肉也廣䏖者火之中勢熾而大也面鋭頭小者火之炎上者鋭且小也好肩背髀腹者火之自下而上光明美好也手足小者火之旁及者其勢小也行安地者火從地而起也疾心者火勢猛也行搖者火之動象也肩背肉滿者即䏖廣也有氣者火有氣勢也此自其體而言耳輕財者火性易發而不聚也少信者火性不常也多慮而見事明者火性通明而旁燭也好顏者火色光明也急心者火性急也不壽暴死者火性不久也此自其性而言耳耐春夏者木火相生之時不耐秋冬者火畏涼寒也故秋冬感而病生焉手少陰君火主氣核核真實之義如火之神明正直也手少陰與手太陽相合質者火之形質也質徵即太徵質判即少徵也質徵之人比於左手太陽右徵之人比於右手太陽太陽之上肌肌鮫鮫然者下文之所謂手太陽之上血氣盛則有多須面多肉以平也肌肌然者肉之充滿也鮫鮫然者性之踴躍也少徵之人比於右手太陽質判之人比於左手太陽太陽之下慆慆支支然者下文之所謂手太陽之下血氣盛則掌肉充滿也慆慆喜悅之態支支頤頤上下之相應也土形之人比於上宮似於上古黃帝其為人黃色圓面大頭美肩背大腹美股脛小手足多肉上下相稱行安地舉足浮安心好利人不喜權勢善附人也能秋冬不能春夏春夏感而病生足太陰敦敦然太宮之人比於左足陽明陽明之上婉婉然加宮之人比於左足陽明陽明之下坎坎然少宮之人比於右足陽明陽明之上樞樞然左宮之人比於右足陽明陽明之下兀兀然中央主土其音宮其色黃故土形之人比於上宮似於上古之黃帝曰上古者以別於本帝也色黃者土之色黃也面圓者土之體圓也頭大者土之高阜也肩背美者土之體厚也腹大者土之闊充也股脛美者充於四體也小手足者土溉四旁至四末而土氣漸微也多肉者土主肉也上下相稱者土豐滿也行安重者土體安重也舉足浮者土揚之則浮也此自其體而言耳安心者土性靜也好利人者土人生物為德也不喜權勢善附人者土能藏垢納汙不棄賤趨貴也耐秋冬者土得令也不耐春夏者受木克而土燥也故春夏感而病生焉此自其性而言耳足太陰濕土主氣敦敦然者有敦厚之道也足太陰與足陽明相合太宮之人比於左足陽明少宮之人比於右足陽明陽明之上婉婉樞樞然者下文之所謂足陽明之上血氣盛則髯美長也婉婉和順之態土之德也樞樞如樞轉之持重土之體也加宮土之加厚比上宮也加宮之人比於左足陽明左宮之人比於右足陽明陽明之下坎坎兀兀然者下文之所謂足陽明之下血氣盛則下毛美長至胸也坎坎然者行地之或安或浮如山路之不平也兀兀不動貌如平陸之安夷也仇汝霖曰東南為左西北為右天缺西北地陷東南加宮者右宮也蓋西北之地高厚而多山嶽故曰加宮金形之人比於上商似於白帝其為人方面白色小頭小肩背小腹小手足如骨發腫外骨輕身清廉急心靜悍善為吏能秋冬不能春夏春夏感而病生手太陰敦敦然釱商之人比於左手陽明陽明之上廉廉然右商之人比於左手陽明陽明之下脫脫然左商之人比於右手陽明陽明之上監監然少商之人比於右手陽明陽明之下嚴嚴然西方主金其音商其色白故金形之人比於上商似於上天之白帝面方者金之體方也色白者金之色白也頭腹肩背俱小者金質收斂而不浮大也小手足如骨發踵外骨輕者金體堅剛而骨勝也身清廉者金之體冷而廉潔不受汙也此自其體而言耳急心靜悍者金質靜而性鋭利也善為吏者有斧斷之才也秋冬者金水相生之時不能春夏者受木火之制也故春夏感而病生焉此自其性而言耳手太陰燥金主氣敦敦然者如金體之敦重也手太陰與手陽明相合釱商之人比於左手陽明左商之人比於右手陽明陽明之上廉廉監監然者下文之所謂手陽明之上血氣盛則髭美也廉廉如金之潔而不汙監監如金之鑑而明察也右商之人比於左手陽明少商之人比於右手陽明陽明之下脫脫嚴嚴然者下文之所謂手陽明之下血氣盛則腋下毛美手魚肉以溫也脫脫如金之堅白涅而不淄嚴嚴如金之整肅也仇汝霖曰五行五音上應五星故曰似於蒼帝者上應歲星也似於白帝者上應太白也水形之人比於上羽似於黑帝其為人黑色面不平大頭廉頤小肩大腹動手足發行搖身下尻長背延延然不敬畏善欺紿人戮死能秋冬不能春夏春夏感而病生足少陰汗汗然太羽之人比於右足太陽太陽之上頰頰然少羽之上比於左足太陽太陽之下紆紆然衆之為人比於右足太陽太陽之下潔潔然桎之為人比於左足太陽太陽之上安安然北方主水其音羽其色黑故水形之人比於上羽似於上天之黑帝色黑者水之色黑也面不平者水面有波也頭大者水面平闊也頤乃腎之部廉頤者如水之清濂也小肩大腹者水體之在下也動手足者水流於四旁也發身搖者水動而不靜也下尻長者足太陽之部如水之長也背主督脈背延延然太陽之水上通於天也水懦弱民狎而玩之則多死焉故人不敬畏而善欺紿人也戮死者多因戮力勞傷而死蓋水質柔弱而不宜過勞也秋冬者金水相生之時春時木泄水氣夏時火熯水涸也故春夏感而病生焉足少陰寒水主氣汙汙然者卑下之態如川澤之納汙也足少陰與足太陽相合太羽之人比於右足太陽桎之為人比於左足太陽太陽之上頰頰安安然者下文之所謂足太陽之上血氣盛則美眉眉有毫毛也頰俠輔也頰頰然者謂太陽在上如有俠輔而尊貴也安安然者安然而不動也少羽之人比於左足太陽衆羽之人比於右足太陽太陽之下紆紆潔潔然者下文之所謂足太陽之下血氣盛則跟肉滿踵堅也紆紆紆洄之態如水之洄旋也潔潔如水之清潔也曰衆之為人者謂居海濱平陸之大衆如水之在下而形體清潔也桎之為人者謂居岡陵山谷之人民如山之在上安然而不動也蓋水性動而不靜故水形之人動手足發行搖身如居於高陵山谷之中受加宮之所勝制則手足如桎梏而安然不動矣蓋言五形之人有居海濱傍水者有居山陵高阜者有居平原汙下者五方雜處之不同也又如釱角之人居於東方質徵之人生於南土則木火之性更偏甚矣如少商之人居於南土少羽之人處於加宮之山陵高阜又各有所調製矣蓋人之五形本於五方五行之所生故各因其所居之處而又有生制之甚衰故以此義申明於五形之末云馬仲化曰桎者受桎梏之人意水形之人為戮死耶仇汝霖曰按疏屬之山有神焉名曰二負桎其手足抑以山居之人以比山之神歟倪仲宣曰不曰左羽右羽而曰衆之為人桎之為人此即以衆桎而為左右也東南為左而地土卑下西方為右而土阜山高倪仲玉曰水形之人豈應桎梏而戮死耶經義淵微聖辭古朴非覃思精粹不易疏也是故五形之人二十五變者衆之所以相欺者是也仇汝霖曰言此五行之人二十五變者乃衆人中之所以相遍欺者也衆人者謂平常之人得五行五音之全者也倪仲宣曰相術以五行中具一形者乃富貴之人若五行混雜者平常之人也故曰衆人謂平常之大衆也故下文曰形色相得者富貴大樂謂木形之人其色蒼火形之人其色赤此偏欺之人也黃帝曰得其形不得其色何如岐伯曰形勝色色勝形者至其勝時年加感則病行失則憂矣形色相得者富貴大樂黃帝曰其形色相勝之時年加可知乎岐伯曰凡年忌下上之人大忌常加七歲十六歲二十五歲三十四歲四十三歲五十二歲六十一歲皆人之大忌不可不自安也感則病行失則憂矣當此之時無為奸事是謂年忌仇汝霖曰形勝色者如太角之人其色黃色勝形者如太宮之人其色青也夫形者五行之體也色者五行之氣也形氣相得感天地之生成故主富貴大樂下上之人者謂左右太少之上下合手足三陽之人而三陰之人不與焉年加者始於七歲每加九年乃形色不相得者之所大忌也夫七歲者少陽也加九年乃十六歲再加九年乃二十五歲蓋以手足三陽之人始於七歲之少陽再加窮九之老陽陽亢極而有悔矣凡此相加之年皆為斯人之大忌不可不自安其分也如感之則病行有所疏失失則憂矣倪仲宣曰五形合手足之三陰故雖逢陽九不以為忌若變而為太少左右者此手足之三陽故為大忌也黃帝曰夫子之言脈之上下血氣之候以知形氣奈何岐伯曰足陽明之上血氣盛則髯美長血少氣多則髯短故氣少血多則髯少血氣皆少則無髯兩吻多畫足陽明之下血氣盛則下毛美長至胸血多氣少則下毛美短至臍行則善高舉足足趾少肉足善寒血少氣多則肉而善瘃血氣皆少則無毛有則稀枯瘁善痿厥足痹瘃音祝寒瘡也吻音刎以下八節申明形者乃皮脈肉筋骨然藉皮肉經脈之血氣以生養此形而有上下盛衰之不同也夫生長鬚毛者乃充膚熱肉淡滲皮毛之血氣然手足三陽之氣血各因本經之經脈所循之處而各分皮部故帝問脈之上下血氣之候以知形氣蓋以各經脈絡所循之上下候之以知形中之氣血也形者謂皮肉筋骨也足陽明之脈其上行者挾口環唇下交承漿是以皮膚之血氣盛則髯美而長血少氣多則髯短氣少血多則髯少氣血皆少則無髯蓋血盛則淡滲皮膚而生毫毛氣者所以熏膚充身澤毛者也是以在上之鬚眉在下之毫毛皆藉皮膚之氣血以生長故氣少則髯少血少則髯短血氣皆少則無髯矣血氣少而不能充皮膚肥腠理故兩吻多畫蓋肌肉不得充滿而多瘦紋也足陽明之脈其下行者循膺胸下臍腹從膝臏而至足跗故在下皮膚之血氣盛則下毛美而長至胸血多氣少則下毛美短至臍血氣皆少則無毛雖有亦稀而枯瘁也足趾少肉足善寒者氣之所以熏膚充身澤毛者也瘃者手足寒冷之凍瘡血少則肉而善瘃者血之所以溫膚熱肉者也痿厥足痹者血氣少而不能營養筋骨也此言二十五人之形者皮脈肉筋骨也然皮肉筋骨之間又藉血氣之所資益而有上下盛衰之不同也足少陽之上氣血盛則通髯美長血多氣少則通髯美短血少氣多則少須血氣皆少則無須感於寒濕則善痹骨痛爪枯也足少陽之下血氣盛則脛毛美長外踝肥血多氣少則脛毛美短外踝皮堅而厚血少氣多則胻毛少外踝皮薄而軟血氣皆少則無毛外踝瘦無肉足少陽之經脈其上行者循於耳之前後加頰車下頸項是以皮膚之血氣盛則通髯美長血多氣少則通髯美短蓋鬚髮乃血之餘是以血多氣少雖短而亦美也在外者皮膚為陽筋骨為陰病在陽者名曰風病在陰者名為痹爪者筋之餘血氣皆少不能營養筋骨以致寒濕之邪留痹而為骨痛爪枯也其經脈之下行者循膝外廉下輔骨之前抵絶骨之端下出外踝之前循足跗上是以在下皮膚分肉之血氣盛則脛毛美長外踝肥血多則皮堅而厚血少則皮薄而軟蓋血之所以淡滲於皮膚者也足太陽之上血氣盛則美眉眉有毫毛血多氣少則惡眉面多少理血少氣多則面多肉血氣和則美色足太陽之下血氣盛則跟肉滿踵堅氣少血多則踵跟空血氣皆少則善轉筋踵下痛少理當作小理足太陽之脈起於目內眥循兩眉而上額交巔是以皮膚之血氣盛則眉美而眉有毫毛也夫充膚熱肉生鬚毛之血氣乃後天水穀之所生在上之髭鬚在下之長毛皆生於有生之後眉乃先天所生故美眉者眉得血氣之潤澤而美也毫毛者眉中之長毛因血氣盛而生長亦後天之所生也惡眉者無華彩而枯瘁也面多小理者多細小之紋理蓋氣少而不能充潤皮膚也血少氣多則面多肉氣之所以肥腠理也經云心之合脈也其榮色也平脈篇曰緩則陽氣長其色鮮其顏光血氣和者謂經脈皮膚之血氣和調則顏色鮮美也蓋五臟六腑之俞皆出於太陽之經太陽為諸陽主脈也轉筋踵下痛者血氣少而不能營養筋骨也手陽明之上血氣盛則髭美血少氣多則髭惡血氣皆少則無髭手陽明之下血氣盛則腋下毛美手魚肉以溫氣血皆少則手瘦以寒手陽明之脈其上行者挾口交人中上挾鼻孔是以皮膚之血氣盛則髭美惡者稀而枯瘁也其經脈之下行者循臑臂上入兩筋之間出合谷故血氣盛則腋下毛美而手魚肉以溫血氣皆少則手瘦以寒也仇汝霖曰手陽明之脈出合谷兩骨之間手魚肉乃手太陰之部分陽明之血氣盛而手魚肉以溫者臟腑之血氣互相交通者也手少陽之上血氣盛則眉美以長耳色美血氣皆少則耳焦惡色手少陽之下血氣盛則手卷多肉以溫血氣皆少則寒以瘦氣少血多則瘦以多脈手少陽之脈其上行者出走耳前交頰上至目鋭眥是以皮膚之血氣盛則眉美以長長者即生毫毛之意也其下行者從肩臑肘臂而上出於手腕故血氣盛則手卷多肉以溫蓋手少陽之血氣循手表腕盛則皮緩肉淖故善於卷握也多脈者皮肉瘦而脈絡多外見也仇汝霖曰陽氣者所以溫分肉充皮膚肥腠理者也是以氣少則皮肉瘦而多脈手太陽之上血氣盛則有多須面多肉以平血氣皆少則面瘦惡色手太陽之下血氣盛則掌肉充滿血氣皆少則掌瘦以寒手太陽之脈其上行者循於顴頰耳鼻目眥之間是以皮膚之血氣盛則有多須面多肉以平血氣皆少則面瘦色惡太陽為諸陽主氣也其下行者循肩臑肘臂而下出於手腕是以血氣盛則掌肉充滿血氣皆少則掌瘦以寒也以上論手足三陽之血氣各循本經之部分充膚熱肉淡滲皮毛肥腠理濡筋骨以養二十五變之形如血氣皆少則又不能他他遺遺之自然矣黃帝曰二十五人者刺之有約乎岐伯曰美眉者足太陽之脈氣血多惡眉者氣血少其肥而澤者血氣有餘血而不澤者氣有餘血不足瘦而無澤者氣血俱不足審察其形氣有餘不足而調之可以知逆順矣此言足太陽之主脈也二十五人之形者皮脈肉筋骨也以五形之人論之則當手少陰主脈今變為二十有五合於手足之三陽故以足太陽主脈蓋十二經脈之俞皆會於足太陽之經也故美眉者足太陽之脈氣血多也惡眉者足太陽之脈氣血少也其肌肉肥而顏色潤澤者手足三陽之脈血氣皆有餘也蓋足太陽為諸陽主脈太陽之脈氣血盛而美眉則諸陽之脈血氣皆有餘而肌肉肥澤矣故當再審察其皮膚分肉之氣血有餘不足而調之可以知逆順矣逆順者皮膚經脈之血氣交相逆順而行者也知逆順之有餘不足則知所以調之矣仇汝霖曰脈字其字宜玩蓋用脈字以知足太陽之脈之氣血多少加其字以分別肥而澤者乃諸陽之脈之血氣有餘也倪仲宣曰按口問篇論足太陽之精氣行於脈外以濡空竅十二奇邪之走空竅獨取足太陽之外踝此章論太陽為諸陽主脈而諸陽脈之血氣有餘不足皆以足太陽為準繩蓋太陽之上寒水主之在天為陽在地為水在人即為精氣是以足太陽為諸陽主氣而又為諸陽主精血也黃帝曰刺其諸陰陽奈何岐伯曰按其寸口人迎以調陰陽切循其經絡之凝澀結而不通者此於身皆有痛痹甚則不行故凝澀凝澀者致氣以溫之血和乃止其結絡者脈結血不行決之乃行故曰氣有餘於上者導而下之氣不足於上者推而休之其稽留不至者因而迎之必明於經隧乃能持之寒與熱爭者導而行之其宛陳血不結者則而豫之必先明知二十五人則血氣之所在左右上下刺約畢也此言手足三陰三陽皮膚分肉間之氣血皆從臟腑之經隧而外出於形身者也蓋二十五變之形者皮脈肉筋骨也是以上節論脈之血氣此節論皮肉筋骨之氣血焉諸陰陽者足之少陰太陰厥陰手之少陰太陰以應五音五行之人也手之太陽陽明足之少陽太陽陽明以應左右太少二十五變之人也諸陰陽之血氣所以充膚熱肉滲澤皮毛肥腠理濡筋骨者皆從本臟本腑之經隧而出於孫絡皮膚各並本經之脈絡以分界畔此非經脈之血氣故當按其寸口人迎以知陰陽之有餘不足而調之切循其經絡之凝澀結而不通者此於形身中皆有邪痹於皮肉筋骨之間甚則留而不行以致經絡之血氣有所凝澀蓋充膚熱肉之氣血從內之經隧而外出於孫絡皮膚此因邪閉於絡脈之外氣血不得外行以致凝澀於經絡之中故當致諸陽之氣以溫之則寒痹解而血得以和於外矣其結絡者血氣留結於脈內以致脈結而血不行又當決之使行蓋邪閉於皮腠而致經絡之凝澀者當理其氣血結於脈絡者當決其血也故曰氣有餘於上者導而下之不足於上者推而上之蓋氣血之出於皮膚而又有上下有餘不足之分者因絡脈所出於上下有疏通阻滯之不同也其有稽留於經絡中而不至者因而迎之此必明於經隧乃能持之經隧者五臟六腑之大絡也胃海所出之氣血而布散於天下者從臟腑之大絡而出於孫絡皮膚大絡雖與經脈繆處然上下左右與經相干而布於四末蓋並經而外出於皮部各隨本經之脈以分界限是以足陽明之上血氣盛則髯美長足太陽之上血氣盛則美眉也寒與熱爭者陰陽之血氣混亂也故當導而行之使各歸於本部蓋手足三陰三陽之血氣行於皮膚分肉之間如不分界畔則混亂交爭矣宛陳者陳莝之物宛積於腸胃之內以致血氣不至此不因於血結於脈絡而不通故當則而豫之蓋用逐陳莝之法則而豫奪之也此手足三陰三陽之血氣本於胃腑之所生從經隧而外出故必先明知二十五人則血氣之所在左右上下刺之約法畢矣如知少宮太宮之人則知比於足之陽明而足陽明之脈其上行者挾口環唇則知經隧之絡脈亦絡於唇口而皮膚之氣血亦分部於唇口也仇汝霖曰此以皆為痛痹之皆字照應氣有餘於上或不足於上蓋十二經隧之絡脈孫絡與十二臟之經脈絡脈並行於形身之上下若此身中皆為痛痹則十二經隧之絡脈皆為之不通如只痹於足陽明之上則陽明之上氣不足而下氣有餘矣若只痹於足陽明之下則陽明之下氣不足而上氣有餘矣痹在陽明之部分則知陽明之氣血結而不通又不涉於諸陰陽之絡矣此蓋假痛痹以申明皮膚分肉之氣血各並本經而出各從本經經脈所循之上下而各分界畔者也五音五味篇第六十五右徵與少徵調右手太陽上此承上章謂五音之人血氣不足者當調之以五穀五畜之五味也上章云右徵之人比於右手太陽太陽之上鮫鮫然又云手太陽之上血氣盛則有多須面多肉以平血氣皆少則面瘦惡色是右徵之人當調手太陽上矣又云少徵之人比於右手太陽太陽之下慆慆然又云手太陽之下血氣盛則掌肉充滿血氣皆少則掌瘦以寒是少徵之人當調手太陽下矣今右徵與少徵同調手太陽上者謂血氣上下之相通也左商與左徵調左手陽明上少徵與太宮調左手陽明上此言皮膚分肉之血氣雖各有分部然通融滲溉交相往來審經絡之相聯者亦可以通融調治也夫左商之人調左手陽明上者宜矣而左徵與少徵應調手太陽而同調於手陽明者謂手太陽與手陽明之脈並出於巨虛而上行手足三陽之脈皆縱橫聯絡於頭面然雖各有界畔而皮膚血氣之流行交相往來故有經脈相聯者亦可以同調之也是以左徵少徵之人同調於手陽明上且手陽明主皮膚之氣血者也手陽明之脈出於足陽明之巨虛上廉而上行故太宮之人當調足陽明上而亦可調之手陽明上也右角與太角調右足少陽下按前章有左角而無右角左右二字有誤前章云左角之人比於右足少陽少陽之下隨隨然是右角之人宜調之右足少陽下也又云太角之人比於左足少陽少陽之人遺遺然此以太角之人同調右足少陽下者左右上下之相通也太徵與少徵調左手太陽上前章云質徵之人比於左手太陽太陽之上肌肌然是太徵之人當調手太陽上矣又云少徵之人比於右手太陽太陽之下慆慆然今以太徵與少徵同調左手太陽上亦左右上下之相通也仇汝霖曰右角與太角故從下少陽之氣從下而上也太徵與少徵故從上太陽之火氣炎上也衆羽與少羽調右足太陽下前章云衆之為人比於右足太陽太陽之下潔潔然又曰少羽之人比於左足太陽太陽之下紆紆然是宜調足太陽下也少商與右商調右手太陽下此以少商與右商調手太陽者即左徵少徵之調手陽明乃互相交通之義桎羽與衆羽調右足太陽下前章曰桎之為人比於左足太陽太陽之上安安然衆之為人比於右足太陽太陽之下潔潔然今皆調足太陽下者太陽之氣從下而上也少宮與太宮調右足陽明下前章云少宮之人比於右足陽明陽明之下樞樞然太宮之人比於左足陽明陽明之下婉婉然以上而同調之下者陰陽血氣皆從下而上足而手也倪仲宣曰足多從下蓋以下而通於上也手多從上蓋以上而通於下也陰陽血氣上下環轉之無端也判角與少角調右足少陽下前章云判角之人比於左足少陽少陽之下栝栝然夫半謂之判判角即少角也前章只有太角左角釱角判角而無少角恐傳寫之誤耳倪仲宣曰下文亦無少角釱商與上商調右足陽明下釱商主手陽明大腸上商主手太陰肺足陽明者胃腑之經氣也此以手太陰陽明而調之足陽明者血氣生於胃腑水穀之精也谷入於胃乃傳之肺蓋肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺肺與大腸之血氣皆從胃腑始出而行於手太陰陽明之經故釱商與上商調足陽明也倪仲宣曰臟腑通連者曰下釱商與上角調左足太陽下釱商手陽明大腸也足太陽者膀胱水府也營衛生會篇曰水穀者常並居於胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱是大腸與膀胱並屬下焦而交相通貫者也是以釱商而調之足太陽下者以腑氣之交通於下也上角應足厥陰肝經五臟之脈絡皆不上循頭面惟足厥陰之脈連目系上出額與督脈會於巔足太陽之脈與督脈會於目之睛明而上額交巔是足太陽與督脈厥陰會於目而交於額也是以上角而調之足太陽下蓋血氣津液主於腸胃之下也按此節論調手足之三陽有左右上下之相通者有手太陽而調之手陽明者有手陽明而調之手太陽者有手陽明而調之足陽明者有足厥陰而調之足太陽者陰陽之血氣各有分部而調治錯綜抑經氣之交通或魯魚之舛誤姑從臆見箋疏以俟後賢參正仇汝霖曰此節論調左右太少之血氣比手足之三陽而不涉於五音之三陰今以上商上角論調於後者謂血氣之生始也營氣篇曰營氣之道內谷為寶谷入於胃乃傳之肺始於手太陰肺終於足厥陰肝其支別者上額循巔交於督脈復循腹裡下注於肺中是以論調上商之手太陰上角之足厥陰者謂血氣之營於臟腑十二經脈之中而滲注於外也張子所謂魯魚之誤者疑辭也且前後不從本經之調治者計什有一條豈差誤之過半耶學者當從氣交中求之上徵與右徵同穀麥畜羊果杏手少陰髒心色赤味苦時夏此節以五穀五畜五果之五味調養五音之人及二十五變之人蓋左右太少者從五音之所變也上徵者手少陰之人也右徵者左右上下手足三陽之人也上徵與右徵同者舉一而概四也蓋四變之人本於五音之所出是以五味調五音而四變之人亦調之以此五味也麥成於夏火之谷也巳午未會成火局羊乃火之畜也杏色赤而味苦心之果也經云五穀為養五果為助五畜為益夫血歸形氣歸精是以五音之形及二十五變之形不足者當補之以味也五音者在氣為手少陰在臟為心在色為赤在味為苦在時為夏此五音之所主也右徵者以陰而變陽也仇汝霖曰按前後二篇並無針刺二字所謂調右手太陽上左足太陽下者即以此五味調之也列左右上下者分別二十五變之人使後學觀形以知血氣之盛虛非用五味之中而有上下之分也如用調左手太陽上右手太陽下總以麥谷羊畜調之也書不盡言言不盡意學者以意逆之則得之矣上羽與太羽同谷大豆畜彘果栗足少陰臟腎色黑味鹹時冬上羽足少陰之人也太羽者二十五變之形也曰右徵曰太羽經文錯綜其間者舉一而左右太少總調之以此味也豆色黑性沉水之谷也彘乃亥畜水之畜也栗色黑味鹹腎之果也上羽者在經氣為足少陰在臟為腎在色為黑在味為咸在時為冬倪仲宣曰所言足少陰臟腎者謂大豆彘栗之味在經氣調養足少陰在臟則調養腎也餘臟同義上宮與太宮同谷稷畜牛果棗足太陰臟脾色黃味甘時季夏上宮足太陰之人也太宮者變而為足陽明也稷色黃味甘土之谷也牛乃土之畜棗者脾之果也在氣為足太陰在臟為脾在色為黃在味為甘在時為長夏上宮太宮加宮左宮少宮之人同調此谷畜之味也上商與右商同谷黍畜雞果桃手太陰臟肺色白味辛時秋上商手太陰之人也右商四變之形也黍色白而秋成金之谷也雞屬酉而鳴於巳酉丑時金之畜也桃色白而有毛肺之果也在氣主手太陰在臟為肺在色為白在味為辛在時為秋上商右商少商釱商左商之人同調此谷畜之味也上角與太角同谷麻畜犬果李足厥陰臟肝色青味酸時春上角足厥陰之人也太角四變之形也麻色青莖直木之谷也犬屬戌而味酸厥陰之畜也李色青味澀肝之果也在經氣主足厥陰在臟為肝在色為青在味為酸在時為春上角太角右角釱角判角同調此谷果之味也仇汝霖曰調五音者補五臟調四變者補六腑太宮與上角同右足陽明上夫生長鬚毛者乃充膚熱肉淡滲皮毛之氣血從臟腑之經隧而出於皮膚是以上節論右徵與少徵調右手太陽上左商與左徵調左手陽明上者論皮膚分肉之氣血各分手足三陽之上下也此復論手足三陽之經脈有上下之相交者各審其經而調之上角者足厥陰肝經也厥陰肝脈循喉嚨入頏顙連目系上出額與督會於巔而足陽明之脈起於鼻交頞中循髮際至額顱從大迎下人迎循喉嚨入缺盆夫頏顙者鼻內之上竅在頞中之分口鼻氣涕相通之竅也足陽明與肝脈交會於喉嚨頏顙額顱之間是以太宮與上角同調於足陽明也仇汝霖曰五音之人及二十五變之形總以此谷畜之五味調養前後錯綜分列二十餘條者重在經氣有上下之交通也學者識之倪仲宣曰前後二十餘則為經氣之交通是以論手足之三陽而前後兼論厥陰之上角蓋厥陰之脈絡上循頭目或與三陽之經絡交通或與皮膚之血氣相合故前後分列二則左角與太角同左足陽明上足少陽之脈上循於頭者抵於䪼下加足陽明之頰車是足少陽與足陽明之脈絡相通故左角與太角同調足陽明上仇氏曰前曰調此曰同合而言之是同調也少羽與太羽同右足太陽下太陽之上寒水主之少羽太羽屬水故同調足太陽下左商與右商同左手陽明上陽明之上金氣主之左商與右商屬金故調手陽明上仇氏曰金氣應天故從上水氣在泉故從下倪氏曰手多從上足多從下加宮與太宮同左足少陽上加宮與太宮比於足陽明也足陽明之脈上出於耳前者會足少陽之客主人是足陽明少陽之經脈交通於上故加宮與太宮同調足少陽下質判與太宮同左手太陽下質判屬火宜調手太陽者也太宮屬土同調手太陽下者手太陽之脈循咽下膈抵胃而所出之經脈本於足陽明之巨虛上廉是足陽明與手太陽之經脈交通於下故同調手太陽下判角與太角同左足少陽下前章云太角之人比於左足少陽少陽之上遺遺然判角之人比於左足少陽少陽之下推推然今同調足少陽下者上下之相通也仇汝霖曰以此經而調彼經者論經氣之交通也以本經而調本經者論左右上下之相通也太羽與太角同右足太陽上太羽屬水宜調足太陽者也太角屬木同調足太陽上者足太陽之脈抵耳上角交於足少陽之浮白率谷竅陰諸穴是足太陽與足少陽之脈絡交通於上故太角同調足太陽上太角與太宮同右足少陽上太角屬木宜調足少陽者也太宮屬土同調足少陽上者足陽明之脈上交於足少陽足少陽之脈上交於足陽明也夫皮膚分肉之血氣所以生鬚毛溫肌肉肥腠理濡筋骨者本於胃腑水穀之精從胃之大絡出於臟腑之經隧而外滲於皮膚是以前節論形中之氣血不足者宜調此五味此復論脈中之血氣不足者同調此五味也倪仲宣曰左角與太角同足陽明上者少陽之脈上交於陽明也加宮與太宮同足少陽下者陽明之脈上交於少陽也今復以太角在上少陽在下而太宮居中謂少陽之脈交於陽明者亦可調之少陽陽明之脈交於少陽者亦可調之陽明也右徵少徵質徵上徵判徵右角釱角上角太角判角右商少商釱商上商左商少宮上宮太宮加宮左宮衆羽桎羽上羽太羽少羽夫上徵上角上商上宮上羽者乃五音五行而合於手足之三陰者也左右太少者乃四變之形而比於手足之三陽者也以五陰而錯綜在中者陰內而陽外也上章論質徵之人比於左手太陽上少徵之人比於右手太陽下右徵之人比於右手太陽上質判之人比於左手太陽下蓋以上徵之人變質徵右徵於上之左右少徵質判於下之左右也今復以五音錯綜其間者是右徵之人可比於左太陽上少徵之人可比於右太陽上也質徵之人可比於右太陽下判徵之人可比於左太陽下也當知五音之人肌肌然而美眉者即變徵之人又不必拘於質徵右徵少徵判徵及太陽左手右手之人也夫分太少釱判左右上下者因四變而分也是以上章以左右太少之人比於手足左右之三陽此章論調手足左右之陰陽以養五音五變之人也五變之中又不必專主於質在左而少在右質在上而少在下故復序此一節蓋欲使學者通變以論陰陽不可膠柱而鼓瑟也黃帝曰婦人無須者無血氣乎岐伯曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則淡滲皮膚生毫毛今婦人之生有餘於氣不足於血以其數脫血也衝任之脈不營口唇故須不生焉此復論充膚熱肉淡滲皮毛之血氣又起於胞中從衝脈任脈而散於脈中者也上章論胃腑所生之血氣出於胃之大絡注臟腑之經隧而外滲於皮膚此後天水穀之精從中焦而出也此言胞中之血氣從衝任而行於經脈之外內乃先天所藏之精氣從下焦而上也蓋言形中之血氣所以營養皮脈肉筋骨者本於先後天之資生而資始也胞中為血海下焦少陰之所主也衝脈任脈皆起於胞中上循背裡為經絡之海者胞中之血氣從衝任而半營於脈中也其浮而外者循腹右上行至胸中而散此半隨衝脈而散於皮膚分肉者也故血氣盛則充膚熱肉血獨盛則淡滲皮膚生毫毛婦人之生因月事以時下數脫於血而血不足不得上營於唇口故須不生焉上章論生鬚眉毫毛之氣血手足三陽之所主也此章論絡唇口生髭鬚之血氣衝脈之所濡也血氣生始出入之道路多歧若非潛心體會反興亡羊之嘆仇汝霖曰妊娠之血皮膚之血也此血臥則歸肝故臥出而風吹之則為血痹如熱入血室刺肝之期門黃帝曰士人有傷於陰陰氣絶而不起陰不用然其須不去其故何也宦者獨去何也願聞其故岐伯曰宦者去其宗筋傷其衝脈血瀉不復皮膚內結唇口不營故須不生宗筋者前陰也宦者去其宗筋傷其衝脈血瀉而不復上營於唇口故須不生此因割去前陰而傷其先天之精氣也黃帝曰其有天宦者未嘗被傷不脫於血然其須不生其故何也岐伯曰此天之所不足也其任沖不盛宗筋不成有氣無血唇口不營故須不生此言胞中之血氣本於先天之所生也天宦者謂之天閹不生前陰即有而小縮不挺不長不能與陰交而生子此先天所生之不足也其衝任不盛宗筋不成有氣無血唇口不營故須不生仇汝霖曰髭鬚生於有生之後然又本於先天之精氣以上二篇論陰陽血氣有互相資生之妙學者再於五音五行之外求之黃帝曰善乎哉聖人之通萬物也若日月之光影音聲鼓響聞其聲而知其形其非夫子孰能明萬物之精是故聖人視其顏色黃赤者多熱氣青白者少熱氣黑色者多血少氣美眉者太陽多血通髯極須者少陽多血美須者陽明多血此其時然也此復論人道之歸於天道也青黃赤白黑五音五行之色也赤主夏而黃主長夏故黃赤者多熱氣熱氣者陽氣也青主春而白主秋故青白者少熱氣也黑主冬令之水而陽氣深藏故多血而少氣也三陰三陽者乃天之六氣亦合於四時初之氣厥陰風木二之氣少陰相火三之氣少陽君火四之氣太陰濕土五之氣陽明燥金終之氣太陽寒水在天有此六氣而人有此六氣者也合人之臟腑經脈有手足十二之分在天之陰陽只有太少之六氣也故美眉者太陽多血通髯極須者少陽多血美須者陽明多血此論人歸於天道而合於天之四時又以分手與足也夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣厥陰常多氣少血少陰常多氣少血太陰常多血少氣此天之常數也此以人之常數而合於天之常數也常數者地之五行天之六氣五六相合而成三十年之一紀六十歲之一周而人亦有此五運六氣者也是以首論地之五行以合人之五形末論人之六氣而合於天之六氣也在天成氣在地成形人秉地之五行而成此形然本於天之六氣故復歸論於天之六氣焉張玉師曰血氣生於陽明故陽明多血多氣其餘陰陽有多氣少血者有多血少氣者此大數之不全自然之理也然本經以厥陰常多氣少血太陰常多血少氣而素問血氣形志篇及本經九針論以厥陰多血少氣太陰多氣少血豈經義之矛盾耶抑相傳之錯誤歟曰此正以人之常數合天之常數也夫厥陰之上風氣主之風者大塊之噫氣故厥陰之多氣也太陰濕土主氣地氣升而為云為雨故曰太陰所至為濕生終為注雨雨者下注於地而為經水故太陰之多血也此天之常數也在人之形臟足厥陰主肝肝主藏血手厥陰主包絡包絡主生血故厥陰之多血也太陰者脾土也命門相火生脾土脾土生肺金三者主生諸陽之氣故太陰之多氣也此人之常數也故有此六氣而人有六氣在天之陰陽應天之常數在人之陰陽應人之常數故以人合於天而合有異同也雖然陰陽之道未有常而無變者也以天之常變論之厥陰司天之政云趨雨府濕化乃行是厥陰之多血矣太陰所至為雷霆烈風是太陰之多氣矣以人之常變論之厥陰不從標本從中見少陽之火化從中者以中氣為化是厥陰之多氣矣脾統諸經之血而足太陰獨受水穀之濁是太陰之多血矣噫知陰陽常變之道者然後能明萬物之精微仇汝霖曰首言天地之間六合之內不離於五人亦應之謂人合天地之五數也末結云夫人之常數此天之常數也謂人合天之六數也故曰其生五其數三謂人之生於地之五行而合於三陰三陽之天數倪仲宣曰五者應五運之在中主神機之出入六者合六氣之在外應天氣之降升人能養此五運六氣與天地合同弗使形氣有傷可以神仙不老百病始生第六十六黃帝問於岐伯曰夫百病之始生也皆生於風雨寒暑清濕喜怒喜怒不節則傷臟風雨則傷上清濕則傷下三部之氣所傷異類願聞其會岐伯曰三部之氣各不同或起於陽或起於陽請言其方喜怒不節則傷臟臟傷則病起於陰也清濕襲虛則病起於下風雨襲虛則病起於上是謂三部至於其淫泆不可勝數勝平聲數上聲按本經云風寒傷形憂恐忿怒傷氣氣傷臟乃病臟寒傷形乃病形風傷筋脈筋脈乃應此形氣外內之相應也又曰邪氣在上者言邪氣之中人也高故邪氣在上也清氣在下者言清濕地氣之中人也必從足始故清氣在下也是風雨清濕之邪病在外而傷於形之上下喜怒不節則傷臟而病起於陰夫形者皮脈肉筋骨五臟之外合也此蓋承上章而言五行之形不足於上者則風雨襲虛而病起於上不足於下者則清濕襲虛而病起於下臟氣不足者則喜怒傷氣而病起於陰故當用五穀五畜五果之五味合而服之以補益精氣使陰陽和調血氣充滿病則無由入其腠理此賢人之所以養生良醫之治未病也徐振公曰五音之人應五臟左右太少之人應身形之上下五音之人陰氣多而陽氣少左右太少之人陰氣少而陽氣多是五音之人當病形左右太少之人當病臟矣雖然陰中有陽陽中有陰陽盛者有血氣之不足陰盛者亦有血氣之不足也倪仲宣曰此注照應下章行針論黃帝曰余固不能數故問先師願卒聞其道岐伯曰風雨寒熱不得虛邪不能獨傷人卒然逢疾風暴雨而不病者蓋無虛故邪不能獨傷人此必因虛邪之風與其身形兩虛相得乃客其形兩實相逢衆人肉堅其中於虛邪也因於天時與其身形參以虛實大病乃成氣有定舍因處為名上下中外分為三員此言風雨之邪客於形而不傷氣者傳舍於內而成積也金匱要略云一者經絡受邪入臟腑為內所因此言邪傷六經之氣而內入於臟腑者也蓋三陰三陽之氣主於膚表而合於六經故邪傷於氣則折毛髮理使正氣橫傾淫邪泮衍於肌腠絡脈之間而傳溜於血脈經脈內連臟腑是以大邪入臟腹痛下淫可以致死而不可以致生蓋陰陽六氣生於五行五臟內合五行外合六氣故傷於氣者傳溜於血脈則內干臟腑矣如病形而不病氣者雖傳舍於經脈只留於腸胃之外而成積也夫虛邪之中人也灑淅動形正邪之中人也微先見於色不知於其身若有若無若亡若存有形無形莫知其情是虛邪傷形而正邪傷氣也正邪者天之正氣風寒暑濕燥火也蓋天有此六氣而人亦此六氣是以正邪中氣同氣相感也故曰風雨寒熱不得虛邪不能獨傷人傷人者謂傷人之形也虛邪者虛鄉不正之邪風形者皮脈肉筋骨五臟之外合應地之五行也地之五行應天之五時地之五方虛風者春時之風從西方來夏時之風從北方來此五行不正之氣故傷人之形是天之六氣傷人之六氣地之五行傷人之五形蓋人秉天地之形氣而生成此形氣也是以虛邪之風與其身形兩虛相搏乃客於形傳舍於腸胃之外而成積也衆人肉堅者承上文而言二十五形之人血氣不足不能充膚熱肉以致虛邪之客於形非比衆人之肉堅也因於天時者因春時之西風夏時之北風也大病乃成者大邪著於腸胃之間而成積也氣有定舍者言邪氣淫泆不可勝論或著於孫絡或著於經輸而後有定名也此論風雨傷上下節論清濕傷下末節論喜怒傷中而分為三員也徐振公曰一篇之中並不提一氣字而此節用三形字反復三轉下節云內傷於憂怒則氣上逆正所謂風寒傷形憂恐忿怒傷氣闡發聖義須全經貫通方能具大手眼是故虛邪之中人也始於皮膚皮膚緩則腠理開開則邪從毛髮入入則抵深深則毛髮立毛髮立則淅然故皮膚痛留而不去則傳舍於絡脈在絡之時痛於肌肉其痛之時息大經乃代留而不去傳舍於經在經之時灑淅喜驚留而不去傳舍於輸在輸之時六氣不通四肢則肢節痛腰脊乃強留而不去傳舍於伏沖之脈在伏沖之時體重身痛留而不去傳舍於腸胃在腸胃之時賁響腹脹多寒則腸鳴飧泄食不化多熱則溏出糜留而不去傳舍於腸胃之外募原之間留著於脈稽留而不去息而成積或著孫脈或著絡脈或著經脈或著輸脈或著於伏沖之脈或著於膂筋或著於腸胃之募原上連於緩筋邪氣淫泆不可勝論飧葉孫勝平聲此言風雨虛邪傷於形身之上從形層傳舍於內而成積也夫邪之中人必先始於皮毛人之形虛則皮膚緩而腠理開開則邪從毛髮入入則抵深深則毛髮立蓋氣者所以充膚澤毛如邪傷氣則折毛髮理此邪入於皮膚而氣不傷故毛髮立淅然者灑淅動形也皮膚痛者邪留於皮膚也絡脈者浮見於皮膚之孫脈絡脈在絡之時痛於肌肉者邪留於肌肉絡脈之間而不得入於經也繆刺篇曰邪之客於形也必先舍於皮毛留而不去入舍於孫脈留而不去入舍於絡脈留而不去入舍於經脈內連五臟散於腸胃此邪之從皮毛而入極於五臟之次也如此則治其經焉今邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病也息止也大經乃代者謂邪止於肌肉絡脈之間不得入於經脈而流於大經也大經者經隧也經隧者五臟六腑之大絡也傳舍於經者傳舍於胃腑之經隧足陽明之脈病故惕然而喜驚也輸者轉輸血氣之經脈即臟腑之經隧也臟腑之大絡左右上下並經而出布於四末故邪留於輸則六經不通四肢之肢節痛也腰脊乃強者臟腑之大絡通於督絡之長強也伏沖者伏行腹內之衝脈衝脈者起於胞中挾臍上行至胸中而散於皮膚充膚熱肉濡養筋骨邪留於內則血氣不能充溢於形身故體重身痛也留而不去傳舍於腸胃在腸胃之時賁響腹脹多寒則腸鳴飧泄多熱則溏出糜糜者谷之不化者也募原者腸胃外之膏膜留著於脈者募原間之脈絡也稽留其間而不去則止於此而成積矣孫脈絡脈者募原中之小絡經脈者胃腑之大經也輸脈者臟腑之大絡轉輸水穀之血氣者也伏沖者伏行於腹之衝脈募原者腸胃之脂膜也膂筋者附於脊膂之筋緩筋者循於腹內之筋也此數者在於腸胃之前後左右邪隨著而為積邪之淫溢不可勝數也徐振公曰邪傷氣則邪從經脈而內干臟腑蓋三陰三陽之氣生於臟腑從經脈而出於膚表故邪亦從經脈而內干於臟腑也邪傷形則從別絡而入於腸胃之外蓋形中之血氣出於胃腑水穀之精滲出於胃外之孫脈絡脈溢於胃之大絡轉注於臟腑之經隧外出於孫絡皮膚所以充膚熱肉滲皮毛濡筋骨者也是以形中之邪亦從外之孫絡傳於內之孫絡留於腸胃之外而成積故下文曰其著孫絡之脈而成積者其積往來上下臂手孫絡之居也浮而緩不能拘積而止之蓋外內孫絡之相通是以外內之相應也倪仲宣曰古來論完穀不化有言因於寒者有言因於熱者今本經以多熱則溏出糜是因於熱矣蓋火能速物而出故不及化黃帝曰願盡聞其所由然岐伯曰其著孫絡之脈而成積者其積往來上下臂手孫絡之居也浮而緩不能拘積而止之故往來移行腸胃之間水湊滲注灌濯濯有音有寒則䐜滿雷引故時切痛其著於陽明之經則挾臍而居飽食則益大飢則益小其著於緩筋也似陽明之積飽食則痛飢則安其著於腸胃之募原也痛而外連於緩筋飽食則安飢則痛其著於伏沖之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀其著於膂筋在腸後者飢則積見飽則積不見按之不得其著於輸之脈者閉塞不通津液不下孔竅乾塞此邪氣之從外入內從上下也此承上文申明留著而成積者各有形證也孫絡者腸胃募原間之小絡蓋胃腑所出之血氣滲出於胃外之小絡而轉注於大絡從大絡而出於孫絡皮膚其著於內之孫絡而成積者其積往來上下其臂手孫絡之居於外也浮而緩不能拘束其積而止之故往來移行於腸胃之間胃腑之水津滲注於外則濯濯有聲蓋留滯於孫絡而不能注於大絡也陽明之經乃胃之大絡故挾臍而居飽則水穀之津注於外故大飢則津血少故小也緩筋者經於腹內之筋故有似乎陽明之積飽則脹故痛飢則止而安也募原者腸胃之膏膜飽則津液滲潤於外故安飢則乾燥故痛也伏沖之脈挾於臍間故揣之應手而動發手則熱者衝脈之血氣充於外也衝脈下循陰股出於脛氣之街其氣下於兩股如湯沃之狀者因積而成熱也膂筋者附於脅膂之內在腸之後故飢則積見飽則不見而按之不得也輸之脈者轉輸津液之脈臟腑之大絡也胃腑水穀之精從胃之大絡而注於臟腑之大絡從臟腑之大絡而出於皮膚故積著於輸之脈則脈道閉塞不通津液不下而皮毛之孔竅乾塞也此邪氣之從外而內從上而下以成其積也徐振公曰手孫絡之居也浮而緩者謂無力也疹孫絡之浮緩者疹尺膚也蓋脈之急者尺之皮膚亦急脈緩者尺之皮膚亦緩胃腑所出之氣血從陽明之五里而出於尺膚是以疹孫絡之浮緩則知其無力而不能拘積也倪仲宣曰寸關尺三部以候臟腑經脈之氣人迎氣口以候在外之氣尺膚以候內在之氣黃帝曰積之始生至其已成奈何岐伯曰積之始生得寒乃生厥乃成積也此承上啓下之文風雨者在天之邪而傷上清濕者在地之邪而傷下在天曰生在地曰成故積之始生得寒而生清濕之邪厥逆於下而成積也黃帝曰其成積奈何岐伯曰厥氣生足悗悗生脛寒脛寒則血脈凝澀血脈凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相搏則併合凝聚不得散而積成矣卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六輸不通濕氣不行凝血蘊裹而不散津液澀滲著而不去而積皆成矣悗莫本切葉門上聲此言清濕之邪傷下之形而成積也悗悶也厥逆生足悗者邪氣厥逆於下則足脛悗而不得疏利矣悗則生寒寒則血脈凝澀而寒氣上入於腸胃入於腸胃則䐜脹脹則腸外之汁沫迫聚不得散日久而成積矣若卒然多食飲則腸滿又或起居不節用力過度則絡脈傷絡脈者即臟腑所出血氣之別絡也陽絡者上行之絡脈傷則血外溢於上而為衄陰絡者下行之絡脈傷則血內溢而為後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相搏則併合凝聚不得散而積成矣或卒然外中於寒邪若兼之內傷於憂怒則氣上逆氣上逆則六輸不通輸者轉輸血氣之脈六者手經之輸即陽絡也六輸不通則溫膚熱肉之氣不行血凝蘊裹而不散津液澀於絡中滲於絡外著而不去而積成矣此言汁沫迫聚或腸外之寒汁沫與血相搏皆為成積也或外中於寒兼之內傷憂怒凝血與津液留著亦皆成積也按經脈有手三陰三陽之大絡並經而上循於手足三陰三陽之大絡並經而下循於足主行血氣滲出於脈外以養形是以陽絡傷則上出於空竅而為衄血陰絡傷則內出於腸胃而為便血六輸不得上通於外則內溢於脈外而成積是外內皆主滲出於脈外者也徐振公曰因於風雨所生之積著於有形而生故曰生因於清濕所成之積乃凝血與津汁搏聚於空郭之中如懷子之狀虛懸而成形蓋因於天者本於無形故附於有形而生因於地者乃自成其形也黃帝曰其生於陰者奈何岐伯曰憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出則傷腎此內外三部之所生病者也此言喜怒不節則傷五臟之形而病起於陰也憂思傷心形寒飲冷則傷肺忿怒不節則傷肝醉以入房汗出當風則傷脾用力過度若入房汗出則傷腎此外因於天之風雨地之清濕內因於五臟之情志而成上中下三部之積也按五臟只曰生病而不曰積蓋五臟之病積在氣而非有形也難經所謂在肝曰肥氣在肺曰息奔在心曰伏梁在脾曰痞氣在腎曰奔豚此乃無形之氣積而非有形之血積也倪仲玉曰憂思忿怒傷氣故積在氣黃帝曰善治之奈何岐伯答曰察其所痛以知其應有餘不足當補則補當瀉則瀉毋逆天時是謂至治痛者為積之痛於內也察其所痛知其所應者如著於孫絡之積則外應於手臂之孫絡著於陽明之經積則外應於光明著於腸胃募原之積則外應於溪谷之穴會著於伏沖之積則外應於氣衝大赫著於膂筋之積則應於足少陰太陽之筋結於緩筋之積則應於足太陰陽明之筋成於六輸之積則外應於內關外關通里列缺支正偏歷積於空郭之中則外應於陽明之五里臂腕之尺膚積於五臟察其左右上下則外應於五臟之經俞審其有餘不足當補則補當瀉則瀉隨四時之序氣之所處病之所舍臟腑之所宜毋逆天時是謂至治倪仲玉曰外因之積應於形內因之積應於脈行針第六十七黃帝問於岐伯曰余聞九針於夫子而行之於百姓百姓之氣血各不同形或神動而氣先針行或氣與針相逢或針已出氣獨行或數刺乃知或髮針而氣逆或數刺病亦劇凡此六者各不同行願聞其方此承前章論刺陰陽之人而行針之不同也夫五音之人多陰左右太少之人多陽百姓者天下之大衆蓋天地之間六合之內不離於五而人亦應之百姓之氣血各不同形者謂形中之血氣有盛有少也六者謂重陽之人陽中有陰之人陰陽和平之人多陰之人陰中有陽之人及粗工之所敗也倪仲玉曰此篇論刺形故提二形字末結一形字岐伯曰重陽之人其神易動其氣易往也黃帝曰何謂重陽之人岐伯曰重陽之人熇熇高高言語善疾舉足善高心肺之臟氣有餘陽氣滑盛而揚故神動而氣先行此言重陽之人神氣之易行也夫五臟內合五行外合五音三陰之所主也心肺居上為陽肝腎脾居下為陰陰中之有陽也重陽之人者手足左右太少之三陽及心肺之臟氣有餘者也熇熇高高手三陽之在上也言語善疾陰中之陽在中也舉足善高足三陽之在下也心藏神肺主氣心肺之臟氣有餘陽氣滑盛而揚故神動而氣先行也黃帝曰重陽之人而神不先行者何也岐伯曰此人頗有陰者也黃帝曰何以知其頗有陰也岐伯曰多陽者多喜多陰者多怒數怒者易解故曰頗有陰其陰陽之離合難故其神不能先行也心為陽中之太陽肝為陰中之少陽心主喜肝主怒心藏神肝藏魂魂隨神以往來者也神動而氣先行者神魂之相離也重陽而頗有陰者陰陽之相合也陰陽之離合難故神與魂合則其神不能先行矣上文曰氣先行此則曰神不能先行蓋氣行則神行神行則氣行神氣之相隨也夫行針者貴在得神取氣然而神有易動氣有易往是以數刺而病益甚者反傷其神氣也仇汝霖曰喜為心志怒為肝志數怒者易解言其人易怒而易解者重陽之人頗有陰也蓋多陰者多怒此陽中之陰故易怒而易解也黃帝曰其氣與針相逢奈何岐伯曰陰陽和調而血氣淖澤滑利故針入而氣出疾而相逢也徐振公曰此言陰陽和平之人血氣淖澤滑利故氣出疾而與針相逢也倪仲玉曰謂陰陽之氣皆應於針黃帝曰針已出而氣獨行者何氣使然岐伯曰其陰氣多而陽氣少陰氣沉而陽氣浮沉者內藏故針已出氣乃隨其後故獨行也徐振公曰此言多陰之人針已出而陰氣獨行也其陰氣多而陽氣少者陰氣沉而陽氣浮陰陽之相離也故針已出則微陽之氣隨針外泄陰氣獨行於內此陰陽不和不能交相廝守而微陽之易脫也黃帝曰數刺乃知何氣使然岐伯曰此人之多陰而少陽其氣沉而氣往難故數刺乃知也徐振公曰此言陰中有陽之人數刺而始知也陰中有陽者多陰而少陽其氣沉而難於往來故數刺乃知此陰陽廝守於內也二節言多陰少陽之人有陰陽之相離者有相守者陰陽離合之道行針者不可不知仇汝霖曰多陰少陽故陰陽不合陰中有陽故陰陽相和蓋陽生於陰也黃帝曰針入而氣逆者何氣使然岐伯曰其氣逆與其數刺病益甚者非陰陽之氣浮沉之勢也此皆粗之所敗工之所失其形氣無過焉徐振公曰重陽之人其神易動其氣易往神氣之易散也多陰之人氣隨針出微陽之易脫也陰陽有離有合氣之有浮有沉粗工不知浮沉離合之道而失之以致數刺而病益甚也夫五音之形陰氣多而陽氣少左右太少之形陽氣多而陰氣少故善用針者調其陰陽而使形氣之無過焉仇汝霖曰神氣者五臟之神氣也重陽之人使神氣外弛則愈亡其陰矣多陰少陽之人使陽氣隨針而出則愈亡其陽矣此皆粗之所敗工之所失也上膈第六十八黃帝曰氣為上膈者飲食入而還出余已知之矣蟲為下膈下膈者食晬時乃出余未得其意願卒聞之岐伯曰喜怒不適食飲不節寒溫不時則寒汁流於腸中流於腸中則蟲寒蟲寒則積聚守於下管則腸胃充郭衛氣不營邪氣居之人食則蟲上食蟲上食則下管虛下管虛則邪氣勝之積聚已留留則癰成癰成則下管約其癰在管內者即而痛深其癰在外者則癰外而痛浮癰上皮熱管脘同此言汁沫積於腸胃而成癰膈者內之膈肉前連於胸之鳩尾後連於脊之十一椎旁連於脅膈上為膻中名曰氣海上焦宗氣之所居上焦開發宣五穀味所以熏膚充身澤毛膈下胃腑之所居名水穀之海受中焦之氣泌糟粕蒸津液化其精微隨三焦出氣以溫肌肉充皮膚若因於喜怒不適食飲不節寒溫不時病在膈上者食飲入而還出因於膈下者食入晬時乃還晬時周時也夫胃者水穀血氣之海也汁沫者胃腑所生之津液滲出於腸胃之外募原間之孫脈絡脈化赤為血注於胃之大絡從臟腑之經隧外出於皮膚如因於外邪以致汁沫滲留於腸外不得散則日以成積矣如因於內傷汁沫留於腸內漸積而成癰此皆因於中上二焦之氣有傷不能宣化輸布故帝曰氣為上膈蟲為下膈上膈者上焦之氣也下膈者中焦之氣也蓋蟲為陰類遇陽熱則消中焦之氣虛寒則陰類生聚而上食矣寒汁流於腸中則腸胃充郭而衛氣不能營於外則留積而成癰矣其癰在脘內者即痛而深其癰在外者則隱見於外而痛浮在癰上之腹皮則熱徐振公曰此節亦承前數章而言謂形中之肌肉血氣藉胃腑水穀之所生養若食飲入而還出或朝食暮吐暮食朝吐則形氣消索矣此皆因於喜怒不節若傷於五臟之形則成五臟之積傷於腸胃則成腸胃之癰本經曰五臟不和則七竅不通六腑不和則留而為癰黃帝曰刺之奈何岐伯曰微按其癰視其所行先淺刺其旁稍內益深還而刺之毋過三行察其沉浮以為深淺已刺必尉令熱入中日使熱內邪氣益衰大癰乃潰伍以參禁以除其內恬憺無為乃能行氣後以鹹苦化谷乃下矣視氣所行者視衛氣之行於手足陽明而取之也毋過三行者先淺刺之以逐陽邪而來血氣復深刺之以致陰氣之邪最後還而復深刺之以下穀氣穀氣者水穀所生之正氣也若過取之則穀氣出故曰毋過三行察其浮沉者察癰之生於脘內脘外而為淺深之刺也已刺必尉者溫散其寒汁沫也伍以參禁者參伍而禁忌之以除其內積也上古天真論曰恬憺虛無真氣從之故宜恬憺無為乃能行氣鹹苦化谷者以鹹苦之物同穀食之蓋咸能軟堅苦能泄下谷則衛其正氣者也徐振公曰此因喜怒不適食飲不節寒溫不時之所致故曰伍以參禁謂禁其飲食之所當忌者恬憺無為是和其喜怒適其寒溫矣倪仲玉曰當忌者忌不當忌者不忌故曰參伍憂恚無言第六十九黃帝問於少師曰人之卒然憂恚而言無音者何道之塞何氣出行使音不彰願聞其方音聲者五音之聲嘹亮而有高下者也語言者分別清濁字面發言而有語句也在肺主聲心主言肝主語然由足少陰腎氣之所發又曰五者音也音主長夏是音聲之道本於五臟之氣全備而後能音聲響亮語句清明故善治者審其有音聲而語言不清者當責之心肝能語言而無音聲者當責之脾肺不能語言而無音聲者此腎氣之逆也夫憂則傷肺肺傷則無聲矣恚怒傷肝肝傷則語言不清矣徐振公曰土數五而主宮音宮乃君主之音五音之主也仇汝霖曰此篇亦承前數章而言蓋憂恐忿怒傷五臟之形則病五臟而成積如傷五臟之氣則無音聲矣倪仲玉曰憂恐忿怒傷氣氣傷臟乃病臟是因氣而病五臟之形或傷五臟之氣少師答曰咽喉者水穀之道也喉嚨者氣之所以上下者也會厭者音聲之戶也口唇者音聲之扇也舌者音聲之機也懸雍垂者音聲之關也頏顙者分氣之所泄也橫骨者神氣所使主發舌者也故人之鼻洞涕出不收者頏顙不開分氣失也是故厭小而疾薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也人卒然無音者寒熱客於厭則厭不能發發不能下至其開闔不致故無音厭上聲胃之上脘為咽喉主進水穀在喉嚨之後肺之上管為喉嚨主氣之呼吸出入在咽喉之前會厭者在喉嚨之上乃喉咽交會之處凡人飲食則會厭掩其喉嚨而後可入於咽此喉嚨之上管故為音聲之戶謂聲氣之從此而外出也脾開竅於口唇口開闔而後語句清明故為音聲之扇心開竅於舌足少陰之脈上挾舌本舌動而後能發言故為音聲之機懸雍者喉間之上齶有如懸雍之下垂者聲從此而出故為音聲之關肝脈循喉嚨入頏顙頏顙者齶之上竅口鼻之氣及涕唾從此相通故為分氣之所泄謂氣之從此而分出於口鼻者也橫骨者在舌本內心藏神而開竅於舌骨節之交神氣之所遊行出入故為神氣之所使主發舌者也蓋言橫骨若弩舌之發機神氣之所使也人之鼻洞涕出不收者因頏顙不開分氣失也蓋以申明頏顙乃齶之上竅口鼻之氣及涕唾之從此而相通者也會厭者為開為闔主聲氣之出入是以薄小則發聲疾厚大則開闔難其氣出遲故重言也重言者口吃而期期也寒氣者足少陰寒水之氣也蓋少陰之脈上繫於舌絡於橫骨終於會厭其正氣上行而後音聲乃發如寒氣客於厭則厭不能發謂不能開也發不能下謂不能闔也是以至其開闔不致而無音聲矣黃帝曰刺之奈何岐伯曰足之少陰上繫於舌絡於橫骨終於會厭兩瀉其血脈濁氣乃闢會厭之脈上絡任脈取之天突其厭乃發也足少陰主先天之生氣留於膻中上出於肺以司呼吸者後天水穀所生之宗氣也是以呼出心與肺吸入下通於肝腎呼吸定息上下之相通也故寒氣客之則正氣不通而會厭失其開闔之機矣濁氣者寒水之濁氣闢除也兩瀉其血脈者謂脈道有兩歧一通氣於舌本一通精液於廉泉玉英蓋足少陰主藏先天之精氣而上通於空竅者也寒熱第七十黃帝問於岐伯曰寒熱瘰癧在於頸腋者皆何氣使生岐伯曰此皆鼠痿寒熱之毒氣也留於脈而不去者也此承上章之義而論足少陰之水火焉寒熱者先天水火之氣水火者精氣也以上數章論後天所成之身形及水穀所生之血氣有盛有虛為癰為積上章論少陰所生之氣上出於會厭而發於音聲所藏之精上通於任脈以濡空竅然有正氣則有邪淫如寒熱之毒氣下藏於臟上通於頸腋之間留於脈而不去則為瘰癧者此腎藏先天之水毒也天開於子天一生水其毒在外故名曰鼠夫頸腋之脈少陽之脈也少陽乃初陽之氣生於先天之水中少陽與腎臟經氣相通故本經曰少陽屬腎愚按本經凡論刺論疾其中暗合天地陰陽之道及血氣之生始出入蓋欲使學者知邪病之所由生則知正氣之所出入若能觸類旁通斯得聖人之微義黃帝曰去之奈何岐伯曰鼠瘻之本皆在於臟其末上出於頸腋之間其浮於脈中而未內著於肌肉而外為膿血者易去也黃帝曰去之奈何岐伯曰謂從其本引其末可使衰去而絶其寒熱審按其道以豫之徐往徐來以去之其小如麥者一刺知三刺而已此言陰臟之毒氣傳於腑陽而外出於末者可刺而易已也夫臟為本脈為末其毒在臟而上出於頸腋之間其浮於脈中而外為膿血者此毒氣出於末而從脈潰故易已也未內著於肌肉者未轉及於陽明也故從其本引其末可使衰去而絶其寒熱之毒審按其所出之道路以豫奪之徐往徐來以引去之其小如麥者毒之輕微者可一刺知三刺而已此章與素問集注第六十篇之骨空論合參其大義曉然矣徐振公曰手厥陰少陽皆與腎合陰臟之毒出於腑陽故為易治若傳於厥陰之臟故為不治之死證矣黃帝曰決其生死奈何岐伯曰反其目視之其中有赤脈上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲而死赤脈不下貫瞳子可治也夫腎藏天一之水地二之火此先天始分之兩儀也少陽厥陰之氣皆出於腎厥陰之氣上舍於心下之包絡而為有形之一臟包絡主脈而代君行其血焉少陽之氣遊行於上中下出入於肌腠歸於中焦之部署而為有形之一腑與心主包絡之相合也是厥陰少陽之形臟在於心下中焦之部分而二氣皆本於腎臟之所生瞳子者水臟之骨睛也赤脈從上而下貫瞳子者水臟之毒氣上交於包絡之火臟火臟之毒氣復下交於水臟之骨睛此為陰陽交者死不治蓋毒氣在於陰陽之臟內往來不能出於末而從脈潰故為不治之惡疾也夫天一地二合而為三一脈一歲死者水臟之毒甚也二脈二歲死者水臟之毒傳之於火臟也三脈三歲死者毒氣分於二歲之間也蓋毒之專者重故死之速分者死之遲也一脈半者一二之間也二脈半者二三之間也夫人秉先天之水火而成此形有感於正氣必協於邪淫是以痘毒發原在腎先天之火毒也瘰癧者先天之水毒也蓋火有毒而水亦有毒但火毒多而水毒少也仇汝霖曰心包絡為陽臟陰傳於陽而不復下交於陰者尤為可治故復曰赤脈不下貫瞳子者可治也聖人救民之心甚切醫者可輕忽而待其死焉邪客第七十一黃帝問於伯高曰夫邪氣之客人也或令人目不瞑不臥出者何氣使然此篇論衛氣行於形身之外內宗氣行於經脈之外內行於脈內者偕營氣而行行於脈外者隨衛氣而轉外內自相逆順而行者也徐振公曰此章假邪客以明衛氣宗氣之行故篇名邪客而經文皆論其正氣焉伯高曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉營氣者泌其津液注之於脈化以為血以營四末內注五臟六腑以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於陰常從足少陰之分間行於五臟六腑今厥氣客於五臟六腑則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹺陷不得入於陰陰虛故目不瞑此論宗氣同營氣行於脈中以應呼吸漏下衛氣行於脈外晝行於陽夜行於陰皮膚經脈之血氣交相逆順而行也按五味篇曰大氣之摶而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入此宗氣隨肺氣行於皮膚呼則氣出而八萬四千毛竅皆闔吸則氣入而八萬四千毛竅皆開此章論宗氣貫心脈而行呼吸心脈者手心主包絡之脈包絡主脈是從心脈而行於十六經脈之中呼吸定息脈行六寸晝夜一萬三千五百息脈行八百十丈以終五十營之一周是宗氣營氣皆半營於脈中而半行於脈外者也衛氣者慓悍滑疾獨行於脈外晝行於陽夜行於陰以司晝夜之開闔行於陽則目張而起行於陰則目瞑而臥如厥逆之氣客於五臟六腑則衛氣獨衛於外行於陽不得入於陰故目不瞑愚按衛氣不得入於陰則目不瞑之論多有重見然各有意存學者宜體析明白徐振公曰大惑篇云衛氣不得入於陰則陽氣滿陽氣滿則陽蹺盛此章陷字疑誤黃帝曰善治之奈何伯高曰補其不足瀉其有餘調其虛實以通其道而去其邪飲以半夏湯一劑陰陽以通其臥立至黃帝曰善此所謂決瀆壅塞經絡大通陰陽和得者也願聞其方伯高曰其湯方以流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪火沸置秫米一升治半夏五合徐炊令竭為一升半去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則臥汗出則已矣久者三飲而已也秫音術稷之黏者此論調足少陰陽明之氣以通衛氣之行於內蓋衛氣之行於陰從手足陽明下行至足而交於足少陰從足少陰而注於五臟六腑故當調此二經之氣焉補不足者補衛氣之不足瀉有餘者瀉厥氣之有餘調虛實者期外內之虛實以通其道路而去其厥逆之邪半夏色白形圓味甘而辛陽明之品也月令五月半夏生感一陰之氣而生者也胃屬戊土腎藏天癸飲以半夏湯一劑者啓一陰之氣上交於胃戊癸合而化大火土之氣則外內之陰陽已通其臥立至此所謂決瀆壅塞經絡大通陰陽得和者也夫腎為水臟而為生氣之原氣行則水渙胃乃燥熱之腑而主中土欲得陰陽以合化而不欲寒水之上乘故用流水千里以外者所謂勞水也再揚之萬遍則水性無力不能助寒水上行矣八乃金之成數五乃土之生數陽明主秋金而胃居中土故用八升五升者助陽明之胃氣也葦乃水草炊以葦薪者助水中之生氣也米乃土谷而秋成置秫米一升者助胃氣也上古以腹中和小便利為知覆杯則臥汗出而已者正氣和而厥氣散衛氣得從其道而出入矣徐振公曰厥氣者臟腑之逆氣也氣本於足少陰腎而生於足陽明胃故調此二經之氣而逆氣自解矣曰陰陽已通曰陰陽和得者一謂衛氣所行於外內之陰陽一謂少陰陽明之陰陽相得而和也黃帝問於伯高曰願聞人之肢節以應天地奈何伯高答曰天圓地方人頭圓足方以應之天有日月人有兩目地有九州人有九竅天有風雨人有喜怒天有雷電人有音聲天有四時人有四肢天有五音人有五臟天有六律人有六腑天有冬夏人有寒冷天有十日人有手十指辰有十二人有足十趾莖垂以應之女子不足二節以抱人形天有陰陽人有夫妻歲有三百六十五日人有三百六十節地有高山人有肩膝地有深谷人有腋膕地有十二經水人有十二經脈地有泉脈人有衛氣地有草蓂人有毫毛天有晝夜人有臥起天有列星人有牙齒地有小山人有小節地有山石人有高骨地有林木人有募筋地有聚邑人有䐃肉歲有十二月人有十二節地有四時不生草人有無子此人與天地相應者也此論人之形身四體臟腑陰陽應天地之日月星辰山川草木人與天地參也衛氣晝行於陽夜行於陰應天道之繞地一周一歲而終三百六十五度日月五星隨天道之環轉風雨雷電從天氣以施行山川泉谷上天之無不覆幬林木草蓂感天氣而生長衛氣日行於陽上至頭目口齒下至足脛膝膕四旁之四肢肢節䐃肉皮毛夜行於陰內循五臟六腑熏於募筋充於胸腹人之身形臟腑應六氣之降升五運之出入衛氣之行應天地之繞地環轉而復通貫於地中故曰地有泉水人有衛氣是衛氣非獨行於形身之外內而復貫通於經脈之外內者也徐振公曰地有草蓂人有毫毛女子月事以時下者淡滲皮毛之血也男子衝任不盛宗筋不成則須不生是以四時之草不生以應人之無子仇汝霖曰上古有蓂草一莖三十葉日落一葉如月小則落二十九葉蓋以應女子之月事以時下黃帝問於岐伯曰余願聞持針之數內針之理縱舍之意扞皮開腠理奈何脈之屈折出入之處焉至而出焉至而止焉至而徐焉至而疾焉至而入六腑之輸於身者余願盡聞少敘別離之處離而入陰別而入陽此何道而從行願盡聞其方岐伯曰帝之所問針道畢矣黃帝曰願卒聞之內葉納舍葉捨此問用針之理而兼問血氣之行於皮膚經脈之外內有出入至止離別之處焉皮腠者脈外之氣分也脈之屈折出入之處焉至而出焉至而止謂血氣之行於經脈外內有至止出入之處而內針之理何以為之至止疾徐也六腑之輸於身者即手足三陽之本標別離之處者別經脈而出於氣街之處也夫皮膚為陽經脈為陰離而入陰者脈外之氣血離皮膚而入於經脈也別而入陽者脈內之氣血別經脈而入於皮膚也此何道從行願盡聞其方伯言帝之所問乃陰陽血氣之流行知血氣之外內則知所以用針矣仇汝霖曰此因針道以明血氣之運行出入蓋針道與血氣之流行皆合天圯之大道岐伯曰手太陰之脈出於大指之端內屈循白肉際至本節之後太淵留以淡外屈上於本節之下內屈與陰諸絡會於魚際數脈並注利其氣滑伏行壅骨之下外屈出於寸口而行上至於肘內廉入於大筋之下內屈上行臑陰入腋下內屈走肺此順行逆數之屈折也屈葉曲數上聲此分論脈外之宗氣循手太陰之經順行而逆數也夫宗氣之行於脈外者從肺氣而出故其氣滑利伏行於壅骨之下外屈出於寸口而行外屈上於本節之下留以淡滲皮毛手太陰之脈出於大指之端內屈循白肉際至本節之後太淵內屈與諸陰絡會於魚際數脈並注上至於肘內廉入於大筋之下內屈上行臑陰入腋下內屈走肺此太陰之脈從指井而走肺脈外之宗氣從臑腋以上魚此順行逆數之屈折也心主之脈出於中指之端內屈循中指內廉以上留於掌中伏行兩骨之間外屈出兩筋之間骨肉之際其氣滑利上二寸外屈出行兩筋之間上至肘內廉入於小筋之下留兩骨之會上入於胸中內絡於心肺此分論行於脈中之宗氣從心主之脈營行於十二經脈之中以應呼吸漏下其脈外之宗氣亦隨本經而屈折於皮膚之間蓋宗氣之出於肺而行於皮膚者散於十二經脈之外各從本經而為逆順之行故行於心主之脈外者外屈出兩筋之間骨肉之際其氣滑利上肘臂二寸外屈而淡滲於皮毛心主之脈出於中指之端內屈循中指內廉以上留於掌中伏行兩骨之間出行兩筋之間上至肘外廉入於小筋之下留兩骨之會上入於胸中內絡於心肺此亦順行而逆數也夫脈外之氣血各隨本經以分界畔故行於脈中者隨脈而屈折於脈內行於脈外者亦隨本經而屈折於脈外也以上二節論宗氣之留於胸中上出於肺行於十二經脈之皮部以司呼吸開闔上貫心脈營於十二經脈之中以應呼吸漏下外內之相應也黃帝曰手少陰之脈獨無輸何也岐伯曰少陰心脈也心者五臟六腑之大主也精神之所舍也其臟堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脈也故獨無輸焉此申明宗氣貫心脈而行呼吸之因蓋血脈者心所主也包絡代行其血氣者君主無為而神明內藏包絡之相代君行其令也精神內藏其臟堅固故邪弗能傷心傷則死矣少陰心脈也包絡者心主之脈也獨無輸者包絡代輸其血氣也黃帝曰少陰獨無輸者不病乎岐伯曰其外經病而臟不病故獨取其經於掌後鋭骨之端其餘脈出入屈折其行之疾徐皆如手少陰心主之脈行也故本輸者皆因其氣之虛實疾徐以取之是謂因沖而瀉因衰而補如是者邪氣得去真氣堅固是謂因天之序此承上文復申明少陰之無輸者謂精神內藏不為各經轉輸其血氣而少陰之經脈亦從外而循於內也故外感於邪獨取其掌後鋭骨之神門穴蓋病在外經而臟不病也其餘手足十二經脈之出入屈折行之疾徐皆如手少陰心主之脈行蓋言十二經脈相同非少陰之獨無輸也故取少陰之本輸者皆因其正氣之虛實以取之而不因於邪也因心氣之盛而沖者瀉之心氣之衰者補之蓋精神內藏藏真堅固邪在外經而不傷於內故止因正氣之盛虛而補瀉其輸也八正神明論曰因天之序盛虛之時移光定位正立而待蓋心為陽中之太陽而上應於日如衰而補之以待日之方中沖而瀉之以待日之將䖳黃帝曰持針縱舍奈何岐伯曰必先明知十二經脈之本末皮膚之寒熱脈之盛衰滑澀其脈滑而盛者病日進虛而細者久以持大以澀者為痛痹陰陽如一者病雖治其本末尚熱者病尚在其熱已衰者其病亦去矣持其尺察其肉之堅脆大小滑澀寒溫燥濕因視目之五色以知五臟而決死生視其血脈察其色以知其寒熱痛痹此論審別病氣在於皮膚經脈之外內有出入盛衰之別也本末者十二經脈之本標血氣之流行出入者也皮膚之寒熱病氣在於皮膚也脈之盛衰滑澀病氣在於經脈也其脈滑而盛者病日進於經脈之中虛而細者病久持於脈外也夫在外者皮膚為陽筋骨為陰脈大以澀者為寒熱痛痹也如左右之陰陽如一者病難治謂皮膚筋骨之淺深皆病也其本末尚熱者病尚在於血脈之中其熱已衰者其病氣隨經脈之血氣出於氣街而亦去矣邪氣臟腑篇曰脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀故持其尺察其尺膚之堅脆大小滑澀以知皮膚分肉之寒熱燥濕也五臟之血色見於目因視目之五色以知五臟而決死生蓋病在臟者半死半生也視其血絡察其皮毛以知痛痹之寒熱也皮部論曰凡十二經絡脈者皮之部也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也此篇論營衛宗氣營行出入於經脈之外內故持針縱舍亦當察病氣之在於皮膚在於經脈或在內之五臟也黃帝曰持針縱舍余未得其意也岐伯曰持針之道欲端以正安以靜先知虛實而行疾徐左指執骨右手循之無與肉果瀉欲端以正補必閉膚輔針導氣邪得淫泆真氣得居此論刺血脈而當養其真氣也真氣者所受於天無穀氣並而充身者也縱舍者迎隨也無與肉果者刺脈無傷肉也黃帝曰扞皮開腠理奈何岐伯曰因其分肉左別其膚微納而徐端之適神不散邪氣得去此論刺皮膚而當養其神氣也神氣者兩精相摶之所生兩神者天乙之精後天水穀之精也黃帝問於岐伯曰人有八虛各何以候岐伯答曰以候五臟黃帝曰候之奈何岐伯曰肺心有邪其氣留於兩肘肝有邪其氣流於兩腋脾有邪其氣留於兩髀腎有邪其氣留於兩膕凡此八虛者皆機關之室真氣之所過血絡之所遊邪氣惡血固不得住留住留則傷經絡骨節機關不得屈伸故病攣也此言五臟之血氣從機關之虛出於膚表與營衛宗氣之相合也九針章曰節之交神氣之所遊行出入兩肘兩腋兩髀兩膕乃關節交會之處心臟之神氣從此而出如五臟有邪則氣留於此而不得布散矣真氣之所過謂五臟之經脈各從此而經過邪氣住留則傷經絡謂邪在於皮膚留而不去則傷經絡矣此言機關之室在於骨節之交五臟之血氣從此而出於分肉皮膚不涉於血脈也故五臟有邪則氣留於此如外感於邪氣惡血留滯於此則骨節機關不得屈伸而病攣也按本篇論營氣行於脈中衛氣行於脈外而宗氣貫心脈而行於脈中從手太陰而行於脈外衛氣日行於皮膚分肉夜行於五臟之陰而五臟之氣又從機關之虛外出於膚表此形身臟腑之氣遊行於外內而交相出入者也至於皮膚經脈之血氣屈折於外內之間出入於本標之處皆假邪客以明正氣之流行乃修身治民之大張本也
