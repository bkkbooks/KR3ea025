body:
  text: 序先儒有云經傳而經亡非經亡也亡於傳經者之精而以粗求之深而以淺視之之失其旨歸也夫靈素之為烈於天下也千百年於茲矣然余嘗考漢藝文志曰黃帝內經一十八卷而靈樞居其九素問亦居其九昔人謂先靈樞而後素問者何也蓋以素問為世人病所由生也病所生而弗慎之則無以防其流故篇中所載陰陽寒暑之所從飲食居處之所攝五運生制之所由勝復六氣時序之所由逆從靡弗從其本而謹制之以示人維持而生人之患微矣若靈樞為世人病所由治也病既生而弗治之則無以通其源故本經所論營衛血氣之道路經脈臟腑之貫通天地歲時之所由法音律風野之所由分靡弗藉其針而開導之以明理之本始而惠世之澤長矣是靈樞素問為萬世所永賴靡有息也故本經曰人與天地相參日月相應而三才之道大備是以人氣流行上應日行於二十八宿之度又應月之盈虧以合海水之消長且以十二經脈臟腑外合於百川彙集之水咸相符也故本經八十一篇以應九九之數合三才之道三而三之成九九八十一篇以起黃鐘之數其理廣大其道淵微傳竹帛而使萬世黎民不罹災眚之患者孰不賴此經也哉乃自皇甫士安類為甲乙針經而玄臺馬氏又專言針而昧理俾後世遂指是經為針傳而忽之而是經幾為贅旒矣余憫聖經之失傳懼後學之沿習遂忘愚昧素問注疏告竣復藉同學諸公舉靈樞而詮釋之因知經意深微旨趣層折一字一理確有指歸以理會針因針悟證殫心研慮雞鳴風雨未敢少休庶幾藉是可告無罪乎俾後之人讀素問而嚴病之所以起讀靈樞而識病之所以瘳則臟腑可以貫通經脈可以出入三才可以合道九針可以同法察形氣可以知生死壽夭之源觀容色可以辨邪正美惡之類且也因九針而悟洛書之妙理分小針而並識河圖之微情則前民用而範圍不過者大易之傳統乎是矣則利民生而裁成不遺者墳典之傳亦統乎是矣敢以質之天下後世之同學者亦或有以諒余之濯灌也夫康熙壬子葵夏錢塘張隱菴書於西泠怡堂
