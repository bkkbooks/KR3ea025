body:
  text: 卷五五閲五使第三十七黃帝問於岐伯曰余聞刺有五官五閲以觀五氣五氣者五臟之使也五時之副也願聞其五使當安出岐伯曰五官者五臟之閲也黃帝曰願聞其所出令可為常岐伯曰脈出於氣口色見於明堂五色更出以應五時各如其臟經氣入臟必當治里莫仲超曰此章論五臟之氣外見於五色上通於五竅五色更出以應五時各如其臟此從內而應於外也如從外而內是當皮而絡絡而脈脈而經經而臟故曰經氣入臟必當治里夫色見於皮膚五臟之氣見於色者蓋亦從經脈而出於皮膚故曰五脈安出五色安見楊元如曰色氣應天經脈應地五臟者在地五行之所主也而色見於面此五行之氣上呈於天也從內而外者由臟而經脈皮膚應地氣之上勝於天從外而內者由皮膚經脈而臟應天氣之下降於地升降出入環轉無端故曰經氣入臟必當治里帝曰善五色獨決於明堂乎岐伯曰五官已辨闕庭必張乃立明堂明堂廣大蕃蔽見外方壁高基引垂居外五色乃治平博廣大壽中百歲見此者刺之必已如是之人者血氣有餘肌肉堅緻故可苦以針莫氏曰此論五臟之氣應土基之博厚也闕庭天庭也明堂王者聽政之堂猶天闕在上王宮在下也蕃蔽者頰側耳門之間猶明堂之藩屏也方壁高基者四方之牆壁堅固而地基高厚也引垂居外者邊陲在外為中土之保障也此土基之平博廣大以配五色之潤澤高明如是者天地交而二氣亨壽必中百歲而去黃帝曰願聞五官岐伯曰鼻者肺之官也目者肝之官也口唇者脾之官也舌者心之官也耳者腎之官也官之為言司也所以聞五臭別五色受五穀知五味聽五音乃五臟之氣外應於五竅而五竅之各有所司也黃帝曰以官何候岐伯曰以候五臟故肺病者喘息鼻張肝病者眥青脾病者唇黃心病者舌卷短顴赤腎病者顴與顏黑卷上聲莫氏曰五官者五臟之閲也閲其五官之色證則知五臟之病矣黃帝曰五脈安出五色安見其常色殆者何如岐伯曰五官不辨闕庭不張小其明堂蕃蔽不見又埤其牆牆下無基垂角去外如是者雖平常殆況加病哉埤音裨卑也莫氏曰此言土基埤薄者其常色亦殆蓋人秉天地之氣所生得博厚高明而後能悠久黃帝曰五色之見於明堂以觀五臟之氣左右高下各有形乎岐伯曰五臟之在中也各以次舍左右上下各如其度也莫氏曰明堂者鼻也五臟次於中央六腑挾其兩側言五色見於明堂而臟腑之氣各有所次之部位此篇照應後第四十九篇之五色此篇論天地人三才相應後篇論臟腑之氣色主病之死生逆順肥瘦第三十八黃帝問於岐伯曰余聞針道於夫子衆多畢悉矣夫子之道應若失而據未有堅然者也夫子之問學熟乎將審察於物而心生之乎此篇論人之形體厚薄血氣清濁以應天地之道逆順而行者也夫子之道應若失者謂道之幽遠難尋堅確也察於物者即物窮理心生之者豁然貫通也蓋聖人之道通乎天地而合於事物之常楊氏曰失堅者即顏子所謂鑽之彌堅瞻之在前忽焉在後之意岐伯曰聖人之為道者上合於天下合於地中合於人事必有明法以起度數法式檢押乃後可傳焉故匠人不能釋尺寸而意短長廢繩墨而起平水也工人不能置規而為圓去矩而為方知用此者固自然之物易用之教逆順之常也黃帝曰願聞自然奈何岐伯曰臨深決水不用工力而水可竭也循掘決沖而經可通也此言氣之滑澀血之清濁行之逆順也伯言天地之道出於自然不待勉強雖幽遠難明然不出乎規矩方圓之外臨深決水者決之去也循掘決沖者導之來也此逆順之行也楊氏曰規矩方圓天地之象也逆順者地氣左遷天道右旋也不用工力者造化之自然也黃帝曰願聞人之白黑肥瘦小長各有數乎岐伯曰年質壯大血氣充盈膚革堅固因加以邪刺此者深而留之此肥人也廣肩腋項肉薄皮厚而黑色唇臨臨然其血黑以濁其氣澀以遲其為人也貪於取與刺此者深而留之多益其數也此論形體之太過也廣肩腋者廣闊於四旁也項乃太陽之所主項肉薄而皮厚黑色者太陽之水氣盛也唇乃脾土之外候臨臨然者土氣厚大也黑者水之色血黑以濁者精水之重濁也氣澀以遲者肌肉厚而氣道滯也夫太過則能與不及則貪取貪於取與者不得中和之道過猶不及也楊元如曰前篇論五臟之氣應土基厚薄氣色清粗此篇論形之肥瘦血之清濁以應太過不及蓋皮肉脈筋骨五臟之外合也朱濟公曰五運主中六氣主外人秉天地之運氣而生故多有太過不及黃帝曰刺瘦人奈何岐伯曰瘦人者皮薄色少肉廉廉然薄唇輕言其血清氣滑易脫於氣易損於血刺此者淺而疾之此論形體之不及也皮薄色少秉天氣之不足也廉廉瘦潔貌肉廉廉然薄唇輕言秉地氣之不足也血清者水清淺也氣滑者肌肉薄而氣道滑利也莫仲超曰音主長夏土氣薄故言輕朱濟公曰氣道之滑澀由肌肉之厚薄應天氣之行於地中黃帝曰刺常人奈何岐伯曰視其白黑各為調之其端正敦厚者其血氣和調刺此者無失常數也此論平人之和調也黑白者水天之色也端正敦厚者坤之德也此得天地平和之氣故其血氣和調也常數者天地之常數也蓋以人應天地之氣而針合天地人之數也黃帝曰刺壯士真骨者奈何岐伯曰刺壯士真骨堅肉緩節監監然此人重則氣澀血濁刺此者深而留之多益其數徑則氣滑血清刺此者淺而疾之此言年壯之士得天真之完固也先天之真元藏於腎而腎主骨天真完固而後骨肉充滿也真骨堅肉緩節監監者筋骨和而肌肉充也監監者卓立而不倚也其人重濁則氣澀血濁其人輕徑則氣滑血清蓋元真者乃混然之氣已生之後而有輕重高下之分焉深而留之淺而疾之導其氣出入於外內也黃帝曰刺嬰兒奈何岐伯曰嬰兒者其肉脆血少氣弱刺此者以毫針淺刺而疾髮針日再可也此言嬰兒未得天真充盛其肉脆而血少氣弱也襁褓乳養曰嬰蓋男子八歲女子七歲腎氣始盛齒更髮長男子四八女子四七則筋骨隆盛肌肉滿壯蓋形肉血氣雖藉後天水穀之所資生然本於先天之生原也日再者導陰陽血氣之生長黃帝曰臨深決水奈何岐伯曰血清氣濁疾瀉之則氣竭焉黃帝曰循掘決沖奈何岐伯曰血濁氣澀疾瀉之則經可通也清濁者天地之氣也臨深決水循掘決沖行之逆順也血氣逆順而行應天地之旋轉也按此篇論形肉之厚薄堅脆血氣之多少清濁應太過不及之氣故用針之淺深疾徐刺法之多少補瀉皆以針合人而導之和平是以一篇之中並無邪病二字若以瀉邪論之去經義遠矣黃帝曰脈行之逆順奈何岐伯曰手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹此言手足陰陽之脈上下外內逆順而行應地之經水也黃帝曰少陰之脈獨下行何也岐伯曰不然夫衝脈者五臟六腑之海也五臟六腑皆稟焉其上者出於頏顙滲諸陽灌諸精其下者注少陰之大絡出於氣街循陰股內廉入膕中伏行䯒骨內下至內踝之後屬而別其下者並於少陰之經滲三陰其前者伏行出跗屬下循跗入大趾間滲諸絡而溫肌肉故別絡結則跗上不動不動則厥厥則寒矣黃帝曰何以明之岐伯曰以言導之切而驗之其非必動然後乃可明逆順之行也黃帝曰窘乎哉聖人之為道也明乎日月微於毫釐其非夫子孰能道之也此言血氣行於脈外以應天之道也夫司天在上在泉在下水天之氣上下相通應人之血氣充膚熱肉淡滲皮毛而肌肉充滿若怯然少氣者則水道不行而形氣消索矣夫衝脈者五臟六腑之海也五臟六腑之氣皆稟於衝脈而行其上者出於頏顙滲諸陽灌諸陰其下者注少陰之大絡下出於氣街此五臟六腑之血氣皆從衝脈而滲灌於脈外皮膚之間應水隨氣而運行於天表也夫少陰主先天之水火水火者精氣也衝脈並少陰之經滲三陰循跗入大趾間滲諸絡而溫肌肉是少陰之精氣又從衝脈而運行出入於經脈皮膚之外內者也故別絡結則少陰之氣不能行於跗上而跗上不動矣不動者乃少陰之氣厥於內故厥則寒矣此氣血結於脈內而不能通於脈外也故當導之以言導氣之外出也驗之以脈知精血之行也其非跗上不動然後乃可明逆順之行逆順之行者少陰之精氣滲灌於膚表而復運行於脈中應司天在泉之氣繞地環轉而復通貫於地中明乎日月微於毫釐者言聖人之道如日月麗天循度環轉無有毫釐差失故曰聖人之為道者上合於天下合於地中合於人事必有明法以起度數法式檢押乃後可傳焉楊元如曰五臟六腑應五運之在中五運者神機之出入也皮膚經脈應六氣之在外六氣者左右上下環轉升降者也五臟六腑之氣稟衝脈而運行於膚表應地氣之出於外也莫仲超曰所謂衝脈者順行逆衝於經脈皮膚之外內充於形身無往不到故曰逆順之行蓋經脈之血氣順行則皮膚之氣血逆轉所以應天地運行之道也稟於五臟六腑者即水穀所生之血氣流溢於中由衝脈而布散於皮膚之外少陰之氣血先天之精氣也並衝脈滲於三陰而行於脈中循足跗滲足趾之諸絡而出於脈外是以陽氣起於足五趾之表陰氣起於足五趾之裡蓋秉足少陰先天之水火也人之形體肥厚由水穀所生之血氣充膚熱肉淡滲皮毛其真骨堅肉緩節監者秉先天之精氣也皮肉筋骨營衛血氣皆本於先天后天生始之血氣以資益而後能筋骨強堅肌肉豐厚是以始論人之肥瘦長短而末結衝脈少陰之出入焉血脈論第三十九黃帝曰願聞其奇邪而不在經者岐伯曰血絡是也此承上章少陰之大絡而復統論其臟腑之十二絡焉玉版論曰人之所受氣者谷也谷之所注者胃也胃者水穀血氣之海也海之所行雲氣者天下也胃之所出血氣者經隧也經隧者五臟六腑之大絡也夫谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧是水穀所生之血氣營行於脈中者也水穀之精氣從胃之大絡注於臟腑之經隧通於孫絡出於皮膚以溫肌肉此水穀所生之氣血散於脈外者也夫大絡與經脈繆處故奇邪而不在經者血絡是也上章論五臟六腑之血氣少陰腎臟之精氣從衝脈而出於皮膚此章論胃腑所生之氣血從臟腑之大絡而出於皮膚楊元如曰按素問繆刺篇云邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病故曰奇邪者血絡是也黃帝曰刺血絡而僕者何也血出而射者何也血少黑而濁者何也血出清而半為汁者何也髮針而腫者何也血出若多若少而面色蒼蒼者何也髮針而面色不變而煩悗者何也多出血而不動搖者何也願聞其故血絡者外之絡脈孫絡見於皮膚之間血氣有所留積則失其外內出入之機岐伯曰脈氣盛而虛者刺之則脫氣脫氣則僕此言經脈之血氣皮膚之氣血皆出於胃腑水穀之精而分走其道所當和平者也若經脈之脈氣盛而皮膚之血氣虛者刺之則脫氣脫氣則僕矣朱濟公曰三陽之氣主於皮膚肌腠之間血虛則脫氣者血為氣之守也陰陽應象論曰陰在內陽之守也血氣俱盛而陰氣多者其血滑刺之則射陽氣蓄積久留而不瀉者其血黑以濁故不能射此言經脈之內皮膚之間皆有此血氣而有陰陽之分焉經脈為陰皮膚為陽俱盛者經藏外內之血氣俱盛也如脈中之陰氣多者其血滑故刺之則射如皮膚之陽氣蓄積久留而不瀉者其血黑以濁故不能射也朱濟公曰陽氣留積其血黑濁血隨氣行者也新飲而液滲於絡而未合和於血也故血出而汁別焉其不新飲者身中有水久則為腫此言絡脈之血由水穀之津液所化津液注於皮膚肌腠滲於孫絡與血和合而化赤者也癰疽章曰中焦出氣如露上注溪谷而滲孫脈津液和調變化赤而為血血和則孫脈先滿溢乃注於絡脈皆盈乃注於經脈陰陽已張因息乃行蓋水穀入胃其津液隨三焦出氣以溫肌肉充皮膚復滲於孫絡於絡脈之血和合變化而赤為血故新飲而液滲於絡未和合於血是津液未變而赤故刺之血出清而半為汁也其不新飲者身中有水久則為腫蓋言血乃水穀之津液所化若不新飲而出為汁者乃身中之水也按奇邪而不在經者謂皮膚之氣血從別絡而出於孫絡皮膚與經脈繆處此節論津液注於皮膚滲於絡脈與經脈之血和合是皮膚孫絡又與經脈相通而皮膚絡脈之氣血所從來又有一道蓋此篇假針以明陰陽血氣之生始出入學者當於針刺之外細體認其義焉陰氣積於陽其氣因於絡故刺之血未出而氣先行故腫此言陽分之氣血因於大絡孫絡而出也臟腑經脈為陰皮膚肌腠為陽臟腑之陰氣積於皮膚之陽分者其氣因於大絡孫絡而出血未出而氣先行者謂臟腑之氣先行而血隨氣出者也上節論脈絡之血乃皮膚之津液滲入孫脈絡脈而化赤此言皮膚之血因於大絡孫絡而出是皮膚脈絡之血氣外內相通故下文曰陰陽之氣其新相得而未和合陰陽之氣其新相得而未和合因而瀉之則陰陽俱脫表裡相離故脫色而蒼蒼然此承上文總結陰陽外內之相合也皮膚為表經脈為里膚表之陽得脈內之陰氣以和之經脈之陰得膚表之陽氣以和之陰陽表裡之相合也如陰陽之氣其新相得而未和合因而瀉之則陰陽俱脫表裡相離故脫色而蒼蒼然蒼蒼青色也平脈篇曰營氣不足面色青陰陽俱脫者經脈外內之營氣脫也刺之血出多色不變而煩悗者刺絡而虛經虛經之屬於陰者陰脫故煩悶此言陰陽俱脫而色變者皮膚絡脈之血脫也如血出多而色不變者刺其絡而虛其經也經虛之屬則陰脫矣心主脈而包絡主血陰臟之血脫故煩悶也蓋言在外之血氣由臟腑之陰而出於經經而脈脈而絡也陰陽相得而合為痹者此為內溢於經外注於絡如是者陰陽俱有餘雖多出血而弗能虛也夫內在陰外在陽經絡為陰皮膚為陽此總結血氣之外內出入相得而和合者也自外而內者從皮膚滲於孫脈絡脈而內溢於經自內而外者從臟腑之陰而出於經從經脈而外注於絡脈皮膚外內之相得也如陰陽俱有餘相合而痹閉於外內之間雖多出血而弗能虛也朱濟公曰陰陽相得而合為痹與上文之陰陽相得同義蓋陰陽和合而流行則調陰陽相得而留滯則痹痹者閉也通篇論經脈血氣之生始出入故帝只問血出多而不動搖伯曰陰陽相得而合為痹是非邪病之痹明矣黃帝曰相之奈何岐伯曰血脈者盛堅橫以赤上下無常處小者如針大者如筋則而瀉之萬全也故無失數矣失數而反各如其度此申明血氣之在經脈而外內出入也相視也盛堅橫以赤者血盛於脈中也上下無常處者血氣之流行也小者如針留血之在孫絡也大者如筋留血之在經隧也數者血脈出入之度數留血之在經絡則而瀉之故無失其所出之度數矣所出之度從經而脈脈而絡絡而孫如失其所出之數而反者又從孫而絡絡而脈脈而經各如其度而外內出入者也楊元如曰萬全者謂血氣流行外內相貫如環無端莫知其紀黃帝曰針入而肉著何也岐伯曰熱氣因於針則針熱熱則肉著於針故堅焉三陽之氣主於膚表熱氣陽氣也熱氣因於針則針熱熱則肉著於針故針下堅而不可拔也按此篇論血氣出入於絡脈之間故篇名血絡論有所留積皆因於絡則而瀉之萬全也若取之肉則肉著於針而針下堅矣陰陽清濁第四十黃帝曰余聞十二經脈以應十二經水者其五色各異清濁不同人之血氣若一應之奈何岐伯曰人之血氣苟能若一則天下為一矣惡有亂者乎黃帝曰余聞一人非問天下之衆岐伯曰夫一人者亦有亂氣天下之衆亦有亂人其合為一耳此篇論陰陽清濁交相於亂者也人之十二經脈外合十二經水內合五臟六腑其五色各異清濁不同故一人之身有亂氣猶天下之衆有亂人其理可合之為一耳惡有不亂者乎楊元如曰清濁天地之氣也天氣下降地氣上升清濁相干命曰亂氣不亂則生化滅矣故曰夫一人者亦有亂氣天下之衆亦有亂人謂天下之人皆有此亂氣也黃帝曰願聞人氣之清濁岐伯曰受谷者濁受氣者清清者注陰濁者注陽濁而清者上出於咽清而濁者則下行清濁相干命曰亂氣六腑為陽五臟為陰六腑受谷者濁五臟受氣者清故清者注陰濁者注陽濁而清者謂水穀所生之清氣上出於咽喉以行呼吸清而濁者肺之濁氣下注於經內注於海此人氣之清濁相干命曰亂氣莫仲超曰上節言天下之衆皆有此亂氣謂人合天地之清濁也故復曰願聞人氣之清濁黃帝曰夫陰清而陽濁濁者有清清者有濁清濁別之奈何岐伯曰氣之大別清者上注於肺濁者下走於胃胃之清氣上出於口肺之濁氣下注於經內積於海此論人合天地之氣也大別者應天地之大而有別也天清地濁而上下氣交故濁者有清清者有濁而人亦應之肺屬天而陽明居中土故清者上注於肺濁者下走於胃此清濁之上下也然濁者有清胃之清氣上出於口口鼻者氣出入之門戶此胃腑水穀之濁生此清氣上出於口以司呼吸而應開闔者也清者有濁肺之濁氣下注於經內積於海肺為精水之原清中所生之津液流溢於下即所謂谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧下注於經者行於經隧也流溢於中者內積於海也海者下焦精髓之海也此陰陽清濁之氣交也朱濟公曰天為陽地為陰天一生水地二生火火為陽水為陰故清者有濁濁者有清黃帝曰諸陽皆濁何陽獨甚乎岐伯曰手太陽獨受陽之濁手太陰獨受陰之清其清者上走空竅其濁者下行諸經諸陰皆清足太陰獨受其濁諸陽皆濁而手太陽獨受其濁之甚蓋手太陽小腸主受盛胃腑之糟粕有形者皆濁而糟粕為濁之甚者也諸陰皆清而手太陰為五臟之長華蓋於上故手太陰獨受陰之清空竅者皮毛之汗空也手太陰主周身之氣走於空竅以司呼吸開闔應天之道也小腸受盛糟粕濟泌別汁化而為赤下行於十二經脈應地之道也脾為倉稟之官主輸運胃腑水穀之精汁故諸陰皆清而足太陰獨受其濁楊元如曰手太陰主天故獨受其清足太陰主地故獨受其濁此篇論人之陰陽清濁應合天地經水故帝曰十二經脈應十二經水伯曰天下之衆又曰氣之大別黃帝曰治之奈何岐伯曰清者其氣滑濁者其氣澀此氣之常也故刺陰者深而留之刺陽者淺而疾之清濁乾者以數調之也氣之滑利者應天運於外故淺而疾之澀濁者應地居於中故深而留之清濁相干者陰陽之氣交故以數調之數者天地之常數也朱濟公曰以數調之與逆順篇之無失常數同義此篇以人之清濁合天地之陰陽下章論人之形體應天地日月水火陰陽系日月第四十一黃帝曰余聞天為陽地為陰日為陽月為陰其合之於人奈何岐伯曰腰以上為天腰以下為地故天為陽地為陰故足之十二經脈以應十二月月生於水故在下者為陰手之十指以應十日日主火故在上者為陽積陽為天積陰為地天地合氣命之曰人故身半以上天氣主之身半以下地氣主之日以應火月以應水人秉先天之水火而成此形故在上者為陽以應日在下者為陰以應月十日應天之十干十二月應地之十二支是以足之十二經脈以應十二月手之十指以應十日人秉天地水火而生故與天地參也黃帝曰合之於脈奈何岐伯曰寅者正月之生陽也主左足之少陽未者六月主右足之少陽卯者二月主左足之太陽午者五月主右足之太陽辰者三月主左足之陽明巳者四月主右足之陽明此兩陽合於前故曰陽明申者七月之生陰也主右足之少陰醜者十二月主左足之少陰酉者八月主右足之太陰子者十一月主左足之太陰戌者九月主右足之厥陰亥者十月主左足之厥陰此兩陰交盡故曰厥陰歲半以上為陽而主少陽太陽歲半以下為陰而主少陰太陰猶兩儀之分四象也兩陽合明故曰陽明兩陰交盡故曰厥陰此四象而生太少中之三陽三陰也男生於寅故始於正月之少陽女生於申故始於七月之少陰陽從左故左而右陰從右故右而左按六氣主歲初之氣厥陰風木二之氣少陰君火三之氣少陽相火四之氣太陰濕土五之氣陽明燥金終之氣太陽寒水而四時調神論又以少陽主春太陽主夏太陰主秋少陰主冬脈解篇曰正月太陽寅寅太陽也厥陰者辰也陽明者午也少陽者申也少陰者戌也太陰者子也而本篇又以寅未主少陽卯午主太陽辰巳主陽明申醜主少陰酉子主太陰戌亥主厥陰經脈別論以肝木主春心火主夏脾土主長夏肺金主秋腎水主冬木火土金水此後天之五行也而診要經終篇又曰正月二月人氣在肝三月四月人氣在脾天元紀論子午屬少陰丑未屬太陰寅申屬少陽卯酉屬陽明辰戌屬太陽巳亥屬厥陰而臟腑配合支幹又以子甲屬少陽膽醜乙屬厥陰肝寅辛屬太陰肺卯庚屬陽明大腸辰戊屬陽明胃巳己屬太陰脾午丙屬太陽小腸未丁屬少陰心申壬屬太陽膀胱酉癸屬少陰腎戌屬包絡相火亥屬三焦相火禁服篇以人迎應春夏一盛在少陽二盛在太陽三盛在陽明氣口應秋冬一盛在厥陰二盛在少陰三盛在太陰而陰陽別論又以少陽為一陽陽明為二陽太陽為三陽陰陽之變化無窮故曰陰陽者有名而無形數之可十推之可百數之可千推之可萬甲主左手之少陽己主右手之少陽乙主左手之太陽戊主右手之太陽丙主左手之陽明丁主右手之陽明此兩火併合故為陽明庚主右手之少陰癸主左手之少陰辛主右手之太陰壬主左手之太陰太陽主日少陽主火故兩火併合是為陽明陽明者離明之象也明兩作離故兩火併合兩陽合陽是為陽明手少陰君火主日手太陰肺金主天故應手之十指此陽中有陰也朱濟公曰按河圖洛書五位中央而主陽五行之中木火為陽金水為陰故甲乙丙丁戊己為陽中之陽庚辛壬癸為陽中之陰故足之陽者陰中之少陽也足之陰者陰中之太陰也手之陽者陽中之太陽也手之陰者陽中之少陰也腰以上者為陽腰以下者為陰此論手足之陰陽而陰中有陽陽中有陰也上節論太少之陰陽分於左右此論太少之陰陽位於上下蓋陰陽氣交於六合之內者也腰以上者為陽腰以下者為陰此陰陽之定位手經有陰足經有陽乃上下之氣交其於五臟也心為陽中之太陽肺為陽中之少陰肝為陰中之少陽脾為陰中之至陰腎為陰中之太陰心屬火而應日故為陽中之太陽肺居高而屬金故為陽中之少陰肝居下而屬木故為陰中之少陽腎居下而屬水故為陰中之太陰脾位中央而主坤土故為陰中之至陰五臟為陰而陰中有陽也黃帝曰以治奈何岐伯曰正月二月三月人氣在左無刺左足之陽四月五月六月人氣在右無刺右足之陽七月八月九月人氣在右無刺右足之陰十月十一月十二月人氣在左無刺左足之陰陽氣從左而右故正二三月人氣在左四五六月人氣在右陰氣從右而左故七八九月人氣在右十月十一十二月人氣在左聖人春夏養陽秋冬養陰以從其根故無刺其氣之所在蓋針刺所以取氣故也朱濟公曰陰陽二氣皆從足而生自下而上故只言足而不言手蓋以從其根也黃帝曰五行以東方為甲乙木主春春者蒼色主肝肝者足厥陰也今乃以甲為左手之少陽不合於數何也岐伯曰此天地之陰陽也非四時五行之以次行也且夫陰陽者有名而無形故數之可十推之可百數之可千推之可萬此之謂也經云東方生風風生木木生酸酸生肝又曰東方青色入通於肝此天地之五方五時五行五色以應人之五臟非天地之陰陽也天地之陰陽者十干在上地支在下天之十干化生地之五行以應人之五臟地之十二支上呈天之六氣以應人之十二經脈是以陰中有陽陽中有陰天地定位上下氣交非四時五行之以次行也且夫陰陽者有名而無形數之可十可百推之可萬可千陰陽變化之無窮也朱濟公曰有名無形者以無形而合有形也病傳第四十二黃帝曰余受九針於夫子而私覽於諸方或有導引行氣喬摩灸尉刺焫飲藥之一者可獨守耶將盡行之乎岐伯曰諸方者衆人之方也非一人之所盡行也黃帝曰此乃所謂守一勿失萬物畢者也此篇論人之身體有形層之淺深有血氣之虛實是以針砭藥灸各守其一非一人之所盡行也病傳者謂邪從皮毛而發於腠理從腠理而入於經脈從經脈而傳溜於五臟所謂經絡受邪入臟腑為內所因也如邪入於臟不可以致生故邪在皮毛者宜砭而去之在於脈肉筋骨者宜針而瀉之邪入於中者宜導引行氣以出之寒邪之入深者宜尉而通之邪在內而虛者只可飲以甘藥實者可用毒藥以攻之陷於下者宜灸以啓之是以藥石灸刺導引諸方隨衆人之所病而施之非一人之所盡行者也此章教人知病傳之有淺深如可治之屬即守一勿失不使大邪入臟而成不救利濟萬物之功畢於此矣今余聞陰陽之要虛實之理傾移之過可治之屬願聞病之變化淫傳絶敗而不可治者可得聞乎岐伯曰要乎哉問道昭乎其如日醒窘乎其如夜瞑能被而服之神與俱成畢將服之神自得之生神之理可著於竹帛不可傳於子孫黃帝曰何謂日醒岐伯曰明於陰陽如惑之解如醉之醒黃帝曰何謂夜暝岐伯曰喑乎其無聲漠乎其無形折毛髮理正氣橫傾淫邪泮衍血脈傳溜大氣入臟腹痛下淫可以致死不可以致生此論形與神俱病則無由入其腠理不致血脈流傳而成不救之死證也陰陽之要者皮膚肌腠為陽血脈為陰肌腠者三焦通會元真之處血脈者神氣之所藏也虛實者血氣之虛實也如腠理固密元真通暢血脈和調精神內守邪氣何由內入虛則傳溜入臟而不可以致生是以生神之理可著於竹帛以教化後世不可傳於子孫蓋言調養此神氣者乃自修之功也傾移之過者折毛髮理正氣橫傾也可治之屬者邪尚在於皮膚肌腠之間未至血脈傳流大邪入臟也此言邪在於外猶為可治之屬守一勿失不使邪溜於內故善治者治皮毛其次治肌肉其次治經脈其次治五臟治五臟者半死半生蓋間傳者生傳之於其所勝者不治也若夫病之變化淫傳絶敗而不可治者乃淫邪泮衍血脈流傳大氣入臟不可以致生也明於陰陽如惑之解如醉之醒畢將服之神自得之所謂上古之人其知道者法於陰陽和於術數食飲有節起居有常不妄作勞故能形與神俱而盡終其天年喑乎其無聲漠乎其無形謂不知道者膚腠空疏血脈虛脫虛邪之中人也微莫知其情莫見其形漸致淫邪入臟不可以致生夫邪之中於人也始於皮毛則毛髮折而腠理開開則邪從毛髮入入則抵深而入於腠理腠理者三焦通會元真之處是以正氣橫傾淫邪泮衍於肌腠之間則傳流於血脈而內入於臟矣蓋經脈內屬於臟腑外絡於形身是以經脈受邪入臟腑為內所因也淫邪泮衍於肌腠則傷氣傳流於血脈而入臟則傷神神氣並傷故可以致死而不可以致生是以聖人之教下也虛邪賊風避之有時恬淡虛無精神內守病從何來故可著於竹帛蓋欲使天下後世子孫黎民咸知此養生之道焉黃帝曰大氣入臟奈何岐伯曰病先發於心一日而之肺三日而之肝五日而之脾三日不已死冬夜半夏日中此論大邪入臟傳於其所不勝而死蓋五臟秉五方五行之氣而生故生於相生而死於相勝也病先發於心一日而傳之肺三日而傳之肝五日而傳之脾皆逆傳其所不勝再至三日不已而死夫心為火臟冬主水夏主火冬夜半者水勝而火滅也夏日中者亢極而自焚也楊元如曰按素問玉機真藏論病入於五臟逆傳於所勝尚可按可浴可藥可灸以救之故曰三日不已死謂邪入於臟猶有可已之生機故首言導引行氣喬摩灸尉刺焫飲藥末言諸病以次相傳者皆有死期不可刺也蓋邪在於形層者宜刺入於臟者只可按摩飲藥以救之聖人救民之心無所不用其極病先發於肺三日而之肝一日而之脾五日而之胃十日不已死冬日入夏日出楊元如曰肺主氣日出而氣始隆日入而氣收引冬日入者氣入而絶於內也夏日出者氣出而絶於外也按只言冬夏而不言春秋者四時之氣總屬寒暑之往來夜半日中陰陽之分於子午也日出日入陰陽之離於卯酉也病傳之一三五日者乃天之奇數蓋五臟生於地之五行而本於天干之所化病先發於肝三日而之脾五日而之胃三日而之腎三日不已死冬日入夏早食楊元如曰按素問標本病傳論云肝病頭目眩脅支滿三日體重身痛五日而脹三日腰脊小腹痛脛痠三日不已死冬日入夏早食蓋病先發於肝故頭目眩而脅支滿三日而之脾則體重身痛五日而之胃則脹三日而之腎則腰脊小腹痛脛痠冬日入夏早食乃木氣絶於卯酉金旺之時病先發於脾一日而之胃二日而之腎三日而之膂膀胱十日不已死冬人定夏晏食楊元如曰按素問標本病傳論云脾病身重體痛一日而脹二日少腹腰脊痛脛痠三日背膂筋痛小便閉十日不已死冬人定夏晏食蓋病發於脾則身痛體重一日而之胃則脹二日而之腎則少腹腰脊痛脛痠膂膀胱者膀胱附於脊背之膂筋也是以三日而之膂膀胱則背膂筋痛小便閉人定在寅木旺而土絶也夏之晏食在亥水泛而土敗也病先發於胃五日而之腎三日而之膂膀胱五日而上之心二日不已死冬夜半夏日昳昳音笛日昃也按素問標本病傳論云胃病脹滿五日少腹腰脊痛䯒痠三日背腹筋痛小便閉五日身體重六日不已死冬夜半夏日昳蓋病先發於胃故脹滿五日而之腎則少腹腰脊痛䯒痠三日而之膂膀胱則背腹筋痛五日而上之心則身體重蓋心主血脈血脈者所以濡筋骨而利關節者也二乃火之生數六日者水之成數也死於二日者火之生氣絶也死於六日者水乘而火滅也故冬夜半者即水乘火滅之義夏日昃者亦太陽之生氣絶也朱濟公曰冬主水夏主火日昃者盛而始虧之時病先發於腎三日而之膂膀胱三日而上之心三日而之小腸三日不已死冬大晨夏晏晡按素問標本病傳論曰腎病者少腹腰脊痛䯒痠三日背𦛗筋痛小便閉三日腹脹三日兩脅支痛二日不已死蓋病先發於腎故少腹腰脊痛䯒痠三日而之膂膀胱則背膂筋痛小便閉三日而上之心則腹脹蓋足少陰腎脈下絡膀胱上從腹注胸中入肺絡心此邪入於臟亦從血脈流傳也上節病在心故身體重此從膀胱而上傳於心復從心而下傳小腸故腹脹也冬大晨者乃寅卯木旺之時木旺則泄其水之氣矣夏晏晡土氣所主之時土剋水也三日者水火之生氣並絶二日者火之生氣絶也蓋病之且死有死於先發之臟氣絶者有死於所傳之臟氣絶者是以靈素經中少有不同學者自當理會病先發於膀胱五日而之腎一日而之小腸一日而之心二日不已死冬雞鳴夏下晡按標本病傳論云膀胱病小便閉五日少腹脹腰脊痛䯒痠一日腹脹一日身體痛二日不已死蓋病發於膀胱故小便閉五日而之腎則少腹脹腰脊痛䯒痠一日而之小腸則腹脹一日而之心故身體痛也冬雞鳴夏下晡即上節大晨晏晡之時也按五臟相傳而有膀胱胃腑者胃居中央為水穀之海乃五臟之生原太陽為諸陽主氣也諸病以次相傳如是者皆有死期不可刺也間一臟及二三四臟者乃可刺也玉機真藏論曰五臟相通移皆有次五臟有病則各傳其所勝病之且死必先傳行至其所不勝病乃死故如是者乃逆傳其所勝皆有死期不可刺也如間一臟者乃心傳之肝肺傳之脾子行乘母也間二臟者心傳之脾肺傳之腎乃母行乘子子母之氣互相資生者也間三臟者心傳之腎肺傳之心從所不勝來者為微邪也按五臟間傳只有間三而無間四所謂間四臟者以臟傳之腑而腑復傳之於他臟蓋腑亦可以名臟也楊元如曰按五臟別論黃帝問曰余聞方士或以腦髓為臟或以腸胃為臟蓋藏貨物曰腑故腑亦可以名臟淫邪發夢第四十三黃帝曰願聞邪淫泮衍奈何岐伯曰正邪從外襲內而未有定舍反淫於臟不得定處與營衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫於腑則有餘於外不足於內氣淫於臟則有餘於內不足於外黃帝曰有餘不足有形乎岐伯曰陰氣盛則夢涉大水而恐懼陽氣盛則夢大火而燔焫陰陽俱盛則夢相殺上盛則夢飛下盛則夢墮盛飢則夢取甚飽則夢豫肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚心氣盛則夢善笑恐畏脾氣盛則夢歌樂身體重不舉腎氣盛則夢腰脊兩解不屬凡此十二盛者至而瀉之立已焫與熱同此承上章論淫邪泮衍而有虛邪正邪之別也虛邪者虛鄉不正之淫邪中人多死正邪者風雨寒暑天之正氣也夫虛邪之中人也灑淅動形正邪之中人也微先見於色不知於身若有若無若亡若存有形無形莫知其情是以上章之淫邪泮衍血脈傳溜大氣入臟不可以致生者虛邪之中人也此章論正邪從外襲內若有若無而未有定舍與營衛俱行於外內肌腠募原之間反淫於臟不得定處而與魂魄飛揚使人臥不得安而喜夢夫邪之折毛髮理邪從皮毛入而發於腠理之間腠理者在外膚肉之紋理在內臟腑募原之肉理衛氣所遊行出入之理路也是以淫邪泮衍與營衛俱行行於募原之肉理則反淫於臟矣夫心藏神腎藏精肝藏魂肺藏魄脾藏意隨神往來謂之魂並精而出為之魄志意者所以御精神收魂魄者也與魂魄飛揚而喜夢者與五臟之神氣飛揚也腑為陽而主外臟為陰而主內邪氣與營衛俱行於臟腑募原之間故氣淫於臟則有餘於內不足於外氣淫於腑則有餘於外不足於內今反淫於臟則有餘於內而五臟之陰氣盛矣陰氣盛則夢涉大水恐懼陽氣盛則夢大火燔焫此心腎之有餘也陰陽俱有餘則心氣並於肺腎氣並於肝而夢相殺相殺者梃刃交擊也此肝肺之有餘也夫魂遊魄降上盛則夢飛下盛則夢墮此魂魄之有餘於上下也飢則夢取飽則夢豫是脾胃之有餘不足也此邪與五臟之神氣遊行而形之於夢也如肝氣盛則夢怒肺氣盛則夢悲心氣盛則夢笑脾氣盛則夢歌樂腎氣盛則夢腰脊不屬此邪干五形臟而形之於夢也凡此十二盛者乃氣淫於臟有餘於內故瀉之立已厥氣客於心則夢見丘山煙火客於肺則夢飛揚見金鐵之奇物客於肝則夢山林樹木客於脾則夢見丘陵大澤壞屋風雨客於腎則夢臨淵沒居水中客於膀胱則夢遊行客於胃則夢飲食客於大腸則夢田野客於小腸則夢聚邑沖衢客於膽則夢鬥訟自刳客於陰氣則夢接內客於項則夢斬首客於脛則夢行走而不能前及居深地窖苑中客於股肱則夢禮節拜起客於胞䐈則夢泄便凡此十五不足者至而補之立已也窖音教地藏也夫邪之所湊其正必虛上章論邪氣之有餘此論正氣之不足厥氣者虛氣厥逆於臟腑之間客者薄於臟腑之外也客於心則夢丘山煙火心屬火而心氣虛也客於肺則夢飛揚肺主氣而肺氣虛也金鐵之奇物金氣虛而見異象也客於肝則夢山林樹木肝氣之變幻也客於脾則夢丘陵大澤土虛而水泛也脾者營之居也名曰器夫形謂之器脾主肌肉形骸乃人之器宇夢風雨壞屋者脾氣虛而為風雨所壞也客於腎則夢臨淵沒居水中腎氣虛陷也客於膀胱則夢遊行太陽之氣虛行也客於胃則夢飲食虛則夢取也客於大腸則夢田野田野者水穀之所生也大腸為傳導之官主受水穀之餘濟泌別汁只夢見田野者大腸之氣虛也客於小腸則夢聚邑沖衢夫聚邑沖衢乃通聚貨物之處小腸受盛化物只夢見衢邑者小腸之氣虛也膽為中正之寄決斷出焉故厥氣客於膽則夢鬥訟自剖客於陰器則夢接內精氣泄也三陽之氣皆循項而上於頭故頭為諸陽之首客於項則陽氣不能上於頭故夢斬截其首也客於脛則夢行走不前脛氣虛也足為陰深居地窖苑中地氣下陷也客於股肱則夢禮節拜起者手足不寧也客於胞則夢泄前溺客於䐈腸則夢後便凡此十五不足者至而補之立已也嗟乎人生夢境耳得其生神之理則神與俱成如醉之醒如夢之覺若迷而不寤喑乎其無聲漠乎其無形矣順氣一日分為四時第四十四黃帝曰夫百病之所始生者必起於燥濕寒暑風雨陰陽喜怒飲食居處氣合而有形得藏而有名余知其然也夫百病者多以旦慧晝安夕加夜甚何也岐伯曰四時之氣使然此章論陽氣晝夜出入應四時之生長收藏五臟主五運於中而外合木火土金水之五氣人之百病不出於外內二因燥濕風雨寒暑外因於天之六氣氣合於有形而為病藉人氣之生長以慧安蓋六淫之邪外合於形而病於形也陰陽喜怒飲食居處內因於人之失調得之於臟而有病名如傷喜則得之於心而有心病矣傷怒則得之於肝而有肝病矣傷悲則得之於肺而有肺病矣傷恐則得之於腎而有腎病矣傷於飲食則得之脾胃而有脾胃之病矣是必以臟氣之所勝時者起蓋內因之病得之於臟而病臟也此論人之正氣合天地之陰陽五行人氣盛可以勝天之淫邪得地之五行可以起人之臟病人與天地參合而互相資助者也黃帝曰願聞四時之氣岐伯曰春生夏長秋收冬藏是氣之常也人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬朝則人氣始生病氣衰故旦慧日中人氣長長則勝邪故安夕則人氣始衰邪氣始生故加夜半人氣入臟邪氣獨居於身故甚也春生夏長秋收冬藏一歲之四時天地之陰陽出入也朝則為春日中為夏日入為秋夜半為冬一日之四時人氣之陰陽出入也人氣生則病衰氣長則安氣衰則病加氣藏則甚此邪正之氣交相勝負人之正氣可以勝天之淫邪是以聖人春夏養陽秋冬養陰以從其根養一日之氣以應天之四時順天地之四時以調養其精氣可以壽敝天地黃帝曰其時有反者何也岐伯曰是不應四時之氣獨臟主其病者是必以臟氣之所不勝時者甚以其所勝時者起也黃帝曰治之奈何岐伯曰順天之時而病可與期順者為工逆者為粗此言因於陰陽喜怒飲食居處者五臟獨主其病是必以臟氣之所不勝時者甚以其所勝時者起也如肝病不能勝申酉時之金氣心病不能勝亥子時之水氣脾病不能勝寅卯時之木氣肺病不能勝巳午時之火氣腎病不能勝辰戌丑未時之土氣是臟氣之所不勝時者甚也如肝病至辰戌丑未時而起心病至申酉時而起脾病至亥子時而起肺病至寅丑時而起腎病至巳午時而起以其所勝時而起也故良工順天之時以調養五行之氣則病之起可與之期若不知天地陰陽四時五行之理者不可以為工矣黃帝曰善余聞刺有五變以主五輸願聞其數岐伯曰人有五臟五臟有五變五變有五輸故五五二十五輸以應五時黃帝曰願聞五變岐伯曰肝為牡臟其色青其時春其音角其味酸其日甲乙心為牡臟其色赤其時夏其日丙丁其音徵其味苦脾為牝臟其色黃其時長夏其日戊己其音宮其味甘肺為牝臟其色白其音商其時秋其日庚辛其味辛腎為牝臟其色黑其時冬其日壬癸其音羽其味鹹是為五變此言五臟之氣應天之四時五音五色五味也五臟有五變者有五時五行五音五色之變異五變有五輸者一臟之中有春刺滎夏刺輸長夏刺經秋刺合冬刺井之五輸故五五有二十五輸以應五時也肝屬木心屬火故為牡臟脾屬士肺屬金腎屬水故為牝臟黃帝曰以主五輸奈何缺岐伯曰藏主冬冬刺井色主春春刺滎時主夏夏刺輸音主長夏長夏刺經味主秋秋刺合是謂五變以主五輸此五臟之氣應天之五時而取之五輸各有所主也腎者主封藏之本藏主冬此腎合冬藏之氣也肝主色色主春此肝合春生之氣也心者生之本神之變也時主夏心合夏長之氣也土數五五者音也音主長夏脾合長夏之氣也五味入口藏於陽胃陽明主秋金之氣味主秋腸胃合秋收之氣也此五臟之氣應五時之變而取之五輸各有所主也春刺滎夏刺輸長夏刺經秋刺合冬刺井皆從子以透發母氣黃帝曰諸原安合以致六輸岐伯曰原獨不應五時以經合之以應其數故六六三十六輸此六腑之應五時也春令木夏令火長夏主土秋令金冬令水此五時之合於五行也肝藏木心藏火脾藏土肺藏金腎藏水此五臟之合於五行也井主木滎主火輸主土經主金合主水此五輸之合於五行也六腑有原穴故不應五時以經與原合之則合於五行以應六六三十六之數矣蓋木火土金水地之五行也以生人之五臟地之五行上呈天之六氣以合人之六腑六氣者木火土金水火也君火以明相火以位是以六氣之中有二火以六氣合六腑六腑有六輸故應六六三十六之數以經火與原火合之則又合五行之數矣此陰陽離合之道五行變化之機天地生成之妙用也黃帝曰何謂藏主冬時主夏音主長夏味主秋色主冬願聞其故岐伯曰病在藏者取之井病變於色者取之滎病時間時甚者取之輸病變於音者取之經經滿而血者病在胃及以飲食不節得病者取之於合故命曰味主合是謂五變也前節論五臟之氣應於五時而取之五輸各有所主此復論五臟之病合於五輸而各有所取也臟者陰也里也腎治於裡故病在藏者取之井以泄冬藏之氣肝應春而主色故病變於色者取之滎時間時甚者火之動象神之變也故取之輸脾主土其數五其音宮宮為五音之主音故變於音者取之經肺與陽明主秋金之令飲入於胃上輸於肺食氣於胃淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑而通於四臟是入胃之飲食由肺氣通調輸布而生此營衛血脈故經滿而血者病在胃飲食不節者肺氣不能轉輸而得病也按靈素經中凡論五臟必兼論胃腑以胃為五臟之生原也肺與陽明並主秋令此章以腑合臟而臟合於四時五行味主秋則秋令所主之臟腑皆櫽於中矣外揣第四十五黃帝曰余聞九針九篇余親受其調頗得其意夫九針者始於一而終於九然未得其要道也夫九針者小之則無內大之則無外深不可為下高不可為蓋恍惚無窮流溢無極余知其合於天道人事四時之變也然余願雜之毫毛渾束為一可乎此章帝以九針之道合而為一以應天道夫九針者始於一以應天二以應地三以應人四以應時五以應音六以應律七以應星八以應風九以應野始於一而終於九者合於天地人事四時之變也然道之要惟一而後能貫通故九針者小之則無內大之則無外深不可為下高不可為蓋恍惚無窮流散無極今欲如毫毛之繁雜者渾束為一可乎岐伯曰明乎哉問也非獨針道焉夫治國亦然黃帝曰余願聞針道非國事也岐伯曰夫治國者夫惟道焉非道何可小大深淺雜合而為一乎夫治民與自治治彼與治此治大與治小治國與治家夫惟道而已矣故非獨針道治國亦然伯以九針之道合於陰陽推之可千可萬合之惟歸於一猶庖犧氏之卦象有變易不易之理所以修身齊家治國平天下總不外乎此黃帝曰願卒聞之岐伯曰日與月焉水與鏡焉鼓與響焉夫日月之明不失其影水鏡之察不失其形鼓響之應不後其聲動搖則應和盡得其情此言渾束而為一者合於天之道也日月麗天繞地即轉不失其光明之影司天在上在泉在下如水與鏡不失其照應之形動靜有常剛柔推蕩如鼓與響不失其傳應之聲言天道也動搖則應和盡得其情者外可以揣內內可以揣外外內相應天地之道也黃帝曰窘乎哉昭昭之明不可蔽其不可蔽不失陰陽也合而察之切而驗之見而得之若清水明鏡之不失其形也五音不彰五色不明五臟波蕩若是則內外相襲若鼓之應桴響之應聲影之應形故遠者司外揣內近者司內揣外是謂陰陽之極天地之蓋請藏之靈蘭之室弗敢使泄也此言天地之道而合於人道也夫六氣主外天之道也五運主內地之道也而人亦應之六氣運行於上下以應十二經脈如升降息則氣立孤危五運出入於外內以應五臟之氣如出入廢則神機化滅是以五音五色之彰明於外者五臟之氣著也如五臟波蕩於內則五音不彰五色不明矣此外內相襲若桴鼓影響之相應也遠者司外揣內應天之道也近者司內揣外應地之道也是謂陰陽之極天地之蓋藏之靈蘭祕室不敢妄泄也楊元如曰始云高不可為蓋謂天之覆蓋於上也又曰天地之蓋謂天包乎地之外上下合而為蓋也此章始論合束為一以應天道然後提出天地陰陽上下外內猶卦象之始於一而成兩奇偶相合而為三三而三之成九九九八十一以起黃鐘之數是九針之道合於天地人事四時之變如雜之毫毛若渾然為一復歸於天道之無極也朱濟公曰九針者有九針之名有九針之式合而為一是為微針矣此篇照應首章之義
