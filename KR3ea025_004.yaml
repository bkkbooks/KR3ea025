body:
  text: 卷四口問第二十八黃帝間居闢左右而問於岐伯曰余已聞九針之經論陰陽逆順六經已畢願得口問岐伯避席再拜曰善乎哉問也此先師之所口傳也黃帝曰願聞口傳岐伯答曰夫百病之始生也皆生於風雨寒暑陰陽喜怒飲食居處大驚卒恐則血氣分離陰陽破散經絡厥絶脈道不通陰陽相逆衛氣稽留經脈虛空血氣不次乃失其常論不在經者請道其方九針之經謂上古之針經帝欲於經傳之外而有口傳心受者陰陽六經之外有別走其道者外因內因之外有奇邪之為病者故設此問闢左右者此上帝之所貴非其人勿傳也伯言百病之生不出外內二因外因者因於風雨寒暑內因者因於喜怒驚恐飲食居處皆傷營衛血氣陰陽經脈若不在經者請言其所在之病黃帝曰人之缺者何氣使然岐伯答曰衛氣晝日行於陽夜半則行於陰陰者主夜夜者臥陽者主上陰者主下故陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數缺陽氣盡陰氣盛則目瞑陰氣盡而陽氣盛則寤矣瀉足少陰補足太陽數葉朔缺江左謂之呵缺此論陰陽之氣上下出入陽者天氣也主外主上陰者地氣也主內主下然又有升降出入之機而人亦應之人之衛氣日行於陽夜行於陰行於陰則陽氣在內陰氣在外陽氣在下陰氣在上夜半一陽初升至天明衛行於陽而寤然在下之陽氣未盡行於上陽欲引而上陰欲引而下陰陽相引故數缺此陰陽之上下也日暮在外之陽氣將盡而陰氣漸盛則目瞑而臥平旦在外之陰氣將盡而陽氣漸盛則寤矣此陰陽之外內也當補足太陽以助陽引而上瀉足少陰以引陰氣而下少陰太陽標本相合為陰陽之主宰黃帝曰人之噦者何氣使然岐伯曰谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦補手太陰瀉足少陰此言人之所受穀氣由胃氣之布散於天下者也胃為水穀之海肺屬天而外主皮毛谷入於胃乃傳之肺肺朝百脈輸精於皮毛毛脈合精行氣於腑五臟六腑皆以受氣是入胃之水穀藉肺氣轉輸於皮毛行於臟腑如肺有故寒氣而不能輸布寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆於胃而胃腑不受復出於胃故厄逆也夫腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也是在下之寒水上通於天者也故當補手太陰以助天之陽氣瀉足少陰以下肺之寒邪肺之寒者乃腎水之寒氣也此篇論人身之應天地陰陽奇邪之走空竅非外因之形寒亦非飲冷之寒氣也姚士因曰按金匱玉函云噦逆者橘皮竹茹湯主之蓋橘之色黃臭香味甘而辛乃中土之品也辛兼走肺皮性走皮是助胃氣走肺而外出於皮毛者也竹性寒而凌冬不凋得冬令寒水之氣用茹者助水氣之運行於膚表不凝聚於肺中配人參甘草生薑大棗以助中土之氣先聖立方之法咸從經義得之學者引而伸之天下之能事畢矣黃帝曰人之唏者何氣使然岐伯曰此陰氣盛而陽氣虛陰氣疾而陽氣徐陰氣盛而陽氣絶故為唏補足太陽瀉足少陰此論陰陽之不相和也太陽少陰乃水火陰陽之本雌雄相合標本互交若陰氣盛而陽氣虛則陰氣疾而陽氣徐矣陰氣疾而陽氣徐則陰氣不能相將而陰與陽絶矣故當補足太陽之陽瀉足少陰之陰以和其陰陽焉唏者欷歔悲咽也蓋陽氣盛則多喜笑陰氣盛則多悲哀黃帝曰人之振寒者何氣使然岐伯曰寒氣客於皮膚陰氣盛陽氣虛故為振寒寒栗補諸陽此言陽氣之在外也諸陽之氣主於肌表故寒氣客於皮膚藉陽氣以化熱若陰氣盛而陽氣虛則為振寒戰栗當補諸陽諸陽者三陽也吳懋先曰寒氣即太陽寒水之氣故當補諸陽黃帝曰人之噫者何氣使然岐伯曰寒氣客於胃厥逆從下上散復出於胃故為噫補足太陰陽明一曰補眉本也此言土位中央而氣出於上下也寒氣客於胃厥逆之氣上走心為噫得後氣則快然如衰是厥氣出於胃從脾氣而上下散故當補足太陰陽明以助其分散焉眉本乃足太陽之經寒氣客於胃者乃太陽寒水之氣也一曰補太陽之陽氣於上而客中之寒氣可散矣姚士因曰腎為水臟太陽之上寒氣主之噦者寒氣在於肺噫者寒氣在胃中一瀉少陰之寒一補太陽之陽補瀉雖別其義則同黃帝曰人之嚏者何氣使然岐伯曰陽氣和利滿於心出於鼻故為嚏補足太陽榮眉本一曰眉上也此言太陽之氣與心氣之相和也太陽之上寒水主之少陰之上君火主之陰陽互交標本相合故心為陽中之太陽太陽與心氣之相合也是以陽氣和利則上滿於心出於鼻而為嚏鼻乃肺之竅肺乃心之蓋也太陽之氣生於膀胱膀胱乃津液之府陽氣和利上滿於心則陽氣盛矣故當取足太陽之榮於眉本使津液上資則陰陽相平矣夫太陽之氣主於膚表一曰補眉上以取太陽之氣使氣行於外則不滿於心矣黃帝曰人之嚲者何氣使然岐伯曰胃不實則諸脈虛諸脈虛則筋脈懈惰筋脈懈惰則行陰用力氣不能復故為嚲因其所在補行肉間嚲音朵此言筋脈皆本於胃腑之所生者嚲者垂首斜傾懈惰之態筋脈皆本於水谷之所資養故胃不實則諸脈虛諸脈虛則筋脈懈惰蓋經脈者所以濡筋骨而利關節者也夫陽明主潤宗筋陽明虛則宗節縱是以筋脈懈惰則陽明之氣行於宗筋而用力於陰器矣行陰用力則陽明之氣不能復養於筋脈故為嚲因其所在行陰故補分肉間以取陽明之氣外出黃帝曰人之哀而泣涕出者何氣使然岐伯曰心者五臟六腑之主也目者宗脈之所聚也上液之道也口鼻者氣之門戶也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈感宗脈感則液道開液道開故泣涕出焉液者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣故命曰奪精補天柱經挾頸此言五臟之液內濡百脈膀胱之津外濡空竅夫水穀入胃津液各走其道酸先入肝苦先入心甘先入脾辛先入肺咸先入腎五臟主藏水穀之津者也膀胱者州都之官津液藏焉復還入胃中以資臟腑是臟腑膀胱之津交相資益者也是故泣不止則液竭液竭則精不灌蓋液者又所以灌精濡空竅者也宗脈者上液之道也液道開而泣不止則液竭而濡空竅之精不能灌於目而目不明矣故命曰奪精謂奪其外濡空竅之精也當補膀胱經之天柱於挾頸間以資津液上灌蓋液隨氣行者也夫口鼻耳目皆為空竅故曰口鼻者氣之門戶也謂津液隨氣而上濡空竅故精不灌則目不明黃帝曰人之太息者何氣使然岐伯曰憂思則心系急心系急則氣道約約則不利故太息以伸出之補手少陰心主足少陽留之也此言上焦之宗氣與下焦之生氣相通而行呼吸者也夫宗氣積於胸中出於喉嚨以貫心脈而行呼吸憂思則心系急心系急則氣道斂約約則不利故太息以伸出之當補手少陰心主足少陽留之留之者候氣之至也蓋腎為生氣之原少陽屬腎乃腎中所生之初陽上通於心主包絡故補手少陰心主以通上焦之氣補足少陽留之以候下焦之生氣以上交王芳侯曰本經凡曰手少陰心主乃包絡之經以相而代行君令者也凡曰足少陽乃兼手少陽而言蓋六腑皆出於足之三陽上合於手者也黃帝曰人之涎下者何氣使然岐伯曰飲食者皆入於胃胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下補足少陰此言足少陰之氣上與陽明相合而主化水穀者也蟲者陰類也陰類動則腎氣不交於陽明而胃氣緩矣氣不上交則水邪反從任脈而上出於廉泉故涎下當補足少陰以助下焦之生氣上升而水邪自下矣姚士因曰少陰陽明戊癸相合而後能化水穀之精微故曰飲食者皆入於胃謂不合則胃緩緩則不能化飲食矣不合則熱熱則蟲動矣上節論少陰之氣上與宗氣相合以行呼吸此論與陽明相合以化飲食之精微下節論與宗脈相合而通會於百脈蓋營衛血氣本於後天水穀之所資生然必藉下焦先天之氣以合化黃帝曰人之耳中鳴者何氣使然岐伯曰耳中宗脈之所聚也故胃中空則宗脈虛虛則下溜脈有所竭者故耳鳴補客主人手大指爪甲上與肉交者也此言經脈之血氣資生於胃而資始於腎也夫肺朝百脈宗脈者百脈一宗肺所主也耳者宗脈之所聚也百脈之血氣水穀之所生也故胃中空則宗脈虛虛則脈氣下溜矣脈中之血氣有所竭故耳鳴也當補客主人與手太陰之少商客主人乃足少陽之脈補之以引下溜之脈氣上行王芳侯曰客主人者謂經脈為客脈中之主人在腎下溜者下陷於腎中也故取在上之脈以引啓之黃帝曰人之自齧舌者何氣使然缺岐伯曰此厥逆走上脈氣輩至也少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇矣視主病者則補之齧音業此總結脈氣生於中焦後天之水穀本於下焦先天之陰陽中下之氣相合而行者也齒者腎氣之所生也少陰之脈挾舌本少陽之脈循於頰陽明之脈挾口環唇下如腎臟之生氣厥逆走上與中焦所生之脈氣相輩而至則舌在齒之內而反向外矣唇在齒之外而反向內矣頰在齒之旁而反向中矣此處假齧舌齧唇以明陽明所生之血脈本於先天之生氣相合而偕行者也凡此十二邪者皆奇邪之走空竅者也故邪之所在皆為不足故上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之眩中氣不足溲便為之變腸為之苦鳴下氣不足則乃為痿厥心悗補足外踝下留之此總結十二邪者皆緣膀胱所藏之津液不能灌精濡空竅故也所謂奇邪者外不因於風雨寒暑內不因於陰陽喜怒飲食居處皆緣津液不足而空竅虛無故邪之所在皆為之不足蓋因正氣不足而生奇邪之證也故上氣不足者腦為之不滿耳為之苦鳴頭為之苦傾目為之眩中氣不足者溲便為之變腸為之苦鳴下氣不足者則為痿厥心悗蓋不足於下則為痿厥不得上交於心則心悗矣補足外踝下留之乃取太陽之崑崙穴候太陽之氣至也蓋太陽者三陽也三陽者天之業膀胱之津水隨氣運行以濡空竅故取之崑崙崑崙乃津水之發原上通於天者也黃帝曰治之奈何岐伯曰腎主為缺取足少陰肺主為噦取手太陰足少陰唏者陰與陽絶故補足太陽瀉足少陰振寒者補諸陽噫者補足太陰陽明嚏者補足太陽眉本嚲因其所在補分肉間泣出補天柱經挾頸挾頸者頭中分也太息補手少陰心主足少陽留之涎下補足少陰耳鳴補客主人手大指爪甲上與肉交者自齧舌視主病者則補之上節總論膀胱之津液不能灌濡空竅以致上中下氣皆為之不足此復分論十二邪者各有補瀉陰陽之法蓋膀胱者津液之府受臟腑之津而藏之復還入胃中以資益臟腑互相交通者也故各因其邪之所在而補瀉之目眩頭傾補足外踝下留之痿厥心悗刺足大趾間上二寸留之一曰足外踝下留之足大趾間上二寸乃足太陰之太白脾臟之上俞也此篇論太陽之津水隨氣而運行於膚表復從中土而上交於心應司天在泉之氣運行於地之外復貫通於地中是以上氣不足補足太陽之崑崙下氣不足不得從中而上通於心者刺足太陰之俞以通土氣然本於足太陽之津氣貫通故一曰足外踝下留之乃取太陽之津氣也姚士因曰缺者足太陽少陰之氣相引而上下也噦者少陰寒水之氣客於肺也唏者太陽與少陰之氣不和也振寒者寒水之氣客於皮膚而太陽之陽氣虛於表也噫者太陽寒水之氣客於胃也嚏者太陽之陽氣滿於心也嚲者筋脈之氣行陰用力前陰者足少陰太陽之會也哀泣者太陽之津液竭也太息者下焦之生氣不交於上也涎下者膀胱之水邪上溢也耳鳴者宗脈之氣溜陷於下焦也自齧者下焦之氣厥逆走上也此皆足太陽與少陰之津氣為病太陽之氣生於膀胱少陽之氣發於腎臟腎與膀胱雌雄相合皆為水臟而為生氣之原膀胱之津水隨太陽之氣運行於膚表以濡空竅應六氣之旋轉腎臟之精氣貫通於五臟應五運之神機此皆不在六經陰陽逆順之論故帝闢左右而問曰願聞口傳王芳侯曰此篇論先後天之陰陽為病師傳第二十九黃帝曰余聞先師有所心藏弗著於方余願聞而藏之則而行之上以治民下以治身使百姓無病上下和親德澤下流子孫無憂傳於後世無有終時可得聞乎岐伯曰遠乎哉問也夫治民與自治治彼與治此治大與治小治國與治家未有逆而能治之也夫惟順而已矣順者非獨陰陽脈論氣之逆順也百姓人民皆欲順其志也黃帝曰順之奈何岐伯曰入國問俗入家問諱上堂問禮臨病人問所便吳懋先曰師傳者先知覺後知先覺覺後覺即夫子所謂明德新民之意上以治國下以治民治大治小治國治家乃修身齊家治國平天下之道順和也氣之逆順者陰陽寒暑之往來也入國問俗入家問諱上堂問禮臨病人問所便即治國齊家治民之要志者心之所之也驕恣縱欲惡死樂生意之所發也所謂欲治其身者必先正心誠意此上醫醫國之道也黃帝曰便病人奈何岐伯曰夫中熱消疸則便寒寒中之屬則便熱胃中熱則消穀令人懸心善飢臍以上皮熱腸中熱則出黃如糜臍以下皮寒胃中寒則腹脹腸中寒則腸鳴飧泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾飢小腹痛脹吳懋先曰便者所以更人之逆也熱者更之寒寒者更之熱也熱中寒中者寒熱之氣皆由中而發內而外也臍以上皮熱者腸中熱臍以下皮寒者胃中寒寒熱外內之相應也黃帝曰胃欲寒飲腸欲熱飲兩者相逆便之奈何且夫王公大人血食之君驕恣縱欲輕人而無能禁之禁之則逆其志順之則加其病便之奈何治之何先岐伯曰人之情莫不惡死而樂生告之以其敗語之以其善導之以其所便開之以其所苦雖有無道之人惡有不聽者乎吳懋先曰寒熱者陰陽之氣也言上醫者具阿衡之材能調燮其陰陽尤能格君心之非也黃帝曰治之奈何岐伯曰春夏先治其標後治其本秋冬先治其本後治其標姚士因曰本標者內為本而外為標也春夏之氣發越於外故當先治其標後治其本秋冬之氣收藏於內故當先治其本後治其標知本末之先後氣可令調為萬民式天之道畢矣黃帝曰便其相逆者奈何岐伯曰便此者飲食衣服亦欲適寒溫寒無悽愴暑無出汗飲食者熱無灼灼寒無滄滄寒溫中適故氣將持乃不致邪僻也適葉的姚士因曰此言飲食衣服乃日用平常之事所當適其和平則陰陽之氣可以持平不致邪僻之所生也便其相逆者謂胃欲寒飲腸欲熱飲兩者相逆便之奈何夫胃中熱腸中寒則胃欲寒飲腸欲熱飲矣如胃中寒腸中熱則胃欲熱飲腸欲寒飲矣此寒熱之在內也故飲食者熱無灼灼寒無滄滄則在內之寒熱可調矣四時之氣寒暑之在外也時值涼寒無使其悽愴時值暑熱無使其汗出則在外之陰陽可調矣吳氏曰通篇大義在調和外內之陰陽非陰陽脈論乃論氣之逆順也故曰寒溫中適故氣將持乃不致邪僻也謂天有寒暑人有陰陽我之陰陽既和可以御天之寒暑黃帝曰本臟以身形支節膕肉候五臟六腑之小大焉今夫王公大人臨朝即位之君而問焉誰可捫循之而後答乎岐伯曰身形支節者臟腑之蓋也非面部之閲也黃帝曰五臟之氣閲於面者余已知之矣以支節知而閲之奈何岐伯曰五臟六腑者肺為之蓋巨肩陷咽候見其外黃帝曰善岐伯曰五臟六腑心為之主缺盆為之道䯏骨有餘以候𩩲骭黃帝曰善岐伯曰肝者主為將使之候外欲知堅固視目小大黃帝曰善岐伯曰脾者主為衛使之迎糧視唇舌好惡以知吉凶黃帝曰善岐伯曰腎者主為外使之遠聽視耳好惡以知其性黃帝曰善願聞六腑之候岐伯曰六腑者胃為之海廣骸大頸張胸五穀乃容鼻隧以長以候大腸唇厚人中長以候小腸目下果大其膽乃橫鼻孔在外膀胱漏泄鼻柱中央起三焦乃約此所以候六腑者也上下三等臟安且良矣䯏音括𩩲音歇骭音干此言望而知之者斯可謂國士也夫人生於地懸命於天天地合氣命之曰人在天主氣在地成形此天之生命所以立形定氣而視壽夭者必明乎此是以五臟之氣見於色臟腑之體應乎形既能閲於面而知五臟之氣又當閲其形以知臟腑之形知氣知形斯可謂望知之神𩩲骭胸骨也肝乃將軍之官故主為將脾乃轉運之官故主為衛腎開竅於耳故主為外言其聽之遠也堅固者五臟之有堅脆也吉凶者臟安則吉臟病則凶也性者五臟有端正偏傾之性也鼻乃肺之竅大腸者肺之腑故鼻以候大腸口乃脾之竅小腸受盛脾胃之濁而上屬於胃故唇與人中以候小腸目乃肝之竅故目下以候膽膀胱者津液之府氣化則出鼻孔在外謂鼻孔之氣出在外則膀胱漏泄蓋上竅通而下竅泄也三焦者決瀆之官水道出焉氣約則止不約則遺鼻柱中央起者謂鼻之吸氣從中央而起則三焦乃約蓋上氣吸入則下約上氣呼出則下通上下開闔之相應也此言臟腑之形外內相應者亦由氣之所感也上下三等謂天地人三部之相等也決氣第三十黃帝曰余聞人有精氣津液血脈余意以為一氣耳今乃辨為六名余不知其所以然此篇論精氣津液血脈生於後天而本於先天也本於先天總屬一氣成於後天辨為六名故帝意以為一而伯分為六焉決分也決而和故篇名決氣謂氣之分判為六而和合為一也岐伯曰兩神相摶合而成形常先身生是謂精何謂氣岐伯曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣何謂津岐伯曰腠理發泄汗出溱溱是謂津何謂液岐伯曰谷入氣滿淖澤注於骨骨屬屈伸泄澤補益腦髓皮膚潤澤是謂液何謂血岐伯曰中焦受氣取汁變化而赤是謂血何謂脈岐伯曰壅遏營氣令無所避是謂脈吳氏曰所生之來謂之精兩精相摶謂之神又曰神者水穀之精氣也兩神者一本於天一之精一生於水穀之精兩神相摶合而成此形也所生之來謂之精故常先身生謂未成形而先生此精也上焦之氣宣發五穀之精微充膚熱肉潤澤皮毛若霧露之溉是謂氣腠理者肌肉之紋理本經曰水穀入於口其味有五各注其海津液各走道故三焦出氣以溫肌肉充皮膚為其津其流而不行者為液是以發泄於腠理汗出溱溱是謂津谷入氣滿淖澤注於骨使骨屬屈伸泄澤從髓空而補益腦髓皮膚潤澤是謂液中焦受水穀之精氣濟泌別汁奉心神變化而赤是謂血壅培助也遏遮蔽也避違避也言經脈壅蔽營氣行於脈中晝夜環轉無所違逆是謂脈黃帝曰六氣者有餘不足氣之多少腦髓之虛實血脈之清濁何以知之岐伯曰精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛痠耳數鳴血脫者色白夭然不澤其脈空虛此其候也營者精氣也血者神氣也精血津液皆本於氣之生化故謂之六氣清濁者營衛之氣也腎主藏精開竅於耳故精脫者耳聾目之精明五色者氣之華也故氣脫者目不明津發於腠理故津脫者腠理開汗大泄液淖澤於骨補益腦髓故液脫者骨屬屈伸不利不能潤澤皮膚故毛色夭焦也腎主骨而骨髓上通於腦故腦髓消而脛痠耳鳴心主血心之合脈也其營色也是以血脫者色白夭然不澤其脈空虛此其候也黃帝曰六氣者貴賤何如岐伯曰六氣者各有部主也其貴賤善惡可為常主然五穀與胃為大海也夫子曰卑高以陳貴賤位矣謂居上者為尊貴居下者為卑賤言此六氣主於心腎而生於胃海也各有部主者謂精之藏於腎血之主於心氣之主於皮膚津之發於腠理液之淖於骨資於腦脈之循於臟腑形身各有所主之部然以心腎為常主五穀與胃為大海津液血氣乃胃海之所生也夫心為君主之官而居上水性潤下而居下火之精為血水之精為精水性柔善火性猛惡其貴賤善惡可為六氣之常主也蓋水火者陰陽之徵兆也謂六氣辨為六名然總歸陰陽之一氣腸胃第三十一黃帝問於伯高曰余願聞六腑傳谷者腸胃之小大長短受谷之多少奈何伯高曰請盡言之谷所從出入淺深遠近長短之度唇至齒長九分口廣二寸半齒以後至會厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣二寸半至胃長一尺六寸胃紆曲屈伸之長二尺六寸大一尺五寸徑五寸大容三斗五升小腸後附脊左環回周疊積其注於回腸者外附於臍上回運環十六曲大二寸半徑八分分之少半長三丈三尺回腸當臍左環回周葉積而下回運環反十六曲大四寸徑一寸寸之少半長二丈一尺廣腸傳脊以受回腸左環葉脊上下闢大八寸徑二寸寸之大半長二尺八寸腸胃所入至所出長六丈四寸四分回曲環反三十二曲也此言有生之後總藉水穀之所生養故專論其腸胃胃主受納水穀腸主傳導變化其精液血氣由此而生焉越人曰唇為飛門齒為戶門會厭為吸門胃為賁門太倉下口為幽門大小腸會為闌門下極為魄門蓋唇齒乃始受水穀之門故先論唇齒之廣長舌者主為衛使之迎糧舌和而後能知五味會厭者喉之上套所以分別咽喉咽乃胃之門主受納水穀喉乃肺之竅以司呼吸者也平人絶谷第三十二黃帝曰願聞人之不食七日而死何也伯高曰臣請言其故胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之谷常留二斗水一斗五升而滿上焦泄氣出其精微慓悍滑疾下焦下溉諸腸小腸大二寸半徑八分分之少半長三丈二尺受谷二斗四升水六升三合合之大半回腸大四寸徑一寸寸之少半長二丈一尺受谷一斗水七升半廣腸大八寸徑二寸寸之大半長二尺八寸受谷九升三合八分合之一腸胃之長凡五丈八尺四寸受水穀九斗二升一合合之大半此腸胃所受水穀之數也平人則不然胃滿則腸虛腸滿則胃虛更虛更滿故氣得上下五臟安定血脈和則精神乃居故神者水穀之精氣也故腸胃之中常留谷二斗水一斗五升故平人日再後後二升半一日中五升七日五七三斗五升而留水穀盡矣故平人不食飲七日而死者水穀精氣津液皆盡故也此論人之臟腑形骸精神氣血皆藉水穀之所資生水穀絶則形與氣俱絶矣六節藏象論曰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生故神者水穀之精氣也平人不然者謂平常無病之人胃滿則腸虛腸滿則胃虛日夜消化只留三斗五升無有如此之留積也是以不飲食七日則所留之水穀盡矣水穀盡則精氣津液皆盡矣王芳侯曰病人不飲食七日不死者水穀留積故也蓋留積則為病矣海論第三十三黃帝問於岐伯曰余聞刺法於夫子夫子之所言不離於營衛血氣夫十二經脈者內屬於腑臟外絡於支節夫子乃合之於四海乎岐伯答曰人亦有四海十二經水經水者皆注於海海有東西南北命曰四海黃帝曰以人應之奈何岐伯曰人有髓海有血海有氣海有水穀之海凡此四者以應四海也黃帝曰遠乎哉夫子之合人天地四海也願聞應之奈何岐伯答曰必先明知陰陽表裡榮輸所在四海定矣黃帝曰定之奈何岐伯曰胃者水穀之海其輸上在氣衝下至三里衝脈者為十二經之海其輸上在於大杼下出於巨虛之上下廉膻中者為氣之海其輸上在柱骨之上下前在於人迎腦為髓之海其輸上在於其蓋下在風府膻葉袒夫天主生物地主成物是以人之形身應地之四海十二經水然水天之氣上下相通是以頭氣有街胸氣有街腹氣有街脛氣有街經氣上下之出入也故合人於天地四海必先明知陰陽表裡榮輸之所在四海定矣胃者水穀之海其輸上在氣衝氣在腹者止之背俞下至足之三里是水穀之海上通於天氣而下通於經水也衝脈者為十二經之海其輸上在於太陽之大杼下至巨虛之上下廉而出於脛氣之街是衝脈之外通於天氣而內通於經水也膻中者為氣之海在膺胸之內宗氣之所聚也宗氣流於海其下者注於氣街其上者走於息道故氣在胸者止之膺與背俞故其輸上在背之天柱前在膺胸之人迎是氣海之上通於天而下通於經水也腦為髓之海氣在頭者止之於腦故其輸上在於其蓋下在督脈之風府是髓海之上通於天而下通於經水也是十二經脈應地之十二經水經水者皆注於海海有東西南北而海之雲氣上通於天是以人之所以合天地四海也黃帝曰凡此四海者何利何害何生何敗岐伯曰得順者生得逆者敗知調者利不知調者害姚氏曰人合天地四海升降出入運行無息故得順而和者則生利無窮逆而不調則敗害至矣黃帝曰四海之逆順奈何岐伯曰氣海有餘者氣滿胸中悗息面赤氣海不足則氣少不足以言吳氏曰天地陰陽之道更相和平者也故有餘不足皆為之逆膻中者宗氣之所居上出於喉以司呼吸故氣海有餘者氣滿胸中氣息悗亂氣上逆故面赤也氣海不足則氣少氣少故不足於言血海有餘則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病吳氏曰衝脈起於胞中上循背裡為經脈之海其浮而外者循腹右上行至胸中而散於皮膚之間是衝脈之血充實於周身故有餘則覺其身大不足則覺其身小怫然狹然不知其為何病也王芳侯曰血以應水故有餘常想其大不足則覺其為小矣水穀之海有餘則腹滿水穀之海不足則飢不受穀食姚氏曰胃氣有餘故腹脹滿胃氣不足故飢而不受穀食髓海有餘則輕徑多力自過其度髓海不足則腦轉耳鳴脛痠眩冒目無所見懈怠安臥姚氏曰精液補益腦髓而下流陰股故髓海有餘則足徑輕健而多力度骨度也髓從骨空循度而上通於腦故有餘則自過其度矣髓海不足則精液竭精液者所以濡空竅者也是以耳為之鳴目無所見液脫者骨屬屈伸不利故脛痠而懈怠安臥黃帝曰余已聞逆順調之奈何岐伯曰審守其輸而調其虛實無犯其害順者得復逆者必敗黃帝曰善吳氏曰審其輸則知其四海之通於經而經俞之外通於氣也調其虛實則有餘不足自和矣害謂經氣之逆復則反逆為順也五亂第三十四黃帝曰經脈十二者別為五行分為四時何失而亂何得而治岐伯曰五行有序四時有分相順則治相逆則亂黃帝曰何謂相順岐伯曰經脈十二者以應十二月十二月者分為四時四時者春秋冬夏其氣各異營衛相隨陰陽已和清濁不相干如是則順之而治黃帝曰何謂逆而亂岐伯曰清氣在陰濁氣在陽穀氣順脈衛氣逆行清濁相干亂於胸中是謂大悗故氣亂於心則煩心密默俯首靜伏亂於肺則俯仰喘喝接手以呼亂於腸胃則為霍亂亂於臂脛則為四厥亂於頭則為厥逆頭重眩僕悗音悶本經邪客篇曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉營氣者泌其津液注之於脈化而為血以營四末內注五臟六腑以應刻數焉此言宗氣積於胸中上貫心脈同營氣行於脈中以應呼吸漏下五味篇曰谷始入於胃其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道其大氣之摶而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入此言宗氣積於胸中上出於肺偕衛氣行於脈外以應呼吸漏下此營行脈中衛行脈外宗氣兩行營衛之道一呼一吸脈行六寸漏下二刻人二百七十息脈行十六丈二尺為一周漏下百刻人一萬三千五百息脈行五十度而大周於身此清氣在陰濁氣在陽營行脈中衛行脈外清濁之不相干也又曰衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於陰常從足少陰之分間行於五臟六腑此營衛相將偕行於脈外晝行陽二十五度夜行陰二十五度與營行脈中衛行脈外之各走其道清濁之不相干也經脈十二以應十二月者六臟六腑之經脈循度環轉行十六丈二尺為一周也分為四時者一日之中有四時朝則為春日中為夏日入為秋夜半為冬衛氣晝行於陽夜行於陰其氣各異營衛相隨陰陽相和而清濁不相干也夫循脈之營衛宗氣從胸而上出於心肺順脈而行以營四末內注五臟六腑以應刻數其營衛相隨晝行陽而夜行陰者與脈逆行從頭注於臂胻以行三陽之分夜則內行臟腑之陰與營行脈中衛行脈外之氣不相干也所謂清濁相干者循脈之營衛與行陰行陽之營衛相干是以亂於胸亂於心肺及亂於腸胃臂胻頭也黃帝曰五亂者刺之有道乎岐伯曰有道以來有道以去審知其道是謂身寶黃帝曰善願聞其道岐伯曰氣在於心者取之手少陰心主之輸氣在於肺者取之手太陰滎足少陰輸氣在於腸胃者取之足太陽陽明不下者取之三里氣在於頭者取之天柱大杼不知取足太陽滎輸氣在於臂足取之先去血脈後取其陽明少陽之滎輸道者謂各有循行之道路有道以來有道以去者言有道以來而清濁相干亦當有道以去而陰陽相和也故審知逆順之道是謂養身之寶取手少陰手太陰之滎輸者取氣以順其宗氣之上行也本經云宗氣流於海其上者走於息道其下者注於氣街又曰衝脈者十二經之海也與少陰之大絡起於腎下出於氣街取足少陰輸者順宗氣之下行也取足太陰陽明而復取之三里者先取氣而後取脈也取天柱大杼而復取之滎輸者先取脈而後取氣也蓋清濁相干乃經脈外內之血氣厥逆也經脈篇曰六經絡手陽明少陽之大絡起於五指間上合肘中逆氣在於臂足取之先去血脈後取其陽明少陽之滎輸者先去其脈中之逆使脈外之血氣溜注於脈中而陰陽已和也黃帝曰補瀉奈何岐伯曰徐入徐出謂之導氣補瀉無形謂之同精是非有餘不足也亂氣之相逆也黃帝曰允乎哉道明乎哉論請著之玉版命曰治亂也徐入徐出者導其氣之來去也營衛者精氣也同生於水谷之精故謂之同精出入補瀉非為有餘不足乃導亂氣之相逆也玉師曰上古治氣者著之玉版治血脈者著之金匱脹論第三十五黃帝曰脈之應於寸口如何而脹岐伯曰其脈大堅以澀者脹也黃帝曰何以知臟腑之脹也岐伯曰陰為臟陽為腑此承上文言衛氣之行於形身臟腑之外內有順有逆逆順不從在外則為脈脹膚脹在內則為臟腑之脹矣寸口堅大為陽脈澀為陰脈陰為臟陽為腑以脈之陰陽則知臟腑之脹矣黃帝曰夫氣之令人脹也在於血脈之中耶臟腑之內乎岐伯曰三者皆存焉然非脹之舍也黃帝曰願聞脹之舍岐伯曰夫脹者皆在於臟腑之外排臟腑而郭胸脅脹皮膚故命曰脹姚士因曰此病在氣而及於臟腑血脈之有形故三者皆存焉然非脹之舍也脹之舍在內者皆在於臟腑之外空郭之中在外者脹於皮膚腠理之間故命曰脹謂脹在無形之氣分也黃帝曰臟腑之在胸脅腹裡之內也若匣匱之藏禁器也各有次舍異名而同處一域之中其氣各異願聞其故王芳侯曰帝問臟腑在於胸腹之內如匣匱所藏之禁器而各有界畔五臟六腑其氣各異今脹氣皆在於臟腑之外何以分別某臟某腑之脹乎此下有岐伯所答之缺文黃帝曰未解其意再問岐伯曰夫胸腹臟腑之郭也膻中者心主之宮城也胃者太倉也咽喉小腸者傳送也胃之五竅者閭里門戶也廉泉玉英者津液之道也故五臟六腑者各有畔界其病各有形狀營氣循脈衛氣逆為脈脹衛氣並脈循分為膚脹三里而瀉近者一下遠者三下無問虛實工在疾瀉膻葉袒此言衛氣生於胃腑水穀之精日行於陽夜行於陰逆於陽則為脈脹膚脹逆於陰則為空郭之脹及五臟六腑之脹夫胸腹者臟腑之郛郭膻中者心主之宮城脹者皆在於臟腑之外排臟腑而郭胸脅此衛氣逆於陰而將為臟腑之脹矣胃主受納水穀為太倉而居中焦在上為咽喉主傳氣而送水穀在下口為小腸主傳送糟粕津汁胃之五竅猶閭里之門戶蓋水穀入胃其味有五津液各走其道酸先入肝苦先入心甘先入脾辛先入肺咸先入腎五臟主藏水穀之精者也其流溢於下焦之津液從任脈而出於廉泉玉英以濡上之空竅故五臟六腑各有界畔其病各有形狀也如營氣循脈衛氣逆於脈中則為脈脹若並脈而循行於分肉則為膚脹蓋衛氣雖常然並脈循行於分肉而行有逆順若並脈順行而乘於脈中則為脈脹行於膚肉則為膚脹此皆衛氣之逆行故曰若順逆也當取足陽明胃經之三里而瀉之在於膚脈而近者一瀉在於城郭而遠者三下無問虛實工在疾瀉蓋留之則為臟腑之脹矣衛氣出於太倉故瀉胃之三里姚氏曰營氣循脈衛氣逆為脈脹與上章之營氣順脈衛氣逆行同義吳氏曰衛氣逆於空郭之中則為鼓脹著於募原而傳送液道阻塞者則為腸胃之脹門戶界畔不清者則為五臟之脹此皆胃腑之門戶道路故瀉足之三里若病久而成虛者瀉之反傷胃氣故曰工在疾瀉疾瀉者治其始蒙也楊元如曰逆則生長之機漸消故久而未有不成虛者審其傳送阻塞者瀉之門戶液道不通者通之界畔不清者理之正氣不足者補之補瀉疏理兼用斯為治脹之良法若新病而不大虛者急宜攻之可一鼓而下朱永年曰醫者只知瀉以消脹焉知其中之門戶道路知其門戶道路可以批卻導窾矣故本經乃端本澄源之學倪沖之曰廉泉玉英者津液之道也液道不通則空竅閉塞而氣逆於中矣故治脹者當先通其津液故曰若欲下之必先舉之朱衛公曰液者所以灌精濡空竅者也其彆氣出於耳而為聽宗氣上出於鼻而為臭濁氣出於胃走唇舌而為味其精陽氣上走於目而為睛故液道不通則諸氣皆逆矣黃帝曰願聞脹形岐伯曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛六腑脹胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者脹鳴而痛濯濯冬日重感於寒則飧泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息吳氏曰此衛氣逆於城郭之中而為臟腑之脹也願聞脹形者問五臟六腑之脹形始在無形而及於有形也凡此諸脹者其道在一明知逆順針數不失瀉虛補實神去其室致邪失正真不可定粗之所敗謂之夭命補虛瀉實神歸其室久塞其空謂之良工姚氏曰其道在一者謂三合而為一也逆順者謂營行脈中衛行脈外相逆順而為行也塞其空者外無使經脈膚腠疏空內使臟腑之神氣充足自無厥逆之患矣此良工治未病也莫仲超曰上節言無問虛實工在疾瀉此復曰瀉虛補實神去其室是又當審其邪正而補瀉之聖人之慮深矣學者不可不深體之王芳侯曰神者先天之精水穀之精兩精相摶合而為神黃帝曰脹者焉生何因而有岐伯曰衛氣之在身也常然並脈循分肉行有逆順陰陽相隨乃得天和五臟更始四時有序五穀乃化然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相摶乃合為脹也此言衛氣逆行因下焦寒氣之所致也夫衛氣之在身也常然並脈循於分肉而行有逆順蓋衛氣與脈內之營氣相逆順而行也陰陽相隨者謂脈外之營衛相將而行陰陽清濁有逆有順乃得天和應天氣之右旋而西轉經水皆歸於東流得天地自然之和氣也五臟更始者謂營行於臟腑經脈外內出入陰陽遞更終而復始也四時有序者謂衛氣日行於陽夜行於陰應四時寒暑之往來也陰陽和平五穀乃化而營衛生焉此先論其陰陽和調然後論厥逆之因乃厥氣在下營衛留止寒氣逆上真邪相攻兩氣相摶乃合為脹也黃帝曰善何以解惑岐伯曰合之於真三合而得帝曰善真者所受於天與穀氣並而充身者也下焦先天之真元上與陽明相合化水穀之精微生此營衛二氣元真之氣通會於腠理與營衛合併而充行於形身者也故營衛二氣合之於真元三合而得其厥逆之因矣如天真之氣厥逆在下則營衛之氣留止於上矣下焦寒水之氣上逆則真邪相攻營衛兩氣相摶乃合而為脹也吳氏曰元真之氣天乙之真元也與寒水之氣相合故真邪相摶則真氣反厥於下而寒氣反逆於上矣真氣不得上合於營衛則營衛留止矣黃帝問於岐伯曰脹論言無問虛實工在疾瀉近者一下遠者三下今有其三而不下者其過焉在岐伯對曰此言陷於肉肓而中氣穴者也不中氣穴則氣內閉針不陷肓則氣不行上越中肉則衛氣相亂陰陽相逐其於脹也當瀉不瀉氣故不下三而不下必更其道氣下乃止不下復始可以萬全烏有殆者乎其於脹也必審其蠌當瀉則瀉當補則補如鼓應桴惡有不下者乎肓音荒蠌之忍切與疹同此論衛氣逆於內而為臟腑之脹者有城郭募原之分也募原者臟腑之膏肓也夫衛氣之逆於內而為脹者在於宮城空郭之中故取之三里三下而已今有其三而不下者此陷於肉肓而中氣穴故也故針不中氣穴則氣閉於內而不得外出針不陷肓則氣不行而不能上越故三而不下者必更其道取之氣穴惡有不下者乎按氣穴有三百六十五以應一歲即上紀之胃脘下紀之關元諸穴非溪谷之會是以中肉則衛氣相亂陰陽相逐蓋衛氣行於皮膚臟腑之肉理今入於氣穴故不當取之肉也姚氏曰按金匱玉函云腠者是三焦通會元真之處理者是皮膚臟腑之紋理也夫臟腑之紋理乃臟腑募原之肉理而肉理之中有脈系衛氣陷於肓膜而入於脈絡故當取之氣穴也王芳侯曰按素問有氣府論氣穴論總屬手足三陰三陽之經脈而分腑與穴者謂腑者藏也壓遏血氣之藏於內也穴者窟也氣從此而出入者也五癃津液別第三十六黃帝問於岐伯曰水穀入於口輸於腸胃其液別為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣並則為泣中熱胃緩則為唾邪氣內逆則氣為之閉塞而不行不行則為水脹余知其然也不知其所由生願聞其道吳氏曰此章論水穀所生之津液各走其道別而為五如五道癃閉則為水脹五別者為汗為溺為唾為淚為髓五癃者液不滲於腦而下流陰陽氣道不通四海閉塞三焦不瀉而津液不化水穀留於下焦不得滲於膀胱則水溢而為水脹因以名篇上章論氣脹之因此章論水脹之因得其因則知所以治矣岐伯曰水穀皆入於口其味有五各注其海津液各走其道故三焦出氣以溫肌肉充皮膚為其津其流而不行者為液吳氏曰此論水穀之精別而為津為液也胃者五臟六腑之海也水穀皆入於胃五臟六腑皆稟氣於胃五味各歸其所喜其津液各走其道隨三焦出氣以溫肌肉充皮膚者為津其流而不行者為液流者淖澤注於骨補益腦髓灌精而濡空竅者也天暑衣厚則腠理開故汗出寒留於分肉之間聚沫則為痛此言津之為汗也腠理者分肉之紋理津隨三焦出氣淖注於皮膚肌肉之間故腠理開則汗大泄如有寒而留聚於分肉之間則排裂分肉而為痛沫者津聚而為沫也天寒則腠理閉氣濕不行水下流於膀胱則為溺與氣姚氏曰此言津之為溺也天寒則腠理閉三焦之氣因濕而不行津水下流於膀胱則為溺與氣氣者膀胱為州都之官津液藏焉氣化而出者為溺藏於膀胱者化生太陽之氣愚按為汗為溺為血為髓皆水穀津液之化伯因帝問而分別答之言津隨寒暑之氣而外內出入然一日之中有四時而飲食衣服亦有寒溫厚薄讀者不以文害義庶為得之五臟六腑心為之主耳為之聽目為之候肺為之相肝為之將脾為之衛腎為之主外故五臟六腑之津液盡上滲於目心悲氣並則心系急心系急則肺舉肺舉則液上溢夫心系與肺不能盡舉乍上乍下故咳而泣出矣此論五臟六腑之津液上滲於目而為泣由心悲肺舉而出也心為君主之官乃五臟六腑之主耳目者上之空竅津液之所注也將相衛者為君主之臣使也腎主外者腎主藏津液所以灌精濡空竅者也心悲氣並者心悲則臟腑之氣皆上並於心聽令於君主也氣並於心則心系急心系急則肺舉肺乃心之蓋也肺舉則液上溢肺主氣而水隨氣行也心系與肺不能盡舉乍上乍下下則為咳上則泣出矣中熱則胃中消穀消穀則蟲上下作腸胃充郭故胃緩胃緩則氣逆故唾出姚氏曰此言液之為唾也按口問篇曰胃緩則廉泉開故涎下補足少陰蓋任脈起於足少陰之陰中而上出於廉泉胃緩則少陰之氣不與陽明相合反上逆於廉泉則水液隨之故涎唾也五穀之精液和合而為高者內滲入於骨空補益腦髓而下流於陰股此言精液之為髓也夫腎主藏精而主骨和合而高者五穀之液與腎臟之精相和合而滲入於骨空上行而高者從骨空而補益腦髓復從髓空而下流陰股此精液淖注於骨而為髓先上益於腦而復下流故曰五臟之精液和合而為高者姚氏曰本經云谷入氣滿淖澤注於骨骨屬屈伸補益腦髓是謂液又曰腎者精之處也其華在發其充在骨是谷之液腎之精並注於骨而為髓髓者以腦為主故曰和合而高者陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛痠陰陽氣道不通四海閉塞三焦不瀉津液不化水穀並於腸胃之中別於回腸留於下焦不得滲膀胱則下焦脹水溢則為水脹此津液五別之逆順也此五液閉癃而為腰痛水脹諸病也陰陽不和者少陰與陽明之不和也陰陽之氣不和則液與精不合使液溢於骨外而下流於陰矣液溢於外則髓液皆減而下是不能為高矣下流過度則骨虛而腰痛脛痠矣此髓道之閉癃也陰陽氣道不通則津液不得注於海而四海閉塞矣三焦之氣不能通瀉於肌腠而津液不化矣濟泌之汁不得滲於膀胱而下焦脹矣水溢於下則上逆而為水脹矣此津液五別之逆順也
