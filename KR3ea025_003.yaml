body:
  text: 卷三四時氣第十九黃帝問於岐伯曰夫四時之氣各不同形百病之起皆有所生灸刺之道何者為定岐伯答曰四時之氣各有所在灸刺之道得氣穴為定故春取經血脈分肉之間甚者深取之間者淺刺之夏取盛經孫絡取分間絕皮膚秋取經俞邪在腑取之合冬取井滎必深之留之間去聲此篇論四時之氣出入於皮膚脈絡而皮肉筋骨乃六腑之外合故百病之起有因於在外之皮膚脈肉筋骨而及於內之六腑者有因病六腑之氣而及於外合之形層者內因外因皆有所生知其氣之出入則知所以治矣四時之氣各有所在故春取經脈於分肉之間夏取盛經孫絡分肉皮膚蓋春夏之氣從內而外也秋取經俞邪在腑取之合此秋氣之復從外而內也冬取井滎必深而留之謂冬氣之藏於內也此人氣之出入應天地之四時是以灸刺之道得氣穴為定按本藏篇曰肺合大腸大腸者皮其應心合小腸小腸者脈其應肝合膽膽者筋其應脾合胃胃者肉其應腎合三焦膀胱三焦膀胱者腠理毫毛其應乃臟合腑而腑合於形層是以有病溫瘧皮水之在外者有腸中不便腹中常鳴之在腑者溫瘧汗不出為五十九痏此外因之邪病在於骨髓也素問瘧論曰溫瘧者得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也是以汗不出則邪不能去當為五十九痏以第四針五十九刺骨風㽷膚脹為五十七痏取皮膚之血者盡取之㽷即水以水為疾也此外因之邪病在於皮膚也㽷水病也因汗出遇風風水之邪留於皮膚而為腫脹也為五十七痏取皮膚之血者盡取之蓋邪在皮膚當從膚表而出五十七痏詳素問水熱穴論飧泄補三陰之上補陰陵泉皆久留之熱行乃止飧葉孫此內因之病在脾而為腫泄也脾為濕土乃陰中之至陰脾氣虛寒則為飧泄故當補三陰之上補陰陵泉皆久留之候熱氣行至乃止三陰之上足三陰交穴陰陵泉脾之合穴也朱濟公問曰經義只病在六腑奚又有脾臟之飧泄曰陽明不從標本從中見太陰之化脾與胃以膜相運陰陽相合為臟腑血氣之生原是以下篇論五臟病而兼論胃此篇論六腑病而有脾轉筋於陽治其陽轉筋於陰治其陰皆卒刺之卒焠同筋有陰陽以應四時十二月故轉筋於陽治其陽轉筋於陰治其陰焠刺者燒針劫刺以取筋痹徒㽷先取環谷下三寸以鈹針針之已刺而筩之而內之入而復之以盡其水必堅來緩則煩悶來急則安靜間日一刺之㽷盡乃止飲閉藥方刺之時徒飲之方飲無食方食無飲無食他食百三十五日筩音桶內音訥此內因脾胃虛寒而水溢於肉理也徒眾也土位中央主灌溉於四旁土氣虛則四方之眾水反乘侮其土而為水病也夫谿谷有三百六十五穴會肉之大會為谷大會者手足股肱之大肉也環谷者取手足之分肉以瀉其水也筩筒也以如筒之針而內之入而復出以盡其水水腫於肌肉則浮而軟水盡則肉必堅矣來緩則煩悶來急則安靜也水雖在於肌腠而其原在內也飲閉藥者謂水乃盡當飲充實脾土之藥勿使水之復乘也方刺之時欲使水盡出於外故徒飲之蓋脾主肌肉㽷病之因本於脾脾水盡而後能土氣充實也夫飲入於胃上輸於脾肺食氣入胃淫散於心肝飲食併入藉三焦之氣蒸化精微濟泌別汁中焦氣虛則水穀不能分別矣是以方飲無食方食無飲蓋言土氣虛而水聚於中者由三焦元氣虛也三焦者通會元真於肌腠三焦元真之氣虛則膚腠空疏而水溢於內矣無食他食者惟食穀食以養土氣也土之成數在十而分旺於四時八節調養百三十五日者逾九節候而土氣復也著痹不去久寒不已卒取其三里此邪留於骨節而為痹也素問痹論曰濕勝為著痹蓋濕流於關節故久寒不已當卒取其三里取陽明燥熱之氣以勝其寒濕也沈亮宸曰谿谷屬骨此承上文肌腠未盡之水流於關節則為著痹故取陽明之三里從腑以瀉臟也骨為幹沈亮宸曰此承上文而言骨之為病在骨之髓節也乾者如木干之堅勁是故溫瘧之邪藏於骨髓濕痹之氣流於關節其骨如干而不受邪之所傷莫云從曰五運行論云腎生骨髓髓生肝骨空論論骨節之交皆有髓空以滲精髓蓋邪害空竅而直骨堅勁不受邪傷即骨之痠痛病在髓節而應於骨也腸中不便取三里盛瀉之虛補之沈亮宸曰此病在三焦而為腸中不便也三焦之氣蒸化水穀濟泌別汁水穀者常並居於胃中成糟粕而俱下於大腸是以腸中不便者三焦之氣虛也三焦之部署在胃腑上中下之間故獨取足陽明之三里邪盛者瀉之正虛者補之厲風者素刺其腫上已刺以銳針針其處按出其惡氣腫盡乃止常食方食無食他食此邪病之在脈也素問風論曰風寒客於脈而不去名曰厲風腫者脈中之營熱出於跗肉而為腫也惡氣者惡厲之邪留而不去則使其鼻柱壞而色敗皮膚瘍潰故當出其惡氣腫盡乃止常食方食無食他食者謂當恬淡其飲食無食他方之異品也腹中常鳴氣上衝胸喘不能久立邪在大腸刺肓之原巨虛上廉三里肓音荒此邪在大腸而為病也大腸為傳導之官病則其氣反逆是以腹中常鳴氣上衝胸喘不能久立膏肓即臟腑之募原膏在上而肓在下肓之原在臍下一寸五分名曰脖胦乃大腸之分巨虛上廉在三里下三寸取巨虛三里者大腸屬胃也小腸控睪引腰脊上衝心邪在小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃熏肝散於肓結於臍故取之肓原以散之刺太陰以予之取厥陰以下之取巨虛下廉以去之按其所過之經以調之睪音高沈亮宸曰控睪引腰脊上衝心者小腸之疝氣也肓乃腸外之脂膜故取肓之原以散之刺手太陰以奪之取足厥陰以下之取巨虛下廉以去小腸之邪按其所過之經以調其氣善嘔嘔有苦長太息心中憺憺恐人將捕之邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔膽取三里以下胃氣逆則刺少陽血絡以閉膽逆卻調其虛實以去其邪此邪在膽而為病也嘔有苦膽氣逆在胃也膽氣欲升故長太息以伸之病則膽氣虛故心中憺憺恐人將捕之病在膽逆在胃者木邪乘土也膽汁通於廉泉玉英故膽液泄則口苦膽邪在胃故胃氣逆則嘔苦也取三里以下胃氣之逆刺少陽經之血絡以閉膽逆調其虛實以去其邪飲食不下膈塞不通邪在胃脘在上脘則刺抑而下之在下脘則散而去之此邪在胃脘而為病也食飲不下膈塞不通如邪在上脘則不能受納水穀故當抑而下之如邪在下脘則不能傳化糟粕故當散而去之沈亮宸曰食飲不下膈塞不通病在上也然下焦阻塞則上焦亦為之不利蓋水穀入口則胃實而腸虛食下則腸實而胃虛如下氣閉而食不下則胃實而上焦膈塞矣是以經文總言其病而治分上下學者體會毋忽小腹痛腫不得小便邪在三焦約取之太陽大絡視其絡脈與厥陰小絡結而血者腫上及胃脘取三里此邪在膀胱而為病者三焦下俞出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺小腹腫痛不得小便邪在三焦約也故當取足太陽之大絡小絡孫絡也足太陽厥陰之絡交絡於跗膕之間視其結而血者去之蓋肝主疏泄結在厥陰之絡亦不得小便矣如小腹腫上及胃脘取足三里睹其色察其以知其散復者視其目色以知病之存亡也一其形聽其動靜者持氣口人迎以視其脈堅且盛且滑者病日進脈軟者病將下諸經實者病三日已氣口候陰人迎候陽也睹其色者分別五行之色也如色青者內病在膽外病在筋色赤者內病在小腸外病在脈也察其以者察其所以然之病或病因於外或病因於內或因於外而病及於內者或因於內而病及於外者散者邪散而病已也復者病在外而復及於內病在內而復及於外也視其目色者察其血色也蓋在外之皮肉筋骨內應於六腑六腑內合五臟外內之病皆本於五行之色而五臟之血色皆見於目故視其目色以知病之存亡也一其形者靜守其神形與神俱也聽其動靜者持氣口人迎以視脈之堅滑軟靜而知病之進退也諸經實者邪在經脈也氣口人迎候三陰三陽之氣也沈亮宸曰五臟六腑應天之五運六氣五運主中六氣主外五運主歲六氣主時五臟內合六腑六腑外應六氣陰陽相合外內交通故本篇首定四時末論臟腑陰陽血氣乃人與天地相參陰陽離合之大道也五邪第二十邪在肺則病皮膚痛寒熱上氣喘汗出咳動肩背取之膺中外俞背三節五臟之旁以手疾按之快然乃刺之取之缺盆中以越之此承上章復論邪在五臟而病於外也夫六腑之應於皮肉筋骨者臟腑雌雄之相合也五臟之外應者陰陽之氣皆有出有入也肺主皮毛故邪在肺則病皮膚痛寒熱者皮寒熱也蓋臟為陰皮膚為陽表裡之氣外內相乘故為寒為熱也上氣喘者肺氣逆也汗出者毛腠疏也咳動肩背者咳急息肩肺俞之在肩背也膺中外俞肺脈所出之中府雲門處背三節五臟之旁乃肺俞旁之魄戶也缺盆中者手陽明經之扶突蓋從腑以越陰臟之邪邪在肝則兩脅中痛寒中惡血在內行善掣節時腳腫取之行間以引脅下補三里以溫胃中取血脈以散惡血取耳間青脈以去其掣肝脈循於兩脅故邪在肝則脅中痛兩陰交盡是為厥陰病則不能生陽故為寒中蓋邪在肝脅中痛乃病經臟之有形寒中病厥陰之氣也內脈內也行善掣節者行則掣節而痛此惡血留於脈內脈度循於骨節也時腳腫者厥陰之經氣下逆也當取足厥陰肝經之行間以引脅下之痛補足陽明之三里以溫寒中取血脈以散在內之惡血耳間青脈乃少陽之絡循於耳之前後入耳中蓋亦從腑陽以去其掣節邪在脾胃則病肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘若俱不足則有寒有熱皆調於三里脾胃主肌肉故邪在脾胃則肌肉痛脾乃陰中之至陰胃為陽熱之腑故陽明從中見太陰之化則陰陽和平雌雄相應若陽氣有餘陰氣不足則熱中而消穀善飢若陽氣不足陰氣有餘則寒中而腸鳴腹痛陰陽俱有餘者邪病之有餘俱不足者正氣之不足皆當調之三里而補瀉之亦從腑而和臟也邪在腎則病骨痛陰痹陰痹者按之而不得腹脹腰痛大便難肩背頸項痛時眩取之湧泉崑崙視有血者盡取之在外者筋骨為陰病在陰者名曰痹陰痹者病在骨也按之而不得者邪在骨髓也腹脹者臟寒生滿病也腰者腎之府也腎開竅於二陰大便難者腎氣不化也肩背頸項痛時眩者臟病而及於腑也故當取足少陰之湧泉足太陽之崑崙視有血者盡取之邪在心則病心痛喜悲時眩僕視有餘不足而調之其輸也邪在心邪薄於心之分也喜為心志心氣病則虛故喜悲神氣傷故時眩僕視有餘不足而調其輸也按皮脈肉筋骨五臟之外合也邪在心而不病脈者手厥陰心主包絡主脈也邪客篇曰心者五臟六腑之大主也精神之所舍也其臟堅固邪勿能容也容之則傷心傷心則神去神去則死矣故諸邪在於心者皆在於心之包絡包絡者心主之脈也本輸者皆因其氣之虛實疾徐以取之故邪在心邪在於包絡心之分也視有餘不足而調之者因心氣之虛實而調之也此邪薄於心之分以致心氣之有餘不足邪不在心故不外應於脈沈亮宸曰邪干臟則死非獨傷於心也曰邪在肺邪在肝者邪薄於五臟之分病臟氣而不傷其臟真故首言三節五臟之旁以手疾按之快然乃刺之蓋五臟之旁乃五臟之氣舍也病在氣當取之氣取之氣故以手按之則快然曰三節曰五臟之旁俱宜體會寒熱病第二十一皮寒熱者不可附席毛髮焦鼻槁臘不得汗取三陽之絡以補手太陰臘思亦切上二章論五臟六腑以及外合之皮肉筋骨為病此章論病三陰三陽之經氣而為寒為熱也病在皮故不可附席皮膚之血氣以滋毛髮皮氣傷故毛髮焦也臘干也肺主皮毛開竅在鼻故鼻為之乾槁此邪在表而病太陰太陽之氣當從汗解如不得汗宜取太陽之絡以發汗補手太陰以資其津液焉按以上三章經旨相連故無君臣問答之辭其病在腑臟經氣之不同故分為三章此章通論陰陽之經氣為病故篇名寒熱寒熱者陰陽之氣也肌寒熱者肌痛毛髮焦而唇槁臘不得汗取三陽於下以去其血者補足太陰以出其汗脈外之血氣充膚熱肉生毫毛故病在肌則肌肉痛而毛髮焦也脾主肌肉開竅於口故唇口槁臘如不得汗當取三陽於下以去其血補足太陰以資水穀之汗三陽太陽也蓋寒熱雖在肌而汗從表出也莫云從曰肺之鼻竅脾之口竅皆在氣分上看骨寒熱者病無所安汗注不休齒未槁取其少陰於陰股之絡齒已槁死不治骨厥亦然骨寒熱者病少陰之氣也病無所安者陰躁也少陰為生氣之原汗注不休者生氣外脫也齒未槁者根氣尚存取足少陰於陰股之絡以去其邪齒已槁死不治矣此邪病少陰之氣邪正相搏故為寒熱邪去則愈正脫則死矣骨厥者謂腎臟為病而腎氣厥逆也夫聖人南面而立前曰廣明後曰太衝太衝之地名曰少陰少陰之上名曰太陽是少陰為生陽之本然腎臟亦為生氣之原故曰骨厥亦然蓋以分別骨寒熱者病少陰之氣也沈亮宸曰以上三節病在三陰之氣故曰取三陽之絡曰取少陰於陰股之絡而不言經穴上章之病在五臟則曰行間三里崑崙湧泉而不言三陰三陽骨痹舉節不用而痛汗注煩心取三陽之經補之骨痹舉節不用而痛汗注煩心病在少陰之氣而入深也故當取太陽之經補之以去其邪夫經脈為里浮見於皮部者為絡上節論三陰之氣而為寒熱者病在於膚表故取之絡此病氣入深故取之經此篇論三陰三陽之經氣為病有病在氣而不及於經者有病在氣而轉入於經者有經氣之兼病者蓋陰陽六氣合手足之六經也沈亮宸曰冬者腎臟血氣在中內著骨髓通於五臟骨痹冬痹者汗注煩心病通於臟也邪氣者常隨四時之氣血而入客也故下文曰冬取經輸經輸者治骨髓故取三陽之經以發越陰臟之痹莫云從曰以本經之法施於治道如鼓應桴馬氏退理以先針致使後學咸視為針刺而忽之不知針刺之中有至道存焉身有所傷血出多及中風寒若有所墮墜四肢懈惰不收名曰體惰取其小腹臍下三結交三結交者陽明太陰也臍下三寸關元也此言皮膚之血氣有傷當取之陽明太陰也夫首言皮腠之寒熱者病三陰之氣也此言皮腠之血氣受傷亦取之太陰陽明陰陽血氣之相關也身有所傷血出多傷其血矣及中風寒傷其營衛矣夫人之形體藉氣呴而血濡血氣受傷故若有所墮墜四肢懈惰不收名曰體惰夫充膚熱肉之血氣生於陽明水穀之精流溢於中由衝任而布散於皮腠故當取小腹臍下之陽明太陰任脈之關元以助血氣之生原三結交者足太陰陽明與任脈交結於小腹臍下也沈亮宸曰首言三陰之氣本於裡陰而外主於皮毛肌骨下節論三陽之氣從下而生而上出於頸項頭面此言膚表之血氣亦由下而上充於皮膚蓋陰陽血氣皆從下而上也厥痹者厥氣上及腹取陰陽之絡視主病也瀉陽補陰經也頸側之動脈人迎人迎足陽明也在嬰筋之前嬰筋之後手陽明也名曰扶突次脈手少陽也名曰天牖次脈足太陽也名曰天柱腋下動脈臂太陰也名曰天府此言陽氣生於陰中由下而上也厥痹者痹閉於下以致三陽之氣厥逆只及於腹而不能上行於頭項也取陰陽之絡視主病者視厥痹之在何經也瀉陽者瀉其厥逆而使之上也補陰者陽氣生於陰中也次脈者從喉旁而次序於項後即本輸篇之所謂一次脈二次脈也蓋三陽之經氣皆循頸項而上充於頭面也腋下動脈手太陰也太陰統主陰陽之氣者也陽明頭痛胸滿不得息取之人迎此下五節承上文而分論厥逆之氣各有所見之證各隨所逆之經以取之陽明頭痛陽明之氣厥逆於腹不得循人迎而上充於頭是以頭痛逆於中焦故胸滿不得息當取之人迎以通其氣暴喑氣鞕取扶突與舌本出血鞕梗同夫金主聲心主言手陽明主氣而主金故陽明氣逆於下則暴喑而氣梗矣取扶突與舌本出血則氣通而音聲出矣暴聾氣蒙耳目不明取天牖手少陽之脈入耳中至目銳眥少陽之氣厥於下則上之經脈不通是以暴聾氣蒙耳目不明當取之天牖暴攣癇眩足不任身取天柱足太陽主筋故氣厥則暴攣而足不任身矣太陽之脈起於目內眥之睛明氣不上通故癇眩也當取之天柱暴癉內逆肝肺相搏血溢鼻口取天府癉消癉暴癉暴渴也肝脈貫肺故手太陰之氣逆則肝肺相搏肺主氣而肝主血氣逆於中則血亦留聚而上溢矣肺乃水之生原搏則津液不生而暴癉矣皆當取手太陰之天府以疏其搏逆夫暴疾一時之厥證也此因於氣厥故用數暴字此為大牖五部牖窗也頭面之穴竅如樓閣之大牖所以通氣者也氣厥於下以致在上之經脈不通而為耳目不明暴喑癇眩諸證蓋言三陽之氣由下而生從上而出故總結曰此為大牖五部以下復論其經絡焉沈亮宸曰人迎扶突天牖天柱頭氣之街也腋下動脈胸氣之街也莫云從問曰本輸篇論次脈乃手足三陽之六經此節只言手陽明少陽足陽明太陽為大牖何也曰太陽之氣生於膀胱水中少陽之氣本於命門相火陽明之氣生於中焦胃腑在經脈有手足之六經在二氣只論三陰三陽也其手陽明與太陰為表裡主行周身之氣故合為五大牖焉臂陽明有入頄遍齒者名曰大迎下齒齲取之臂惡寒補之不惡寒瀉之足太陽有入頄遍齒者名曰角孫上齒齲取之在鼻頄與前方病之時其脈盛盛則瀉之虛則補之一曰取之出鼻外頄音仇齲邱禹切上節論三陽之氣循次而上出於大牖此復論氣從絡脈以相通所謂絡絕則徑通如環無端莫知其紀也蓋氣之出於大牖者從氣街而出於脈外氣之行於脈中者從絡脈而貫於脈中外內環轉之無端故莫知其紀也顴鼻交處為頄齲齒痛也臂陽明有入頄遍絡於齒者名曰大迎大迎乃足陽明之經穴此手陽明之氣從絡而貫於足陽明之經故下齒痛當取之臂陽明惡寒飲者虛也當補之不惡寒飲者實也當瀉之足太陽有入頄遍絡於齒者名曰角孫角孫乃手少陽之經穴此足太陽之氣貫於手少陽之經故上齒痛者當取之鼻與頄前乃太陽之絡脈也按營血宗氣之所營行者經脈也足太陽之絡不入於齒中此非經脈亦非支別乃微細之系以通二陽之氣者也故方病之時其脈盛乃氣之太過也太過則瀉之不及則補之莫云從曰三陽之氣分則有三合則為一一陽之氣下通於泉繞地環轉而復通貫於地中故遍歷於齒屬口對入齒者水臟之所生口者土之外候也足陽明有挾鼻入於面者名曰懸顱屬口對入系目本視有過者取之損有餘益不足反者益足陽明當作手太陽此總結三陽之六次脈也蓋三陽之氣上出於大牖者循手之陽明少陽足之陽明太陽而經脈之貫通則有手足六脈之相交矣故手太陽有挾鼻入於面者名曰懸顱懸顱乃足少陽之經穴此手太陽之氣從絡脈而通於足少陽之經也屬口對入上系目本視有過者取之過病也如病在太陽而太陽之絡有餘少陽之經不足則當損大陽之有餘益少陽之不足反是者又當益太陽也沈亮宸曰反者當從有過上看推此二句當知太陽之氣從絡脈而貫於少陽之經少陽之氣從絡脈而通於太陽之經也以上四脈亦然莫云從問曰陽明手足相交自然之道也太陽之與少陽相合其義何居曰太少之氣本於先天之水火猶兩錢所分之四象是以正月二月主於太少五月六月主於太少太少之相合也陽明者兩陽合明故曰陽明主於三月四月此陽明之自相交合也夫陰陽之道推變無窮明乎經常變易之理始可與言陰陽矣朱濟公問曰太陽之氣主皮毛陽明之氣主肌腠少陽之氣主樞脅今論三陽之氣又皆循經而上出於頭面焉曰此升降出入之道也陰陽之氣出入於外內故皮寒熱者取之太陽太陰肌寒熱者取三陽於下升降於上下故邪中於面則下陽明中於項則下太陽中於頰則下少陽二陽之氣運行於肌表故中於陽則溜於經經氣外內之相通也此升降出入之無息者也一息不運則失其機矣其足太陽有通項入於腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間入腦乃別陰蹺陽蹺陰陽相交陽入陰陰出陽交於目銳眥陽氣盛則瞋目陰氣盛則瞑目此言足太陽之氣貫通於陽蹺陰蹺也其者承上文而言言其足太陽又有通項入於腦者正屬目本名曰眼系在項中兩筋間入腦乃別絡於陰蹺陽蹺而陰陽相交於目銳眥陽蹺之氣入於陰蹺陰蹺之氣出於陽蹺如陽蹺之氣盛則張目陰蹺之氣盛則瞑目此太陽之氣又從眼系而貫通於陰陽之蹺脈也按脈度篇曰蹺脈者太陰之別起於然谷之後循胸上行屬目內眥合於太陽陽蹺而上行氣並相還則為濡目此言陰蹺之脈起於足少陰而上通於太陽陽蹺此節論太陽之氣通於陽蹺陰蹺故曰男子數其陽女子數其陰蓋陰蹺之脈通少陰之精水於陽蹺陽蹺之脈通太陽之氣於陰蹺男子以氣為主故男子數其陽女子以精血為主故女子數其陰氣為陽而血為陰也莫云從曰舉足行高曰蹺足少陰太陽乃陰陽血氣之生原陰蹺陽蹺主通陰陽血氣從下而上交於目目者生命之門也熱厥取足太陰少陽皆留之寒厥取足陽明少陰於足皆留之此論陰陽之氣不和而為寒厥熱厥也蓋在表之陰陽不和則為肌皮之寒熱發原之陰陽不和則為寒厥熱厥矣馬元臺曰少陽當作少陰少陰當作少陽按素問厥論曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥蓋以熱厥為足三陽氣勝則所補在陰故當取足太陰少陽皆留之以使針下寒也寒厥為足三陰氣勝則所補在陽故當取足陽明少陽於足者留之以俟針下熱也余伯榮曰取之於足者謂陽氣生於下也舌縱涎下煩悗取足少陰此言上下之陰陽不和也少陰之上君火主之而下為水臟水火之氣上下時交舌縱涎下煩悗者腎氣不上資於心火也故當取足少陰以通少陰之氣振寒洒洒鼓頷不得汗出腹脹煩悗取手太陰此言表裡之陰陽不和也內經云陽加於陰謂之汗膚表為陽腹內為陰在內之陰液藉表陽之氣宣發而為汗振寒洒洒鼓頷不得汗出腹脹煩悗者表裡之陰陽不和也故當取手太陰以疏皮毛之氣以行其汗液焉手太陰主通調水液四布於皮毛者也莫云從曰上節論上下此節論表裡乃陰陽之升降出入篇名寒熱者皆陰陽之不調也刺虛者刺其去也刺實者刺其來也此總論陰陽寒熱之不調因邪正虛實之有礙也虛者正氣之不足實者邪氣之有餘蓋邪氣實則正氣虛矣故刺虛者刺其氣之方去所謂追而濟之也刺實者刺其氣之方來所謂迎而奪之也迎之隨之以意和之可使氣調可使病已也春取絡脈夏取分腠秋取氣口冬取經輸凡此四時各以時為齊絡脈治皮膚分腠治肌肉氣口治筋脈經輸治骨髓此以人之形層深淺與四時之氣為齊也蓋人之血氣應天地之陰陽出入故春取絡脈夏取分腠春夏之氣從內而外也秋取氣口冬取經輸秋冬之氣復從外而內也此人之氣血隨天地四時之氣而外內出入者也齊者所以一之也凡此四時以應人之陰陽出入故各以時為齊故取絡脈者以治皮膚取分腠以治肌肉取氣口以治筋脈取經輸以治骨髓此又以四時之法以治皮肉筋骨之淺深蓋天氣有四時之出入而人有陰陽之形層故各以時為齊也五臟身有五部伏兔一腓二腓者腨也背三五臟之腧四項五此五部有癰疽者死夫在外者皮膚為陽筋骨為陰癰疽所發在於皮肉筋骨之間此言五臟各有五部而一部之陰陽不和即留滯而為癰矣伏兔腎之街也腨者脾之部也背者肺之俞也五臟俞者謂五椎之心俞也項者肝之俞也本經曰癰疽之發不從天下不從地出積微之所生也故五部之有癰疽者乃五臟漸積之郁毒外應於血氣之不和而為癰疽故五部有此者死按上章論五臟之邪外應於皮肉筋骨此言五臟各有五部而一部之中皆有陰陽血氣之流行所謂陰中有陽陽中有陰也余伯榮曰癰疽之發有因於風寒外襲者有因於喜怒不測食飲不節營衛不和逆於肉理乃發為癰陰陽不通兩熱相搏乃化為膿然有發於股臂而死者有發於項背而生者此又以邪毒之重輕正氣之虛實以別其死生然病及五臟者必死故因於外邪者善治治皮毛其次治肌肉因於內傷者使五臟之鬱氣四散於皮膚弗使癰腫於一部所謂始萌可救膿成則死此上工之治未病也病始於臂者先取手陽明太陰而汗出病始頭首者先取項太陽而汗出病始足脛者先取足陽明而汗出此分別形身上下各有所主之陰陽也夫身半以上手太陰陽明皆主之故病始於臂者先取手陽明太陰而汗出太陽之氣生於膀胱而上出於頭項故病始於頭首者先取項太陽而汗出身半以下足太陰陽明皆主之故病始足脛者先取足陽明而汗出曰始者謂病始於下者下行極而上始於上者上行極而下曰先者謂手足之陰陽雖各有所主然三陰三陽之氣上下升降外內出入又互相交通者也臂太陰可汗出足陽明可汗出故取陰而汗出甚者止之於陽取陽而汗出甚者止之於陰汗乃陰液生於陽明太陰主氣行於膚表水津四布乃氣化以通調故臂太陰可汗出水穀之津液從腠理發泄汗出溱溱故足陽明可汗出然汗液必由氣之宣發氣得液而後能充身澤毛故取陰而汗出甚者止之於陽取陽而汗出甚者止之於陰蓋陽為陰之固陰為陽之守也沈亮宸曰此篇論陰陽之不調而為寒熱之證宜從汗解故總結汗法數條凡刺之害中而不去則精泄不中而去則致氣精泄則病甚而恇致氣則生為癰疽也泄精者謂陰陽血氣生於精過傷則並傷其根原矣癰瘍者謂陰陽血氣營行於皮肉筋骨之間邪氣留客致正氣不行則生癰瘍矣本篇論陰陽寒熱緣邪正之實虛故以此節重出於篇末蓋以戒夫治病者慎勿再實實而虛虛也癲狂第二十二目眥外決於面者為銳眥在內近鼻者為內眥上為外眥下為內眥銳眥內眥者睛外之眼角也太陰之氣主約束目外角為銳眥內角為內眥者乃太陰之氣主乎外內之目眥也太陽為目上綱陽明為目下綱上為外眥下為內眥者乃太陽陽明之氣主於上下之目眥也手太陰主天足太陰主地太陽為開陽明為闔天地之氣晝明夜晦人之兩目晝開夜闔此人應天地之晝夜開闔者也一息之中有開有闔以應呼吸漏下者也天地開闔之氣不清陰陽出入之氣混濁則神志昏而癲狂作矣是以治癲狂之法獨取手足之太陰太陽陽明焉夫肺主皮毛目之拳毛天氣之所生也肌肉之精為約束地氣之所生也目眥之外內上下又統屬天地陰陽之氣而為開闔者也王芳侯曰癲狂之疾最為難治得此篇之理可批卻導窾矣癲疾始生先不樂頭重痛視舉目赤甚作極已而煩心候之於顏取手太陽陽明太陰血變而止夫癲狂之疾乃陰陽之氣先厥於下後上逆於巔而為病故通評虛實篇曰癲疾厥狂久逆之所生也又曰厥成為癲疾夫少陰者先天之水火太陰者後天之地土天地水火之氣上下平交者也厥則不平而為病矣水之精為志火之精為神先不樂者神志不舒也舉視目赤者心氣上逆也癲甚作極已而心煩者厥逆之氣上下於太陰陽明而復之於少陰之心主也五色篇曰庭者顏也首面上於闕庭王宮在於下極蓋謂天闕在上王宮在下故候之於顏者候天之氣色也身半以上為陽手太陰陽明皆主之故取手太陰陽明以清天氣之混濁取手太陽以清君主之心煩心主血血變則神氣清而癲疾止矣癲疾始作而引口啼呼喘悸者候之手陽明太陽左強者攻其右右強者攻其左血變而止此論厥氣上乘致開闔不清而為癲疾也啼悸者太陽之氣混亂也喘呼者陽明之氣不清也太陽主開陽明主闔故當候之手陽明太陽夫天地開闔之氣左旋而右轉故左強者攻其右右強者攻其左莫云從曰手太陽者心之表手陽明者肺之表在心為啼悸在肺為喘呼因開闔不清而啼悸喘呼者病在表而及於內也癲疾始作先反僵因而脊痛候之足太陽陽明太陰手太陽血變而止癲疾始作先反僵者厥氣逆於寒水之太陽也因而脊痛者寒氣乘於地中也脊背也易曰艮其背艮為山止而不動乃坤土之高阜者故當候之足太陽陽明太陰按首節論厥氣上乘於天及太陽君火次節論開闔之不清此節論厥氣逆於水土之中蓋天地水火之氣不清而為癲疾也復取手太陽者水火神志相交足太陽之水邪上逆必致心主之神氣昏亂故俟其血變則神氣清矣沈亮宸曰以上三證曰始生始作蓋厥氣始上逆於太陰太陽陽明之氣而未及乎有形之筋骨也疾在氣者易於清散其病已入深雖司命無奈之何故骨脈之癲疾皆多不治使良醫得早從事則疾可已身可治也奈人之所病病疾多而醫之所病病道少治癲疾者常與之居察其所當取之處病至視其有過者瀉之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者骶骨也此言治癲疾者當分別天地水火之氣而治之太陽之火日也隨天氣而日繞地一周動而不息者也地水者靜而不動者也常與之居者得其病情也察其所當取之處視其有過者瀉之謂視疾之在於手足何經而取之也匏壺葫蘆也致其血於壺中發時而血獨動者氣相感召也如厥氣傳於手太陰太陽則血於壺中獨動感天氣太陽之運動也不動者病入於地水之中故當灸骶骨二十壯經云陷下則灸之此疾陷於足太陽太陰故當灸足太陽之骶骨二者陰之始十乃陰之終地為陰而水為陰也朱永年曰素問長刺節論云初發歲一發不治則月一發名曰癲疾夫歲一發者日一歲而一周天日以應火也月一發者月一月而一周天月以應水也骨癲疾者顑齒諸腧分肉皆滿而骨居汗出煩悗嘔多沃沫氣下泄不治顑葉坎面也悗音瞞悶也齒者骨之餘分肉屬骨是以骨癲疾者顑齒諸分肉皆滿骨居者骨肉不相親也汗者血之液汗出煩悗者病在足少陰腎而上及於手少陰心也嘔多沃沫太陰陽明之氣上脫也腎為生氣之原氣下泄少陰之氣下泄也陰陽上下離脫故為不治莫云從曰病入骨髓雖良醫無所用其力故不列救治之法此下三證病在有形之筋骨故不言太少之陰陽筋癲疾者身倦攣急大刺項大經之大杼脈嘔多沃沫氣下泄不治病在筋故身倦攣而脈急大足太陽主筋故當刺膀胱經之大杼嘔多沃沫氣下泄者病有形之臟腑而致陰陽之氣脫也脈癲疾者暴僕四肢之脈皆脹而縱脈滿盡刺之出血不滿灸之挾項太陽灸帶脈於腰相去三寸諸分肉本輸嘔多沃沫氣下泄不治經脈者所以濡筋骨而利關節脈癲疾故暴僕也十二經脈皆出於手足之井滎是以四肢之脈皆脹而縱脈滿者病在脈故當盡刺之以出其血不滿者病氣下陷也夫心主脈而為陽中之太陽不滿者陷於足太陽也十二臟腑之經俞皆屬於太陽故當灸太陽於項間以啟陷下之疾帶脈起於季脅之章門橫束諸經脈於腰間相去季脅三寸乃太陽經俞之處也諸分肉本俞谿谷之俞穴也蓋使脈內之疾仍從分肉氣分而出癲疾者疾發如狂者死不治夫陰盛者病癲陽盛者病狂癲疾者疾發如狂者陰陽之氣並傷故死不治夫陰陽離脫者死陰陽兩傷者亦死莫云從曰陽病速故疾發用二者字以分陰陽狂始生先自悲也喜忘苦怒善恐者得之憂飢治之取手太陰陽明血變而止及取足太陰陽明此以下論狂疾之所生有虛而有實也先自悲者先因於腎虛也經云水之精為志精不上傳於志而志獨悲故泣出也喜忘善恐者神志皆虛也苦怒者肝氣虛逆也蓋肝木神志皆腎精之所生也此得之憂飢夫憂則傷肺飢則穀精不生肺傷則腎水之生原有虧穀精不生則腎精不足矣陰不足則陽盛而為狂取手太陰陽明者逆氣上乘於手太陰陽明瀉出其血而逆氣散矣及取足太陰陽明者補足太陰陽明資穀精以助腎氣也此節首論陰虛以致陽狂即末節之所謂短氣息短不屬動作氣索補足少陰去血絡也蓋癲狂乃在上之見證厥逆乃在下之始因故篇名癲狂而後列厥逆上工之治未病者治其始蒙也夫癲疾多因於陰實狂疾有因於陰虛故越人曰重陰者癲重陽者狂蓋陰虛則陽盛矣夫陰虛陽盛則當瀉陽補陰矣然陰精生於陽明而陽氣根於陰中陰陽互相資生之妙用學者細心體會大有裨於治道者也狂始發少臥不飢自高賢也自辨志也自尊貴也善罵詈日夜不休治之取手陽明太陽太陰舌下少陰視之盛者皆取之不盛釋之也此心氣之實狂也夫陰氣盛則多臥陽氣盛則少臥食氣入胃精氣歸心心氣實故不飢心乃君主之官虛則自卑下實則自尊高陽明實則罵詈不休心火盛而傳乘於秋金也肺者心之蓋火炎上則天氣不清矣故當取手太陽之腑以瀉君火之實取手陽明太陰以清乘傳之邪舌下少陰心之血絡也此病心之神志而不在血脈故當視之如盛者並皆取之如不盛則釋之而勿取也蓋病在無形之神志皆從腑以清臟腑為陽而主氣也如入於血絡則取本臟之脈絡矣馬氏曰上節言始生而此曰始發則病已成而發也狂言驚善笑好歌樂妄行不休者得之大恐治之取手陽明太陽太陰此腎病上傳於心而為心氣之實狂也得之大恐則傷腎陰虛陽盛故狂言而發驚也經云心氣實則善笑虛則善悲實則心志鬱結故好歌樂以伸舒之神志皆病故妄行不休也取手太陽以清心氣之實取手陽明太陰以資腎氣之傷狂目妄見耳妄聞善呼者少氣之所生也治之取手太陽太陰陽明足太陰頭兩顑此因腎氣少而致心氣虛狂也心腎水火之氣上下相濟腎氣少則心氣亦虛矣心腎氣虛是以目妄見耳妄聞善呼者虛氣之所發也當取手太陽太陰陽明以清狂妄補足太陰陽明以資穀精蓋水穀入胃津液各走其道腎為水臟受藏五臟之精氣生於精也本經曰胃氣上注於肺其悍氣上衝頭者循咽上走虛竅循眼系入絡腦出顑下客主人循牙車合陽明並下人迎此陽明之氣上走空竅出於頭之兩顑不曰足陽明而曰頭兩顑者蓋取陽明中上二焦之氣以納化水穀也按此節即下文之少氣身漯漯也言吸吸也蓋始見在下之虛即補少陰之陰今發於上而為狂又當用治狂之法矣狂者多食善見鬼神善笑而不發於外者得之有所大喜治之取足太陰太陽陽明後取手太陰太陽陽明此喜傷心志而為虛狂也心氣虛故飲多食神氣虛故善見鬼神也因得之大喜故善笑不發於外者冷笑而無聲也食氣入胃濁氣歸心故當先補足太陰陽明以養心精補足太陽之津以資神氣後取手太陰太陽陽明以清其狂焉按因於足少陰者先取手而後取足因於手少陰者先取足而後取手皆上下氣交之妙用狂而新發未應如此者先取曲泉左右動脈及甚者見血有頃已不已以法取之灸骨骶二十壯此總結以上之狂疾如從下而上者則當先取肝經之曲泉應者謂因於下而應於上也蓋言狂乃心氣虛實之為病如因於腎氣之實虛皆從水而木木而火也故狂而新發未見悲驚喜怒妄見妄聞如此之證者先取曲泉左右之動脈盛者見血即已蓋病從木氣清散而不及於心神矣如不已用灸法以取之骶骨乃督脈之所循督脈與肝脈會於頭項故灸骨骶引厥陰之脈氣復從下散也按脊骨之盡處為骶骨乃足太陽與督脈交會之處曰窮骨曰骶骨曰骨骶蓋亦有所分別也風逆暴四肢腫身漯漯唏然時寒飢則煩飽則善變取手太陰表裡足少陰陽明之經肉清取滎骨清取井經也經云厥成為癲疾蓋因厥氣上逆而成癲疾也夫腎為水臟風行則水渙風逆者因感外淫之風以致少陰之氣上逆也風淫末疾故暴腫四肢漯漯寒濕也唏然寒競貌乃風動水寒之氣而見此證也風傷腎水則心氣亦虛故飢則煩風木之邪賊傷中土故飽則善變也取手太陰表裡以清風邪足少陰陽明之經以調逆氣清冷也肉清者涼出於肌腠故取滎火以溫肌寒蓋土主肌肉火能助土也骨清者尚在於水臟故取井木以瀉水邪余伯榮曰取手太陰表裡者取汗也如用麻黃以通毛竅配杏子以利肺金蓋裡氣疏而後表氣通也厥邪為病也足暴清胸將若裂腸若將以刀切之煩而不能食脈大小皆澀暖取足少陰清取足陽明清則補之溫則瀉之此足少陰之本氣厥逆而為病也少陰之大絡起於腎下出於氣街循陰股內廉斜入膕中下出內踝之後入足下少陰之氣逆於內故足暴清也胸將若裂腸若將以刀切之煩而不能食者厥氣從腹而上及於心胸也血脈資始於腎脈來或大或小皆澀者腎氣逆而致經脈之不通也腎為生氣之原如身體暖者實逆也故當取足少陰以瀉之清者虛逆也故當補足陽明以資腎臟之精氣以上二節一因外感之厥一因本氣之厥皆為癲疾之生始見厥證而先以治厥之法清之即所以治未病也厥逆腹脹滿腸鳴胸滿不得息取之下胸二脅咳而動手者與背腧以手按之立快者是也此言厥逆之氣上乘於太陰陽明而將成癲疾也腹脹滿者乘於足太陰陽明也腸鳴者乘於手陽明也胸滿不得息者乘於手太陰也胸下二脅乃手太陰中府雲門之動脈處背俞者肺之俞也取之下胸二脅咳而動手者再以手按其背俞而病人立快者是厥逆之氣上乘是成癲疾矣病在氣故按之立快蓋言厥癲疾者在氣而不在經也朱衛公曰肺合天氣故候於手太陰內閉不得溲刺足少陰太陽與骶上以長針此承上文而言厥逆之氣惟逆於下而不上乘者也逆氣在下故內閉不得溲當刺足少陰太陽與骶上以瀉逆氣而通其溲便焉夫足少陰先天之兩儀也手足太陰陽明後天之地天也先後天之氣上下相通者也是以少陰之厥氣上乘則開闔不清而成癲疾故當取之太陰陽明如厥氣在下只病下之閉癃其過只在足少陰太陽矣氣逆則取其太陰陽明厥陰甚取少陰陽明動者之經也此言逆氣上乘而為狂疾者則取其太陰陽明厥陰也夫狂始生得之憂飢治之取手太陰陽明及取足太陰陽明蓋少陰之氣上逆於太陰陽明而始生狂疾故則取其太陰陽明然又有足少陰之逆氣上乘於心而為狂疾者則取其厥陰也蓋水氣傳於肝木肝木傳於心火是以狂而新發未應如是者先取曲泉左右之動脈也甚者逆氣太盛也故當取足少陰之本經以瀉之少陰之氣上與陽明相合少陰氣甚則陽明亦甚矣陽明脈盛則罵詈不休故並取陽明動者之經少氣身漯漯也言吸吸也骨痠體重懈惰不能動補足少陰漯音壘此足少陰之氣少而欲為虛逆也漯漯寒慄貌吸吸引伸也蓋心主言肺主聲藉腎間之動氣而後發腎氣少故言語之氣不接續也腎為生氣之原而主骨腎氣少故骨痠體重懈惰不能動當補足少陰以治其始蒙短氣息短不屬動作氣索補足少陰去血絡也此虛氣上乘而將作虛狂也所謂少氣者氣不足於下也短氣者氣上而短故息短而不能連屬若有動作則氣更消索矣當補足少陰之不足而去其上逆之血絡焉上節治其始蒙故只補其少陰此將欲始作故兼去其血絡按足少陰虛實之厥逆為癲狂之原始故首論癲狂後論厥逆善治者審其上下虛實之因分別調治未有不中乎肯綮者矣熱病第二十三偏枯身偏不用而痛言不變志不亂病在分腠之間巨針取之益其不足損其有餘乃可復也此篇論外感風寒之熱內有五臟之熱外內陰陽邪正之為病而先論其外因焉經曰虛邪偏客於身半其入深內居榮衛榮衛稍衰故真氣去邪氣獨留故為偏枯是風寒之邪偏中於形身則身偏不用而痛夫心主言腎藏志言不變志不亂此病在於分腠之間而不傷於內也以巨針取之益其正氣之不足損其邪氣之有餘而偏傷之正氣乃可復也按素問熱論論熱病者皆傷寒之類本經論熱病首言偏枯次言痱之為病而不曰中風蓋風寒之邪皆能為熱也此篇與刺熱論大義相同故刺熱論中亦用五十九刺之法痱之為病也身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也病先起於陽後入於陰者先取其陽後取其陰浮而取之痱音肥痱者風熱之為病也身無痛者邪入於裡也風木之邪賊傷中土脾藏智而外屬四肢四肢不收智亂不甚者邪雖內入尚在於表裡之間臟真之氣未傷也其言微者此傷於氣故知可治甚則不能言者邪入於臟不可治也夫外為陽內為陰病先起於分腠之間而後入於裡陰者先取其陽後取其陰浮而取之者使外受之邪仍從表出也沈亮宸曰風之為病也善行而數變上節論偏客於形身此論在於表裡之間入內而干臟則死浮而取之外出則愈二節之中有左右外內出入邪正虛實死生之別熱病三日而氣口靜人迎躁者取之諸陽五十九刺以瀉其熱而出其汗實其陰以補其不足者身熱甚陰陽皆靜者勿刺也其可刺者急取之不汗出則泄所謂勿刺者有死徵也沈亮宸曰熱病三日三陽為盡三陰當受邪如氣口靜而人迎躁者此邪尚在陽而未傳於陰也故當取諸陽為五十九刺以瀉其熱而出其汗實其陰以補其不足勿使邪氣之入陰也如身熱甚而陰陽之脈皆靜者此邪熱甚而陰陽之正氣皆虛有死徵而勿刺也其可刺者急取之如邪在陽分即出其汗在陰分即從下泄此邪雖甚而正氣未脫故當急瀉其邪張開之曰夫熱病者皆傷寒之類也六經相傳七日來復在三陽三陰之氣分而不涉於經故候在人迎氣口不汗則泄即素問之所謂未滿三日者可汗而已其滿三日者可下而已尚御公曰內經言其常仲景言其變張隱菴曰熱病三日氣口靜而人迎躁者即常中之變也熱病七日八日脈口動喘而短者急刺之汗且自出淺刺手大指間此熱病七日八日而邪仍在表陽者急從汗解也表陽之邪七日來復八日不解將作再經而有傳陰之害矣如脈口動喘而短者邪尚在於膚表急取手太陰之少商使之汗則邪自共並而出矣按素問有喘脈喘而短者謂脈之喘動於寸口而不及於尺故知其可汗解也余伯榮曰此即傷寒論之太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在麻黃湯主之夫麻黃湯即取手大指汗出之劑也仲祖傷寒立論緣本於靈素諸經學者引伸觸類頭頭是道何必守針熱病七日八日脈微小病者溲血口中乾一日半而死脈代者一日死此外熱不解內傳少陰而為死證也六經傳遍七日來復八日不解又作再經矣微細少陰之脈也少陰之上君火主之病者溲血病足少陰之水臟也口中乾病手少陰之君火也一日半死者死於一二日之間陰陽水火之氣終也夫脈始於腎而主於心脈代者已絕於下故一日而死沈亮宸曰巨陽者為諸陽主氣故傷寒熱病本於太陽太陽與少陰為表裡故傷寒論曰傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也此太陽之邪傳於少陰少陰標陰而本熱故陽煩而陰躁也本經之再經七八日即傷寒論之初經一二日也少陰從本從標故傷寒論有急下急溫之證本經之溲血口中乾一日半死者標本皆病也熱病已得汗出而脈尚躁喘且復熱勿刺膚喘甚者死熱病已得汗而脈尚躁者陽熱甚而不從汗解也喘而且復熱者邪入於裡故勿刺膚喘甚者邪盛在裡而陰氣受傷故死熱病七日八日脈不躁躁不散數後三日中有汗三日不汗四日死未曾汗者勿腠刺之數葉朔熱病七八日脈不躁者外已解也脈即躁而不散數此邪熱雖未去而正氣不傷後三日乃再經之十一日此復傳於裡陰必得陰液之汗而解故未曾汗者勿腠刺之當取汗於陰也如三日不汗乃陽熱盛而陰氣已絕故至四日而死上節論熱病在外雖得汗而不解邪復傳於裡陰此論邪入於陰如有汗而不死謂陽可入陰而陰亦可出於陽也以上論外因風寒之熱病有表裡陰陽邪正虛實之死生莫云從曰此篇先論風寒而後論熱病傷寒論先言中風而後論傷寒熱病先膚痛窒鼻充面取之皮以第一針五十九苛軫鼻索皮於肺不得索之火火者心也此以下論內因之熱病在五臟當取諸外合之皮脈肉筋骨如不得解當以五行勝制之法治之熱病先膚痛鼻窒者熱在肺而病氣先應於皮膚鼻竅也故當以第一之鑱針取之皮用五十九刺之法以瀉五臟之熱若皮苛鼻軫當索皮於內合之肺再不得解索之於火火者心也當取心臟之氣以勝制其金焉蓋五臟內合五行之氣外合皮肉筋骨之形病氣先在於外合之形故先取之形次索之臟氣再以五行勝制之法治之蓋先標而後本也前章論外因之熱病在六氣此論內因之熱病在五行莫云從曰上章與素問之熱論此與評熱論大同小異熱病先身澀倚而熱煩悗干唇口嗌取之脈以第一針五十九膚脹口乾寒汗出索脈於心不得索之水水者腎也此熱在心主之包絡而病見於脈也經脈者所以行血氣而營陰陽病在血脈故先身澀倚而熱煩悗者相火盛而心不安也唇口嗌乾者火炎上也當取之脈以第一針為五十九刺之法以瀉其熱若膚脹者脈盛而脹於皮膚也仍口乾而寒汗出者熱在內而蒸發其陰液也當索脈於心索脈於心者刺脈而久留之以候心氣之至也如不得解當索之水水者腎也取腎氣以勝制其火也按此節當以第三針取脈用第一針者以絡脈之在皮膚故曰膚脹蓋在皮膚間而取諸絡皮膚絡脈之相通也熱病嗌乾多飲善驚臥不能起取之膚肉以第六針五十九目眥青索肉於脾不得索之木木者肝也喉主天氣嗌主地氣嗌乾多飲者脾熱上行也脾熱盛則及於胃故善驚脾主肌肉四肢故臥不能起當取之膚肉以第六針為五十九刺之法以瀉其熱脾主約束若目眥青者脾病未去也當索肉於脾不得索之木木者肝也取肝木之氣以勝制其土此當以第四針取膚肉熱病面青腦痛手足躁取之筋骨以第四針於四逆筋躄目浸索筋於肝不得索之金金者肺也色主春面青者肝木之病色見於面也肝脈上額循巔下項中故腦痛肝主筋諸筋皆起於四肢之指井並經而循於形身故手足為之躁擾當取之筋間以第四針刺手足之四逆肝開竅於目筋之精為黑眼若筋躄而目浸淫當索筋於肝不得索之金金者肺也取肺金之氣以勝制其肝木熱病數驚瘈瘲而狂取之脈以第四針急瀉有餘者癲疾毛髮去索血於心不得索之水水者腎也數葉朔心病熱故數驚本經曰心脈急甚為瘈瘲心氣實則狂也當取之脈以第四針急瀉其血絡之有餘者癲疾脈癲疾也發者血之餘若癲疾而毛髮去當索血於心不得索之水水者腎也取腎水之氣以勝制其心火熱病身重骨痛耳聾而好瞑取之骨以第四針五十九刺骨病不食齧齒耳青索骨於腎不得索之土土者脾腎為生氣之原熱傷氣故身重腎主骨故骨痛也腎開竅於耳腎氣逆故耳聾病在少陰故欲寐也當取之骨以第四針為五十九刺之法以刺骨若病而不欲食者腎氣實也經曰腎是動病飢不欲食齧齒者熱盛而咬牙也齒者骨之餘耳者腎之竅若齧齒耳青當索骨於腎不得索之土土者脾也取脾土之氣以勝制其水焉夫五臟者形臟也五行者五臟之氣也病氣出於外合之皮肉筋骨故先治其外不得故復內索於五臟五行之氣焉莫云從曰若重感其外邪則為外內交爭之證熱病不知所痛耳聾不能自收口乾陽熱甚陰頗有寒者熱在髓死不可治本篇首章論外因之熱上章論內因之熱此以下復論外內之熱合併而交爭者也凡病皆生於風雨寒暑陰陽喜怒飲食居處故有因外邪而病熱者有因內傷而病熱者有因於外而不因於內者有因於內而不因於外者有外內之兼病者此章與素問刺熱論合參大義自明矣熱病不知所痛者外因之熱入於內也耳聾不能自收口乾者腎臟之熱乘於上也陽熱甚而陰頗有寒者在內之熱交爭於外也熱在髓者外因之熱交爭於內也凡病出於外者生深入於內者死熱病頭痛顳顬目𤬓脈痛善衄厥熱病也取之以第三針視有餘不足寒熱痔此外因之熱與肝熱交爭也肝脈上巔頂熱病頭痛者表邪之熱交於肝脈也顳顬目𤬓者口目振戰之貌此肝臟之熱逆於上也脈痛善衄者表邪之熱迫於經也此厥陰肝經之熱與外熱交逆而為病也當以第三針取脈視其外內之有餘不足而治之經云風客淫氣精乃亡邪傷肝也因而飽食筋脈橫解腸澼為痔如外感風淫之熱內因飽食而熱外內不解則往來寒熱而為痔矣按外內交爭之熱皆在氣而不涉於經此節論熱入於經故曰厥熱謂外內之熱厥逆於厥陰之經而為病也蓋有熱在氣而皆出入於氣分者有病在氣而轉入於經者經氣外內之相通也莫云從曰在經氣外內之間故為寒熱在筋脈故為痔筋在脈外之氣分熱病體重腸中熱取之以第四針於其腧及下諸指間索氣於胃胳得氣也胳當作絡此外因之熱與脾熱交爭也熱病體重者脾熱出於外也熱病腸中熱者外熱入於內也取之於第四針於其腧腧主土也及下諸趾間乃足太陰之隱白陽明之歷兌也大腸小腸屬胃索氣於胃絡得手太陽陽明之氣則腸中之外邪隨氣而出矣熱病挾臍急痛胸脅滿取之湧泉與陰陵泉取以第四針針嗌裡此外淫之熱與心熱並交也內經云環臍而痛者病名伏梁此風根也熱病挾臍急痛者外淫之風邪客於心下而為伏梁也胸脅滿者內因之心熱逆於內也取足少陰之湧泉索水氣以濟心火取足太陰之陰陵泉補中土以散心腹之伏梁嗌裡舌下也取第四針針嗌裡以瀉外內心下之熱邪熱病而汗且出及脈順可汗者取之魚際太淵大都太白瀉之則熱去補之則汗出汗出太甚取內踝上橫脈以止之此外因之熱與肺熱相交可俱從汗解也熱病而汗且出及脈順者外內之熱皆在於膚表也故取手太陰之魚際太淵補足太陰之大都隱白蓋瀉肺經則熱去補脾土則津液生而汗出矣內踝上橫脈即足太陰之三陰交蓋汗隨氣而宣發於外取氣下行則汗止矣夫外內之熱入深者死不可治外出者易散而愈金匱玉函曰非謂一病百病皆然在外者可治入里者死然因於內者從內而外因於外者從外而內是以上工治皮毛其次治肌肉其次治經脈其次治六腑其次治五臟治五臟者半死半生熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病者脈尚躁而不得汗者此陽脈之極也死脈盛躁得汗靜也生此總結上文而言外內之熱皆宜從汗而外解也夫外為陽內為陰熱病已得汗而脈尚躁盛者此內因之熱外雖汗出而裡熱不解此內熱之極也死於得汗而脈靜者熱已清而脈平和故生熱病者脈尚躁病外因之熱而及於經也不得汗者不得從乎外解此外熱之極也故死脈盛躁得汗而脈靜者外淫之邪從表汗而散故生熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘈瘲齒噤齘也凡此九者不可刺也一曰汗不出者外淫之熱不得從汗解也刺熱論曰肝熱病者左頰先赤心熱病者顏先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病頤先赤大顴赤者滿顴面皆赤此五臟之熱甚也噦呃逆也噦者外內之熱交爭於中而致胃氣絕也二曰泄而腹滿甚者正氣陰液下泄而外熱之邪填於內也三曰目不明熱不已者內熱甚而外內不清也四曰老人嬰兒熱而腹滿者死夫老人者外內之血氣已衰嬰兒者表裡之陰陽未足腹滿者熱逆於中不得從外內散也五曰汗不出嘔下血者外熱不解而入於陰之經也六曰舌本爛熱不已者內熱盛而逆於上之脈也七曰咳而衄汗不出者咳者內熱上逆於肺也衄者表熱外迫於經也夫肺主皮毛而朝百脈外內之熱咸從肺氣以汗解汗不出者氣絕於上也出不至足者氣絕於下也八曰髓熱者熱在髓死不可治也九曰熱而痙者太陽之氣終也太陽氣終則腎氣亦絕是以腰折瘈瘲齒噤齘也太陽少陰陰陽生氣之根原也夫刺者所以致氣而卻邪也凡此九者邪熱甚而正氣已絕刺之無益也所謂五十九刺者兩手外內側各三凡十二痏五指間各一凡八痏足亦如是頭入發一寸旁三分各三凡六痏更入發三寸邊五凡十痏耳前後耳下者各一項中一凡六痏巔上一囟會一髮際一廉泉一風池二天柱二痏葉賄針瘢也此申明上文之五十九穴也兩手內側者肺之少商心之少衝心包絡之中衝左右各三計六痏外側者手陽明之商陽手太陽之少澤手少陽之關衝左右各三計六痏兩手外內各三共十二痏五指間各一凡八痏足亦如是者手足第三節縫間共十六痏也頭入發一寸旁三分各三者乃足太陽膀胱經之五處承光通天兩旁各三凡六痏更入發三寸邊五者乃足少陽膽經之臨泣目窗正營承靈腦空五穴左右凡十痏曰入發旁三分曰更入發三寸邊者謂太陽經去行中之督脈共三寸而兩分也少陽經去督脈兩邊各三寸也耳前後各一者手少陽三焦經之和髎在耳前足少陽膽經之浮白在耳後口下一者任脈之承漿項中一者督脈之大椎耳前後左右之四脈合任督共六痏也巔上一者督脈之百會囟會一者督脈之上星髮際一者前髮際乃督脈之神庭後髮際乃督脈之風府廉泉任脈穴在頷下結喉上四寸風池足少陽膽經穴在耳後兩旁髮際陷中天柱足太陽膀胱經穴在項後兩旁髮際大筋外陷中凡此五十九穴各分別表裡陰陽五臟十二經之熱病而取之氣滿胸中喘息取足太陰大趾之端去爪中如韭葉寒則留之熱則疾之氣下乃止本篇首論外淫之熱次論內因之熱次論外內交爭然皆在氣分而不涉於經此復論內因之病入於三陰之經外因之病入於三陽之經故取手足之指井及血絡焉太陰居中土厥逆從上下散足太陰脾脈上膈注心中氣滿胸中喘息者經氣逆於上也故取足太陰大趾之隱白使逆氣下行則快然如衰矣心疝暴痛取足太陰厥陰盡刺去其血絡疝乃少腹陰囊之疾心疝者病在下而及於上故曰病心疝者少腹當有形也足太陰之脈從腹而上注心中足厥陰之脈絡陰器抵小腹上貫膈注於肺此病足太陰厥陰之經而上為心疝故取足太陰厥陰於下去其血絡則心痛止矣喉痹舌卷口中乾煩心心痛臂內廉痛不可及頭取手小指次指爪甲下去端如韭葉心包絡之脈起於胸中出屬心包絡上通於心下絡三焦故是主脈所生病者煩心心痛相火上炎則喉痹舌卷口中乾也取小指次指之井穴乃手少陽經之關衝瀉其相火則諸病自平矣目中赤痛從內眥始取之陰蹺此論外淫之邪入於三陽之經而證見於上中下也目中赤痛從內眥始病足太陽之經而在上也太陽之脈起於目內眥與陰蹺陽蹺會於睛明故當取之陰蹺以清陽熱風痙身反折先取足太陽及膕中及血絡出血中有寒取三里此風邪入於太陽之經而證見於中也夫陽病者不能俯陰病者不能仰太陽之經脈循於背風入於中則筋脈強急而身反折矣先取足太陽之委中出其血絡中有寒者取足陽明之三里以補之蓋經脈血氣陽明水穀之所生也癃取之陰蹺及三毛上及血絡出血此病足太陽之經而在下也三焦下俞出於委陽並太陽之正入絡膀胱約下焦實則閉癃故亦取之陰蹺蓋陰蹺與陽蹺相交於太陽之睛明陽入於陰陰出於陽陽蹺乃足太陽之別瀉其陰蹺則太陽之經邪從蹺脈而出矣三毛足厥陰之大敦肝所生病者為閉癃故及三毛之經上有血絡者以出其血夫太陽之氣主於膚表邪之中人始於皮毛是以皮毛之邪而轉入於太陽之經也按前章論外內之邪在於表陽之氣分是以七日來復八日再經如與五臟之氣交爭則為外內出入此復論外內之病轉入於經外者入陽內者入陰各不相干涉矣沈亮宸曰四時篇論小腹痛腫不得小便邪在三焦約取之太陽大絡視其絡脈與厥陰小絡結而血者此癃在太陽三焦亦兼取厥陰之絡蓋厥陰之氣生於膀胱水中母能令子實實則瀉其子也按本經以針合理數以人配天地陰陽乃修身養性治國治民之大本其於救民之疾苦分表裡陰陽邪正虛實陰陽血氣經絡臟腑五行六氣生克補瀉各有其法學者以針刺之理引而伸之施於藥石妙用無窮惜乎皇甫士安次為甲乙而馬氏隨文順句惟曰此病在某經而有刺之之法此病系某證而有刺之之法反將至理矇昧使天下後世藐忽聖經久矣悲夫男子如蠱女子如怚身體腰脊如解不欲飲食先取湧泉見血視跗上盛者盡見血也怚當作阻通篇論外因內因之病此復結外內之正氣焉蓋外內之病皆傷人之陰陽血氣而陰陽血氣本於先天之精氣生於後天之穀精從內而外者也先天之精腎臟之所主也水穀之精胃腑之所生也臍下丹田為氣海胞中為血海男子以氣為主女子以血為主故曰男子如蠱女子如阻形容其血氣之留滯於內也身體腰脊如解形容血氣之病於外也身體脾胃之所主也腰脊腎之府也不欲飲食胃氣逆也此外內之邪而傷其外內之正氣也故當先取腎臟之湧泉再取胃腑之趺陽於跗上盡見其血者通其經而使血氣之外行也蓋言千般病難不越外內二因而外內之病總傷人之陰陽血氣知其生始出入之本原能使血氣和調陰陽固密非惟苛疾不生更可延年不老聖人之教化大矣女子如阻者如月經之阻隔也男子無月事之留阻故曰如蠱用三如字不過形容外內血氣之為病在男女二字亦當輕看參閱聖經勿以文辭害義庶為得之莫云從曰此與寒熱篇臍下關元三結交之大義相同厥論第二十四厥頭痛面若腫起而煩心取之足陽明太陰此章論經氣五臟厥逆為病因以名篇夫三陰三陽天之六氣也木火土金水火地之五行也在天呈象在地成形地之五行化生五臟天之六氣配合六經是以五臟相通移皆有次穴氣旋轉上下循環若不以次相傳則厥逆而為病矣再按在天丹蒼黅素元之氣經於五方之分化生地之五行地之五行上呈三陰三陽之六氣此天地陰陽五運六氣互相生成者也而人亦應之故曰東方生風風生木木生酸酸生肝南方生熱熱生火火生苦苦生心此五臟之形氣生於地之五行而本於天之六氣十二經脈外合六氣而本於臟腑之所生臟腑經氣之相合也靈素經中凡曰太陽少陽陽明太陰少陰厥陰此論在六氣或有及於六經若曰肝心脾肺腎此論有臟腑經脈而或涉於六氣此陰陽離合之道也夫陰陽出入寒暑往來皆從地而出自足而上是以賢人上配天以養頭下象地以養足中旁人事以養五臟苟失其養則氣厥而為頭痛臟厥而為心痛矣陽明之氣上出於面厥氣上逆於頭故為頭痛面腫陽明是動則病心欲動故起而心煩此陽明之氣上逆於頭而為厥頭痛也故當取之足陽明陽明從中見太陰之化故兼取之太陰此厥逆在氣而不及於經也厥頭痛頭脈痛心悲善泣視頭動脈反盛者刺盡去血後調足厥陰此論厥陰之氣厥逆於上轉入於經而為厥頭痛也夫三陰三陽之氣皆從下而上有厥在氣而不及於經者有厥在氣而轉入於經脈者經氣外內相通可離而可合也是以首節只論氣厥此以下論氣厥而上及於經脈焉逆在脈故頭脈痛厥陰為闔闔折則氣絕而喜悲逆在氣故心悲善泣視頭痛脈反盛者刺之盡去其血以瀉脈厥後調足厥陰以通其氣逆焉厥頭痛貞貞頭重而痛瀉頭上五行行五先取手少陰後取足少陰此少陰之氣厥逆於上轉及於太陽之經脈而為厥頭痛也貞貞固而不移也頭上五行取足太陽經之五處承光通天絡郗玉枕少陰太陽主水火陰陽之氣上下標本相合是以先瀉太陽次取手少陰後取足少陰也沈氏曰陰陽六氣只合六經從足而手故先取手而後取足尚氏曰少陰之上君火主之故先取手而後取足張開之曰沈論六氣合六經而有手足之上下尚論六氣有標本之上下二說俱宜通曉厥頭痛意善忘按之不得取頭面左右動脈後取足太陰此太陰之氣厥逆於上及於頭面之脈而為厥頭痛也經云氣並於上亂而喜忘脾藏意太陰之氣厥逆則脾臟之神志昏迷故意喜忘也頭主天氣脾主地氣按之不得者地氣上乘於天入於頭之內也先取頭面左右之動脈以瀉其逆氣後取足太陰以調之莫云從曰頭面左右之動脈足陽明之脈也厥頭痛項先痛腰脊為應先取天柱後取足太陽此太陽之氣上逆於頭而為厥頭痛也夫陰陽六氣皆循經而上太陽之脈從頭項而下循於腰脊太陽之厥頭痛項先痛而腰脊為應此逆在氣而應於經也故先取項上之天柱以瀉其逆後取足太陽以調之厥頭痛頭痛甚耳前後脈湧有熱瀉出其血後取足少陽此少陽之氣厥入於頭項之經脈而為厥頭痛也少陽之上相火主之火氣上逆故頭痛甚而耳前後脈湧有熱先瀉出其血而後取其氣焉以上論三陰三陽之氣厥而為頭痛不因於外邪也真頭痛頭痛甚腦盡痛手足寒至節死不治真頭痛者非六氣之厥逆乃客邪犯腦故頭痛甚腦盡痛頭為諸陽之首腦為精水之海手足寒至節此真氣為邪所傷故死不治頭痛不可取於腧者有所擊墮惡血在於內若肉傷痛未已可則刺不可遠取也此擊墮傷頭而為頭痛者不可取之俞也夫有所擊墮惡血在於內若肉傷痛未已可則在此痛處而刺之不可遠取之俞也蓋言痛在頭而取之下者乃在下之氣厥逆於上經氣上下交通若有所傷而痛者非經氣之謂也頭痛不可刺者大痹為惡日作者可令少愈不可已此言大痹而為頭痛者亦不可刺其俞也大痹者風寒客於筋骨而為惡也日作者當取之筋骨可令少愈如不止不可已而再取之此言風寒之邪深入於筋骨故不可取之俞而亦不能即愈也頭半寒痛先取手少陽陽明後取足少陽陽明此寒邪客於經脈而為偏頭痛也寒傷榮故為寒痛手足三陽之脈上循於頭左者絡左右者絡右傷於左則左痛傷於右則右痛非若厥氣上逆而通應於頭也手足少陽陽明之脈皆分絡於頭之左右先取手而後取足者手經之脈上於頭而交於足經者不取太陽者太陽之在中也按靈素二經凡論六氣後列經證一條論六經後列氣證一則此先聖之婆心欲後學之體認沈亮宸曰千般疢難不越三因厥頭痛者內因之氣厥也真頭痛者淫邪犯腦也大痹者風寒逆於脈外也頭半痛者寒邪客於脈中也此外因之疾也有所擊墮者不內外因也以此詳之病由都盡若人能慎養內使血氣和調陰陽順序外使元真通暢腠理固密不令淫邪於忤更能保身忍性無有擊墮之虞可永保其天年而無夭枉之患矣厥心痛與背相控善瘈如從後觸其心傴僂者腎心痛也先取京骨崑崙髮針不已取然谷此論五臟之經氣厥逆而為厥心痛也臟真通於心心藏血脈之氣也是以四臟之氣厥逆皆從脈而上乘於心背為陽心為陽中之太陽故與背相控而痛心與背相應也心脈急甚為瘈瘲如從後觸其心者腎附於脊腎氣從背而上注於心也心痛故傴僂而不能仰此腎臟之氣逆於心下而為痛也先取膀胱經之京骨崑崙從腑陽而瀉其陰臟之逆氣如髮針不已再取腎經之然谷此臟氣厥逆從經脈相乘與六氣無涉故不曰太陽少陰而曰崑崙然谷厥心痛腹脹胸滿心尤痛甚胃心痛也取之大都太白胃氣上逆故腹脹胸滿胃氣上通於心故心痛尤甚脾與胃以膜相連而為胃之轉輸故取脾經之大都太白以輸胃之逆氣尚御公曰上節從腑瀉臟此復從臟瀉腑皆雌雄相合經氣交通之妙用夫五臟之血氣皆從胃腑而生故經中凡論五臟多兼論其胃焉厥心痛痛如以錐針刺其心心痛甚者脾心痛也取之然谷太谿脾脈上膈注心中故痛如以錐刺其心然谷當作漏谷太谿當作天溪蓋上古之文不無魯魚之誤厥心痛色蒼蒼如死狀終日不得太息肝心痛也取之行間太衝肝主色而屬春生之氣肝氣厥逆故色蒼蒼如死狀肝病則膽氣亦逆故終日不得太息此肝氣逆乘於心而為肝心痛也取本經之行間太衝以疏逆氣厥心痛臥若徒居心痛間動作痛益甚色不變肺心痛也取之魚際太淵夫肺主周身之氣臥若徒然居於此者氣逆於內而不運用於形身也動作則逆氣內動故痛或少間而動則益甚也夫心之合脈也其榮色也肺者心之蓋此從上而逆於下故心氣不上出於面而色不變也取肺經之魚際太淵以瀉其逆真心痛手足青至節心痛甚旦發夕死夕發旦死夫四臟厥逆而為心痛者從經脈而薄於心之分也心為君主之官神明出焉故心不受邪若傷其臟真而為真心痛者不竟日而死矣蓋心乃太陽之火應一日而繞地一周心氣傷故不終日而死夫寒熱天之氣也青赤五行之色也故真頭痛者寒至節真心痛者青至節心痛不可刺者中有盛聚不可取於俞此言心痛之因於氣者不可取之俞也盛聚者五臟之逆氣太盛聚於中而為心痛非循脈之上乘也此節論五臟之經脈厥逆而末結氣證一條蓋以證明經氣之各有別也故只曰不可取於俞而不言其治法腸中有蟲瘕及蛟蛕皆不可取以小針心腸痛憹作痛腫聚往來上下行痛有休止腹熱喜渴涎出者是蛟蛕也以手聚按而堅持之無令得移以大針刺之久持之蟲不動乃出針也恲腹憹痛形中上者恲音烹中平聲此言蟲瘕蛟蛕而亦能為心痛也蟲瘕者癥瘕而成形也蛟蛕者蛔蟲也蛟蛕生於腸胃之中蛟蛕而為心痛者六腑之氣亦上通於心也蟲瘕積於腸胃之外蟲瘕而為心痛者心主神明正大端居於上即宮城郛郭之間亦不容其邪也皆不取以小針者謂不涉於經絡皮膚也憹者懊憹不安也腫聚者蟲聚而壅於胸腹之間上行則痛歸下則安故痛有休止也蟲瘕蛟蛕皆感濕熱以生聚故腹熱蟲欲飲故喜渴蟲動則廉泉開故涎下也見此諸證是蛟蛕也以手聚按而堅持之無令得移以大針刺之久持之蟲不動則蟲已斃而乃出針也若腹恲滿而心中懊憹作痛者乃瘕聚之形類從中而上者也沈亮宸曰此與上節之擊墮下節之干耵聹皆不涉於經氣者也耳聾無聞取耳中耳鳴取耳前動脈耳痛不可刺者耳中有膿若有干耵聹耳無聞也耳聾取手小指次指爪甲上與肉交者先取手後取足耳鳴取手中指爪甲上左取右右取左先取手後取足此言經氣之厥逆從經而氣從足而手自下而上也故逆在上之經絡而為耳聾耳鳴者即從耳間之絡脈以取之若氣之上逆而為耳聾耳鳴者當取手足之指井先取手而後取足蓋六氣止合六經其逆盛而躁者在手故陰陽二氣厥逆而為耳聾耳鳴者從足而手手而頭也若有膿而痛者有干耵聹而耳聾無聞者此又與經氣無涉故不可刺耳間之絡脈及手足之指井也按小指次指者乃手少陽之關衝手中指者乃手厥陰之中衝後取足者乃足厥陰之大敦手足三陰之脈皆不上循於頭亦非左絡右而右絡左此因氣之上逆而為耳聾耳鳴也蓋耳者腎之竅厥陰主春少陽乃初生之氣皆生於腎臟之水中所生氣之厥逆則母臟之外竅不通是以取手足之指井乃經氣之所出也夫首論厥頭痛者因氣厥而及於經次論厥心痛者因臟厥以及於脈乃臟腑經氣之相通也此復論厥在經絡者即取之絡厥在氣分者即取手足之指井以疏其氣此經氣離合之道也陰陽出入寒暑往來皆從地而出自足而上是以先取陽而後取陰氣自下而上也先取手而後取足氣從足而手也沈亮宸曰此論人經氣上下臟腑陰陽各有分別足髀不可舉側而取之在樞閤中以圓利針大針不可刺病注下血取曲泉此承上文而言經氣之厥逆於下者即從下而取之也夫陰陽之氣雖從下而生然上下升降環轉無端故有從下而逆於上者有從上而逆於下者皆隨其所逆而取之也足髀不可舉者少陽之氣厥於下也側而取之者側臥而取之也合樞中乃髀樞中之環跳穴必深取而後得之以圓利針而大針不可刺者此逆在氣而不在經故當淺刺於膚腠之間以疏氣不必深取之經穴也病注下血者此厥在氣而入於經也厥陰肝經主血此厥陰之氣厥於經故當取本經之曲泉以止血夫氣為陽血為陰上為陽下為陰故氣從下而上逆於經絡者則為氣閉之耳聾耳鳴氣從上而下逆於經絡者則為病注下血風痹淫濼病不可已者足如履冰時如入湯中股脛淫濼煩心頭痛時嘔時悶眩已汗出久則目眩悲以喜恐短氣不樂不出三年死也此論厥氣之分乘於上下也風痹淫濼乃痹逆之風邪淫濼於上下蓋風之善行而數變也夫陰陽之道分則為三陰三陽應於經脈則又有手足之分合而論之總歸於陰陽二氣水火者陰陽之徵兆也心腎者水火之形臟也風邪淫濼於上下故病不可已蓋寒之則傷心主之火熱之則傷腎臟之陰病不可治故不可已也淫濼於下故足如履冰感寒水之氣也時或淫濼於上則如入湯中感火熱之氣也股脛淫濼淫及於下之足脛煩心頭痛淫及於上之頭首也時嘔時悶有時而逆於中也諸脈皆會於目眩者淫於經脈之血分也毛腠疏則汗出汗出者淫於毛腠之氣分也水之精為志火之精為神志與心精共湊於目故久則目眩也喜為心志恐為腎志心悲名曰志悲悲以喜恐者心腎之神志傷而悲泣也腎為生氣之原短氣者傷其腎氣也不樂者傷其心氣也夫日以應火月以應水周天三百六十五度四分度之一歲三百六十五日有奇日月一周天而復大會不出三年死者不過盡水火陰陽之數周而終也此篇論厥逆為病有經氣五臟陰陽邪正之分病本第二十五先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本此承前數章之義分別標本外內先後之治法焉先逆先寒先熱者先病天之六氣也先病者先病人之經氣也先病而後逆者人之形體先病而後致氣之厥逆故當先治其本病先逆而後病者先感天之六氣病吾身之陰陽以致氣逆而為病者故當先治其天之本氣先寒而後生病者先感天之寒邪而致生六經之病故當先治其本寒先病而後生寒者吾身中先有其病而後生寒者當先治其本病先熱而後生病者先感天之熱邪而致生形身之病故當先治其天之本熱天之六氣風寒熱濕燥火也人之六氣六經三陰三陽也人之陰陽與天之六氣相合故有病本而及標者有病標而及本者此節以先病為本後病為標莫云從曰先病後逆先逆後病總論天之六氣與吾身之陰陽先寒而後生病先病而後生寒先熱而後生病先病而後生熱分論天有此寒熱而吾身中亦有此寒熱也先泄而後生他病者治其本必且調之乃治其他病先病而後中滿者治其標先病而後泄者治其本先中滿而後煩心者治其本泄者脾胃之病也脾屬四肢而主肌肉此病者因脾病於內而生四肢形體之病故當先治其本病必且調其脾胃而後治其他病焉中滿者腹中脹滿脾胃之所生也先病而後中滿者因病而致中滿也則當先治中滿之標病而後治其本病先病而後泄者因病而致飧泄也當先治其本病而泄自止矣脾所生病者上走心為噫先中滿而後煩心者脾病上逆於心也故當治其本病夫人之臟腑形骸經脈血氣皆本於脾胃之所生上節論天之客氣與人之陰陽外內交感而為病此論人之本氣為病又當以脾胃為根本也有客氣有同氣大小便不利治其標大小便利治其本此承上文而言所謂先病先逆先寒先熱先泄中滿之為病有客氣而有同氣者也客氣者天之六氣也同氣者吾身中亦有此六氣與天氣之相同也有客氣之為病者有本氣之為病者皆傷人之正氣傷則氣不化而二便不利矣故大小便不利者治其標大小便利者治其本莫云從曰客氣之病從外而內本氣之病從內而外大小便不利者病氣皆入於內故當治其標而從下解大小便利者病氣皆在於外故當治其外之本病病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹詳察間甚以意調之間者並行甚為獨行先大小便不利而後生他病者治其本也間去聲此論陰陽六氣之標本也六微旨論曰少陽之上火氣治之陽明之上燥氣治之太陽之上寒氣治之厥陰之上風氣治之少陰之上熱氣治之太陰之上濕氣治之所謂本也本之下氣之標也蓋以風寒暑濕燥火六氣為本以三陰三陽六氣為標有餘者邪氣之有餘不足者正氣之不足故病發而有餘本而標之先治其風寒暑濕之本氣而後調其三陰三陽之標謂當先散其邪而後調其正氣如病發而不足標而本之當先調其陰陽而後治其本氣此標本邪正虛實之治要也再當謹察其間甚以意調之間者邪正虛實之相間故當並行其治蓋以散邪之中兼補其正補正之內兼散其邪甚者謂邪氣獨盛或正氣獨虛又當獨行其治如邪氣甚者獨瀉其邪正虛甚者獨補其正此補瀉間甚之要法也如先大小便不利而後生他病者當治其二便之本病又無論其邪正之間甚矣按此篇列於厥證之間無問答之辭乃承上啟下以申明厥逆之義蓋人秉天地陰陽五運六氣而成此形此身中亦有五運六氣應天道環轉之不息若感天之客氣則為客邪所逆而成病矣若喜怒暴發志意不調飲食失節居處失宜則此身中之氣運厥逆而為病矣故病客氣者自外而內病同氣者自內而外有標本外內之出入有邪正虛實之後先故曰標本之道要而博小而大可一言而知百病之害言標與本易而勿損察本與標氣令可調明知勝復為萬民式天之道畢矣雜病第二十六厥挾脊而痛至頂頭沉沉然目䀮䀮然腰脊強取足太陽膕中血絡䀮音荒此論客氣厥逆於經而為雜病也足太陽之脈起於目內眥上額交巔從巔入絡腦還出別下項挾脊抵腰中太陽之氣主於膚表客氣始傷太陽則經氣厥逆而為頭目項脊之病故當取足太陽膕中血絡以瀉其邪沉重也莫云從曰虛邪之中人也必先始於皮毛太陽之氣主表故首論其太陽厥胸滿面腫唇漯漯然暴言難甚則不能言取足陽明足陽明之脈起於鼻交頞中挾口環唇循喉嚨入缺盆下膈本經曰中於面則下陽明蓋中於面之皮膚則面腫下於陽明之經則為胸滿唇漯諸證喉嚨者氣之所以上下也陽明之脈循喉嚨逆則氣機不利故暴言難甚則不能言也當取足陽明之經以瀉其邪厥氣走喉而不能言手足清大便不利取足少陰此邪病足少陰之氣而為厥逆也足少陰腎脈循喉嚨挾舌本厥氣上逆於喉故不能言腎為生氣之原氣逆故手足清腎開竅於二陰故大便不利當取足少陰以通其逆氣厥而腹向向然多寒氣腹中谷禾呈糸禾呈糸便溲難取足太陰禾呈糸音谷此客氣薄於太陰致太陰之氣厥而為此諸證也腹乃脾土之郭氣厥於內故腹向向然太陰濕土主氣為陰中之至陰故寒氣多而禾呈糸禾呈糸然如水濕之聲也地氣不升則天氣不降故溲便難取足太陰以散其厥逆嗌乾口中熱如膠取足少陰夫所謂厥者有病在下而氣厥於下者有病在下而厥氣上逆者如上節之厥氣走喉而不能言乃少陰之氣上逆於喉也此邪病少陰之氣而氣厥於下也蓋心腎水火之氣上下時交少陰之氣厥逆於下而不上交於心則火熱盛而嗌乾口中熱如膠矣取足少陰以散逆氣而通水陰之上濟膝中痛取犢鼻以圓利針發而間之針大如犛刺膝無疑按以上五節乃邪客陰陽之氣而為氣厥即有見經證者乃邪在氣而迫及於經也此以下復論邪入於經而經脈之厥逆故曰針大如犛刺膝無疑九針論曰六者律也律者調陰陽四時而合十二經脈虛邪客於經絡而為暴痹者也故為之治針必令尖如犛且圓且銳中身微大以取暴氣此邪客於足陽明之經而為膝中痛者當以如犛之針而刺膝痛之無疑也意言邪在氣而致氣厥者當取之氣穴邪客於經絡而為經痛者當取之經穴無疑也犛音釐牛尾也張開之曰暴痹者不從氣而轉入乃直中於脈而為脈痹也犢鼻乃足陽明胃經穴不因於氣故曰取犢鼻而不曰陽明以下取手足之三陽者經氣之合病也喉痹不能言取足陽明能言取手陽明喉痹者邪閉於喉而腫痛也足陽明之脈循喉嚨挾於結喉之旁故邪閉則不能言矣當取之足陽明手陽明之脈在喉旁之次故能言者取手陽明瘧不渴間日而作取足陽明渴而日作取手陽明瘧氣隨經絡沉以內薄間日而作者其氣舍深內薄於陰而不得出足陽明之脈屬胃絡脾應地氣之在下其道遠故間日而作地為陰故不渴手陽明之脈屬大腸絡肺應天氣之在上其道近故日作天為陽故渴也沈亮宸曰按素問瘧論云其間日者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作夫手陽明者肺之腑手太陽者心之腑手少陽者心主包絡之腑此三腑者主氣主火而應於上故渴而日作足陽明者脾之腑足太陽者腎之腑足少陽者肝之腑此三腑者主血主水而在下故不渴而間日作獨取手足陽明者身半以上手陽明皆主之身半以下足陽明皆主之齒痛不惡清飲取足陽明惡清飲取手陽明手足陽明之脈遍絡於上下之齒足陽明主悍熱之氣故不惡寒飲手陽明主清秋之氣故惡寒飲莫云從曰齒痛病在手足陽明之脈惡清飲不惡清飲手足陽明之氣也此因脈以論氣因氣以取脈脈氣離合之論蓋可忽乎哉聾而不痛者取足少陽聾而痛者取手陽明陽明當作少陽手足少陽之脈皆絡於耳之前後入耳中手少陽秉三焦之相火故聾而痛莫云從曰與上節之意相同衄而不止衃血流取足太陽衃血取手太陽不已刺宛骨下不已刺膕中出血衃音胚宛腕同鼻中出血曰衄血至敗惡凝聚其色赤黑者曰衃陽絡傷則衄血手足太陽之脈交絡於鼻上足太陽主水故衃血流手太陽主火故衃血而不流此邪薄於皮毛之氣分而迫於絡脈也故取手足太陽以行氣不已刺手之經脈於腕骨下不已刺足之經脈於膕中莫云從曰取氣先足而手取經脈先手而足經氣上下環轉之不息腰痛痛上寒取足太陽陽明痛上熱取足厥陰不可以俯仰取足少陽足太陽陽明少陽厥陰之脈皆循腰脊而上行太陽陽明主寒水清金之氣故痛上寒者取足太陽陽明厥陰風木主氣秉中見少陽之火化故痛上熱者取足厥陰不可以俯仰者少陽之樞折也故取之少陽沈亮宸曰腰脊者身之大關節也厥陰主春少陽主夏陽明主秋太陽主冬寒暑往來之氣厥逆則為腰脊之病故獨取此四經焉中熱而喘取足少陰膕中血絡足少陰之脈上行者貫膈注胸中入肺絡心下行者循陰股內廉斜入膕中中熱而喘者厥逆於下而不得上交於心故取足厥陰膕中血絡莫云從曰嗌乾口中熱如膠乃水火之氣上下不濟故曰取足少陰中熱而喘乃上下之經脈不交故取膕中血絡喜怒而不欲食言益小取足太陰怒而多言刺足少陽此下論陰陽喜怒飲食居處而成內因厥逆之雜病也暴喜傷心暴怒傷肝食氣入胃散精於心肝食飲不節肝心氣逆故不欲食也五者音也音主長夏肝心氣逆則中氣不舒故言益小也當取足太陰以疏脾氣則食氣得以轉輸而音聲益彰矣肝主語而在志為怒怒而多言厥陰之逆氣太甚故當取中見之少陽以疏厥陰之氣頷痛刺手陽明與顑之盛脈出血顑葉坎此言手足陽明之經氣厥逆皆能為頷痛也手陽明之脈從缺盆上頸貫頰足陽明之氣上走空竅循眼系出顑下客主人循牙車合陽明並下人迎頷在腮之下人迎之上此病陽明之氣下合陽明之經而為頷痛故不曰取足陽明而曰顑之盛脈蓋氣逆於顑而致脈盛也莫云從曰足陽明之脈起於鼻交頞中入齒中挾口環唇交承漿循頰車上耳前從大迎下人迎陽明之氣上衝於頭走空竅循眼系入絡腦出顑下客主人循牙車而下始與陽明之脈相合而並下人迎項痛不可俯仰刺足太陽不可以顧刺手太陽也手足太陽之脈皆循項而上故皆能為項痛足太陽之脈挾脊抵腰中故不可俯仰者取足太陽手太陽之脈繞肩胛故不可以顧者取手太陽也小腹滿大上走胃至心淅淅身時寒熱小便不利取足厥陰腹滿大便不利腹大亦上走胸嗌喘息喝喝然取足少陰腹滿食不化腹向向然不能大便取足太陰此三陰之經氣厥逆於下而皆能為腹滿也口問篇曰夫百病之始生也皆生於風雨寒暑陰陽喜怒飲食居處大驚卒恐則血氣分離陰陽破散經絡厥絕脈道不通陰陽相逆血氣不次乃失其常如驚怒則傷足厥陰肝卒恐則傷足少陰腎飲食不節則傷足太陰脾臟氣傷則經絡厥絕脈道不通而皆為脹滿也足厥陰肝脈抵小腹挾胃上貫膈厥陰之經脈厥逆故小腹滿大厥氣上逆則走胃至心厥陰者陰極而一陽初生故身淅淅然時有寒熱之變肝主疏泄小便不利者厥陰之氣逆也腎者胃之關也而開竅於二陰腹脹滿而大便不利者腎氣逆而關門不利也足少陰之脈上貫肝膈入肺中循喉嚨氣逆則及於經故亦上走胸嗌而喘息喝喝然此少陰之氣逆也足太陰主輸運水穀脾氣厥逆故腹滿而食飲不化足太陰是動則病腹脹善噫得後氣則快然如衰腹向向然不能大便者氣逆於中也故當取足三陰之經以通厥逆之氣心痛引腰脊欲嘔取足少陰腰脊腎之外府也腎與胃戊癸合化心痛引腰脊而欲嘔者腎氣上逆而為心痛也當取之足少陰心痛腹脹嗇嗇然大便不利取足太陰嗇嗇畏寒貌太陰為陰中之至陰陰寒故腹脹而嗇嗇然大便不利者土氣不化也此足太陰之氣厥而為心痛故當取本經以疏逆氣心痛引背不得息刺足少陰不已取手少陽腎脈從腎貫膈入肺中出絡心心痛引背不得息少陰之經脈厥逆於上而為心痛也故當刺足少陰不已者腎臟之氣逆也少陽屬腎三焦之氣發原於腎臟上布於胸中故當取手少陽以瀉腎氣之逆莫云從曰刺少陰之脈曰刺取少陽之氣曰取心痛引小腹滿上下無定處便溲難刺足厥陰足厥陰肝脈抵小腹別貫膈上注肺心痛引小腹滿者厥陰之經絡上逆也上下無定處溲便難者厥陰之氣逆也此經氣並逆當刺足厥陰之經經脈通則氣亦疏利矣心痛但短氣不足以息刺手太陰肺主氣而司呼吸心系上連於肺心痛但短氣不足以息者但逆在肺而為心痛也當刺手太陰以通肺氣之逆沈亮宸曰足太陰少陰厥陰而為心痛者臟氣上逆而為痛也肺乃心之蓋故但短氣不足以息此病在本臟而應於心也四臟皆然故無真心痛之死證心痛當九節次之按已刺按之立已不已上下求之得之立已此總結五種心痛因臟氣之上乘而為痛也次者俞穴之旁也九節次之者肝俞次旁之魂門也肝藏之魂心藏之神相隨而往來出入故取之魂門以通心氣按已而刺出針而覆按之導引氣之疏通故心痛立已九節之上乃膈俞旁之膈關下乃膽俞次之陽綱心氣從內膈而通於外故不已當求之上以通心神求之下以舒魂氣得之者得其氣也金匱玉函曰經絡受邪入臟腑為內所因前章之厥心痛乃五臟之血脈相乘故有真心痛之死證此因氣而痛故按摩導引可立已也前章刺血脈曰崑崙然谷魚際太淵此取臟氣曰太陰厥陰少陰少陽沈亮宸曰七節之旁中有小心如逆傷心氣者環死故取之魂門以通心氣不得已而求之膈關也余伯榮曰前章之厥心痛論經脈相乘而有兼乎氣者此厥氣為痛而有及於經者顑痛刺足陽明曲周動脈見血立已不已按人迎於經立已顑葉坎顑面也顑痛者邪傷陽明之氣也陽明之脈曲折於口鼻頤頰之間故取陽明曲周動脈見血立已此氣分之邪隨血而解如不已按人迎於頭立已前三句論經氣之相通所謂中於面則下陽明是也後二句論陽明之氣上衝於頭而走空竅出顑循牙車而下合於陽明之經並下人迎言如不從曲折之絡脈而解導之入於人迎而下行其痛可立已也蓋陽明居中土為萬物之所歸邪入於經則從腸胃而出矣余伯榮曰如寒傷太陽劇者必衄衄乃解此皆氣分之邪可隨血而愈莫云從曰按人迎於經乃啟下文之意言陽明之氣上行於頭從牙車而下合於人迎循膺胸而下出於腹氣之街者也氣逆上刺膺中陷者與下胸動脈氣逆上者氣逆於上而不下行也膺胸間乃足陽明經脈之所循刺之使在上之逆氣而下通於經也此言陽明之氣從人迎而下循於膺從膺以下胸從胸而下臍也腹痛刺臍左右動脈已刺按之立已不已刺氣街已刺按之立已此承上文而言陽明之氣循經而下行也足陽明之脈從膺胸而下挾臍入氣街中腹痛者陽明之經厥也故當刺臍左右之動脈不已刺氣街按之立已夫腹氣有街與衝脈於臍左右之動脈間刺氣街而按之者使經脈之逆氣從氣街而出於膚表也此論陽明之氣上衝於頭而走空竅出顑循牙車而下合陽明之經並下人迎循膺胸而下出於臍之氣街是陽明之氣出入於經脈之外內環轉無端少有留滯則為痛為逆矣沈亮宸曰陽明之氣從外迎而直下於足跗通貫於十二經脈故上之人迎與下之衝陽其動也若一氣街者氣之徑路也蓋絡絕不通然後從別徑而出非竟出於氣街也故先刺挾臍左右之動脈不已而後取之氣街痿厥為四末束悗乃疾解之日二不仁者十日而知無休病已止悗音悶此復論陽明之氣不能分布於四末而為痿厥也痿者手足委棄而不為我所用厥者手足清冷也夫陽明為闔氣不通則闔折闔折則氣無所止息而痿疾起矣陽受氣於四末陽明之氣不行故手足逆冷也陽明居中土為水穀之海海之所以行雲氣者天下也是以上文論陽明之氣不能升降於上下此論不得分布於四方朱永年曰悗悶也為四末束悗者束縛其手足使滿悶而疾解之導其氣之通達也夫按之束之皆導引之法猶尺蠖之欲伸而先屈也身半以上為陽身半以下為陰晝以前為陽晝以後為陰日二者使上下陰陽之氣表章而交通也不仁者榮血不行也十日者陰數之周也歲以草刺鼻嚏嚏而已無息而疾迎引之立已大驚之亦可已歲作噦嚏音啻噦呃逆也言其發聲如車鑾之聲而有輸序故名曰噦此陽明所受之穀氣欲從肺而轉達於膚表肺氣逆還於胃氣並相逆復出於胃故為噦故以草刺鼻取嚏以通肺氣肺氣疏通則穀氣得以轉輸而呃逆止矣無息鼻息不通也疾迎引之連取其嚏也夫谷入於胃散精於心肝大驚則肝心之氣分散胃之逆氣亦可從之而外達也按胃絡上通於心肝臟之脈挾胃此言陽明之氣從肺氣而出於氣分亦可從肝心而出於血分也此章論雜病之因有因於氣者有厥在經脈者有經氣之並逆者首論太陽而末結陽明蓋太陽為諸陽主氣陽明乃血氣之生原故行於上下四旁氣分血分夫人之百病不越外內二因外內之病皆能令血氣厥逆是以凡病多本於郁逆學者以數篇厥逆之因證細心參求為治之要思過半矣張介賓曰歲當作噦周痹第二十七黃帝問於岐伯曰周痹之在身也上下移徙隨脈其上下左右相應間不容空願問此痛在血脈之中耶將在分肉之間乎何以致是其痛之移也間不及下針其慉痛之時不及定治而痛已止矣何道使然願聞其故岐伯答曰此眾痹也非周痹也此篇論經脈與絡脈之繆處也經脈者臟腑之十二經脈循行於上下者也絡脈者臟腑之十二大絡陰走陽而陽走陰左之右而右之左者也痹者風寒濕邪雜合於皮膚分肉之間邪在於皮膚而流溢於大絡者為眾痹在於分肉而厥逆於經脈者為周痹帝以上下左右血脈分肉概而問之然雖總屬於陰陽血氣而有皮膚肌肉之淺深經脈絡脈之繆處故伯有周痹眾痹之分焉慉痛動而痛也不及定治者邪客於左則右病右盛則左病左右移易故不及下針也按玉版篇曰人之所受氣者谷也谷之所注者胃也胃者水穀血氣之海也海之所以行雲氣者天下也胃之所出血氣者經隧也經隧者五臟六腑之大絡也此言胃腑所出之血氣從大絡而布於皮膚猶海之行雲氣於天下故邪客於皮膚流溢於大絡者名曰眾痹謂邪在天下之廣眾也黃帝曰願聞眾痹岐伯對曰此各在其處更發更止更居更起以右應左以左應右非能周也更發更休也黃帝曰善刺之奈何岐伯對曰刺此者痛雖已止必刺其處勿令復起各在其處者邪隘於大絡與經脈繆處也更發更止更居更起者左痛未已而右脈先病也以右應左以左應右者左盛則右病右盛則左病也更發更休故非能周也病在左而右痛病在右而左痛故刺其痛處而病雖已止然必刺其所病之處而勿令復起也帝曰善願聞周痹何如岐伯曰周痹者在於血脈之中隨脈以上隨脈以下不能左右各當其所黃帝曰刺之奈何岐伯對曰痛從上下者先刺其下以過之後刺其上以脫之痛從下上者先刺其上以過之後刺其下以脫之手足三陰三陽之脈從下而上從上而下交相往還故周痹在於血脈之中隨脈氣上下而不能左之右而右之左也各當其所者與絡脈各居其所也過者使邪氣過在分肉皮膚以外出脫者使病本之更脫於脈中也沈亮宸曰經脈之上下絡脈之左右應司天在泉左右間氣蓋臟腑之經脈絡脈總合於天之六氣也後刺以脫之與必刺其處同義黃帝曰善此痛安生何因而有名岐伯對曰風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發發則如是此言周痹之因乃邪客於分肉之間而厥逆於脈也分肉肌肉之腠理沫者風濕相搏迫切而為涎沫也沫得寒則聚聚則排分肉而分裂其腠理故痛痛則心專在痛處而神亦歸之神歸之則熱熱則痛解解則厥逆於脈中厥於脈中則彼之周痹發發則如是之隨脈上下也此內不在臟而外未發於皮獨居分肉之間真氣不能周故命曰周痹帝曰善余已得其意矣此句宜衍當以下文接上節此內不在臟而外未發於皮獨居分肉之間真氣不能周故命曰周痹故刺痹者必先切循其下之六經視其虛實及大絡之血結而不通及虛而脈陷空者而調之熨而通之其瘈堅轉引而行之瘈音掣夫邪之客於形也必先舍於皮毛留而不去則腠理開開則抵深而入於分肉留而不去入舍於絡脈留而不去入舍於經脈內連五臟此邪在於分肉而厥逆於脈中故內不在臟而外未出於皮獨居分肉之間真氣不能周故命曰周痹真氣者五臟元真之氣三焦通會於肌腠之間所受於天與穀氣並而充身者也邪沫凝聚於腠理則真氣不能充身故曰周謂因痹而不周也下之六經謂臟腑十二經脈本於足而合於六氣也夫邪在於分肉則分肉實而經脈虛厥逆於脈中則經脈實而分肉虛故當視其虛實而取之此刺周痹之法也大絡之血結而不通邪在於大絡也及虛而脈陷空者絡氣虛而陷於內也熨而通之啟其陷下之氣通於外也瘈堅者絡結而掣瘲堅實故當轉引而行之此調治眾痹之法也張開之曰邪在分肉內則入於脈中外則出於皮膚故曰外未發於皮謂經脈分肉之邪當仍從皮毛而出黃帝曰善余已得其意矣亦得其事也九者經巽之理十二經脈陰陽之病也事者謂揆度奇恆之事蓋邪在於皮膚留而不去不得入於經流溢於大絡而生奇恆之病故帝曰余已得其意矣謂得其邪在分肉經脈之意矣亦得其事也言亦得知其邪在大絡之事也九針者乃經常巽順之理所以明十二經脈陰陽之病也沈氏曰觀帝所言謂九針之論乃經巽之理所以明人之陰陽血氣終始出入應天地之大道學者當於針中求理勿以至理反因針而昧之聖人立言之意其庶幾乎
