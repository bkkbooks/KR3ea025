body:
  text: 卷六五變第四十六黃帝問於少俞曰余聞百疾之始期也必生於風雨寒暑循毫毛而入腠理或復還或留止或為風腫汗出或為消疸或為寒熱或為留痹或為積聚奇邪淫溢不可勝數願聞其故夫同時得病或病此或病彼意者天之為人生風乎何其異也少俞曰夫天之生風者非以私百姓也其行公平正直犯者得之避者得無殆非求人而人自犯之馬仲化曰此言人之感邪同而病否異者非天之有私而人有避不避之異也黃帝曰一時遇風同時得病其病各異願聞其故少俞曰善乎哉問請論以比匠人匠人磨斧斤礪刀削斷材木之陰陽尚有堅脆堅者不入脆者皮弛至其交節而缺斤斧焉夫一木之中堅脆不同堅者則剛脆者易傷況其材木之不同皮之厚薄汁之多少而各異耶夫木之早花先生葉者遇春霜烈風則花落而葉萎久曝大旱則脆木薄皮者枝條汁少而葉萎久陰淫雨則薄皮多汁者皮潰而漉卒風暴起則剛脆之木枝折杌傷秋霜疾風則剛脆之木根搖而葉落凡此五者各有所傷況於人乎黃帝曰以人應木奈何少俞答曰木之所傷也皆傷其枝枝之剛脆而堅未成傷也人之有常病也亦因其骨節皮膚腠理之不堅固者邪之所舍也故常為病也此章論因形而生病乃感六氣之化有五變之紀也夫形之皮膚肌腠筋骨有厚薄堅脆之不同故邪舍有淺深而其病各異即五臟之病消疸腸胃之有積聚亦因形之皮膚肌肉而病及於內也故以木之皮汁堅脆多少方之陰陽者木之枝幹皮肉也交節而缺斧斤者比人之皮弛肉脆而骨節堅剛也是以一木之中尚有堅脆之不同堅者則剛脆者易傷況其材木之不同耶木之皮薄枝脆者比人之皮不致密膚腠疏也木之多汁少汁者比皮膚之津液多少也木之早花先葉者木氣外敷而不禁風霜也潰散也漉滲也皮薄多汁者遇久陰淫雨則潰而漉剛脆之木遇卒風暴起則枝折杌傷蓋汁多者不宜陰雨剛脆者又忌暴風以比人之腠理疏者漉汗剛直多怒者消疸也木之所傷皆傷其枝枝之剛脆者易傷而堅者未成傷也故人之常病亦因其骨節皮膚腠理之不堅固者邪之所舍而常為病也朱永年曰木枝者比人之四肢本經曰中於陰常從䟰臂始是以上古之人起居有常不妄作勞養其四體也黃帝曰人之善病風厥漉汗者何以候之少俞答曰肉不堅腠理疏則善病風黃帝曰何以候肉之不堅也少俞答曰膕肉不堅而無分理理者粗理粗理而皮不致者腠理疏此言其渾然者朱永年曰此言皮不致密肉理粗疏致風邪厥逆於內而為漉漉之汗蓋津液充於皮腠之間皮潰理疏則津泄而為汗矣委中之下曰膕太陽之部分也蓋太陽之氣主於皮膚如膕肉不堅而無分理無分理者粗理也理粗而皮不致密則腠理疏而渾然汗出矣倪沖之曰太陽之津氣運行於膚表如天道之渾然水隨氣行者也故皮不密則氣泄氣泄則津亦泄矣黃帝曰人之善病消疸者何以候之少俞答曰五臟皆柔弱者善病消疸黃帝曰何以知五臟之柔弱也少俞答曰夫柔弱者必有剛強剛強多怒柔者易傷也黃帝曰何以候柔弱之與剛強少俞答曰此人皮膚薄而目堅固以深者長沖直揚其心剛剛則多怒怒則氣上逆胸中蓄積血氣逆留臗皮充肌血脈不行轉而為熱熱則消肌膚故為消疸此言人之暴剛而肌肉弱者也消疸者疸熱而消渴消瘦也邪氣臟腑篇曰五臟之脈微小為消疸蓋五臟主藏精者也五臟皆柔弱則津液竭而善病消疸矣夫形體者五臟之外合也薄皮膚而肌肉弱則五臟皆柔弱矣夫柔弱者必有剛強謂形質弱而性氣剛也故此人薄皮膚而目堅固以深者其氣有長沖直揚之勢其心剛剛則多怒怒則氣上逆而血積於胸中氣逆留則充塞於肌肉血蓄積則脈道不行血氣留積轉而為熱熱則消肌膚故為消疸此言其人暴剛而肌肉弱者也蓋肌肉弱則五臟皆柔暴剛則多怒而氣上逆矣朱永年曰按本經有五臟之消疸有肌肉之消疸五臟之消疸津液內消而消渴也肌肉之消疸肌肉外消而消瘦也蓋因於內者必及於外因於外者必及於內形體五臟外內之相合也高士宗曰按平脈篇云腎氣微少精血奔氣促迫上入胸膈蓋精血少則逆氣反上奔故曰柔弱者必有剛強謂五臟之精質柔弱而氣反剛強是柔者愈弱而剛者愈強剛柔之不和也黃帝曰人之善病寒熱者何以候之少俞答曰小骨弱肉者善病寒熱黃帝曰何以候骨之小大肉之堅脆色之不一也少俞答曰顴骨者骨之本也顴大則骨大顴小則骨小皮膚薄而其肉無䐃其臂懦懦然其地色殆然不與其天同色汗然獨異此其候也然後臂薄者其髓不滿故善病寒熱也䐃音窘懦音糯此言骨小肉弱者善病寒熱也夫腎主骨顴者腎之外候也故顴骨為骨之本顴大則周身之骨皆大顴小則知其骨小也䐃者肉之指標也懦懦柔弱也臂薄者股肱之大肉不豐也地色者地閣之色殆不與天庭同色此土氣之卑汙也髓者骨之充也骨小則其髓不滿矣夫在外者皮膚為陽筋骨為陰骨小皮薄則陰陽兩虛矣陽虛則生寒陰虛則發熱故其人骨小皮薄者善病寒熱也倪沖之曰津液隨三焦出氣以溫肌肉充腠理淖澤注於骨補益腦髓潤澤皮膚如臂薄者通體之皮肉薄弱矣皮肉薄弱則津液竭少故曰臂薄者其髓不滿高士宗曰邪在皮膚則發熱深入於骨則發寒黃帝曰何以候人之善病痹者少俞答曰粗理而肉不堅者善病痹黃帝曰痹之高下有處乎少俞答曰欲知其高下者各視其部此言理粗而肉不堅者善病痹也理者肌肉之紋理如粗疏而不致密則邪留而為痹夫皮脈肉筋骨五臟之分部也痹論曰風寒濕三氣雜至合而為痹以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹故各視其部則知痹之高下蓋心肺之痹在在高肝腎脾痹在下也黃帝曰人之善病腸中積聚者何以候之少俞答曰皮膚薄而不澤肉不堅而淖澤如此則腸胃惡惡則邪氣留止積聚乃傷脾胃之間寒溫不次邪氣稍至蓄積留止大聚乃起朱永年曰此言善病腸中積聚者以腸胃之惡也夫皮膚薄而氣不充身澤毛肉不堅而津液不能淖澤如此則腸胃惡蓋津液血氣腸胃之所生也惡則邪氣留止而成積聚乃傷脾胃之間若再飲食之寒溫不節邪氣稍至即蓄積而大聚乃起夫陽乃肺之合而主皮主氣胃乃脾之合而主肉主津故皮膚薄而肉不堅則氣不充而津液不淖澤矣氣不充而液不澤則毫毛開而腠理疏疏則邪氣留止漸溜於腸胃之間而成積聚矣黃帝曰余聞病形已知之矣願聞其時少俞答曰先立其年以知其時時高則起時下則殆雖不陷下當年有沖通其病必起是謂因形而生病五變之紀也風雨寒暑運行之六氣也六氣在外以病形故當先立其年以知其時之六氣如辰戌之歲太陽司天二之客氣乃陽明燥金主氣乃少陰君火此主氣勝臨御之氣值此時氣高而病必起起者即帝所謂或復還也如三之客氣乃太陽寒水主氣乃少陽相火四之客氣乃厥陰風木主氣乃太陰濕土五之客氣乃少陰君火主氣乃陽明燥金終之客氣乃太陰濕土主氣乃太陽寒水值時氣下而為客氣所勝故其病必殆殆將也時氣下而不能勝則病將留止即帝所謂或留止也蓋風雨寒暑乃臨御之化六期環轉客於形而為病故必因時氣以勝之此論六氣之在外也陷下者陷於腸胃之間而成積聚也沖通者五運之氣通出於外而衝散其病氣也如太陽寒水司天而五運乃太宮土運此在內之運氣勝之故病亦不能留止也蓋六氣在外以應天之三陰三陽五運主中以應地之五行人之五臟此臟氣勝歲氣故雖不陷下病留止於外者亦能沖通而散蓋六氣主升降於上下五運主出入於外內者也是謂因形而生病五變之紀也夫皮膚肌腠曰形腠者皮膚肌肉之紋理乃營衛出入之道路此病形而不病氣者也如病氣則與營衛俱行淫於內而與魂魄飛揚矣如傳溜於血脈則入臟腑為內所因矣此病形而不病氣亦不溜於脈中故為漉汗消疸寒熱留痹積聚五者之病即陷於內乃傷脾胃之間郛郭之中而不及於臟腑此奇邪淫溢或病形或病氣或溜於血脈或入於臟腑病之變化不可勝數也是以傷寒論六篇首論三陰三陽之氣以及六經之證然亦有病形而不病氣者故太陽篇中曰形作傷寒蓋在天成氣在地成形此天地之生命所以立形定氣而視壽夭者必明乎此臨病人以觀邪之中人或病氣或病形或溜於血脈或入於臟腑以知病之輕重人之死生者必明乎此朱氏曰素問歲運諸篇有客氣勝主氣而為民病者主氣勝客氣而為民病者有六氣勝五運而為民病者五運勝六氣而為民病者此概論歲運之太過不及也此篇論人之皮薄理疏風雨寒暑之氣循毫毛而入腠理為五變之病故藉主氣以勝之主氣者吾身中有此六氣而合於天之四時也朱衛公曰氣者三陰三陽之氣相將出入之營氣衛氣三焦通會元真之氣所以充行於皮膚肌腠之間此病形而不病氣故藉此形中之陰陽合四時之六氣以勝邪若病氣則又有氣之變證矣倪沖之曰按陰陽別論云氣傷痛形傷腫先痛而後腫者氣傷形也先腫而後痛者形傷氣也蓋形舍氣氣歸形故病形必及於氣病氣必及於形此章論病形而不病氣蓋陰陽之道有有形有無形有經常有變易上宗曰理者皮膚臟腑之紋理也蓋在外乃皮膚肌肉之紋理在內乃臟腑募原之紋理故留止而成積聚者在臟腑外之募原故乃傷脾胃之間而不涉於臟腑募原者連於腸胃之膏膜本藏第四十七黃帝問於岐伯曰人之血氣精神者所以奉生而周於性命者也經脈者所以行血氣而榮陰陽濡筋骨利關節者也衛氣者所以溫分肉充皮膚肥腠理司開闔者也志意者所以御精神收魂魄適寒溫和喜怒者也是故血和則經脈流行營覆陰陽筋骨徑強關節清利矣衛氣和則分肉解利皮膚調柔腠理致密矣志意和則精神專直魂魄不散悔怒不起五臟不受邪矣寒溫和則六腑化谷風痹不作經脈通利肢節得安矣此人之常平也五臟者所以藏精神血氣魂魄者也六腑者所以化水穀而行津液者也此人之所以具受於天也無愚智賢不肖無以相倚也然有其獨盡天壽而無邪僻之病百年不衰雖犯風雨卒寒大暑猶有弗能害也有其不離屏蔽室內無怵惕之恐然猶不免於病何也願聞其故岐伯曰窘乎哉問也五臟者所以參天地副陰陽而運四時化五節者也五臟者固有小大高下堅脆端正偏傾者六腑亦有小大長短厚薄結直緩急凡此二十五者各不同或善或惡或吉或凶請言其方上章論在外之皮膚肌腠因剛柔厚薄而生病此章論在內之五臟六腑有大小高下偏正厚薄之不同亦因形而生病也夫營衛血氣臟腑之所生也脈肉筋骨臟腑之外合也精神魂魄五臟之所藏也水穀津液六腑之所化也是以血氣神志和調則五臟不受邪而形體得安然又有因於臟腑之形質而能長壽不衰雖犯風雨寒暑邪勿能害者有外不離屏蔽室內內無怵惕之恐然猶不免於病者此緣臟腑在大小厚薄之不同致有善惡凶吉之變異蓋五臟六腑本於天地陰陽四時五行之氣而成此形故宜中正堅厚以參副天地陰陽之正氣心小則安邪弗能傷易傷以憂心大則憂不能傷易傷於邪心高則滿於肺中悗而善忘難開以言心下則臟外易傷於寒易恐以言心堅則臟安守固心脆則善病消疸熱中心端正則和利難傷心偏傾則操持不一無守司也心小則神氣收藏故邪弗能害小心故易傷以憂也心大則神旺而憂不能傷大則神氣外弛故易傷於邪也肺者心之蓋故心高則滿於肺中在心主言在肺主聲滿則心肺之竅閉塞故悶而善忘難開以言也經云心部於表故心下則臟外易傷於寒心卑下故易恐以言也心堅則臟安守固心脆則善病消疸熱中按邪氣臟腑篇五臟脈微小為消疸蓋五臟主藏精者也五臟脆弱則津液微薄故皆成消疸心正則精神和利而邪病難傷心偏傾則操持不一無守司也肺小則少飲不病喘喝肺大則多飲善病胸痹喉痹逆氣肺高則上氣肩息咳肺下則居賁迫肺善脅下痛肺堅則不病咳上氣肺脆則苦病消疸易傷肺端正則和利難傷肺偏傾則胸偏痛也賁葉奔肺主通調水道故小則少飲大則多飲肺居胸中開竅於喉以司呼吸故小則不病喘喝大則善病胸痹喉痹肺主氣故高則上氣息肩而咳也賁乃胃脘之賁門在胃之上口下則肺居賁間而胃脘迫肺血脈不通故脅下痛脅下乃肺脈所出之雲門中府處也肺堅則氣不上逆而咳肺脆則苦病消疸而肺易傷也肺藏氣氣舍魄肺端正則神志和利邪勿能傷肺偏傾則胸偏痛也肝小則臟安無脅下之痛肝大則逼胃迫咽迫咽則苦膈中且脅下痛肝高則上支賁切脅悗為息賁肝下則逼胃脅下空脅下空則易受邪肝堅則臟安難傷肝脆則善病消疸易傷肝端正則和利難傷肝偏傾則脅下痛也肝居脅下故小則臟安而無脅下之痛肝居胃之左故大則逼胃而胃脘上迫於咽也肝在膈之下故大則苦於膈中且脅下痛肝脈貫膈上注肺故高則上支賁切脅悗為息賁肝居胃旁故下則逼胃而脅下空空則易受於邪蓋脅乃邪正出入之樞部也肝堅則臟安難傷脆則善病消疸而易傷也肝藏血血舍魂端正則神志和利偏傾則脅痛也脾小則臟安難傷於邪也脾大則苦湊䏚而痛不能疾行脾高則䏚引季脅而痛脾下則下加於大腸下加於大腸則臟苦受邪脾堅則臟安難傷脾脆則善病消疸易傷脾端正則和利難傷脾偏傾則善滿善脹也䏚音秒與杪同脾為中土而主於四旁故小則臟安而難傷於邪也脾居於腹在脅骨之秒故大則苦湊䏚而痛脾主四肢故不能疾行也脅在䏚之上故高則䏚引季脅而痛下則加於大腸加於大腸則臟苦受邪蓋臟虛其本位也脾堅則臟安難傷脾脆則善病消疸而易傷也脾藏意意舍榮端正則神志和利偏傾則善滿善脹也腎小則臟安難傷腎大則善病腰痛不可以俯仰易傷以邪腎高則苦背膂痛不可以俯仰腎下則腰尻痛不可以俯仰為狐疝腎堅則不病腰背痛腎脆則苦病消疸易傷腎端正則和利難傷腎偏傾則苦腰尻痛也凡此二十五變者人之所苦常病也尻音敲肫骨也夫臟者藏也故小則臟安難傷大則善病腰痛腰乃腎之府也夫腰脊者身之大關節也故腰痛背膂痛腰尻痛皆不可以俯仰腎附於腰脊間故病諸痛也狐疝者偏有大小時時上下狐乃陰獸善變化而藏睪丸上下如狐之出入無時此腎臟之疝也腎堅則不病腰背痛脆則苦病消疸而易傷也腎藏精精舍志臟體端正則神志和利而難傷偏傾則苦腰尻痛也夫身形五臟之外合也皮薄理疏則風雨寒暑之邪循毫毛而入腠理以病形蓋六氣之客於外也如在內之藏形薄脆偏傾則人之所苦常病常病者五五二十五變病也黃帝曰何以知其然也岐伯曰赤色小理者心小粗理者心大無𩩲骭者心高𩩲骭小短舉者心下𩩲骭長者心下堅𩩲骭弱小以薄者心脆𩩲骭直下不舉者心端正𩩲骭倚一方者心偏傾也𩩲音結骭音干小理者肌肉之紋理細密粗理者肉理粗疏大肉䐃脂五臟之所生也故候肉理之粗細即知臟形之大小𩩲骭胸下蔽骨也本經曰膏人縱腹垂腴肉人者上下客大蓋人之䐃肉本於臟腑募原之精液以資生募原者臟腑之膏肓也五臟所藏之精液溢於膏肓而外養於䐃肉是以五臟病者大肉陷下破䐃脫肉白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脅者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脅偏疏者肺偏傾也肺居肩膺之內脅腋之上故視其肩背膺腋即知肺之高下堅脆偏傾倪沖之曰肺屬天而華蓋於上背為陽而形身之上也故肺俞出於肩背朱永年曰脈要精微論云尺內兩旁則季脅也尺外以候腎尺裡以候腹中推而外之內而不外有心腹積也推而內之外而不內身有熱也蓋形身之上下即臟腑所居之外候也青色小理者肝小粗理者肝大廣胸反骹者肝高合脅兔骹者肝下胸脅好者肝堅脅骨弱者肝脆膺腹好相得者肝端正脅骨偏舉者肝偏傾也骹音交骹者胸脅交分之扁骨內膈前連於胸之鳩尾旁連於脅後連於脊之十一椎肝在膈之下故廣胸反骹者肝高合脅兔骹者肝下兔者骨之藏伏也肝脈下循於腹之章門上循於膺之期門在內者從肝別貫膈故膺腹好相得者肝端正黃色小理者脾小粗理者脾大揭唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾也倪氏曰唇者脾之候故視唇之好惡以知脾臟之吉凶黑色小理者腎小粗理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾也凡此諸變者持則安減則病也倪氏曰耳者腎之候故視耳之好惡以知腎臟之高下偏正凡此諸變者神志能持則安減則不免於病矣帝曰善然非余之所問也願聞人之有不可病者至盡天壽雖有深憂大恐怵惕之志猶不能減也甚寒大熱不能傷也其有不離屏蔽室內又無怵惕之恐然不免於病者何也願聞其故岐伯曰五臟六腑邪之舍也請言其故五臟皆小者少病苦焦心大愁憂五臟皆大者緩於事難使以憂五臟皆高者好高舉措五臟皆下者好出人下五臟皆堅者無病五臟皆脆者不離於病五臟皆端正者和利得人心五臟皆偏傾者邪心而善盜不可以為人平反復言語也倪沖之曰此總結五臟之形不同而情志亦有別也五臟者所以藏精神血氣魂魄志意者也故小則血氣收藏而少病小則神志畏怯故苦焦心大憂愁也五臟皆大者神志充足故緩於事難使以憂五臟皆高者好高舉措五臟皆下者好出人下此皆因形而情志隨之也和於中則著於外故得人心善盜者貪取之小人語言反復不可以為平正人也黃帝曰願聞六腑之應岐伯答曰肺合大腸大腸者皮其應心合小腸小腸者脈其應肝合膽膽者筋其應脾合胃胃者肉其應腎合三焦膀胱三焦膀胱者腠理毫毛其應倪氏曰五臟為陰六腑為陽臟腑雌雄相合五臟內合六腑六腑外應於形身陰內而陽外也故視其外合之皮脈肉筋骨則知六腑之厚薄長短矣腎將兩臟一合三焦一合膀胱黃帝曰應之奈何岐伯曰肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裡大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結倪氏曰五臟內合六腑外應於皮脈肉筋骨是以肺應皮而皮厚者大腸厚皮薄者大腸薄臟腑之形氣外內交相輸應者也心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈衝小者小腸小而短諸陽經脈皆多紆屈者小腸結邪氣臟腑篇曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩皮脈之相應也故皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄脾應肉肉䐃堅大者胃厚肉䐃麼者胃薄肉䐃小而麼者胃不堅肉䐃不稱身者胃下胃下者下脘約不利肉䐃不堅者胃緩肉䐃無小裹纍者胃急肉䐃多小裹纍者胃結胃結者上脘約不利也䐃音窘稱去聲倪氏曰䐃肥脂也麼亦小也約約束也胃有上脘中脘下脘故胃下則下脘約不利結則上脘約不利也肝應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黑多紋者膽結也朱氏曰爪者筋之餘故肝應爪視爪之好惡以知膽之厚薄緩急也五臟六腑皆取決於膽故秉五臟五行之氣色莫子瑜曰膽屬甲子主天干地支之首故備五行之色腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也倪氏曰太陽之氣主皮毛三焦之氣通腠理是以視皮膚腠理之厚薄則內應於三焦膀胱矣又津液隨三焦之氣以溫肌肉充皮膚三焦者少陽之氣也本經云熏膚充身澤毛是謂氣是以皮毛皆應於三焦膀胱朱永年曰經云溪谷屬骨是肌肉之屬於骨也又曰脾生肉肉生肺肺生皮毛是骨肉皮毛交相資生者也故曰腎應骨密理厚皮者三焦膀胱厚黃帝曰厚薄美惡皆有形願聞其所病岐伯答曰視其外應以知其內臟則知所病矣倪氏曰六腑內合五臟外應於皮肉筋骨故視其外應以知其內臟則知其所病矣蓋六腑之厚薄緩急大小而為病者與五臟之相同也禁服第四十八雷公問於黃帝曰細子得受業通於九針六十篇旦暮勤服之近者編絶久者簡垢然尚諷誦弗置未盡解於意矣外揣言渾束為一未知所謂也夫大則無外小則無內大小無極高下無度束之奈何士之才力或有厚薄智慮褊淺不能博大深奧自強於學若細子細子恐其散於後世絶於子孫敢問約之奈何黃帝曰善乎哉問也此先師之所禁坐私傳之也割臂歃血之盟也子若欲得之何不齊乎雷公再拜而起曰請聞命於是矣乃齊宿三日而請曰敢問今日正陽細子願以受盟黃帝乃與俱入齊堂割臂歃血黃帝親祝曰今日正陽歃血傳方敢有背此言者反受其殃雷公再拜曰細子受之黃帝乃左握其手右受之書曰慎之慎之吾為子言之凡刺之理經脈為始營其所行知其度量內刺五臟外刺六腑審察衛氣為百病母調其虛實虛實乃止瀉其血絡血盡不殆矣夫氣合於天天合於地血合於水外揣篇論九針之道渾束為一而合於天道故篇名外揣言天道之運行於外司外可以揣內也此篇以氣血約而為一候其人迎氣口外可以知六氣內可以驗其臟腑之病蓋經脈本於臟腑之所生而合於六氣也故曰凡刺之理經脈為始營其所行知其度量內刺五臟外刺六腑審察衛氣為百病母謂邪之中人必先始於皮毛氣分而入於絡脈從經脈而入於臟腑故瀉其血絡血盡不殆蓋絡脈絡於皮膚之間乃氣血之交會故視其血絡盡瀉其血則邪病不致傳溜於經脈臟腑而成危殆之證矣虛實者血氣之虛實也蓋邪在氣則氣實而血虛陷於脈中則血實而氣虛故必審察其本末以調之夫血脈者上帝之所貴先師之所禁也藏之金匱非其人勿教非其真勿授故帝與歃血立盟而後乃傳方篇名禁服者誡其佩服而禁其輕泄也莫子瑜問曰此篇論約束氣血為一奚復引外揣而論曰天與水相連而運行於上下水天之合一也故曰如水鏡之察不失其形外揣篇論九針之道渾束為一而合於天道遠者司外揣內近者司內揣外是謂陰陽之極天地之蓋謂天地之合一也天地相合而水在其中矣此篇論氣血約而為一應水天之相合故引外揣而問者補申明前章之義也雷公曰此皆細子之所以通未知其所約也黃帝曰夫約方者猶約囊也囊滿而弗約則輸泄方成弗約則神與弗俱雷公曰願為下材者弗滿而約之黃帝曰未滿而知約之以為工不可以為天下師未滿而知約者知氣與血合候人迎氣口以知三陰三陽之氣而不知陰陽血氣推變無窮可渾束為一而合於天之大數故通人道於天道者斯可以為天下師約方者約束血氣之法如約囊者謂氣與血合猶氣在橐籥之中滿而弗約則輸泄矣故方成而弗約則神與弗俱謂血與氣不能共居而合一也滿而弗約者謂不知經治脈急弗引也約而為一者脈大以弱此血氣已和則欲安靜也雷公曰願聞為工黃帝曰寸口主中人迎主外兩者相應俱往俱來若引繩大小齊等春夏人迎微大秋冬寸口微大如是者名曰平人願聞為工者願聞血氣之相應而後明合一之大道是由工而上上而神神而明也寸口主陰故主中人迎主陽故主外陰陽中外之氣左右往來若引繩上下齊等如脈大者人迎氣口俱大脈小者人迎氣口俱小春夏陽氣盛而人迎微大秋冬陰氣盛而寸口微大如是者陰陽相應是謂平人若不應天之四時而更偏大於數倍是為溢陰溢陽之關格矣此論三陰三陽之氣而應於人迎氣口之兩脈也高子曰人迎氣口謂左右之兩寸口所以分候陰陽之氣非寸關尺三部也若以三部論之則左有陰陽而右有陰陽矣人迎大一倍於寸口病在足少陽一倍而躁病在手少陽人迎二倍病在足太陽二倍而躁病在手太陽人迎三倍病在足陽明三倍而躁病在手陽明盛則為熱虛則為寒緊則為痛痹代則乍甚乍間盛則瀉之虛則補之緊痛則取之分肉代則取血絡且飲藥陷下則灸之不盛不虛以經取之名曰經刺人迎四倍者且大且數名曰溢陽溢陽為外格死不治必審按其本末察其寒熱以驗其臟腑之病間去聲數葉朔此論陰陽之氣偏盛而脈見於人迎氣口及病之在氣在脈以證明血氣之相應相合也三陽之氣偏盛則人迎大二倍三倍此氣血之相應也脈大以弱則欲安靜此血氣之相合也痛痹者病在於皮腠之氣分氣傷故痛氣血相摶其脈則緊此病在氣而見於脈也代則乍甚乍間乍痛乍止者病在血氣之交或在氣或在脈有交相更代之義故脈代也盛則瀉之者氣盛宜瀉之也虛則補之者氣虛宜補之也緊痛之在氣分故當取之分肉代則病在血氣之交故當刺其血絡且飲藥者助其血脈臟腑勿使病從絡脈而入於經脈從經脈而入於臟腑也陷下則灸之者氣之下陷也不盛不虛者氣之和平也以經取之者病不在氣而已入於經則當取之於經矣若人迎大於四倍且大且數名曰溢陽溢陽者死不治夫始言人迎大一倍二倍三倍者此陽氣太盛而應於脈也後言以經取之名曰經刺人迎四倍者且大且數名曰溢陽此陽盛之氣溢於脈中氣血之相合也此以陰陽氣之偏盛病之在氣在脈以明氣之應於脈而合於脈也故必審按其本末察其寒熱以驗其臟腑之病本者以三陰三陽之氣為本末者以左右之人迎氣口為標蓋言陰陽血氣渾束為一外可以候三陰三陽之六氣內可以候五臟六腑之有形此陰陽離合之大道天運常變之大數也寸口大於人迎一倍病在足厥陰一倍而躁病在手心主寸口二倍病在足少陰二倍而躁病在手少陰寸口三倍病在足太陰三倍而躁病在手太陰盛則脹滿寒中食不化虛則熱中出糜少氣溺變色緊則痛痹代則乍痛乍止盛則瀉之虛則補之緊則先刺而後灸之代則取血絡而後調之陷下則徒灸之陷下者脈血絡於中中有著血血寒故宜灸之不盛不虛以經取之名曰經刺寸口四倍者名曰內關內關者且大且數死不治必審察其本末之寒溫以驗其臟腑之病夫在天蒼黅丹素玄之氣經於十干之分化生地之五行地之五行上呈天之六氣六氣合六經五行生五臟是六氣本於五臟之所生故陰氣太盛則脹滿寒中虛則熱中出糜溺色變氣從內而外由陰而陽也是以候人迎氣口則知陰陽六氣之盛虛內可以驗其臟腑之病陰陽外內之相通也夫痛痹在於分腠之氣分腠者皮膚臟腑之肉理故病在陽者取之分肉病在陰者先刺而後灸之蓋灸者所以啓在內在下之氣也代則氣分之邪交於脈絡故先取血絡而後飲藥以調之陷下則徒灸之蓋言氣陷下者宜灸今入於脈中又當取之於經矣如陷於脈而宜灸者乃脈受絡之留血而陷於中中有著血血寒故宜灸若氣並於血又非灸之所宜也此蓋因氣之盛虛病之外內以證明血氣之有分有合有邪病有和調反復辨論皆所以明約束之道所謂邪病者中有著血猶囊滿而弗約則輸泄矣和調者氣並於血神與氣俱渾束為一陰陽已和則欲安靜毋用力煩勞不可灸也朱永年曰本經中論人迎寸口大一二三倍之文凡四見其中章旨不同學者各宜體會若僅以三陰三陽論之去經義遠矣馬氏以六氣增注臟腑更為蛇足通其滎輸乃可傳於大數大數曰盛則徒瀉之虛則徒補之緊則灸刺且飲藥陷下則徒灸之不盛不虛以經取之所謂經治者飲藥亦曰灸刺脈急則引脈大以弱則欲安靜用力無勞也此總結上文以申明約束為一之道通其滎輸者謂血氣之相合從滎輸而溜注於脈也大數者謂合一之道通天道也故知其大數則曰盛則徒瀉之虛則徒補之陷下則徒灸之蓋謂氣盛者宜瀉氣虛者宜補氣陷下者宜灸今氣與血合渾束為一有病者則當取之於經氣盛於脈中者又當引而伸之血氣和平而相合者則欲安靜調養是以徒瀉徒補徒灸也所謂經治者飲藥亦曰灸刺此病入於經所當以經治之脈急則引者陰陽偏盛之氣並於脈中故脈數急又當引而伸之蓋囊滿勿約則輸泄矣若脈大以弱者此平和定氣與血相合而已和調則欲安靜以調養無用力以傷其血脈無煩勞以傷其氣也此章假人迎氣口之盛躁以明氣血之合一故曰脈急則引者先言盛躁之氣而合於脈中也繼言脈大以弱者乃平和之氣血渾束於一也氣並於脈中故脈大血氣和調故柔軟也外揣篇論渾束為一而合於天道天地有外內上下之氣交故司外可以揣內司內可以揣外此天地之合一也此篇論陰陽六氣與血脈渾束為一應司天在上在泉在下如水鏡之察不失其形此水天之合一也愚按此篇大義謂陰陽六氣外合於手足六經內合於五臟六腑可分可合可外可內者也候人迎氣口者候六氣之在外而不涉於經也陷下則灸之者謂氣陷於內而不陷於脈也故曰審察衛氣為百病母衛氣外行於皮膚分肉內行於臟腑之募原六氣在外同衛氣而在膚表之間陷於內則入於臟腑之募原矣故曰審察其本末之寒溫以驗其臟腑之病蓋以內為本而外為末血為本而氣為標審其病之在氣在脈在外在內也如病在外之六氣有不涉於六經者有病在氣而轉入於經者有陷於內而不幹於臟腑者有陷於募原之中而病及於臟腑者此六氣之於經脈臟腑可分而可合也緊則為痛痹者病形而傷氣也代則乍甚乍間者氣始入於脈也蓋六氣本於五臟之所生而外出於膚表合而為一則從絡而脈脈而經經而臟腑也六氣出入於臟腑經脈之間有離有合運行無息者也春夏人迎微大秋冬寸口微大此六氣行於脈外也脈大以弱則欲安靜此氣與血合混束而為一矣即如中風傷寒六經相傳七日來復此病在六氣而不涉於經也如病一二日即見嘔吐泄泄諸證者此陷於內而入腑也有病一二日即見神昏氣促煩躁諸證者此陷於臟腑之募原而為半死半生之證矣蓋客於臟外者生干臟者死干臟而臟真完固不為邪傷者生臟真傷而神昏躁盛者死故曰治五臟者半死半生也如傷寒之黃連阿膠桃花小陷胸證此病在氣而溜於經也蓋邪入於經其臟氣實不必動臟則溜於腑若血脈傳溜大氣入臟腹痛下淫可以致死而不可以致生矣夫邪氣淫泆不可勝數有病一二日或即溜於經或即陷於內或即干臟入腑者有病多日而漸次溜經陷內干臟入腑者有病久而只在氣在形不入於內者此邪病之有重輕正氣之有虛實也此篇論血氣之離合出入審病氣之輕重死生大有關於至道故帝令齊宿而始授其書豫亦不厭瑣贅而復明之以勉後學知正氣之出入則知邪病之淺深治其始蒙救其未逆弗使邪氣內入而成不救此醫道中修身善後之大功德也高子曰外揣篇論氣與形合此篇論氣與血合五變章論病在形而不病氣本藏篇論病在臟腑而不病氣本經厥逆諸篇有病氣者有病血者有血氣之兼病者此陰陽離合之道變化之不測也五色第四十九雷公問於黃帝曰五色獨決於明堂乎小子未知其所謂也黃帝曰明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽必中百歲此承三十七章之五閲五使復辨明五臟之氣見色於明堂見脈於氣口察其色切其脈以知病之間甚人之壽夭也五閲章曰五官已辨闕庭必張乃立明堂明堂廣大蕃蔽見外方壁高基引垂居外五色乃治平博廣大壽中百歲故帝復釋之曰明堂者鼻也闕者眉間也庭者顏者蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽必中百歲蓋言面部之形色應天地之形氣欲其清明而廣厚也夫五臟生於地之五行地之五行上呈天之五色及三陰三陽之六氣故色見於明堂脈出於氣口乃五臟之氣見於色而應於脈也故曰五氣者五臟之使也五時之副也氣口者左之人迎右之寸口所以候三陰三陽之氣三陰三陽者五臟六腑之氣也朱氏曰按五藏生成篇云凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也蓋五臟之氣色見於面五臟之血色見於目也脈要精微論曰尺外以候腎中附上左外以候肝右以候脾上附上右外以候肺左外以候心是五臟之有形候見於左右三部之寸關尺五臟之氣候見於氣口也故曰脈之浮沉及人迎與寸口氣小大等者病難已此五臟之形氣各有所候也夫天地之生命所以立形定氣故視人之壽夭決病之死生者必明乎此雷公曰五官之辨奈何黃帝曰明堂骨高以起平以直五臟次於中央六腑挾其兩側首面上於闕庭王宮在於下極五臟安於胸中真色以致病色不見明堂潤澤以清五官惡得無辨乎惡葉烏五官者五臟之外候也明堂者鼻也鼻之准骨貴高起而平直者也五臟次於中央闕庭之中肺也闕下者心也直下者肝也再下者脾也臟為陰而主中故候次於中央也六腑挾其兩側肝左者膽也方上者胃也中次者大腸也面王以上者小腸也面王以下者膀胱子處也腑為陽而主外故位次於兩側也腎為水臟故挾大腸而位於蕃蔽之外應地居中而海水之在外也首面上於闕庭王宮在於下極應天闕在上王宮在下有天地人之三部也闕庭者肺也肺主天而居上也極下者脾也脾主地而居下也王宮者心之部也心為君主而居中也五臟安居於胸中而臟真之色致見於外五官惡得無辨乎雷公曰其不辨者可得聞乎黃帝曰五色之見也各出其色部部骨陷者必不免於病矣其色部乘襲者雖病甚不死矣朱永年曰不辨者謂不辨其真色而辨其病色也五色之見各出其色部者謂五臟之病色各見於本部也刺熱論曰色榮顴骨熱病也部骨陷者謂本部之色隱然陷於骨間者必不免於病矣蓋病生於內者從內而外色隱現於骨者病已成矣承襲者謂子襲母氣也如心部見黃肝部見赤肺部見黑腎部見青此子之氣色承襲於母部雖病甚不死蓋從子以泄其母病也雷公曰官五色奈何黃帝曰青黑為痛黃赤為熱白為寒是為五官倪沖之曰此察五部之色而知外淫之病也青黑者風寒之色故為痛黃赤者火土之色故為熱白者清肅之氣故為寒是為五色之所司而為外因之病也莫子瑜曰上節論五臟之病色各出其部此論天之風寒見於五色審別外內是為良工雷公曰病之益甚與其方衰如何黃帝曰外內皆在焉切其脈口滑小緊以沉者病益甚在中人迎氣大緊以浮者其病益甚在外其脈口浮滑者病日進人迎沉而滑者病日損其脈口滑而沉者病日進在內其人迎脈滑盛以浮者其病日進在外脈之浮沉及人迎與寸口氣小大等者病難已病之在臟沉而大者易已小為逆病在腑浮而大者其病易已人迎盛堅者傷於寒氣口盛堅者傷於食此切其脈口人迎以知病之間甚外內也夫外因之病從外而內自陽而陰內因之病從內而外由陰而陽脈口主內人迎主外故曰外內皆在謂候其脈口人迎而外感內傷之病皆可以知其甚衰也故切其脈口滑小緊以沉者病甚在內也人迎氣大緊以浮者病甚在外也夫浮為陽沉為陰其脈口浮滑者陽氣在陰故病主日進人迎沉而滑者陰氣出陽故病日損也其脈口滑以沉者病日進在內也其人迎滑以浮者病日進在外也脈之浮沉謂左右寸關尺三部之脈與人迎寸口之氣大小浮沉等者此臟腑之形氣俱病故為難已病之在臟沉而大者此陰病見陽脈故為易已是以小則為逆病在腑浮而大者陽病在外故其病易散也人迎主外是以人迎盛堅者傷於寒病因於外也氣口主中是以氣口盛堅者傷於食病因於內也人迎氣口主臟腑陰陽之氣故候其兩脈而外內之病皆在焉雷公曰以色言病之間甚奈何黃帝曰其色粗以明沉夭者為甚其色上行者病益甚其色下行如雲徹散者病方已五臟各有臟部有外部有內部也色從外部走內部者其病從外走內其色從內走外者其病從內走外病生於內者先治其陰後治其陽反者益甚其病生於陽者先治其外後治其內反者益甚朱永年曰此察其色而知病之間甚外內也粗明主陽沉大主陰陰陽交見故為病甚夫色乃五臟五行之氣從內而出自下而上以見於面其色上行者病氣方殷故為益甚夫地氣升而為云得天氣降而徹散故病方已也臟部臟腑之分部也五臟次於中央為內部六腑挾其兩側為外部色從外部走內部者外因之病從外走內也其色從內走外者內因之病從內走外也蓋腑為陽而主外臟為陰而主內也故病生於內者先治其陰後治其陽反者益甚其病生於陽者先治其外後治其內反者益甚也其脈滑大以代而長者病從外來目有所見志有所惡此陽氣之並也可變而已承上文而言氣分之病並於血脈也上文之所謂陰陽外內者病在氣也故脈見於氣口色見於明堂若氣並於血則脈見寸關尺之三部而色見於目矣滑者寒水之象大者暑熱之象代者濕土之象長者風木之象此外因風寒暑濕之氣並於血脈而見此疹故曰以代曰而長謂或滑大或代或長皆病從外來非四氣之同並而同見此脈也目有所見者色見於目也志有所惡者五臟之神志有所不安也此陽氣之並也可變而已謂先治其外後治其內使之通變於外而病可已也雷公曰小子聞風者百病之始也厥逆者寒濕之起也別之奈何黃帝曰常候闕中薄澤為風沖濁為痹在地為厥此其常也各以其色言其病地者面之下部名地閣也風乃天氣故常候於闕庭寒濕者地氣故候在地部風乃陽邪故其色薄澤寒濕者陰邪故其色沖濁此承上啓下之文言風寒濕邪可並於脈中可入於臟腑而為卒死之不救故邪風之至疾如風雨而為百病之長故善治者治皮毛其次治肌膚其次治筋脈其次治臟腑治臟腑者半死半生也是以醫者當明於分部審察外內用陰和陽用陽和陰勿使邪入於臟而成不救斯謂之良工而萬舉萬當也朱永年曰氣並於脈則血脈傳溜大氣入臟不可以致生蓋邪在血脈尚可變而已已入於臟不亦晚乎是故聖人之教人察色辨脈蓋欲其不治已病而治未病不治已亂治未亂也倪沖之曰扁鵲望見桓侯之色正欲其治未病也所謂未病者病未傳溜於深隧也雷公曰人不病卒死何以知之黃帝曰大氣入於臟腑者不病而卒死矣雷公曰病小愈而卒死者何以知之黃帝曰赤色出兩顴大如拇指者病雖小愈必卒死黑色出於庭大如拇指必不病而卒死此承上文而言外因內因之病並於血脈而入臟者皆為卒死也大氣入臟者外淫之邪入於臟腑故不病而卒死矣不病者無在外之形證也病小愈而卒死者內因之病臟腑相乘也赤色出兩顴黑色出於庭即下文之所謂腎乘心心先病腎為應色皆如是蓋赤者火之色黑者水之色也小愈者水濟其火也卒死者水淫而火滅也蓋五行之氣制則生化淫勝則絶滅矣夫病在氣者其色散而不聚乘於脈中者其色聚而不散大如拇指者血脈之聚色也腎脈注胸中上絡心赤色出兩顴者腎上乘心而心火之氣外出也黑色出於庭者腎乘心而心先病腎為應而亦隨之外出故色皆如是皆如是者色皆如拇指也蓋臟者藏也五色之見於面者五臟之氣見於色也聚色外見者臟真之外泄也倪沖之曰水上乘心則心先病故曰病曰小愈腎氣上乘則自虛其本位矣復為後應而上出故不病而卒死不病者不為他臟所乘而自脫也朱永年曰五行之氣有相生有承製制則生化勝制太過則絶滅矣故病之小愈者制則生化也小愈而卒死者勝制太過也舉心腎而五臟皆然高士宗曰庭者天庭也水通於天上下環轉黑色出於庭乃水歸於天而無施轉之機矣在人則卒死在天為混濛雷公再拜曰善哉其死有期乎黃帝曰察色以知其時雷公曰善乎願卒聞之黃帝曰庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股里也巨屈者膝臏也此五臟六腑肢節之部也各有部分有部分用陰和陽用陽和陰當明部分萬舉萬當能別左右是謂大道男女異位故曰陰陽察色以言其時者察五臟五行之色以知所死之時也如赤色出於兩顴者所死之期其日壬癸其時夜半也黑色出於庭而死者其日戊己其時辰戌丑未時也臟腑各具五行之色各有所主之部故當明其部分用陰和陽用陽和陰陰陽和調萬舉萬當矣左右者陰陽之道路陽從左陰從右能別左右是謂天地之大道男子之色從左而右女子之色從右而左男女異位故曰陰陽倪沖之曰男從左女從右氣之順也順則散如男從右女從左氣之逆也逆則聚聚則有勝克絶滅之患此節論內因之色有陰陽左右死生逆順之分審察澤夭謂之良工沉濁為內浮澤為外黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚者為血痛甚為攣寒甚為皮不仁五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散摶以知遠近視色上下以知病處積神於心以知往今故相氣不微不知是非屬意勿去乃知新故色明不粗沉夭為甚不明不澤其病不甚此言審察其色以知外因之病也沉濁為內浮澤為外謂外因之病從外而內察其色之浮沉則知病之外內也風乃天之陽邪故色見黃赤痛為陰痹故色見青黑色白為寒色黃而膏潤為癰膿赤甚者為留血痛在筋骨故甚則為拘攣寒傷皮膚故甚為皮不仁此外因之邪見於五色而各見其部察其色之浮沉以知病之淺深察其色之澤夭以觀人之成敗察其色之散摶以知病之遠近視其色之上下以知病之所在夫色脈者上帝之所貴先師之所傳也上古使僦貸季理色脈而通神明合之四時五行八風六合不離其常是以積神於心然後以知往古來今故相氣不微不知是非屬意勿去乃知新故若色明不粗而反見沉夭者其病為甚其色雖不明澤而不沉夭者其病不甚蓋外因之病宜從外散而不宜內入也其色散駒駒然未有聚其病散而氣痛聚未成也腎乘心心先病腎為應色皆如是此復申明內因之病有聚散死生之別夫臟病之散而不聚則其色散如駒駒然而病未有聚也若摶聚於臟血脈相乘則見摶聚之色而為卒死之病矣駒駒然者如駒之過隙行而不留者也其色行散故病未有聚也夫氣傷痛其病散於氣分而痛者聚未成於血脈也若臟病不出於氣分如腎乘心則心先病而摶聚之赤色出於兩顴大如拇指矣腎即為應而黑色出於庭亦大如拇指矣此藏邪聚於臟從血脈相乘故色皆如是之聚而不散也金匱要略云血氣入臟即死入腑即愈非為一病百病皆然在外者可治入里者即死男子色在於面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿉陰之屬也女子在於面王為膀胱子處之病故為痛摶為聚方圓左右各如其色形其隨而下至胝為淫有潤如膏狀為暴食不潔左為左右為右其色有邪聚散而不端面色所指者也圜圓同邪斜同此言外因之病色見於腑部者其病在腑色雖摶聚非死徵也面王以上者小腸也面王以下者膀胱子處也故男子色見於面王為小腹痛其圓直為莖痛夫外因之病從外而內其色從上而下故以高為本下為所行之首其病乃在下狐疝陰㿉之屬也女子色見於面王為膀胱子處之病男女之病散在氣分則為痛摶於血分則為聚夫狐疝陰㿉之屬乃有形之證其形之或方或圓或左或右各如其色形蓋病聚於內則見聚色於外形方則色方形圓則色圓此病形而不病臟雖有聚色非死色也此五臟六腑各有部分有外內能明乎部分知其外內萬舉萬當矣胝者面王之下部也其面王之色隨而下至胝者主有淫濁之證其色潤如膏狀者為暴食不潔之物蓋腑為陽而主外主受納水穀傳導糟粕是以或外受風寒或內傷飲食皆為病腑而色見於腑部也色見於左則為病在左色見於右則為病在右其所見之色或聚或散皆斜而不端其摶聚之面色所謂如指者也夫血脈傳溜大邪入臟則為卒死今腑病而為狐疝陰㿉之屬因邪摶而為聚病故見其聚色非入臟之死徵也色者青黑赤白黃皆端滿有別鄉別鄉赤者其色赤大如榆莢在面王為不日此言色之摶聚而端滿者乃大氣入臟而為卒死矣青黃赤白黑五臟五行之色也別鄉者如小腸之部在面王而面王者乃心之別鄉也膽之部在肝左膽部者肝之別鄉也大如榆莢者血分之聚色即如拇指之狀也不日者不終日而卒死也此言五臟之病色見於本部五臟之死色見於別鄉如心受外淫之邪而卒死者其色見於面王心受內因之病而卒死者其色出於顴皆非心臟之本部但在臟者其色端滿而不斜在腑者其色斜而不端此臟腑死生之有別也高士宗曰臟真藏於內絶則從腑而脫於外故色見於腑部其色上鋭首空上向下鋭下向在左右如法此承上文以申明端邪之色狀也鋭尖也空虛也其色上行者上鋭首虛浮而上行其色下行者下鋭首虛浮而下行蓋病從內而外者其本在下其首在上病從外而內者其本在上其首在下是以本沉實而首虛浮此端滿之色狀也有邪而不端者其本在左其首向右行其本在右其首向左行皆如上鋭首空下鋭首空之法此病在腑而摶為聚之聚色也朱永年曰榆莢上下皆鋭但虛浮者其鋭形外見所沉之本不見其鋭形也故曰察其浮沉以知淺深以五色命臟青為肝赤為心白為肺黃為脾黑為腎肝合筋心合脈肺合皮脾合肉腎合骨也此總結五臟各具五色而各有外內之形層也上文言赤色出於兩顴黑色出於庭赤色在面王此心腎之色也若以五色命臟則五臟各有五者之色矣至於肩臂膺背膝脛手足之部俱各有五臟所合之皮脈肉筋骨視其五色則知病在內之五臟在外合之形層此五臟內合五行外見五色若外因風寒暑濕之邪而見於色者六氣之應於色也倪沖之曰病五臟於內則外見五色邪中外合之皮脈肉筋骨則內入於五臟此外內出入之道也按病傳章曰血脈傳溜大邪入臟可以致死不可以致生帝曰大氣入臟奈何伯曰病先發於心一日而之肺三日而之肝蓋血脈傳溜故先發於心若邪中皮而內入則先發於肺矣夫邪從形層次第而入於內者先皮毛而肌腠腠而絡絡而脈脈而經經而腑臟此邪在外之皮脈即中內合之五臟故曰人不病而卒死謂不病在外之形層而即入於臟也論勇第五十黃帝問於少俞曰有人於此並行並立其年之長少等也衣之厚薄均也卒然遇烈風暴雨或病或不病或皆病或皆不病其故何也少俞曰帝問何急黃帝曰願盡聞之少俞曰春青風夏陽風秋涼風冬寒風凡此四時之風者其所病各不同形黃帝曰四時之風病人如何少俞曰黃色薄皮弱肉者不勝春之虛風白色薄皮弱肉者不勝夏之虛風青色薄皮弱肉不勝秋之虛風赤色薄皮弱肉不勝冬之虛風也黃帝曰黑色不病乎少俞曰黑色而皮膚肉堅固不傷於四時之風其皮薄而肉不堅色不一者長夏至而有虛風者病矣其皮厚而肌肉堅者長夏至而有虛風不病矣其皮厚而肌肉堅者必重感於寒外內皆然乃病黃帝曰善朱永年曰上章論五臟之氣見於色而分別於明堂此論五臟之氣充於形而審其虛實蓋皮膚肌腠之間五臟元真之所通會是以薄皮弱肉則臟真之氣虛矣五臟之氣虛則不能勝四時之虛風矣虛風者虛鄉不正之邪風也黑者水之色論腎氣之厚薄也不傷於四時之風者謂土旺於四季也不病長夏之風者謂土主於長夏也設有皮厚肉堅而傷於四時之風者必重感於寒也夫在地為水在天為寒腎為水臟上應天之寒氣是以色黑而皮厚肉堅之為病者必重感於寒外內皆然乃病謂外受天之寒邪內傷腎臟之水氣此言人之五臟與天之六氣相合是以五色之薄弱者不能勝四時之風氣也倪沖之曰五變章論形之厚薄堅脆此章論形中之氣有強弱之不同黃帝曰夫人之忍痛與不忍痛者非勇怯之分也夫勇士之不忍痛者見難則前見痛則止夫怯士之忍痛者聞難則恐遇痛不動夫勇士之忍痛者見難不恐遇痛不動夫怯士之不忍痛者見難與痛目轉面盻恐不能言失氣驚顏色變化乍死乍生余見其然也不知其何由願聞其故少俞曰夫忍痛與不忍痛者皮膚之厚薄肌肉之堅脆緩急之分也非勇怯之謂也倪沖之曰此言形氣之有別也夫忍痛與不忍痛者因形之厚薄堅脆也勇怯者氣之強弱也上節論因形而定氣此論形氣之各有分焉蓋形舍氣氣歸形形氣之可分可合而論者也黃帝曰願聞勇怯之所由然少俞曰勇士者目深以固長沖直揚三焦理橫其心端直其肝大以堅其膽滿以傍怒則氣盛而胸張肝舉而膽橫眥裂而目揚毛起而面蒼此勇士之由然者也黃帝曰願聞怯士之所由然少俞曰怯士者目大而不減陰陽相失其焦理縱𩩲骭短而小肝系緩其膽不滿而縱腸胃挺脅下空雖方大怒氣不能滿其胸肝肺雖舉氣衰復下故不能久怒此怯士之所能然者也朱永年曰此言勇怯者本於心之端小氣之盛衰肝膽之強弱也目深以固長沖直揚肝氣強也理者肌肉之紋理乃三焦通會之處三焦理橫少陽之氣壯而膽橫也其心端直自反而縮也肝大以堅臟體之堅大也膽滿以傍膽之精汁充滿於四旁此肝膽之形質壯盛也氣盛而胸張氣之盛大也肝舉膽橫眥裂毛起肝膽之氣強也夫心者君主之官神明出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉是以心直氣壯肝舉膽橫此勇士之所由然者也目大不減者目雖大而不深固也陰陽相失者血氣不和也焦理縱者三焦之理路縱弛也𩩲骭短而小者心小而下也肝系緩膽不滿腸胃緩脅下空肝膽之體質薄也夫肺主氣氣不能滿其胸故雖方大怒肝肺雖舉氣衰復下此怯士之所由然者也黃帝曰怯士之得酒怒不避勇士者何臟使然少俞曰酒者水穀之精熟谷之液也其氣慓悍其入於胃中則胃脹氣上逆滿於胸中肝浮膽橫當是之時固比於勇士氣衰則悔與勇士同類不知避之名曰酒悖也朱氏曰此復申明人之勇怯本於氣之弱強氣之壯盛由胃腑水穀之所生也酒者水穀之精熟谷之液也其氣慓悍故能助氣之充滿而使肝膽浮橫然酒散則氣衰氣衰則悔矣故善養乎氣者飲食有節起居有常則形氣充足矣暴喜傷陽暴怒傷陰和其喜怒則陰陽不相失矣形氣壯盛雖遇烈風暴雨無由入其腠理而況四時之虛風乎倪氏曰氣之敢勇本於心之端直肝之大堅膽之汁滿是氣生於形也氣滿胸中而使肝浮膽橫是形本乎氣也形不離乎氣氣不離乎形此天之生命所以立形定氣以觀人之壽夭者也高士宗曰怯士之得酒與勇士同類即雖方大怒肝肺舉而氣衰復下相同蓋因酒因怒以壯其氣酒散氣衰則復怯矣故無暴其氣此善養乎大勇者也背俞第五十一黃帝問於岐伯曰願聞五臟之俞出於背者岐伯曰背中大俞在杼骨之端肺俞在三焦之間心俞在五焦之間膈俞在七焦之間肝俞在九焦之間脾俞在十一焦之間腎俞在十四焦之間皆挾脊相去三寸所則欲得而驗之按其處應在中而痛解乃其俞也灸之則可刺之則不可氣盛則瀉之虛則補之以火補者毋吹其火須自滅也以火瀉者疾吹其火傅其艾須其火滅也倪沖之曰五臟六腑之俞皆在於背帝只問五臟之俞者臟腑雌雄相合論地之五行也焦椎也在脊背骨節之交督脈之所循也大杼在第一椎端之兩旁肺俞在三椎之間心俞在五椎之間膈俞在七椎之間肝俞在九椎之間脾俞在十一椎之間腎俞在十四椎之間皆挾脊相去三寸所左右各間中行一寸五分也按其俞應在中而痛解者太陽與督脈之相通也是以問五臟之俞而先言大杼者乃項後大骨之端督脈循於脊骨之第一椎也問五臟而言七焦之膈俞者五臟之氣皆從內膈而出故曰七節之旁中有小心中膈者皆為傷中其病雖愈不過一歲必死夫五臟之俞皆附於足太陽之經者膀胱為水府地之五行本於天一之水也按太陽之經而應於督脈者太陽寒水之氣督脈總督一身之陽陰陽水火之氣交也灸之則可者能啓臟陰之氣也刺之則不可者中心者環死中脾者五日死中腎者七日死中肺者五日死蓋逆刺其五臟之氣皆為傷中非謂中於臟形也以火補之者以火濟水也以火瀉之者艾名冰臺能於水中取火能啓發陰臟之氣故疾吹其火即傅上其艾以導引其外出也朱氏曰太陽之上寒水主之是以標陽而本寒秉水火陰陽之氣者也督脈環繞於周身之前後從陰而上行者循陰氣別繞臀上股內後廉貫脊屬腎從陽而下行者與太陽起於目內眥上額交巔入絡腦還出別下項挾脊抵腰中下循膂絡腎是督脈環繞於前後上下而屬絡於兩腎者也天一生水地二生火此太極始分之陰陽人秉先天之水火化生五行以成此形是以五臟之俞皆本於太陽而應於督脈也衛氣第五十二黃帝曰五臟者所以藏精神魂魄者也六腑者所以受水穀而化行物者也其氣內於五臟而外絡支節其浮氣之不循經者為衛氣其精氣之行於經者為營氣陰陽相隨外內相貫如環之無端亭亭淳淳乎孰能窮之然其分別陰陽皆有標本虛實所離之處能別陰陽十二經者知病之所生候虛實之所在者能得病之高下知六腑之氣街者能知解結契紹於門戶能知虛實之堅軟者知補瀉之所在能知六經標本者可以無惑於天下此章論營行脈中衛行脈外然經脈皮膚之血氣外內出入陰陽相貫環轉之無端也其氣者謂水穀所生之營衛內榮於五臟以養精神魂魄外絡於支節以濡筋骨關節此言臟腑陰陽十二經脈之外內也其浮氣之不循經者為衛氣其精氣之行於經者為營氣謂營行脈中衛行脈外各走其道交相逆順而行者也陰陽相隨外內相貫謂脈內之血氣出於脈外脈外之氣血貫於脈中陰陽相隨外內出入如環無端莫知其紀也合天地之亭毒乃陰陽之化淳亭亭淳淳孰能窮之然其分別陰陽皆有標本虛實所離之處蓋以經脈所起之處為本所出之處為標虛實者謂血氣出於氣街離經脈而榮於膚腠則經脈虛而皮膚實矣高下者謂本在下而標出於上也氣街者氣之徑路絡絶則徑通乃經脈之血氣從此離絶而出於脈外者也契合也紹繼也門戶者血氣所出之門戶知六腑之氣街則知血氣之結於脈內者解而通之脈內之血氣與脈外之氣血相合相繼而行則知出於氣街之門戶矣脈內之血氣從氣街而出於脈外脈外之氣血從井滎而溜於脈中出於氣街則經脈虛軟而皮膚石堅溜於脈中則經脈石堅而皮膚虛軟故能知虛實則知補瀉之所在矣皮膚之氣血猶海之布雲氣於天下經脈之血氣合經水之流貫於地中故能知六經之標本可以無惑於天下篇名衛氣者謂脈內之營氣出於氣街與衛氣相將晝行陽而夜行於陰也夫營衛者水穀之精氣營行脈中衛行脈外乃無形之氣也水穀之津液化而為血以奉生身命曰營氣乃有形之血行於經隧皮膚者皆謂之營氣夫充膚熱肉之血有從衝脈而散於皮膚者有從大絡而出於脈外者有隨三焦出氣之津液化而為赤者皆謂之營氣蓋以血為營血之氣為營氣也此章論行於脈中之營氣出於氣街與衛氣相將而行故篇名衛氣曰陰陽相隨外內相貫血氣之生始出入陰陽離合頭緒紛紜學者當於全經內細心窮究庶可以無惑矣岐伯曰博哉聖帝之論臣請盡意悉言之足太陽之本在跟以上五寸中標在兩絡命門命門者目也足少陽之本在竅陰之間標在窗籠之前窗籠者耳也足少陰之本在內踝下上三寸中標在背俞與舌下兩脈也足厥陰之本在行間上五寸所標在背俞也足陽明之本在厲兌標在人迎頰挾頏顙也足太陰之本在中封前上四寸之中標在背俞與舌本也此分別十二經脈之本出於手足之腕踝其標在於胸腹頭氣之街標者猶樹之梢杪杪絶而出於絡外之徑路也本者猶木之根干經脈之血氣從此而出也足太陽之本在跟以上五寸中其標在於兩目而出於頭氣之街夫氣在頭者止之於腦兩目之脈入於腦而絶於內也足少陽之本在足竅陰之間其標在耳窗籠之前而出於頭氣之街足少陰之本在內踝下上三寸中其標在於背俞與舌下之兩脈而出於胸氣之街蓋氣在胸者止之膺與背俞謂絡脈之循於胸者或絶於膺胸之間或行至背俞而始絶也根結篇曰少陰結於廉泉舌下兩脈廉泉玉英也蓋少陰主先天之精氣及受藏水穀之精故從本經之絡脈而出於胸氣之街復從任脈而上出於廉泉從衝脈而下出於脛氣之街少陰為水臟而富於精血者也足厥陰之本在行間上五寸所標在背俞而出於胸氣之街足陽明之本在足之厲兌標在人迎頰挾頏顙而出於頭氣之街頏顙者鼻之上竅以收洞涕者也足太陰之本在中封前上四寸之中標在背俞與舌本而出於胸氣之街蓋三陽之經上循於頭是以絡脈亦上出於頭而始絶三陰之脈止於膺胸之間故絡脈亦至膺與背俞而止按此章與根結篇大義相同而各有分別根結篇論三陰三陽之開闔樞此章論十二絡脈之標本出入倪氏曰開闔樞者三陰三陽之氣也入於脈中為闔出於膚表為開出入於皮膚經脈之外內為樞此論氣而及於脈絡也此章論血氣出入於十二經脈之中以合三陰三陽之氣故曰太陽少陽陽明太陰少陰厥陰而不言臟腑之經脈此論絡脈而及於氣也蓋血氣之行於膚表者應六氣之司天在泉運行於地之外膚表之氣血溜注於脈中應天泉之復通貫於地內五運行篇之所謂燥勝則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地固也十二經脈應經水之流行於地中經脈之血氣從絡脈而出於膚表猶經水之從支流而注於海海之雲氣復上通於天是以論陰陽六氣不離乎經脈論十二經脈不離乎陰陽人與天地參也手太陽之本在外踝之後標在命門之上一寸也手少陽之本在小指次指之間上二寸標在耳後上角下外眥也手陽明之本在肘骨中上至別陽標在顏下合鉗上也手太陰之本在寸口之中標在腋內動也手少陰之本在鋭骨之端標在背俞也手心主之本在掌後兩筋之間二寸中標在腋下下三寸也手太陽之本在外踝之後標在命門之上一寸而出於頭氣之街手少陽之本在小指次指之間上二寸標在耳後上角下外眥而出於頭氣之街手陽明之本在肘骨上至別陽標在顏下合鉗上而出於頭氣之街鉗上者耳上也手太陰之本在寸口之中標在腋內之動處而出於胸氣之街手少陰之本在鋭骨之端標在背俞而出於胸氣之街手心主之本在掌後兩筋之間二寸中標在腋下三寸而出於胸氣之街按十二經脈之終始出於井溜於滎注於輸行於經入於合而內屬於臟腑此臟腑之十二經脈也十二絡脈之本標乃經脈之支別故曰此氣之大絡也絡絶則徑通蓋血氣從絡脈之起處為本盡處為標而出於氣街也然支絡乃經脈之分派故曰足太陽之本在跟以上五寸中足少陰之本在內踝下三寸中蓋以本支所分之處為本而不定在於經俞之穴會也至於標在頭氣之街者止之於腦如太陽之在目內少陽之在耳中陽明之在頏顙乃三陽之絡脈絶於頭腦之中亦非頭面之穴會也經脈之內屬臟腑外絡形身應神機之出入血氣之從絡脈出於氣街運行於膚表應精氣之降升出入廢則神機化滅升降息則氣立孤危故曰亭亭淳淳孰能窮之言血氣之升降出入合天地之化育運行無息者也凡候此者下虛則厥下盛則熱上虛則眩上盛則熱痛故石者絶而止之虛者引而起之虛實者謂十二絡脈之血氣有虛而有實也下虛下盛者虛實之在本也是以下虛則厥下盛則熱上虛上盛者虛實之在標也是以上虛則眩上盛則熱痛故石者絶而止之謂絶之於下而止之盛於上也虛者引而起之謂引之於上而起之出於下也此候手足之十二絡脈上出於頭氣胸氣之街者也朱氏曰絶者絶其經脈之血氣溢於絡脈之中起者起其經脈之血氣而引出於氣街也此蓋以申明血脈之貫通非補瀉之謂也請言氣街胸氣有街腹氣有街頭氣有街脛氣有街故氣在頭者止之於腦氣在胸者止之膺與背俞氣在腹者止之背俞與衝脈於臍左右之動脈者氣在脛者止之於氣街與承山踝上以下取此者用毫針必先按而在久應於手乃刺而豫之所治者頭痛眩僕腹痛中滿暴脹及有新積痛可移者易已也積不痛難已也街路也氣街者氣之徑路絡絶則徑通乃絡脈之盡絶處血氣從此通出於皮腠者也止盡也止之於腦者言頭氣之街絡脈盡於腦也止之膺與背俞者謂胸氣之街絡脈有盡於膺胸之間者有從胸上循肩背而始絶者脈內之血氣或從膺腋之絡脈盡處而出於皮膚或從背俞之絡脈盡處而出於皮膚也夫十二經脈上出於頭氣之街胸氣之街者血氣從下而上出於標也經云衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈是陽明之血氣又從衝脈而出於腹氣之街故與衝脈會於臍之左右動脈也本經動腧篇曰衝脈與少陰之大絡起於腎下出於氣街循陰股內廉邪入膕中膕中乃足太陽之部分故與足太陽之承山交會於踝上以下此足少陰又同衝脈而出於脛氣之街也毫針微細之針取氣之出於皮毛者也按之在久者候氣之至也夫少陰陽明為血氣之生始少陰之血氣逆於脈氣之街則不能上行而為頭痛眩僕陽明之血氣逆於腹氣之街則不能布散而為腹痛中滿此因少陰陽明之氣厥逆故用毫針久按以候氣故所治者頭痛眩僕中滿也及有新積痛可移者積在氣分故為易已積不痛者積在血分故難已也此蓋假積以申明經絡出榮血出於氣街與衛氣偕行環轉無端或有因於氣逆或有因於血逆也陽明為血氣所生之腑少陰乃先天精氣之臟故復從衝脈出於腹氣之街脛氣之街而充布於皮膚肌腠是以動腧篇論足少陰陽明獨動不休者乃血氣之盛也論痛第五十三黃帝問於少俞曰筋骨之強弱肌肉之堅脆皮膚之厚薄腠理之疏密各下同其於針石火焫之痛如何腸胃之厚薄堅脆亦不等其於毒藥何如願盡聞之少俞曰人之骨強筋弱肉緩皮膚厚者耐痛其於針石之痛火焫亦然黃帝曰其耐火焫者何以知之少俞答曰加以黑色而美骨者耐火焫黃帝曰其不耐針石之痛者何以知之少俞曰堅肉薄皮者不耐針石之痛於火焫亦然焫熱同此承上文復申明人之皮肉筋骨皆藉少陰陽明之所資生而資養者也少陰秉先天之精氣陽明化水穀之精微是以筋骨之強弱肌肉之堅脆皮膚之厚薄腠理之疏密皆秉氣於少陰陽明者也黑色而美骨者少陰之血氣盛也肉緩皮膚厚者陽明之血氣盛也莫子曰腎為水臟故少陰之氣盛者能耐火焫陽明秉秋金之氣故氣弱則不能耐針石火焫矣黃帝曰人之病或同時而傷或易已或難已其故何如少俞曰同時而傷其身多熱者易已多寒者難已此分論少陰之氣少陰者至陰也而為生氣之原故其身多熱者少陰之生氣盛也多寒者少陰之生氣虛也人之形氣生於後天之水穀始於先天之陰陽形氣盛則邪散形氣虛則邪留是以病之難易已者由少陰生氣之盛衰也朱氏曰少陰先天之精氣藉後天水穀以資培兩火併合故曰陽明陽明秉燥熱之氣者也其身多熱者少陰之氣盛也少陰之氣盛受陽明之所資也此節論少陰受陽明之氣以資培下節論陽明受少陰之氣以合化黃帝曰人之勝毒何以知之少俞曰胃厚色黑大骨及肥者皆勝毒故其瘦而薄胃者皆不勝毒也勝平聲此復論少陰與陽明之相合也陽明居中土主受納水穀藉少陰之氣上升戊癸相合化大火土之氣而後能蒸泌水穀之精微是以胃厚色黑大骨及肥者少陰陽明之氣並盛故皆能勝毒倪氏曰中下二焦互相資生然後筋骨強堅肌肉豐厚此注與素問厥論合看天年第五十四黃帝問於岐伯曰願聞人之始生何氣築為基何立而為楯何失而死何得而生岐伯曰以母為基以父為楯失神者死得神者生也倪沖之曰此篇論人之生死壽夭皆本於少陰陽明也夫陽為父陰為母基始也言人生於少陰而始生也楯者干盾之屬所以扞禦四旁謂得陽明之氣而能充實於四體也兩精相搏謂之神兩精者一生於先天之精一生於水穀之精相搏者摶聚而合一也謂得先後天之精氣充足然後形與神俱度百歲乃去黃帝曰何者為神岐伯曰血氣已和營衛已通五臟已成神氣舍心魂魄畢具乃成為人朱永年曰此言有生之初得先天之精氣生此營衛氣血五臟神志而後乃成人黃帝曰人之壽夭各不同或夭壽或卒死或病久願聞其道岐伯曰五臟堅固血脈和調肌肉解利皮膚緻密營衛之行不失其常呼吸微徐氣以度行六腑化谷津液布揚各如其常故能長久朱氏曰此言已生之後藉水穀之精氣資生營衛津液資養臟腑形身而後能長久黃帝曰人之壽百歲而死何以知之岐伯曰使道隧以長基牆高以方通調營衛三部三里起骨高肉滿百歲乃得終此總論人秉先後天之精氣充足營衛通調骨肉豐滿可長享其天年使道者血脈之道路本輸篇之所謂間使之道蓋心包絡之主血脈也隧行列也長者環轉之無端也此言血氣充足循序而流通也土基高以方者肌肉厚而充於四體也脈道流長肌肉高厚則營衛通調矣三部者形身之上中下三里者手足陽明之脈皆起發而平等也骨高者少陰之氣足也肉滿者陽明之氣盛也如此者壽之徵也倪氏曰心包絡主脈包絡三焦乃腎臟所生之氣出歸於心下為有形之臟腑而主血脈此先天之精氣也基牆者土基厚而四壁堅固此從天水穀之精氣也黃帝曰其氣之盛衰以至其死可得聞乎岐伯曰人生十歲五臟始定血氣已通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五臟大定肌肉堅固血脈盛滿故好步四十歲五臟六腑十二經脈皆大盛以平定腠理始疏榮華頽落發頗頒白平盛不搖故好坐五十歲肝氣始衰肝葉始薄膽汁始滅目始不明六十歲心氣始衰善憂悲血氣懈惰故好臥七十歲脾氣虛皮膚枯八十歲肺氣衰魄離故言善誤九十歲腎氣焦四臟經脈空虛百歲五臟皆虛神氣皆去形骸獨居而終矣此言人之生長從陰而生自下而上故曰其氣在下好走好趨好步者春夏生動之氣也人之衰老從上而下自陽而陰故肝始衰而心心而脾脾而肺肺而腎好坐好臥者秋冬收藏之氣也肌肉堅固血脈盛滿少陰陽明之氣盛也腠理空疏發頗頒白陽明少陰之氣衰也朱氏曰人之生長先本於腎臟之精氣從水火而生木金土先天之五行也人之衰老從肝木以及於火土金水後天之五行也黃帝曰其不能終壽而死者何如岐伯曰其五臟皆不堅使道不長空外以張喘息暴疾又卑基牆薄脈少血其肉不石數中風寒血氣虛脈不通真邪相攻亂而相引故中壽而盡也數葉朔此言人秉先天之氣虛薄而後天猶可資培更能無犯賊風虛邪亦可延年益壽若秉氣虛弱而又不能調養兼之數中風寒以致中道夭而不能盡其天年矣五臟不堅使道不長空外以張喘息暴疾先天之氣不足也又卑基牆薄脈少血其肉不石又失其飲食起居之調養矣數中風寒又不知虛邪賊風避之有時矣致使真邪相攻亂而相引故中壽而盡也倪沖之曰先天者腎臟之精氣也然有生之後惟藉後天以資培水穀入口其味有五津液各走其道酸先入肝苦先入心甘先入脾辛先入肺咸先入腎五臟主藏水穀之精者也腎為水臟受五臟之精而藏之是以先天之精氣不足得後天以資養亦可以享其永年故曰六腑化谷津液布揚各如其常故能久長
