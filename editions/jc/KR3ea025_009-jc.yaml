body:
  text: 卷九通天第七十二黃帝問於少師曰余嘗聞人有陰陽何謂陰人何謂陽人少師曰天地之間六合之內不離於五人亦應之非徒一陰一陽而已也而略言耳口弗能遍明也黃帝曰願略聞其意有賢人聖人心能備而行之乎少師曰蓋有太陰之人少陰之人太陽之人少陽之人陰陽和平之人凡五人者其態不同其筋骨氣血各不等一陰一陽者始生之兩儀應陰陽和平之人也太陰少陰太陽少陽應所生之四象也人秉天地之氣而生成此形氣是以陰陽二十五人章論地之五行以生此形故論五音之形此論人合天之陰陽四象故篇名通天而論人之態也黃帝曰其不等者可得聞乎少師曰太陰之人貪而不仁下齊湛湛好內而惡出心和而不發不務於時動而後之此太陰之人也內葉訥惡去聲趙庭霞曰太陰之人太偏於陰矣其人陰險故貪而不仁陰內而陽外故好內而惡出湛湛清潔貌下齊謙下整齊足恭之態也心和而不發陰柔之性也不務於時者不通時務也動而後之者見人之舉動而後隨之柔順之態也少陰之人小貪而賊心見人有亡常若有得好傷好害見人有榮乃反慍怒心疾而無恩此少陰之人也好俱去聲趙氏曰少陰之人少偏於陰故小貪然陰險之性局量褊淺故常好賊害之心利人之失而忌人之得也太陽之人居處於於好言大事無能而虛說志發於四野舉措不顧是非為事如常自用事雖敗而無常悔此太陽之人也趙氏曰于于自足貌好言大事無能而虛說言大不慚無必為之志也志發於四野者放曠而肆志也舉措不顧是非者恣意妄行顛倒從違也自用者言不式古行不遵先也雖敗而無常悔者陽剛而矯強也陽在外故偏陽之人好誇張於外而無內之實行也少陽之人是諦好自貴有小小官則高自宜好為外交而不內附此少陽之人也趙氏曰是諦好自貴者好自審為貴也有小官則高者妄自尊高也好外交而不內附者陽性之外務也陰陽和平之人居處安靜無為懼懼無為欣欣惋然從物或與不爭與時變化尊則謙謙譚而不治是謂至治趙氏曰居處安靜者恬憺虛無也無為懼懼無為欣欣者心安而不懼志閒而少欲也惋然從物或與不爭者與物無競與世不爭也與時變化者隨世變遷所謂禹稷顏回同道也居尊而謙其德愈光也譚而不治者無為而治也至治者不治之治也此陰陽和平之象賢人聖人心能備而行之則心正身修而可以平治天下矣古之善用針灸者視人五態乃治之盛者瀉之虛者補之偏陽之人瀉陽補陰偏陰之人瀉陰補陽此言針合天地人三才之道可以挽回天地陰陽之造化者也朱衛公曰陰陽之氣皆從下而上古之善灸者能啟陰陽之氣以上行黃帝曰治人之五態奈何少師曰太陰之人多陰而無陽其陰血濁其衛氣澀陰陽不和緩筋而厚皮不之疾瀉不能移之趙庭霞曰太陰之人多陰無陽故其陰血濃濁陽氣者通會於腠理無陽故衛氣所行之澀滯也陰血多故筋緩血多氣少故皮堅而厚此陰陽不和之劇不之疾瀉不能移易也少陰之人多陰少陽小胃而大腸六腑不調其陽明脈小而太陽脈大必審調之其血易脫其氣易敗也趙氏曰在內者五臟為陰六腑為陽多陰少陽故六腑不調也陽氣生於中焦其陽明脈小者生陽之本不足也太陽之氣生於水中太陽脈大者寒水之氣盛也此陰陽不和故其血易脫而氣易敗必審察其盛虛以調之閔士先曰多陰無陽故不疾瀉其陰血則陰陽不能移易多陰少陽故宜調之蓋陰陽不和自不能交相廝守矣朱衛公曰中下二焦之精氣互相資生而資益者也陽明脈小太陽脈大此先後天之氣不和故易脫而易敗倪仲玉曰上節論在外之陰陽此論在內之陰陽蓋外有陰陽而內有陰陽也外不和必因於內內不和必及於外太陽之人多陽而少陰必謹調之無脫其陰而瀉其陽陰重脫者陽狂陰陽皆脫者暴死不知人也趙氏曰無脫其陰而瀉其陽者陽為陰之固也若陰氣重脫則為陽狂陰陽皆脫則為暴死蓋陽為陰之固陰為陽之守陽氣生於陰中陰重脫則陽亦脫矣少陽之人多陽少陰經小而絡大血在中而氣外實陰而虛陽獨瀉其絡脈則強氣脫而疾中氣不足病不起也趙氏曰經脈為里支而橫者為絡小胃而大腸者以上為陽而下為陰也經小而絡大者以里為陰而表為陽也血在中而氣外者陰在內而陽在外血為陰而氣為陽也故欲實陰而虛陽獨瀉其絡脈則強如瀉氣則氣脫而疾致中氣不足病不起也閔士先曰上節論瀉陽當防其陰脫謂陰陽之二氣也此以血為陰而氣為陽充膚熱肉之氣從里之經隧而出於絡脈皮膚故欲實陰虛陽獨瀉其絡脈則強至於三焦通會之元真不可瀉也瀉之則疾脫脫則中氣不足病不起也此章論陰陽之理參伍錯綜蓋陰陽者有名而無形若以有形之腸胃經絡表裡上下皆可以論陰陽者也朱衛公曰陰陽血氣之源流頭緒紛紜須貫通全經而後可以無惑陰陽和平之人其陰陽之氣和血脈調謹診其陰陽視其邪正安容儀審有餘不足盛則瀉之虛則補之不盛不虛以經取之此所以調陰陽別五態之人者也趙庭霞曰陰陽之氣和氣有陰陽也血脈調謹診其陰陽血有陰陽也視其邪正安其容儀形中之陰陽也審其有餘不足盛則瀉之虛則補之調其氣之盛虛也如氣無盛虛則以經取之調其血之虛實也此所以調陰陽別五態之人也朱衛公曰始論無形之四象而漸及於有形之五行黃帝曰夫五態之人者相與毋故卒然新會未知其行也何以別之少師答曰眾人之屬不知五態之人者故五五二十五人而五態之人不與焉五態之人尤不合於眾者也毋無同趙氏曰此論視其狀而即知其態也蓋陰陽五態之人與五音之二十五人不同也尤不合於眾人者也故當視其形狀以別之閔士先曰在天呈象在地成形天地合氣命之曰人故前章論五行之形而後合於六氣此論陰陽四象而復合於有形黃帝曰別五態之人奈何少師曰太陰之人其狀黮黮然黑色念然下意臨臨然長大膕然未僂此太陰之人也趙氏曰黮黮然者黑暗而無光明也念然下意即下齊足恭之意也身半以下為陰是以臨臨然膕脛之長大也朱衛公曰膕脛長大故俯恭於身半以上而膕未傴僂也念然下意而膕未僂者形容其無陽之人而作此態也少陰之人其狀清然竊然固以陰賊立而躁嶮行而似伏此少陰之人也嶮險同馬仲化曰清然冷貌竊然者消沮閉藏之貌也以陰險賊害為心故有此態也其立也躁而不靜陰善躁也行而似伏者其內藏沉思反側之心故耳太陽之人其狀軒軒儲儲反身折膕此太陽之人也馬氏曰車之向前曰軒軒軒者面高而軒昂也儲儲挺然之狀反身折膕者腹仰而倨然也此居處於於好言大事之人故有此狀也少陽之人其狀立則好仰行則好搖其兩臂兩手則常出於背此少陽之人也趙氏曰立則好仰即反身折膕之狀行則好搖者初陽生動之象也其兩臂兩手常出於背者謂常反挽其手於背此皆輕倨傲慢之狀無叉手掬恭之貌也陰陽和平之人其狀委委然隨隨然顒顒然愉愉然㼐㼐然豆豆然眾人皆曰君子此陰陽和平之人也趙氏曰委委雍雍自得之貌隨隨不急遽也顒顒尊嚴貌愉愉和悅也㼐㼐目好貌豆豆有品也蓋存乎人者莫良於眸子胸中正故眸子瞭然而美好也此陰陽和平之人眾人皆曰君子蓋自賢人以至於聖人皆可以君子稱也官能第七十三黃帝問於岐伯曰余聞九針於夫子眾多矣不可勝數余推而論之以為一紀余司誦之子聽其理非則語余請正其道令可久傳後世無患得其人乃傳非其人勿言岐伯稽首再拜曰請聽聖王之道黃帝曰用針之理必知形氣之所在左右上下陰陽表裡血氣多少行之逆順出入之合謀伐有過知解結知補虛瀉實上下氣門明通於四海審其所在寒熱淋露以輸異處審於調氣明於經隧左右支絡盡知其會寒與熱爭能合而調之虛與實鄰知決而通之左右不調犯而行之明於逆順乃知可治陰陽不奇故知起時審於本末察其寒熱得邪所在萬刺不殆知官九針刺道畢矣此章論用針之理必明知陰陽血氣之流行出入逆順淺深五臟六腑之經輸配合虛實疾徐而針論畢矣形氣之所在左右上下陰陽表裡血氣多少此形中之陰陽血氣也行之逆順者皮膚經脈之血氣交相逆順而行也出入之合者經脈外內之氣血有本標之出入有離而有合也謀伐有過者謂有過之脈宜伐而去之知解結者謂契紹之門戶有所結而不通者宜解之此言血氣之流行於經脈外內之間或留積於脈內或阻滯於氣街之門也知補虛瀉實上下氣門者知六腑氣街之門戶虛實之堅軟者則知補瀉之所在也明通於四海者知膻中衝脈胃腑腦髓之出入也寒熱陰陽血氣也淋露中焦所生之津液也審其所在以輸異處者當知膻中之宗氣輸於經脈之外內以應呼吸漏下者也衝脈之血氣半輸於十二經脈之中半散於皮膚之外者也胃腑所生之津液淖澤注於骨而補益腦髓者也審於調氣明於經隧者知胃腑所出之血氣注於經隧經隧者五臟六腑之大絡也左右肢絡盡知其會者左注右而右注左左右上下與經相干布於四肢出於絡脈與脈外之氣血相會於皮膚分肉間也寒與熱爭者陰陽之氣不和也故當合而調之虛與實鄰者血與氣之不和也故知決而通之左右不調者人迎氣口之不調故當犯而行之陰陽不奇者臟腑陰陽交相配合十二經脈交相貫通也故知起時者如乘秋則肺先受邪乘春則肝先受邪之類也如春甲乙傷於風者為肝風以夏丙丁傷於風者為心風之類也以冬遇此者為骨痹以春遇此者為筋痹之類也如正月太陽寅故為腰脽腫痛陽明者午也陽盛而一陰加之故洒洒振寒之類也如手太陽之筋病名曰仲春痹足少陽之筋病名曰孟秋痹也蓋知臟腑之陰陽故知病起之時也本末病之本標也寒熱陰陽之邪也用針之理知陰陽血氣之流行出入則知邪之所在矣按此篇乃全經之總綱帝平時詳析咨訪於伯已得其宗旨故復宣揚以發明之故曰余聞九針於夫子眾多矣不可勝數余推而論之以為一紀紀綱也明於五輸徐疾所在屈伸出入皆有條理言陰與陽合於五行五臟六腑亦有所藏四時八風盡有陰陽各得其位合於明堂各處色部五臟六腑察其所痛左右上下知其寒溫何經所在審皮膚之寒溫滑澀知其所苦膈有上下知其氣所在先得其道稀而疏之稍深以留故能徐入之大熱在上推而下之從下上者引而去之視前病者常先取之大寒在外留而補之入於中者從合瀉之針所不為灸之所宜上氣不足推而揚之下氣不足積而從之陰陽皆虛火自當之厥而寒甚骨廉陷下寒過於膝下陵三里陰絡所過得之留止寒入於中推而行之經陷下者火則當之結絡堅緊火所治之不知所苦兩蹺之下男陰女陽良工所禁針論畢矣五輸者五臟五輸五五二十五輸六腑六輸六六三十六輸本經云因其氣之實虛疾徐而取之故明知五輸之實虛則知疾徐之所在矣其臟腑之十二經脈屈伸出入皆有循度之條理也言陰與陽合於五行者言五臟六腑合於天之陰陽地之五行也五臟六腑亦有所藏者五臟藏五神志六腑傳導水穀膽為中精之府膀胱為津液之所藏也四時八風盡有陰陽各得其位合於明堂者五色篇之所謂黃赤為風青黑為痛白為寒五色各見其部察其浮沉以知淺深視色上下以知病處也五臟六腑察其所痛在身形之左右上下則知寒溫之邪在於臟腑之何經也審皮膚之寒溫滑澀知其所苦者邪氣臟腑篇之所謂脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀心脈滑甚為善渴澀甚為喑是也膈有上下知其氣所在者膈上為宗氣之海上焦開發宣五穀味熏膚充身澤毛者也膈下乃胃腑中焦之分三焦出氣以溫肌肉充皮膚者也故知其氣之所在先得其所出之道路稀而疏之以導氣之出也稍深以留以致穀氣知穀氣已至故能徐而入之復使氣之入也身半以上為陽身半以下為陰大熱在上故當推而下之使下和於陰也從下上者熱厥也熱厥之為熱也起於足而上故當引行於上而去之夫大熱在上由中焦之所生熱厥於下因酒入於胃氣聚於脾中不得散故視身以前痛者常先取之此氣因於中當先取之中焦也太陽之上寒氣主之太陽之氣主於膚表大寒在外寒水之氣在表也故當留而補之候陽氣至而針下熱補其陽以勝其寒也如寒邪上入於中者從合以瀉之夫合治內腑使寒邪從腸胃以瀉出之也夫寒氣之甚於外而入於中者因陽氣之在下也故針所不能為者灸之所宜也上氣不足者推而揚之下氣不足者積而從之謂氣本於下之所生也陰陽皆虛火自當之蓋艾能於水中取火能啟陽氣於陰中也厥而寒甚起於廉骨下之陷中而上逆於膝此寒厥也寒厥起於足五趾之裡集於膝下而聚於膝上蓋氣因於中陽氣衰不能滲營其經絡陽氣日損陰氣獨在故為之寒是以取陽明之下陵三里以補之此寒厥之在氣也若寒氣從絡之所過得之則留而止之如寒入於中則當推而行之此治寒厥之法也經氣陷下以火灸之結絡堅緊者中有著血血寒故火所治之調經論曰病不知所痛兩蹺為上蓋陽蹺陰蹺並起於足踝上循胸裡故痛在蹺脈之上者不知痛處也是以不知所苦痛者當取兩蹺於踝下也男子數其陽女子數其陰故男取陰而女取陽此良工之所禁也能知臟腑陰陽寒熱虛實表裡上下補瀉疾徐針論畢矣用針之服必有法則上視天光下司八正以闢奇邪而觀百姓審於虛實無犯其邪是得天之露遇歲之虛救而不勝反受其殃故曰必知天忌閔士先曰服事也言用針之事當合於天時也夫針者所以候氣也故當上視天光因天之序盛虛之時移光定位正立而待蓋俟天之陽以助人之氣也下司八正所以候八風之虛邪以時至者也虛實者人氣之有盛衰也得天之露者清邪中上陽中霧露之氣也遇歲之虛者逢年之虛值月之空失時之和救而不能勝邪則反受其殃故曰必知天忌乃言針意法於往古驗於來今觀於窈冥通於無窮粗之所不見良工之所貴莫知其形若神彷彿閔氏曰法於往古者先知針經也驗於來今者先知日之寒溫月之虛盛以候氣之浮沉而調之於身觀其立有驗也觀於窈冥者言形氣營衛之不形於外而工獨知之通於無窮者可以傳於後世也是故工之所以異也然而不形見於外故俱不能見也視之無形嘗之無味故莫知其形若神彷彿邪氣之中人也灑淅動形正邪之中人也微先見於色不知於其身若有若無若亡若存有形無形莫知其情是故上工之取氣乃救其萌芽下工守其已成因敗其形閔士先曰此言虛邪傷形而正邪中氣也虛邪者虛鄉不正之邪風如春時之風從西方來夏時之風從北方來蓋人秉地之五行而成此形是以五方不正之氣而傷人之形也正邪者風寒暑濕燥火天之正氣也天有此六氣而人亦有此六氣是以正邪中氣者同氣相感也中於氣故先見於色不知於其身若有若無莫知其情是故上工之取氣乃救其萌芽必先見三部九候之氣盡調不敗而救之下工守其已成救其已敗救其已敗者不知三部九候之相失因病而敗之也是故工之用針也知氣之所在而守其門戶明於調氣補瀉所在徐疾之意所取之處瀉必用圓切而轉之其氣乃行疾而徐出邪氣乃出伸而迎之搖大其穴氣出乃疾補必用方外引其皮令當其門左引其樞右推其膚微旋而徐推之必端以正安以靜堅心無懈欲微以留氣下而疾出之推其皮蓋其外門真氣乃存用針之要無忘其神閔氏曰知氣之所在者知病氣之所在而守其門戶門者邪循正氣之所出入也明於調氣者知氣之實虛而為之補瀉以疾徐之意而取之也瀉必用圓者圓活而轉之其氣乃行也疾內而徐出者疾而徐則虛也邪氣乃出則實者虛矣搖大其穴以出其針則邪氣乃疾出矣補必用方者外引其皮令當其穴門左手引其樞轉右手推其膚微旋轉其針而徐推之其針必端以正安靜以候氣至堅心而無懈惰微留其針候氣下而疾出之推其皮以蓋其外門則真氣乃存於內矣用針之要貴在得神蓋存己之神以俟彼之神也朱衛公曰按素問八正神明論曰瀉必用方補必用圓蓋方與圓非針也乃用針之意耳且方圓者天地之象也天氣下降氣流於地地氣上升氣騰於天天地之氣上下相交是以方圓之意皆可圓活用之雷公問於黃帝曰針論曰得其人乃傳非其人勿言何以知其可傳黃帝曰各得其人任之其能故能明其事雷公曰願聞官能奈何黃帝曰明目者可以見色聰耳者可以聽音捷疾辭語者可使傳論語徐而安靜手巧而心審諦者可使行針艾理血氣而調諸逆順察陰陽而兼諸方緩節柔筋而心和調者可使導引行氣疾毒言語輕人者可使吐癰咒病爪苦手毒為事善傷人者可使按積抑痹各得其人方乃可行其名乃彰不得其人其功不成其師無名故曰得其人乃言非其人勿傳此之謂也手毒者可使試按龜置龜於器下而按其上五十日而死矣手甘者復生如故也閔士先曰官之為言司也言各因其所能而分任之以司其事故曰官能如目之明者可使之察色耳之聰者可使之聽音可使行針艾者任之其艾針之能可使導引行氣者任之其導引之能口毒者可使唾癰咒病手毒者可使按積抑痹各得其能方乃可行其名乃彰不得其人其功不成蓋聖人慾得其人量材而官授任而治己不與於其間而總司其成也試按龜者言手毒之人不可使之行針即靈壽之物亦遭其毒手而況病人乎惟手巧而甘美者能活人也朱衛公曰五十乃大衍之數謂不能盡百歲之天年按陰陽別論篇論五臟氣絕亦合五十之數此皆出於理數之自然也夫麟鳳龜龍謂之四靈聖人制九針之法所以救民之災異豈試以毒手而傷其靈瑞乎蓋以深戒夫非其人勿傳非其人勿任耳論疾診尺第七十四黃帝問於岐伯曰余欲無視色持脈獨調其尺以言其病從外知內為之奈何岐伯曰審其尺之緩急小大滑澀肉之堅脆而病形定矣此章以論疾診尺從外知內論疾者謂論其疾而知其證診視也診尺者謂視其尺膚而知其內不待視面王之色持手太陰之脈獨調其尺以知其病也夫胃者水穀血氣之海也故行於脈中者至於太陰之兩脈口持其脈以知臟腑之病血氣之行於脈外者從手陽明之大絡循經脈之五里而散行於尺膚故審其尺之緩急大小滑澀肉之堅脆而病形定矣蓋太陰主陰陽明主陽臟腑雌雄相合氣血色脈之相應也故臟腑邪氣篇曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀閔士先曰小兒視虎口紋乃手陽明之色與手太陰之脈相應者也視人之目窠上微癰如新臥起狀其頸脈動時咳按其手足上窅而不起者風水膚脹也壅癰同窅窈同此論其疾而知其病也足太陽之脈起於兩目而下出於頸項太陽之上寒水主之太陽之氣運行於膚表此水隨氣而溢於皮膚之間故目窠微腫頸脈動而膚脹咳者水留於皮毛而動其肺氣也風水者因外受於風風行而水渙也尺膚滑其淖澤者風也尺肉弱者解㑊安臥脫肉者寒熱不治尺膚滑而澤脂者風也尺膚澀者風痹也尺膚粗如枯魚之鱗者水泆飲也尺膚熱甚脈盛躁者病溫也其脈盛而滑者病且出也尺膚寒其脈小者泄少氣尺膚炬然先熱後寒者寒熱也尺膚先寒久大之而熱者亦寒熱也此論診尺而知外內之病也夫津液淖澤於皮膚故尺膚滑其淖澤者知風在於皮膚而鼓動其津液也脂者肌肉紋理間之脂膜尺膚滑而澤脂者風在於肌肉間也夫在外者皮膚為陽筋骨為陰病在陽者名曰風病在陰者名曰痹如尺膚澀者此風痹於筋骨間也此以尺膚之淖澤滑澀而知風邪之淺深也肌肉者五臟元真之所通會脾土之所主也故尺肉弱者主脾土虛而解㑊安臥解㑊者懈惰也脫肉者形損也寒熱者陰陽血氣虛也陽虛則發寒陰虛則發熱陰陽形氣皆已虛脫故為不治如枯魚之鱗者皮膚起寒粟也寒者水之氣此水邪泆飲於內故寒色見於外也溫病者寒毒藏於肌膚至春發為溫病故尺膚熱甚而脈盛躁者知其為病溫也其脈盛而滑者知病且出於外也尺膚寒其脈小者少氣蓋氣者所以溫膚熱肉從陰而生自內而外故知其泄於內而虛於外也此診其尺而知內因之病也尺膚之先熱後寒先寒後熱而皆為寒熱者尺膚主三陰三陽之氣也肘所獨熱者腰以上熱手所獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱肘後粗以下三四寸熱者腸中有蟲掌中熱者腹中熱掌中寒者腹中寒魚上白肉有青血脈者胃中有寒夫手太陰之脈從指井之少商過於輸行於經而入於肘之尺澤脈外之氣血從手陽明之五里走尺以上魚相逆順而行也是以脈要精微篇論兩手之尺寸上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也蓋以尺上寸以候身半以上寸下尺以候身半以下夫身半以上為陽身半以下為陰故以寸之陽以候上尺之陰以候下也肘所自寸而下尺也手所自尺而上寸也肌所獨熱者腰以上熱手所獨熱者腰以下熱此診尺膚以候形身之上下故與脈候之上下反其診也肘前乃手厥陰之曲澤處肘後乃手少陽之天井處蓋以兩手下垂上以候上下以候下前以候前後以候後也夫所謂肘所手所者論手臂之背面臂中掌中魚上乃手臂之正面背面為陽故候形身之外正面主陰故候腰腹腸胃之內即尺外以候季脅尺裡以候腹中之大義相同也夫人生於天地六合之內其血氣之流行升降出入應天運之環轉於上下四旁是以脈要精微論以寸尺之外內前後上下候形身之外內前後上下此章以手臂皮膚之前後外內候形身之上下前後外內蓋脈內之血氣應地氣之上騰於天脈外之氣血應天氣之下流於地人與天地參也尺炬然熱人迎大者當奪血尺堅大脈小甚少氣悗有加立死悗悶同尺炬然熱人迎大者三陽之氣偏盛也故當主奪血夫皮膚為陽血脈為陰尺堅大脈小甚者陽盛而陰絕於外也少氣悗有加者陽盛而陰絕於內也目赤色者病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中此以目色而候五臟之血氣也五臟之血氣行於脈中而變見於寸口五臟之氣血變見於色而出於目中蓋五臟之精皆上注於目而為之睛也前節視目窠以知皮膚之水此節視目色以知五臟之陰皆從外以知內也胸中膈中也黃色不可名者色黃而有黑白青赤之間色也病在胸中者五臟之氣皆從內膈而出故所見之色若是診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病太陽為目上綱故目脈從上下者主太陽病陽明為目下綱故從下上者主陽明病少陽之脈循目銳眥故從外走內者主少陽病上節視目色以知五臟之陰此診目脈以知三陽之氣夫色為陽脈為陰此陰陽之變換診寒熱赤脈上下至瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死此論血脈主於手少陰心主而本於足少陰腎臟寒熱者水火陰陽之氣也心主包絡之氣發原於腎歸於心下之部署為一形臟而主脈瞳子者腎臟之骨精也水臟之毒上交於火臟而火臟之氣復下交於陰所謂陰陽交者死不治朱衛公曰此論水臟之毒氣隨正氣相交而死故凡論疾皆當體會其正氣焉診齲齒痛按其陽之來有過者獨熱在左左熱在右右熱在上上熱在下下熱馬仲化曰齒痛曰齲上齒屬手陽明大腸經下齒屬足陽明胃經故按其陽脈之來有過者必為獨熱其脈在左右上下則病熱亦分左右上下也診血脈者多赤多熱多青多痛多黑為久痹多赤多黑多青皆見者寒熱此以皮部之色而知血脈之寒熱也皮部論曰凡十二經脈者皮之部也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也身痛而色微黃齒垢黃爪甲上黃黃疸也安臥小便黃赤脈小而澀者不嗜食此論中土之病統見於五臟之外合土灌於四臟也身痛病見於肉也色黃病見於皮也齒垢黃病見於骨也爪甲上黃病見於筋也黃疸脾家病也脾病故解㑊安臥小腸為赤腸心之腑也心主血脈小便赤黃脈小而澀病見於脈也小便赤黃下焦熱也不嗜食上焦虛也蓋土位中央而上下四旁皆為之應人病其寸口之脈與人迎之脈小大等及其浮沉等者病難已也此論人迎氣口與手太陰兩寸口之脈各有所候也寸口者手太陰之兩脈分寸關尺三部以候臟腑之血氣者也人迎氣口者候三陰三陽之氣也人病其寸口之脈與人迎之脈大小浮沉等者此表裡陰陽血氣留病故為難已按人迎氣口以左為陽而右為陰手太陰之兩脈以寸為陽而尺為陰是以宋崔紫虛四言舉要曰關前一分人命之主左為人迎右為氣口蓋亦有所本也夫寸口者在太淵之分關前一分者寸關之間也寸關尺三部以候內之五臟六腑人迎氣口以候外之三陰三陽所候不同而所取之部位亦有別也是以手太陰之兩寸曰寸口人迎寸口又曰脈口又曰氣口蓋各有部位之分故名亦有別也五色篇曰脈之浮沉及人迎與寸口氣小大等者病難已蓋左右三部之脈以候血脈左右之人迎氣口以候三陰三陽之氣故曰氣口朱衛公曰此篇論尺故兼論人迎蓋尺膚與人迎氣口之相應也女子手少陰脈動甚者妊子此論人之始生本於先天之水火也手少陰者兩手之少陰腎脈也蓋胞系於腎故少陰之脈動甚也夫妊始成形先生兩腎猶太極中之陰陽陰陽分而五行備五行備而形始成是以女子手少陰脈動甚者主妊子也閔士先曰此篇論診尺若以手少陰心脈論之則失其經旨矣且本經云陰搏陽別謂之有子夫寸為陽尺為陰陰搏者尺脈滑利也陽別者與寸關之有別也趙庭霞曰動甚者動脈也厥厥動搖狀如小豆與滑脈之流利如珠同形蓋有諸內而形諸外也朱衛公曰動在左者先感天一之氣故主男動在右者先感地二之氣故主女越人以胞系於命門者謂氣之所感非著於右腎也試按男子之胎多偏於左嬰兒病其頭毛皆逆上者必死此論人之血氣本於先天所生而上下環轉者也嬰兒者始生之兒毛髮者血之餘少陰精血之所生也發覆下垂以應人之血氣從下而升復從巔而下若發上逆是惟升而無降矣升降息故不免於死亡耳間青脈起者掣痛腎主骨而開竅於耳故耳間青脈起者當主筋骨掣痛此承上文而言人之血氣始於先天腎臟之所生大便赤辦飧泄脈小者手足寒難已飧泄脈小手足溫泄易已辦葉辨內從力飧葉孫辦別也大便赤辦者謂黃赤之間別也蓋中焦泌糟粕蒸津液乃化而為血獨行於經隧命曰營氣水穀常並居於胃成糟粕而俱下於大腸濟泌別汁而參入於膀胱如大便赤辦乃中焦之血與糟粕並下矣飧泄大腸虛而不能濟泌矣此腸胃虛泄於下中焦之汁不能營於脈中故脈小也若手足溫者得下焦之生氣故泄易已此言中焦水穀之精微有藉下焦之生氣以合化閔士先曰本經凡論針論疾之中櫽括陰陽血氣之生始出入能明乎正氣之所從來然後知邪病之淺深外內學者當體認毋忽四時之變寒暑之勝重陰必陽重陽必陰故陰主寒陽主熱故寒甚則熱熱甚則寒故曰寒生熱熱生寒此陰陽之變也此言人之陰陽血氣應四時之寒暑往來而有寒熱陰陽之變蓋變化者陰陽之道也邵子曰少不變而老變故重陰必陽重陽必陰寒甚則熱熱甚則寒故曰冬傷於寒春生癉熱春傷於風夏生飧泄腸澼夏傷於暑秋生痎瘧秋傷於濕冬生咳嗽是謂四時之序也此承上文申明陰陽寒熱之變冬傷於寒春生癉熱者寒毒藏於肌膚至春時人之陽氣外出寒隨氣而化熱故春發為癉熱之病夏傷於暑秋生痎瘧者暑氣藏於募原至秋時人之陰氣外出邪隨氣而發為痎瘧痎瘧者陰瘧也此寒暑之伏邪隨人氣之外內出入也夫天之寒邪化為癉熱天之暑邪化為陰瘧此天之陰陽又隨人氣之變化也夫陽者天氣也主上陰者地氣也主下風乃天之陽邪故傷於風者上先受之濕乃地之陰邪故傷於濕者下先受之陽病者上行極而下是以春傷於風夏生飧泄陰病者下行極而上是以秋傷於濕冬生咳嗽此天地之陰陽又隨四時之上下升降也趙庭霞曰人之陰陽出入隨四時之寒暑往來故曰四時者變寒暑之勝至於陰陽寒熱之變有因於天氣者有因於人氣者閔士先曰冬時陽氣伏藏於內裡氣實故寒毒藏於肌膚夏時陽氣發越於外裡氣虛故暑熱藏於募原長夏濕土主氣太陰之氣主七月八月故秋傷於濕募原者臟腑之膏膜在腸胃之外是痎瘧邪盛而透發不出者若流於空郭之中則成鼓脹近時多用斷瘧之法其誤人不淺矣刺節真邪第七十五黃帝問於岐伯曰余聞刺有五節奈何岐伯曰固有五節一曰振埃二曰發矇三曰去爪四曰撤衣五曰解惑黃帝曰夫子言五節余未知其意岐伯曰振埃者刺外去陽病也發矇者刺腑輸去腑病也去爪者刺關節肢絡也撤衣者盡刺諸陽之奇輸也解惑者盡知調陰陽補瀉有餘不足相傾移也此章論真氣遊行出入於肢節皮膚經脈之間皆當調之和平導其通利真氣者所受於天與穀氣並而充身者也受於天者先天所生之精氣穀氣者水穀所生之營衛宗氣津液也節之交三百六十五會神氣之所遊行出入故曰刺節有因真氣不調有為邪氣所阻故篇名刺節真邪趙庭霞曰兩精相搏謂之神兩精者先天之精後天水穀之精是真氣即是神氣分而論之各有其名合而論之總屬中下二焦所生之血氣也黃帝曰刺節言振埃夫子乃言刺外經去陽病余不知其所謂也願卒聞之岐伯曰振埃者陽氣大逆上滿於胸中憤䐜肩息大氣逆上喘喝坐伏病惡埃煙𩜺不得息請言振埃尚疾于振埃黃帝曰取之何如岐伯曰取之天容黃帝曰其咳上氣窮詘胸痛者取之奈何岐伯曰取之廉泉黃帝曰取之有數乎岐伯曰取天容者無過一里取廉泉者血變而止帝曰善哉䐜充人切惡去聲𩜺音噎詘音屈此陽氣逆於內而不能充行於形身也陽氣者陽明水穀所生之氣大氣宗氣也陽氣大逆故憤䐜肩息大氣逆上故喘喝坐伏也六元正紀論曰陽明所至為埃煙病惡埃煙𩜺不得息陽明之氣病也陽明者土也請言振發其陽明之氣疾如振發其塵埃也天容手太陽小腸之經刺之以通陽氣之逆詘者語塞也其咳上氣窮詘胸痛者所受於天之氣上逆不得合併而充身也故取任脈之廉泉以通腎臟之逆氣一里者如人行一里其氣已通言其速也血變者通其血絡也閔士先曰手太陽心之腑也通神氣故取手太陽之天容黃帝曰刺節言發矇余不得其意夫發矇者耳無所聞目無所見夫子乃言刺腑輸去腑病何輸使然願聞其故岐伯曰妙乎哉問也此刺之大約針之極也神明之類也口說書卷猶不能及也請言發矇耳尚疾於發矇也黃帝曰善願卒聞之岐伯曰刺此者必於日中刺其聽宮中其眸子聲聞於耳此其輸也黃帝曰善何謂聲聞於耳岐伯曰刺邪以手堅按其兩鼻竅而疾偃其聲必應於針也黃帝曰善此所謂弗見為之而無目視見而取之神明相得者也此言神氣之通於七竅也矇者耳無所聞目無所見上竅之不通也聽宮手太陽之經心之腑輸也眸子耳中之珠刺耳之聽宮尚疾於發目之矇是耳竅與目竅之相通也以手堅按其兩鼻竅而疾偃其聲必應其耳中之針是耳竅與鼻竅口竅之相通也而上之七竅不通獨取手太陽以通心神之氣而七竅皆利是神明之通於七竅也心為陽中之太陽故必於日中取之黃帝曰刺節言去爪夫子乃言刺關節肢絡願卒聞之岐伯曰腰脊者身之大關節也肢脛者人之管以趨翔也莖垂者身中之機陰精之候津液之道也故飲食不節喜怒不時津液內溢乃下留於睪血道不通日大不休俯仰不便趨翔不能此病榮然有水不上不下鈹石所取形不可匿常不得蔽故名曰去爪帝曰善此言津液隨神氣而滲灌於諸節者也津液生於中焦陽明淖澤於骨所以濡筋骨而利關節腰脊者從大椎至尾骶乃身之大關節也手足肢脛之骨節人之管以趨翔蓋津液淖澤於肢脛則筋骨利而脛能步趨肢能如翼之翔也莖垂者腎之前陰乃宗筋之會腎者胃之機關主受藏津液夫腎臟所藏之津液從宗脈而上濡於空竅故曰莖垂者身中之機陰精之候津液之道也此言胃腑所生之津液隨神氣而淖注於骨節腎臟所藏之津液從宗脈而上濡於空竅如飲食不節喜怒不時則津液內溢乃下流於睪囊血道不通日大不休俯仰不便趨翔不能此病榮然有水不上不下當用鈹石取之形謂前陰爪者脈之餘謂形不可藏匿常不得遮蔽有若去其宗筋故命曰去爪黃帝曰刺節言撤衣夫子乃言盡刺諸陽之奇輸未有常處也願卒聞之岐伯曰是陽氣有餘而陰氣不足陰氣不足則內熱陽氣有餘則外熱內熱相搏熱於懷炭外畏綿帛近不可近身又不可近席腠理閉塞則汗不出舌焦唇槁臘干嗌燥飲食不讓美惡黃帝曰善取之奈何或之於其天府大杼三痏又刺中膂以去其熱補足手太陰以出其汗熱去汗稀疾於撤衣黃帝曰善此因津液不外濡於皮毛以致陽熱盛而不可近席不上濟於心臟以致內熱盛而熱如懷炭蓋陽氣者火熱之氣陰氣者水陰之氣也故曰盡刺諸陽之奇輸奇輸者六腑之別絡也津液生於胃腑水穀之精大腸主津液小腸主液膽者中精之府膀胱者州都之官津液藏焉是六腑之津液從大絡而外濡於皮膚分肉者也心為陽中之太陽太陽膀胱為水府水火上下相濟者也水液不上滋於心以致心火盛而熱於懷炭舌焦唇槁臘干嗌燥心不和故飲食不知味也或之於其者謂水穀之津液皆藏於膀胱水液隨太陽之氣運行於膚表或不必盡刺諸陽之奇輸取之於其天府大杼三痏使膀胱所藏之津外濡於皮毛又惡太陽經之中膂通津液上滋於心臟以去其熱手太陰乃金水之生源而外主皮毛足太陰主脾而外主肌肉脾主為胃行其津液者也故當補足手太陰以出其汗熱去汗稀疾於徹衣之去熱也黃帝曰刺節言解惑夫子乃言盡知調陰陽補瀉有餘不足相傾移也惑何以解之岐伯曰大風在身血脈偏虛虛者不足實者有餘輕重不得傾側宛伏不知東西不知南北乍上乍下乍反乍復顛倒無常甚於迷惑黃帝曰善取之奈何岐伯曰瀉其有餘補其不足陰陽平復用針若此疾於解惑黃帝曰善請藏之靈蘭之室不敢妄出也此言陰陽不調致神志之迷惑也夫火為陽水為陰水火者陰陽之徵兆也火之精為神水之精為志大風在身則血脈偏虛虛者不足實者有餘主脈偏虛則輕重傾側矣陰陽不調則神志迷惑矣神志迷惑是以不知東西不知南北而反復顛倒也故當瀉其有餘補其不足陰陽平復疾於解惑夫血者神氣也心臟所主而發原於腎是以風傷血脈則陰陽不調陰陽不調則神志昏而甚於迷惑也此五節論神氣不調故曰刺節節者神氣之所遊行出入神遊最速故曰疾於撤衣疾於解惑閔士先曰以上五節雖有氣神津液之分然總不出於下焦之腎臟膀胱中焦之陽明胃腑蓋下焦乃所受於天之精中焦乃後天之穀氣兩者相搏而為神也黃帝曰余聞刺有五邪岐伯曰病有持癰者有容大者有狹小者有熱者有寒者是謂五邪黃帝曰刺五邪奈何岐伯曰凡刺五邪之方不過五章癉熱消滅腫聚散亡寒痹益溫小者益陽大者必去請道其方此節言真氣通會於皮膚肌腠之間而有壅滯大小寒熱之病邪者謂不得中正之和調也章法也謂陽盛於外而為癉熱者使之消滅氣熱而為壅腫者使之散亡寒者致其神氣以和之真氣小者益其陽大者必使之歸去各有平調之法也閔士先曰始言刺節中論真氣末言外邪故曰刺節真邪所謂邪病者謂不得中和之道而為病也若以外邪之病論之去經義遠矣凡刺癰邪無迎隴易俗移性不得膿脆道更行去其鄉不安處所乃散亡諸陰陽過壅者取之其輸瀉之此氣滯於皮膚肌腠之間而為腫聚也癰者壅也此因氣壅而腫非癰膿者離合真邪論曰天暑地熱則神水波湧而隴起經之動脈其至也亦時隴起蓋言此氣壅於皮膚分肉而為腫無迎刺隴起之經脈也俗猶習俗性者心之所生也謂心所生之神氣習聚於此當移易其流行非癰膿故不得膿脆道肌肉之理路也聚氣從脆道更行去其所聚之鄉不使安其處則聚氣乃行散矣諸陰陽之脈所過於壅處者取其輸而瀉之蓋皮膚分肉之氣從經輸絡脈而出恐聚氣之流於脈絡也此言合併充身之真氣亦運行環轉之無端也凡刺大邪日以小泄奪其有餘乃益虛剽其通針其邪肌肉親視之毋有反其真刺諸陽分肉間大者謂真氣容大於肌腠之間故當使之日小夫有飲於外則不足於內若泄奪其有餘乃益虛其內矣蓋言日以小者使之復反於內非奪其外泄也故剽切其真氣通會之處針其有餘之氣以通於內親近也近視其肌肉緻密而小則外內和平矣若毋有反其真者再刺諸陽分肉間蓋真氣者神氣也從關節而出於肌腠之外故剽通其關節其有未反者再取之肌肉也閔士先曰水穀所生之氣從大絡而出於分肉神氣出入於關節之間總屬中焦之穀氣而分走其道趙庭霞曰穀氣與下焦之精氣相搏而後謂之神朱衛公曰毋有反其真刺諸陽分肉間是真氣從節而出可復從分肉理路而入亦環轉出入者也凡刺小邪日以大補其不足乃無害視其所在迎之界遠近盡至其不得外侵而行之乃自費刺分肉間小者通會於肌腠之氣虛小故當使日以漸大即追而補之乃無害視其氣至之所在而迎之於界界者節之交也使上焦之神氣中焦之穀氣下焦之天真遠近盡至則日以大矣侵漸進也費用也其不得外侵而行之者乃中焦之穀氣自用不與下焦之天真合併而充身故當刺分肉間以通其穀氣閔士先曰追而濟之曰補蓋追其正氣之內歸小者當迎之使出不當追之使入曰補其不足乃無害者言此處追而補之則彼處溢而自出矣謂真氣之環轉出入者也朱衛公曰此節與上節交錯環轉本篇論氣血之離合出入聖人反復辯論曲盡婆心學者不可不深體之凡刺熱邪越而蒼出遊不歸乃無病為開闢門戶使邪得出病乃已熱邪者陽氣盛而留於肌腠之間故為熱也蒼蒼者天之正色也越而蒼者使邪熱發越而天真之氣色見矣出遊不歸謂神氣遊行於外而不返其真此為開闢門戶使邪得出而後病乃已故雖出遊不歸乃無病此蓋言真氣外內出入環轉無息者也凡刺寒邪日以除徐往徐來致其神長戶已閉氣不分虛實得調其氣存也寒氣者所得於天之水寒神者火之精也水火相感神志合精是為和平故刺寒邪者日以除其寒徐往徐來以致其神氣即閉其門戶使氣不分而寒熱之虛實得調其真氣乃存矣上節論開闢門戶以去邪此論門戶已閉乃存正黃帝曰官針奈何岐伯曰刺癰者用鈹針刺大者用鋒針刺小者用圓利針刺熱者用鑱針刺寒者用毫針也此申明五者之病皆在皮膚肌肉之氣分故所用之針皆取痹於肌肉者也請言解論與天地相應與四時相副人參天地故可為解下有漸洳上生葦蒲此所以知形氣之多少也陰陽者寒暑也熱則滋雨而在上根荄少汁人氣在外皮膚緩腠理閉血氣減汗大泄皮淖澤寒則地凍水冰人氣在中皮膚致腠理閉汗不出血氣強肉堅澀當是之時善行水者不能往水善穿地者不能鑿凍善用針者亦不能取四厥血脈凝結堅搏不往來者亦未可即柔故行水者必待天溫冰釋凍解而水可行地可穿也人脈猶是也治厥者必先熨調和其經掌與腋肘與腳項與脊以調之火氣已通血脈乃行然後視其病脈淖澤者刺而平之堅緊者破而散之氣下乃止此所謂以解結者也此解論所受於天之氣從陰而生自下而上應天地之寒暑往來隨四時之生長收藏者也漸洳濡滋之地也葦蒲生於水中其質柔弱中抽堅莖名曰蒲槌內剛外柔為堅心之坎水以比人之元陽生於精水之中故曰此所以知形氣之多少也謂充於形中之氣生於天一水中知所秉之厚薄則知氣有多少矣人之陰陽出入應天地之寒暑往來熱則滋雨在上而萬物之根荄少汁蓋言精水亦隨氣而上出者也熱則人氣在外腠理開而汗大泄津氣外泄故在內之血氣減少此言人之血氣本於下焦之精氣也地凍水冰則天氣收藏而人氣在中皮膚緻密而汗不出精氣內藏故血氣自強也善行水者不能鑿冰善用針者不能取四厥謂氣隨天地之寒暑出入非人力之所能強也治厥者必先熨通其氣也調和其經通其經也謂所受於天之精氣行於經脈之外內者也調之掌與腋肘與腳項與脊謂血氣之行於上下四旁無處不到也淖澤者行之太過當刺而平之緊澀者澀滯不通當破而散之此所謂以針而解結者也用針之類在於調氣氣積於胃以通營衛各行其道宗氣流於海其下者注於氣街其上者走於息道故厥在於足宗氣不下脈中之血凝而留止弗之火調弗能取之此言後天飲食之穀氣乃營衛宗氣各走其道充於形身之上下者也厥在足者少陰之氣厥也寒氣厥逆於下是以宗氣不能不行脈中之血凝而留止弗之火調弗能通之謂下焦之精氣乃陰陽水火得火熱而後能溫其水寒夫所受於天者少陰腎臟之精氣也衝脈與少陰之大絡起於腎出於氣街循陰股內廉邪入膕中厥在於足而宗氣不下者謂宗氣下行而與少陰之氣相合也夫所謂合併而充身者下焦先天之氣上與陽明之穀氣相合而出入於關節肌腠之間然而後天所生之宗氣亦下行而與少陰之精氣相合注於氣街入於膕中並行於經脈皮膚之外內者也用針者必先察其經絡之實虛切而循之按而彈之視其應動者乃後取之而下之此申明血氣之行於脈中也內經云絡滿經虛瀉陽補陰經滿絡虛瀉陰補陽蓋以里之經脈為陰外之絡脈為陽血氣之行於脈中從經而脈脈而絡絡而孫故必先察其經絡之虛實而後取之六經調者謂之不病雖病謂之自已也一經上實下虛而不通者此必有橫絡盛加於大經令之不通視而瀉之此所謂解結也此申明血氣之行於脈外也六經者手足之十二經別也大經者經隧也經隧者五臟六腑之大絡也胃腑所出之氣血充於皮膚分肉之間者從臟腑之大經而外出於皮膚橫絡者經脈之支別也如一經上實下虛而不通者此必有經脈之橫絡盛加於大經而令之不通也故視而瀉之此所謂解結也此二節論水穀所生之血氣營於脈中充於膚腠各有道路也閔士先曰以此二節列於節中者分別合併而充身之真氣各別也當以自費之義參之上寒下熱先刺其項太陽久留之已刺則熨項與肩胛令熱下合乃止此所謂推而上之者也此言下焦所生之氣從下而上也太陽為諸陽主氣而太陽之氣生於膀胱水中上寒下熱此太陽之氣留於下而不上故先刺其項太陽久留之以候氣至已刺則熨項與肩胛令火熱與下之陽氣交合乃止此所謂推而上之者也閔士先曰本經凡曰項太陽皆在氣分上看取表氣故不言經穴趙庭霞曰少陰太陽本水火之標本故俱用火以溫氣上熱下寒視其虛脈而陷之於經絡者取之氣下乃止此所謂引而下之者也此言上焦所生之氣從上而下也上焦開發宣五穀味熏膚充身澤毛是謂氣此上焦之氣從上而下如上熱下寒當視其虛脈而陷之於經絡者取之此因脈虛而氣陷於脈內不能熏膚熱肉故下寒也故當取之於經俟氣下乃止此所謂引而下之者也大熱遍身狂而妄見妄聞妄言視足陽明及大絡取之虛者補之血而實者瀉之因其偃臥居其頭前以兩手四指挾按頸動脈久持之卷而切之下至缺盆中而復止如前熱去乃止此所謂推而散之者也此言中焦所生之氣從中而出散行於上下者也中焦之氣陽明水穀之悍氣也大熱遍身狂而妄見妄聞此陽明之氣逆而為熱狂也故當視足陽明之皮部及大絡取之虛者補之如逆於血脈之中而血實者瀉之蓋中焦之氣從大絡而出於皮膚者也其悍氣之上衝頭者循咽上走空竅出顑下客主人循牙車復與陽明之脈相合並下人迎從膺胸而下至足跗故當因其偃臥居其頭前以兩手四指挾按頸中人迎之動脈久持之蓋使悍熱之散於脈外勿使合於脈中此所謂推而散之者也以上三節申明膚表之氣又有從上中下之三道而出者是所受於天與穀氣並而充身者又有二氣也學者能明乎陰陽血氣離合出入之道全經大義思過半矣黃帝曰有一脈生數十病者或痛或癰或熱或寒或癢或痹或不仁變化無窮其故何也岐伯曰此皆邪氣之所生也此下論邪氣之傷人營衛宗氣則真氣去邪獨留邪氣淫泆變化無窮是以一脈而生數十病也黃帝曰余聞氣者有真氣有正氣有邪氣何謂真氣岐伯曰真氣者所受於天與穀氣並而充身者也正氣者正風也從一方來非實風又非虛風也邪氣者虛風之賊傷人也其中人也深不能自去正風者其中人也淺合而自去其氣來柔弱不能勝真氣故自去所受於天者先天之精氣穀氣者後天水穀之精氣合併而充身者也正氣者大塊噫氣其名為風從一方來非實風又非虛風此天地之正氣也虛風者從虛鄉來之賊風傷人正氣其中人也深不能自去正風者其中人也淺與真氣合而自去蓋其氣來柔弱不能勝真氣故自去閔士先曰人秉天地之正氣所生故天之正氣與人之真氣相合不能勝真氣者合併之氣盛也朱衛公曰風出於地隧之中故其氣來柔弱實風者天之怒氣也虛邪之中人也灑淅動形起毫毛而發腠理其入深內搏於骨則為骨痹搏於筋則為筋攣搏於脈中則為血閉不通則為癰搏於肉與衛氣相搏陽勝者則為熱陰勝者則為寒寒則真氣去去則虛虛則寒搏於皮膚之間其氣外發腠理開毫毛淫氣往來行則為癢留而不去為痹衛氣不行則為不仁此言虛邪之傷形也灑淅動形故搏於皮脈肉筋骨而為痹為攣為癰為痹陰勝則為寒寒則真氣去有傷衛氣則為不仁此皆邪氣之所生也虛邪偏客於身半其入深內居營衛營衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛此邪氣偏客於形傷其營衛則真氣去而為偏枯也其邪氣淺者脈偏痛蓋偏枯者邪直傷於筋骨也閔士先曰營衛衰則真氣去當知營衛真氣同本所生而各走其道可離而可合者也虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿內傷骨內傷骨為骨蝕有所疾前筋筋屈不能伸邪氣居其間而不反發為筋溜有所結氣歸之衛氣留之不得反津液久留合而為腸溜久者數歲乃成以手按之柔已有所結氣歸之津液留之邪氣中之凝結日以易甚連以聚居為昔瘤以手按之堅有所結深中骨氣因於骨骨與氣並日以益大則為骨疽有所結中於肉宗氣歸之邪留而不去有熱則化而為膿無熱則為肉疽凡此數氣者其發無常處而有常名也此虛邪傷氣而病形也寒與熱搏者形中之陰陽二氣也蓋形舍氣氣歸形形氣之相合也是以傷形則病氣傷氣則病形結氣歸之者寒熱相搏之氣歸於邪留之形所也凡此數氣者其發無定處而有肉枯骨蝕筋溜昔瘤之定名也末章論邪氣病形則真氣去而營衛傷蓋真氣者出入於節之交遊行於皮膚肌腠之間者也衛氣行第七十六黃帝問於岐伯曰願聞衛氣之行出入之合何如伯高曰歲有十二月日有十二辰子午為經卯酉為緯天周二十八宿而一面七星四七二十八星房昴為緯虛張為經是故房至畢為陽昴至心為陰陽主晝陰主夜故衛氣之行一日一夜五十周於身晝日行於陽二十五周夜行於陰二十五周周於五臟是故平旦陰盡陽氣出於目目張則氣上行於頭循項下足太陽循背下至小趾之端其散者別於目銳眥下手太陽下至手小指之間外側其散者別於目銳眥下足少陽注小趾次趾之間以上循手少陽之分側下至小指之間別者以上至耳前合於頷脈注足陽明以下行至跗上入五趾之間其散者從耳下下手陽明入大指之間入掌中其至於足也入足心出內踝下行陰分復合於目故為一周髒字舊本誤作歲今改正歲有十二月者周天三百六十五度四分度之一一晝一夜日隨天道環轉繞地一周而過一度歲三百六十五日有奇而一周天日有十二辰者夜半為子日中為午日出為卯日入為酉子位於北午位於南卯位於東酉位於西子午為經卯酉為緯天周二十八宿而一面七星四七二十八星是二十八宿分位於周天之三百六十五度也房位於卯昴位於酉虛位於子張位於午房昴為緯虛張為經房度在卯畢度在酉房至畢為陽者日隨天道自東而西漏下二十五刻日正中而行至張度又二十五刻而行至畢度此晝日行於陽也昴度在酉心度在卯昴至心為陰者日隨天道自西而東繞地環轉漏下二十五刻夜正中而行至虛度又二十五刻行至心度此夜行於陰也衛氣之行一日一夜五十周於身者謂營行脈中衛行脈外循臟腑之手足十二經脈與督脈任脈陽蹺陰蹺之脈度而行一呼一吸脈行六寸水下二刻計二百七十息脈行十六丈二尺為一周晝行二十五周夜行二十五周總屬此十六丈二尺之脈度無分陰與陽也其晝行於陽二十五周夜行於陰二十五周周於五臟者晝行於三陽之分夜行於五臟之陰與循經而行者各走其道蓋衛氣之循經而行者是脈內之營氣交相循度環轉晝行於陽夜行於陰者與脈外之營氣相將而行晝行於皮膚肌腠之間夜行於五臟募原之內與晝夜循行十六丈二尺之經脈五十周者不同也是以平旦氣出於陽而目張暮則氣入於陰而目瞑故下文曰日行一舍人氣行一周與十分身之八蓋言日行一舍衛氣之循度而行者環轉於十六丈二尺之一周與行於三陽之分者亦一周也夫衛氣之晝行於陽夜行於陰者應日隨天道繞地環轉衛氣之循經而行者應月與海水之盛虧於東西故曰人與天地參也與日月相應也按厥論曰陽氣起於足五趾之表陰氣起於足五趾之裡陽明者表也為之行氣於三陽而衛氣者陽明水穀之悍氣合於陽明之頷脈下行至足跗上是以衛氣之上入於五趾之間者合陽明而入於頷脈之人迎下至足跗故入於足五趾之端從指井而復出於皮膚之氣分也玉師曰經言衛氣先行皮膚先充絡脈是衛氣與絡脈之相通也衛氣大會於風府日下一節二十一日下至尾骶內行於伏沖之脈是衛氣外行於皮膚而內行於經脈也此言衛氣入於陽明之頷脈是營衛之行於經脈外內又不可執一而論是故日行一舍人氣行一周與十分身之八日行二舍人氣行二周於身與十分身之六日行三舍人氣行於身五周與十分身之四日行四舍人氣行於身七周與十分身之二日行五舍人氣行於身九周日行六舍人氣行於身十周與十分身之八日行七舍人氣行於身十二周在身與十分身之六日行十四舍人氣二十五周於身有奇分與十分身之四陽盡於陰陰受氣矣其始入於陰常從足少陰注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎為周是故夜行一舍人氣行於陰分一周與十分藏之八亦如陽行之二十五周而復合於目陰陽一日一夜合有奇分十分身之四與十分藏之二是故人之所以臥起之時有早晏者奇分不盡故也日行一舍者日行乎一宿之度也人氣行一周者言衛也黃帝曰衛氣之在於身也上下往來不以期候氣而刺之奈何伯高曰分有多少且有長短春秋冬夏各有分理然後常以平旦為紀以夜盡為始是故一日一夜水下百刻二十五刻者半日之度也常如是無已日入而止隨日之長短各以為紀而刺之謹候其時病可與期失時反候者百病不治故曰刺實者刺其來也刺虛者刺其去也此言氣存亡之時以候虛實而刺之是故謹候氣之所在而刺之是謂逢時在於三陽必候其氣在於陽而刺之病在於三陰必候其氣在陰分而刺之此論四時晝夜有長短之分然各有分理以定氣之在陽在陰也如春秋晝夜平分之時常以平旦為紀以夜盡為始日出卯初一刻以一刻人氣在太陽為始二刻在少陽三刻在陽明四刻在陰分一日一夜水下百刻為一周二十五刻者半日之度也至日入而止為晝隨日之長短皆以卯初一刻人氣在太陽為紀而刺之謹候其人氣在於陽分之時以刺陽病人氣在於陰分之時以刺陰病此病可與期而愈如失時反候百病不治也實者邪氣實也來者謂氣之始來如邪在陽分以水下一刻五刻九刻氣始來於陽而即刺之所謂迎而奪之也虛者正氣虛也去者謂氣之已去如陽氣虛者以水下三刻七刻十一刻人氣將去陽而之陰之時以刺之所謂追而濟之也如病在陰之虛實者亦如此法是謂逢時如病在於三陽必候其氣在於陽而刺之病在於三陰必候其氣在於陰而刺之倪仲玉曰必候其氣在於陽者在三陽之分也在於陰者在三陰之分也以三陰三陽之為病亦候其氣之在三陰三陽之分治之水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分水下五刻人氣在太陽水下六刻人氣在少陽水下七刻人氣在陽明水下八刻人氣在陰分水下九刻人氣在太陽水下十刻人氣在少陽水下十一刻人氣在陽明水下十二刻人氣在陰分水下十三刻人氣在太陽水下十四刻人氣在少陽水下十五刻人氣在陽明水下十六刻人氣在陰分水下十七刻人氣在太陽水下十八刻人氣在少陽水下十九刻人氣在陽明水下二十刻人氣在陰分水下二十一刻人氣在太陽水下二十二刻人氣在少陽水下二十三刻人氣在陽明水下二十四刻人氣在陰分水下二十五刻人氣在太陽此半日之度也從房至畢一十四舍水下五十刻日行半度回行一舍水下三刻與七分刻之四大要曰常以日之加於宿上也人氣在太陽是故日行一舍人氣行三陽行於陰分常如是無已與天地同紀紛紛𤽉𤽉終而復始一日一夜水下百刻而盡矣𤽉普巴切此論衛氣應天道之繞地環轉在陽在陰以為取刺之法夫陽者天氣也主外陰者地氣也主內少陰之上君火主之君火者日之太陽也日隨天道環轉晝明夜晦蓋天運以日光明也是以水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分陰分者少陰之分也水下二十五刻此半日之度也從房至畢一十四舍水下五十刻日行天度之半回行一舍者繞地迴轉從昴至心而又行一舍也水下三刻者謂五十三刻而又加於太陽與七分刻之四者有一分二釐五毫之奇分也此衛氣隨天道繞地環轉晝夜皆行於三陽之分是以五十三刻而復行於太陽故大要曰常以日之加於宿上也人氣在太陽謂晝夜日之加於舍上皆以太陽為始也是故日行一日人氣行於三陽而行於陰分常如是無已與天地同紀謂地居天之中而天道運行於地之外也紛紛𤽉𤽉者謂雜亂紛紜而仍有明白之分度也夫衛氣晝行於陽夜行於五臟之陰者應天氣之入於地中有寒暑之往來衛氣環轉一周行於三陽之分二十五周者天道環轉於地之下也故病在於三陽必俟其氣在陽而刺之病在於三陰必俟其氣在陰分而刺之陰分者少陰之分少陰乃三陰之主也衛氣晝行於三陽夜行於五臟共計行五十周應天運環轉於地之外晝夜止行二十五周此氣之有徐駃矣若夫大會於風府日下一節二十二日內行於伏沖其行九日上出於缺盆其所行更遲矣經言衛氣慓悍滑疾而所行疾徐不同此皆出於理數之自然又非人之知力所能臆度也王子律曰晝夜行於三陽乃在肌表氣分與晝夜循經而行大略相同經脈應地之經水抑水流速而氣行緩與九宮八風第七十七太一常以冬至之日居葉蟄之宮四十六日明日居天留四十六日明日居倉門四十六日明日居陰洛四十五日明日居天宮四十六日明日居玄委四十六日明日居倉果四十六日明日居新洛四十五日明日復居葉蟄之宮曰冬至矣盧良侯曰此章論太一所居之宮徙遊之日以下應君民將相之安否也太乙北極也斗杓所指之辰謂之月建即氣令所主之方月令五日謂之候三候謂之氣三氣謂之節冬至子之半一陽初動乃歲時之首也是以太一常以冬至之日居葉蟄之宮葉蟄坎宮也本宮居四十六日明日四十七日徙居於天留之宮天留艮宮也居四十六日明日徙居倉門之宮倉門震宮也居四十六日明日徙居於陰洛之宮陰洛巽官也居四十五日明日徙居於天宮天宮離宮也居四十六日明日徙居於玄委之宮玄委坤宮也居四十六日明日徙居於倉果之宮倉果兌宮也居四十六日明日徙居於新洛之宮新洛乾宮也居四十五日明日四十六日復居於葉蟄之宮是明歲之冬至矣常如是無已終而復始此太乙一歲所居之宮也倪仲玉曰坎宮名葉蟄者冬令主蟄封藏至一陽初動之時蟄蟲始振故名曰葉蟄艮宮名天留者艮為山正而不動因以為名震宮名倉門者倉藏也天地萬物之氣收藏至東方春令而始震動開闢故名倉門巽宮名陰洛者洛書以二四為肩巽宮位居東南而主四月因以為名離宮名天宮者日月麗天主離明在上之象因以為名坤宮名玄委者坤為地玄幽遠也之隨順也地道幽遠柔順是以名之兌宮名倉果者果實也萬物至秋而收藏成實是以名之乾宮名新洛者新始也洛書戴九履一一乃乾之始也此九宮之位應於八方四時各隨時而命名也太一日遊以冬至之日居葉蟄之宮數所在日從一處至九日復反於一常如是無已終而復始太乙移日天必應之以風雨以其日風雨則吉歲美民安少病矣先之則多雨後之則多汗太乙在冬至之日有變佔在君太一在春分之日有變佔在相太一在中宮之日有變佔在吏太一在秋分之日有變佔在將太一在夏至之日有變佔在百姓所謂有變者太一居五宮之日疾風折樹木揚沙石各以其所主占貴賤因視風所從來而占之風從其所居之鄉來為實風主生長養萬物從其沖後來為虛風傷人者也主殺主害者謹候虛風而避之故聖人曰避虛邪之道如避矢石然邪弗能害此之謂也汗當作旱盧良侯曰此太一日遊於九宮也數所在日者以所在之宮數至九日而復反於本宮也如居葉蟄之宮即從葉蟄之一處一日而至天留二日而至倉門三日而至陰洛四日而至天宮五日而至中宮六日而至玄委七日而至倉果八日而至新洛九日而復反於葉蟄之宮如居天留之宮即從天留數至九日而復反於天留也常如是無已終而復始風雨者天地陰陽之和氣是以太一移宮之日天必應之以風雨其本日風雨則吉歲美民安少病如先期而風雨主多雨水後期而風雨則多旱燥此太一出遊之第一日即移宮之第四十七日也二至二分乃陰陽離合之候中宮乃佔八風之時是以遞居本宮之第一日有變則佔在君民將相也疾風折木揚沙暴戾之變氣也實風者春之東風夏之南風秋之西風冬之北風春夏交之東南風秋冬交之西北風此天地四時之正氣故主生長養萬物其從沖後來者如冬至從南西二方而來春分從西北二方而來是為虛鄉不正之風主傷人而殺害萬物故聖人日避虛邪之道如避矢石日避者太一出遊之一日也是故太一徙立於中宮乃朝八風以占吉凶也風從南方來名曰大弱風其傷人也內舍於心外在於脈氣主熱風從西南方來名曰謀風其傷人也內舍於脾外在於肌其氣主為弱風從西方來名曰剛風其傷人也內舍於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也內舍於小腸外在於手太陽脈脈絕則溢脈閉則折不通善暴死風從北方來名曰大剛風其傷人也內舍於腎外在於骨與肩背之膂筋其氣主為寒也風從東北方來名曰凶風其傷人也內舍於大腸外在於兩脅腋骨下及肢節風從東方來名曰嬰兒風其傷人也內舍於肝外在於筋紐其氣主為身濕風從東南方來名曰弱風其傷人也內舍於胃外在肌肉其氣主體重此八風皆從其虛之鄉來乃能病人三虛相搏則為暴病卒死兩實一虛病則為淋露寒熱犯其雨濕之地則為痿故聖人避風如避矢石焉其有三虛而偏中於邪風則為擊僕偏枯矣盧氏曰太一出遊之第五日立於中宮乃朝八風以占吉凶八風者四正四維之風也夫人之五臟生於五方五行內合六腑外合於皮脈肉筋骨是以八方不正之風內傷臟腑外病形身此皆從其虛之鄉來乃能病人也如居葉蟄之宮而出遊之第五日風從南西二方而來如居倉門之宮而出遊之第五日風從西北二方而來數所在日而來不正之風皆謂之虛風也三虛者乘年之虛逢月之空失時之和三虛相搏則為暴病卒死兩實一虛者只傷於虛風也淋露寒熱者汗出而為寒為熱也犯其雨濕之地則風濕相擊而為痿其有三虛而偏中於邪風則為擊僕偏枯故聖人避風如避矢石矣倪仲玉曰重言聖人避風如避矢石者上節謂避太一出遊之第一日此避太一立於中宮所朝之八風也九針論第七十八黃帝曰余聞九針於夫子眾多博大矣余猶不能寤敢問九針焉生何因而有名岐伯曰九針者天地之大數也始於一而終於九故曰一以法天二以法地三以法人四以法時五以法音六以法律七以法星八以法風九以法野黃帝曰以針應九之數奈何岐伯曰夫聖人之起天地之數也一而九之故以立九野九而九之九九八十一以起黃鐘數焉以針應數也一者天也天者陽也五臟之應天者肺肺者五臟六腑之蓋也皮者肺之合也人之陽也故為之治針必以大其頭而銳其末令無得深入而陽氣出二者地也人之所以應土者肉也故為之治針必筒其身而圓其末令無得傷肉分傷則氣得竭三者人也人之所以成生者血脈也故為之治針必大其身而圓其末令可以按脈勿陷以致其氣令邪氣獨出四者時也時者四時八風之客於經絡之中為瘤病者也故為之治針必筒其身而鋒其末令可以瀉熱出血而痼病竭五者音也音者冬夏之分分於子午陰與陽別寒與熱爭兩氣相搏合為癰膿者也故為之治針必令其末如劍鋒可以取大膿六者律也律者調陰陽四時而合十二經脈虛邪客於經絡而為暴痹者也故為之治針必令尖如犛且圓且銳中身微大以取暴氣七者星也星者人之七竅邪之所客於經而為痛痹舍於經絡者也故為之治針令尖如蚊虻喙靜以徐往微以久留正氣固之真邪俱往出針而養者也八者風也風者人之股肱八節也八正之虛風八風傷人內舍於骨解腰脊節腠理之間為深痹也故為之治針必長其身鋒其末可以取深邪遠痹九者野也野者人之節解皮膚之間也淫邪流溢於身如風水之狀而溜不能過於機關大節者也其為之治針令小大如槌其鋒微圓以取大氣之不能過於關節者也此篇論九針之道應天地之大數而合之於人人之身形應天地陰陽而合之於針乃交相輸應者也天地人者三才之道也天地之大數始於一而成於三三而三之成九九而九之九九八十一以起黃鐘之數焉以針應數也肺屬金而位居尊高為臟腑之蓋故應天者肺脾屬土而外主肌肉故應土者肉也而脈者人之神氣也故人之所以成生者血脈也經絡出於四肢以應歲之十二月故合於四時八風五居九數之中故主冬夏之分分於子午律分陰陽故合十二經脈七竅在上故應天之七星人之四肢應於四旁骨有八節故應八方之風九野者在天為分野在地為九州在人為膺喉頭首手足腰脅故曰其氣九州九竅皆通於天氣此論九針之道通於天地人而各有其式各有其用也黃帝曰針之長短有數乎岐伯曰一曰鑱針者取法於巾針去末寸半卒銳之長一寸六分主熱在頭身也二曰圓針取法於絮針筒其身而卵其鋒長一寸六分主治分肉間氣三曰鍉針取法於黍粟之銳長三寸半主按脈取氣令邪出四曰鋒針取法於絮針筒其身鋒其末長一寸六分主癰熱出血五是鈹針取法於劍鋒廣二分半長四寸主大癰膿兩熱爭者也六曰圓利針取法於犛針微大其末反小其身令可深內也長一寸六分主取癰痹者也七曰毫針取法於毫毛長一寸六分主寒熱痛痹在絡者也八曰長針取法於綦針長七寸主取深邪遠痹者也九曰大針取法於鋒針其針微圓長四寸主取大氣不出關節者也針形畢矣此九針大小長短法也此論九針之制有大小長短之法而取用各不同也夫人之氣血合天地陰陽晝夜旋轉無所寧息少有留滯則為痹為癰是以九針之用皆取氣取癰取痹蓋針者所以斡旋天地陰陽之氣黃帝曰願聞身形應九野奈何岐伯曰請言身形之應九野也左足應立春其日戊寅己丑左脅應春分其日乙卯左手應立夏其日戊辰己巳膺喉首頭應夏至其日丙午右手應立秋其日戊申己未右脅應秋分其日辛酉右足應立冬其日戊戌己亥腰尻下竅應冬至其日壬子六腑膈下三臟應中州其大禁大禁太一所在之日及諸戊己凡此九者善候八正所在之處所主左右上下身體有癰腫者欲治之無以其所直之日漬治之是謂天忌日也九野者九州之分野也按星書立春應天文箕尾分野禹貢冀州之域春分應天文心房分野禹貢徐州之域立夏應天文翼軫分野禹貢荊州之域夏至應天文井鬼分野禹貢雍州之域立秋應天文參井分野禹貢梁州之域秋分應天文奎婁分野禹貢兗州之域立冬應天文危室分野禹貢青州之域冬至應天文牛鬥分野禹貢揚州之域中州應天文張柳分野禹貢豫州之域蓋地有九野九州人有九竅九臟皆上通於天氣是以身形應九野而合於天之四時八節也手足之主戊己者土屬四肢也歲半以上天氣主之歲半以下地氣主之膺喉頭首應夏至者身半以上為陽也腰尻以下應冬至者身半以下為陰也丙午屬火故主夏壬子屬水故主冬脅主外內出入之樞故主春秋二分蓋春主陽氣上而陰氣下秋主陰氣上而陽氣下也乙卯屬木主於東方故其日乙卯辛酉屬金主於西方故其日辛酉六腑膈下三臟居形身之中而在下故應地之中州太一所在之日謂移宮出遊之一日並立中宮之日也八正者八方之正位所以候八風之虛邪以時至者也所直之日謂太一所在之日及諸戊己凡此九者是謂天忌日也王子律曰按遁甲經云六戊為天門六己為地戶故為天忌盧良侯曰肺應天心應日故只膈下之三臟應地倪仲玉曰氣從下而上故左足應立春右足應立冬者氣復歸於下也形樂志苦病生於脈治之以灸刺形苦志樂病生於筋治之以熨引形樂志樂病生於肉治之以針石形苦志苦病生於咽喝治之以甘藥形數驚恐筋脈不通病生於不仁治之以按摩醪藥是謂形喝當作𩩲此言人有貴賤君子小人之不同形志有偏苦偏樂之分異故治法亦宜守一勿失也夫富貴之人形樂志苦村野之人形苦志樂淡忘舒泰者形志皆樂系牽拘畏者形志皆苦形樂者四體不運則血脈留滯故當治之以灸刺而通血脈形苦者勞其筋骨故當治之以熨引以舒其筋形樂志樂則心廣體胖故當治之針石以疏氣志者心之所發也咽乃胃腑之門而胃主肌形𩩲骭乃心之蔽骨而內應於心臟故形志皆苦者病生於咽𩩲此病在不足故當調之以甘藥也驚傷心肝恐則傷腎是以形數驚恐則筋脈不通營氣不行則為不仁此病因於內故當治之以按摩醪藥是謂五形志也五臟氣心主噫肺主咳肝主語脾主吞腎主欠此以下意言明乎九針之道更當知五運六氣之微五運者五行之化運合於五臟六腑而主出入六氣者主司天在泉合人之三陰三陽而通於手足之十二經脈以九九之大數而合於五六之變化可通於無窮可傳於後世矣噫者中焦之逆氣上走心為噫故心主噫陰陽應象論曰肺在變動為咳語者論難也肝為將軍之官謀慮出焉故肝主語脾主為胃行其津液者也脾氣不能灌溉於四臟則津液反溢於外竅故為吞嚥之證本經曰陽者主上陰者主下陽引而上陰引而下陰陽相引故數欠當瀉足少陰補足太陽蓋腎氣上逆欲引而下則為欠六腑氣膽為怒胃為氣逆噦大腸小腸為泄膀胱不約為遺溺下焦溢為水王子律曰膽者中正之官決斷出焉故氣逆則為怒口問篇曰人之噦者谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦大腸小腸受盛水穀變化糟粕病則不能化物而為泄矣膀胱者州都之官津液藏焉氣化則出是以不約則為遺溺下焦如瀆水道出焉病則反溢而為水病矣五味酸入肝辛入肺苦入心甘入脾鹹入腎淡入胃是謂五入酸走筋辛走氣苦走血咸走骨甘走肉是謂五走也王氏曰酸苦甘辛鹹五行之味也血氣肉筋骨五臟之所生也是以五味各自走其道五裁病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘口嗜而欲食之不可多者必自裁也命曰五裁王子律曰裁者酌其適中而不可多也夫五味入口內養五臟外濡形身病則嗜食故宜裁之五發陰病發於骨陽病發於血陰病發於肉陽病發於冬陰病發於夏王子律曰腎為陰臟在體為骨故陰病發於骨心為陽臟在體為脈故陽病發於血脾為陰中之至陰在體為肉故陰病發於肉即調神論之所謂逆夏氣則太陽不長心氣內洞逆冬氣則少陰不藏腎氣獨沉之義蓋因本氣自逆而發病也肝為牡臟逆冬氣則奉生者少春為痿厥故肝臟之陽病發於冬肺為牝臟逆夏氣則奉收者少秋為痿瘧故肺臟之陰病發於夏故言五臟發病有因所生之母氣而為病者有因本氣自逆而為病者以五臟錯綜而論之皆能為病者也五邪邪入於陽則為狂邪入於陰則為血痹邪入於陽轉則為癲疾邪入於陰轉則為喑陽入之於陰病靜陰出之於陽病喜怒喜當作善宣明五氣章曰陰出之陽病善怒王子律曰邪入於陽則陽盛陰不勝其陽則脈流薄疾並乃狂又四肢為諸陽之本陽盛則四肢實實則能登高也熱盛於身則棄衣欲走也陽盛則使人罵詈不避親疏也痹者閉也痛也邪入於陰閉而不行則留著而為痹痛矣夫在外者皮膚為陽筋骨為陰故曰病在陽者名曰風在陰者名曰痹癲乃重陰邪入於陽轉入於陰則為癲疾矣夫心主言由腎間之動氣而後發邪入於腎臟之陰轉入於心臟之陽則為喑矣陽分之邪而入於陰則病者靜陰分之邪而出於陽則善怒上節論五臟之氣自傷此論五臟為邪所病五藏心藏神肺藏魄肝藏魂脾藏意腎藏志也本神篇曰肝藏血血舍魂脾藏營營舍意肺藏氣氣舍魄心藏脈脈舍神腎藏精精舍志神志魂魄意五臟所藏之神也五主心主脈肺主皮肝主筋脾主肌腎主骨王子律曰上節論五臟內藏之神此論五臟外合之形陽明多血多氣太陽多血少氣少陽多氣少血太陰多血少氣厥陰多血少氣少陰多氣少血故曰刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太陰出血惡氣刺厥陰出血惡氣刺少陰出氣惡血也惡葉烏去聲王子律曰此與五音五味篇中之論相同而重見者以五運而生六氣也多者宜出少者不宜故曰惡足陽明太陰為表裡少陽厥陰為表裡太陽少陰為表裡是謂足之陰陽也手陽明太陰為表裡少陽心主為表裡太陽少陰為表裡是謂手之陰陽也三陰三陽者天之六氣也而人亦有此六氣合於手足十二經脈六臟六腑蓋針有九九人有九九地有九九皆上通於天之六六也王子律曰地之五行上呈天之六氣故先論五行而後論六氣歲露論第七十九黃帝問於岐伯曰經言夏日傷暑秋病瘧瘧之發以時其故何也岐伯對曰邪客於風府病循膂而下衛氣一日一夜常大會於風府其明日日下一節故其日作晏此其先客於脊背也故每至於風府則腠理開腠理開則邪氣入邪氣入則病作此所以日作尚晏也衛氣之行風府日下一節二十一日下至尾骶二十二日入脊內注於伏沖之脈其行九日出於缺盆之中其氣上行故其病稍益全章大義論衛氣充行於皮膚肌腠為形身之外衛晝行於陽夜行於陰應天運之開闔一日一夜大會於風府其明日日下一節二十二日內注於伏沖之脈其行九日上出於缺盆應月行一月而一周天海水西盛人血氣積肌肉充海水東盛人血氣虛衛氣去形獨居應海水之消長蓋一日一夜天道繞地一周水天之氣上下相通而月以應水也衛氣行於肌腠之間寒則皮膚急而腠理閉暑則皮膚緩而腠理開故以夏傷於暑秋成痎瘧以證衛氣之行焉瘧者暑邪藏於肌膚秋時陰氣外出陰與陽遇寒與熱爭邪正相持而發為瘧也風府督脈穴在腦後髮際中邪氣客於風府循脊膂而下衛氣一日一夜大會於風府其明日日下一節故其日作晏此邪先客於脊背也故衛氣每至於風府則腠理開開則邪氣入而與衛氣相遇則病作衛氣日下一節故作日晏也蓋衛氣日下一節則開其下節之腠理邪氣因開而入與衛氣相遇而病乃作也伏沖者衝脈伏行背裡為經絡之海衛氣循外而下從內而上環轉一周應天道也盧良侯曰衛氣行陽行陰應天與日之晦冥循脊膂而下注衝脈而上應天道之運行於外而復通貫於地中衛氣內注於伏沖之脈外注於足陽明之脈猶司天在泉上下環轉泉在天之下而與地中之經水相通至其內搏於五臟橫連募原其道遠其氣深其行遲不能日作故次日乃蓄積而作焉內搏五臟者邪留於五臟之募原募原者橫連於臟腑之脂膜瘧邪內搏於五臟募原之間則其道遠其氣深不能與衛氣俱行而外出故不能日作而間日乃發也此言衛氣夜行於陰者行於五臟募原之間也黃帝曰衛氣每至於風府腠理乃發發則邪入焉其衛氣日下一節則不當風府奈何岐伯曰風府無常衛氣之所應必開其腠理氣之所舍節則其府也此承上文申明衛氣出於缺盆之中其氣上行一日一夜大會於風府明日日下一節矣蓋歲有三百六十日而氣盈五日九百四十分則一月該盈四百九十五分是出於缺盆之第九日行一日一夜正朔日之平旦而大會於風府也其明日日下一節則邪與衛氣亦會於下節而大會於風府矣蓋衛氣之所應必開其腠理開則邪循脊膂而下入與衛氣相遇則病乃作故風無常府謂衛氣日下所舍之節則其府也故曰常大會於風府常者謂一歲之中常十二大會於風府也大會者與膂脈相會蓋始於風府其日下所舍之節即其府也黃帝曰善夫風之與瘧也相與同類而風常在而瘧特以時依何也岐伯曰風氣留其處瘧氣隨經絡沉以內搏故衛氣應乃作也帝曰善風乃天之陽邪故留於表陽之分瘧乃風寒暑濕之邪主陰陽寒熱之往來故隨經絡之出入沉以內搏與衛氣相應乃作蓋衛氣隨經絡交相逆順而行者也黃帝問於少師曰余聞四時八風之中人也故有寒暑寒則皮膚急而腠理閉暑則皮膚緩而腠理開賊風邪氣因得以入乎將必須八正虛邪乃能傷人乎少師答曰不然賊風邪氣之中人也不得以時然必因其開也其入深其內極病其病人也卒暴因其閉也其入淺以留其病也徐以遲此言邪氣必因其開而入深也四時有寒暑之往來故八風之中人也有寒風而有暑風寒則皮膚急而腠理閉暑則皮膚緩而腠理開然賊風邪氣之中人也蓋因人氣之虛實開闔而入有淺深不因寒暑之開閉也黃帝曰有寒溫和適腠理不開然有卒病者其故何也少師答曰帝弗知邪入乎雖平居其腠理開閉緩急其故常有時也黃帝曰可得聞乎少師曰人與天地相參也與日月相應也故月滿則海水西盛人血氣積肌肉充皮膚致毛髮堅腠理郄煙垢著當是之時雖遇賊風其入淺不深至月郭空則海水東盛人氣血虛其衛氣去形獨居肌肉減皮膚縱腠理開毛髮殘腠理薄煙垢落當是之時遇賊風則其入深其病人也卒暴此承上文申明人氣之虛實開闔應天時之盛衰人與天地相參與日月相應也衛氣日行於陽夜行於陰應天道之開闔日麗天而繞地一周衛氣從風府而下至骶骨注衝脈而上出缺盆應一月而月與天會月乃陰魄故月之盈虧應水之消長月郭滿則海水西盛月郭空則海水東盛蓋月有盈虧虧於西則滿於東月生於西故從西而盛於東也衛氣者所以溫分肉充皮膚肥腠理司開闔者也故衛氣盛則肌肉充皮膚致毛髮堅腠理郄煙垢著當是之時雖遇賊風其入淺不深至月郭空則海水東盛人氣血虛其衛氣去而形獨居肌肉減皮膚縱腠理開毛髮殘理者肌肉之紋理乃三焦通會之處故曰焦理煙垢者火土之餘也三焦主火肌肉主土故焦理薄則煙垢落謂肌肉減腠理開則肌腠之氣亦消散也當是之時遇賊風則其入深其病人也卒暴夫衛氣去者去形身而內入於伏沖之脈也二十二日入於內注於伏沖其行九日復出於缺盆其氣上行是每月朔旦復出於形身復會於風府也故八正神明論曰月始生則血氣始精衛氣始行夫月晦初蘇曰朔謂衛氣至朔日始行於陽而大會於風府也此衛氣之與天地相參與日月相應者也王子律曰海水初八起汐十五大潮念三落汐是以衛氣應月滿而盛至念三而去形也黃帝曰其有卒然暴死暴病者何也少師答曰三虛者其死暴疾也得三實者邪不能傷人也黃帝曰願聞三虛少師曰乘年之衰逢月之空失時之和因為賊風所傷是謂三虛故論不知三虛工反為粗帝曰願聞三實少師曰逢年之盛遇月之滿得時之和雖有賊風邪氣不能危之也命曰三實黃帝曰善乎哉論明乎哉道請藏之金匱然此一夫之論也逢年之虛者六氣司天在泉之不及也逢月之空者月郭空之時也失時之和者四時不正之氣也夫衛氣與天地相參與日月相應是年之虛月之空時之違和皆主衛氣失常蓋衛氣者衛外而為固也衛氣虛則腠理疏而邪氣直入於內故為暴病卒死夫三虛三實民所共由帝曰此一夫之論者謂虛邪賊風人逢之則中非比下文之衝風能傷天下人者也故聖人避風如避矢石焉黃帝曰願聞歲之所以皆同病者何因而然少師曰此八正之候也黃帝曰候之奈何少師曰常以冬至之日太一立於吐蟄之宮其至也天必應之以風雨者矣風雨從南方來者為虛風賊傷人者也其以夜半至者萬民皆臥而弗犯也故其歲民少病其以晝至者萬民懈怠而皆中於虛風故萬民多病虛邪入客於骨而不發於外至其立春陽氣大發腠理開因立春之日風從西方來萬民又皆中於虛風此兩邪相搏經氣結代者矣故諸逢其風而遇其雨者命曰遇歲露焉因歲之和而少賊風者民少病而少死歲多賊風邪氣寒溫不和則民多病而死矣八正者冬至夏至春分秋分立春立夏立秋立冬定八方之正位以候八方之風雨也冬至之日風從南方來立春之日風從西方來此從其沖後來為虛風傷人者也冬至子之半其氣始蒙故虛邪入客於骨而不即發立春時陽氣大發腠理開而立春之日又逢西方來之衝風兩邪相搏則經絡結代矣風者天之氣雨者天之露故諸逢其風而遇其雨者命曰遇歲露焉一歲之中得及時之風雨而少賊風者是因歲之和則歲美民安少病如風雨不時又多烈風邪氣而失時之和則民多病而死矣黃帝曰虛邪之風其所傷貴賤何如候之奈何少師答曰正月朔日太一居天留之宮其日西北風不雨人多死矣正月朔日平旦北風春民多死正月朔日平旦北風行民病死者十有三也正月朔日日中北風夏民多死正月朔日夕時北風秋民多死終日北風大病死者十有六正月朔日風從南方來命曰旱鄉從西方來命曰白骨將國有殃人多死亡正月朔日風從東方來髮屋揚沙石國有大災也正月朔日風從東南方行春有死亡正月朔日天和溫不風糴賤民不病天寒而風糴貴民多病此所以候歲之風䔲人者也二月醜不風民多心腹病三月戌不溫民多寒熱四月巳不暑民多癉病十月申不寒民多暴死諸所謂風者皆髮屋折樹木揚沙石起毫毛發腠理者也正月朔日候四時之歲氣者以建寅之月為歲首人生於寅也二月醜不風者又常以冬至之日太一始居葉蟄之宮以候天之風雨以建子之月為歲首天開於子也三月主辰三月戌不溫者辰與戌合也在十二月所主在十二辰在六氣所主在三陰三陽故曰三月戌不溫四月巳不暑蓋或從六氣或從十二辰也寅申少陽主氣十月申不寒者以六氣之主時也天干始於甲地支始於子如子午之歲寅申少陽主五氣之九月十月十月申不寒者主氣失時民多暴死蓋四時主客之氣三陰三陽之所主也以一日之四時而應一歲之四時者日日隨天道環轉一周而歲與天會也正月朔日風從東方來者正風也因發木揚沙故國有災也天寒而風二月醜風謂和風也諸所謂風者皆折木揚沙之烈風又無和潤之雨露故民有死亡也此章論人之虛實因天氣之盛衰而四時之風露又有和厲之異氣故聖人曰避虛邪之道如避矢石然庶邪勿能害也大惑論第八十黃帝問於岐伯曰余嘗上於清冷之臺中階而顧匍匐而前則惑余私異之竊內怪之獨瞑獨視安心定氣久而不解獨博獨眩被髮長跪俯而視之後久之不已也卒然自上何氣使然岐伯對曰五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈併為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪其精其精所中不相比也則精散精散則視歧視歧見兩物目者五臟六腑之精也營衛魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黑眼法於陰白眼赤脈法於陽也故陰陽合傳而精明也目者心使也心者神之舍也故神精亂而不轉卒然見非常處精神魂魄不相得故曰惑也清冷之臺東苑之臺名也惑眩亂也精精明也窠藏也眼者瞳子黑白之總名也骨之精為瞳子腎之精也筋之精為黑眼肝之精也血之精為絡心之精也窠氣之精為白眼肺之精也約束者目之上下綱肌肉之睛為約束脾之精也裹擷筋骨血氣之精心主包絡之精也包絡之精與脈併為目系上屬於腦後出於項中是諸脈皆上繫於目會於腦出於項此脈系從下而上從前而後也若邪中於項則隨眼系入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣比周密也邪其精其精為邪所中則不相比密而精散矣精散則視歧而見兩物矣夫心藏神腎藏志肝藏魂肺藏魄脾藏意此五臟所藏之神志也目者五臟六腑之精也是故瞳子黑眼法於陰白眼赤脈法於陽故陰陽相合傳於目而為睛明也夫心者五臟之專精也目者其竅也華色者心之榮也故目乃心之使心者神之舍也神精亂而不轉則卒然見非常處精神魂魄散不相得故曰惑也黃帝曰余疑其然余每之東苑未曾不惑去之則復余唯獨為東苑勞神乎何其異也岐伯曰不然也心有所喜神有所惡卒然相感則精氣亂視誤故惑神移乃復是故聞者為迷甚者為惑夫火之精為神水之精為精精上傳於神共湊於目而為精明若神感於精則精氣亂而為惑矣蓋精明者從下而上從前而後也是以上文論從後而逆於前此論上而感於下皆反逆而為惑也心有所喜者喜之東苑而上清冷之臺也神乃火之精而惡清冷故神有所惡卒然相感者神志相感也神乃清冷而有所感則神反下交於陰矣神氣下交則精氣亂矣精氣亂則視誤而為惑矣候神移於上而後乃復也夫腎藏志而開竅於耳是故志不上交於神則迷甚則神反下交於志則惑也按此章總結九針之道貴在得神能存乎精氣神者可無惑於天下故帝設此問而伯論其精氣神焉寶命全形論曰凡刺之真必先治神又曰淺深在志遠近若一八正神明論曰神乎神耳不聞目明心開而志先慧然獨悟離合真邪論曰誅罰無過命曰大惑反亂大經真不可復蓋治針之要貴在診視審察存神定志適其常變萬舉萬全可傳於後世令終而不滅至於修身養生治國治民總在調養精氣神三者是以內經素問首論上古天真末結解精微論所以修身養生也本經首論九針之道末結大惑癰疽所以治國治民也知修身則知所以治民知治民則知所以治天下國家矣黃帝曰人之善忘者何氣使然岐伯曰上氣不足下氣有餘腸胃實而心肺虛虛則營衛留於下久之不以時上故善忘也本篇曰目者五臟六腑之精也營衛魂魄之所常營也八正神明論曰觀其冥冥者言形氣營衛之不形於外而工獨知之又曰養神者必知營衛血氣之盛衰故此以下復論營衛之行所當詳審者也夫營衛生於中焦之陽明運行於形身之外內氣者先天之真元生於下焦精水之中上通於心肺環轉於上下上氣不足下氣有餘則腸胃實而心肺虛矣虛則營衛留於下久之不以時上故善忘也倪仲玉曰腸胃陽明也先天之氣逆於下則後天之氣亦逆於中中下並逆則上氣大虛故善忘也黃帝曰人之善飢而不嗜食者何氣使然岐伯曰精氣並於脾熱氣留於胃胃熱則消穀谷消則善飢胃氣逆於上胃脘寒故不嗜食也脾主為胃行其津液者也精氣並於脾則脾家實而不能為胃轉輸則熱氣留於胃而消穀善飢矣夫谷入於胃五臟六腑皆以受氣別出兩行營衛之道清者為營濁者為衛其大氣之搏而不行者積於上焦之胸中胃氣逆上者謂之悍氣上衝於頭而走空竅蓋脾不能為胃行其津液則營衛大氣留而不行胃之逆氣反上衝於頭而別走陽明矣胃脘者胃之上脘大氣不行則上焦虛而胃脘寒上焦虛寒不能主納故不嗜食也以上二節論營衛生始之因黃帝曰病而不得臥者何氣使然岐伯曰衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑矣黃帝曰病目而不得視者何氣使然岐伯曰衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉也陽蹺者足太陽之別起於足之外踝循脅下肩膊從口吻至目內眥與陰蹺會於足太陽之睛明陰蹺乃足少陰之別起於然谷之後循胸上入缺盆從咽喉至目內眥與陽蹺會於足太陽之睛明衛氣行陽二十五周下行陰分而復會於目內行於五臟之陰亦如陽行之二十五周而復會於目是以衛氣出於陽則目張而寤入於陰則目瞑而臥故衛氣留於陽則陽蹺盛不得入於陰則陰氣虛故目不瞑衛氣留於陰則陰蹺滿不得入於陽則陽氣虛故目閉也此言衛氣行陽行陰皆從目以出入故曰目者營衛魂魄之所常營也王子律曰此節重見者再蓋其文則同而各有所謂也黃帝曰人之多臥者何氣使然岐伯曰此人腸胃大而皮膚澀而分肉不解焉腸胃大則衛氣留久皮膚澀則分肉不解其行遲夫衛氣者晝日常行於陽夜行於陰故陽氣盡則臥陰氣盡則寤故腸胃大則衛氣行留久皮膚濕分肉不解則行遲留於陰也久其氣不精則欲瞑故多臥矣其腸胃小皮膚滑以緩分肉解利衛氣之留於陽也久故少瞑焉衛氣外行於肌肉之紋理內行於腸胃之募原分肉者肌肉之腠理其人腸胃大則衛氣行於陰而留久皮膚澀分肉不解則出於陽而行遲留於陰也久其氣不精則欲瞑而多臥矣其人腸胃小則衛氣周於陰也速皮膚滑以緩分肉解利衛氣之行於陽也久故少瞑焉蓋衛氣日行於陽夜行於陰陽氣盡則入於陰而臥陰氣盡則出於陽而寤如留於陰久則多臥留於陽久則少瞑焉上節論衛氣通貫於陽蹺陰蹺之脈中此論衛氣出入於分肉募原之氣分夫衛者陽氣也主外而夜行於陰衛者濁氣也注陽而復貫於脈此應天道之運行無往而不遍者也黃帝曰其非常經也卒然多臥者何氣使然岐伯曰邪氣留於上膲上膲閉而不通已食若飲湯衛氣久留於陰而不行故卒然多臥焉膲焦同此言衛氣留於上而不行於上則卒然多臥蓋身半以上為陽身半以下為陰也非常經者非一日行於陽夜行於陰之經常出入此因邪氣留於上焦則上焦閉而不通飲食於胃則中焦滿實以致衛氣久留於下之陰而不能上行於陽故卒然多臥也黃帝曰善治此諸邪奈何岐伯曰先其臟腑誅其小過後調其氣盛者瀉之虛者補之必先明知其形志之苦樂定乃取之先其臟腑者先調其五臟六腑之精氣神志誅其小過者去其微邪也後調其氣者調其營衛也必先明知其形志之苦樂定其灸刺熨引甘藥醪醴以取之蓋志者精神魂魄志意也形者營衛血氣之所營也故志苦則傷神行勞則傷精氣矣癰疽第八十一黃帝曰余聞腸胃受谷上焦出氣以溫分肉而養骨節通腠理中焦出氣如露上注谿谷而滲孫脈津液和調變化而赤為血血和則孫脈先滿溢乃注於絡脈皆盈乃注於經脈陰陽已張因息乃行行有經紀周有道理與天合同不得休止切而調之從虛去實瀉則不足疾則氣減留則先後從實去虛補則有餘血氣已調形氣乃持余已知血氣之平與不平未知癰疽之所從生成敗之時死生之期有遠近何以度之可得聞乎岐伯曰經脈流行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草蓂不成五穀不殖徑路不通民不往來巷聚邑居則別離異處血氣猶然請言其故夫血脈營衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫寒氣化為熱熱勝則腐肉肉腐則為膿膿不瀉則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄瀉血枯空虛則筋骨肌肉不相營經脈敗漏熏於五臟臟傷故死矣泣澀同此篇歸結首章之義蓋人之血氣流行與天地相參與日月相應晝夜環轉之無端也一息不運則留滯而為癰為痹故聖人立九針之法所以治未病也若積久而成癰疽則多不治之死證矣夫營衛血氣之行皆從內而外應寒暑往來經水流行皆從地而出帝復論上焦出氣以溫分肉而養骨節通腠理中焦出氣如露上注谿谷而滲孫脈從孫脈而注於絡脈經脈是從氣分而注於經脈之中乃從外而內應天道之運行於外而復通於經水之中人與天地參也故經脈流行不止與天同度與地合紀天宿失度日月薄蝕地經失紀水道流溢人之血氣猶然夫血脈營衛周流不休上應星宿下應經數如寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之歸還也蓋營行脈中衛行脈外交相逆順而行者也營血留泣不行則衛氣亦還轉而不得復反其故道故癰腫也骨空者節之交也癰腫不當骨空之處則骨中之邪熱不得泄瀉矣血枯而經脈空虛則筋骨肌肉不相營矣經脈外絡形身內屬臟腑經脈敗漏則熏於五臟臟傷故死矣黃帝曰願盡聞癰疽之形與忌曰名岐伯曰癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉則合豕膏冷食三日而已夫皮脈肉筋骨五臟之外合也而臟腑之血氣循行又各有部分故有輕重死生之別焉嗌乃呼吸出入之門發於嗌中其勢甚猛故名猛疽若膿不瀉而塞嗌則呼吸不通不待半日而死矣嗌乃肺之上管肺腎上下交通豕乃水畜冷飲豕膏者使熱毒從下而出也發於頸名曰夭疽其癰大以赤黑不急治則熱氣下入淵液前傷任脈內熏肝肺熏肝肺十餘日而死矣頸乃手足少陽陽明血氣循行之分部故不急治則熱氣下入淵液淵液乃足少陽膽經穴在腋下三寸蓋從外而將入於內也任脈居陽明少陽四脈之中故前傷在脈內熏肝肺此在外腑經之毒內熏於臟故至十餘日而死經云上工治皮膚其次治經脈其次治六腑其次治五臟治五臟者半死半生為瘍醫者不可不知也陽氣大發消腦留項名曰腦爍其色不樂項痛而如刺以針煩心者死不可治陽氣大發者三陽之氣併發也三陽者太陽也太陽經脈入於腦出於項故陽氣大發留於項名曰腦爍此純陽之氣消爍腦髓也夫心為陽中之太陽心與太陽標本相合心氣受郁故其色不樂若煩心者腑毒干臟死不可治矣發於肩及臑名曰疵疽其狀赤黑急治之此令人汗出至足不害五臟癰發四五日逞焫之焫熱同肩臑乃肺臟之部分故令人汗出至足此癰生浮淺如疵之在皮毛故名疵癰而不害五臟逞快也速焫治之則毒隨氣而散矣姚氏曰火氣能消肺金之毒發於腋下赤堅者名曰米疽治之以砭石欲細而長疏砭之塗以豕膏六日已勿裹之腋者亦肺臟之部分米者言其小也治之以砭石者癰亦浮淺也毒氣在於皮膚之間六日則氣已周而來復故已勿裹之者使毒氣外泄也夫癰發於腑部者反熏臟而死發於臟部者易已此皆淺深內外之別為瘍醫者不可不知其癰堅而不㿉者為馬刀俠纓急治之纓當作癭其癰堅而不㿉者承上文而言癰在膺腋之間堅而不潰者此為馬刀俠癭金匱要略曰人年五六十其病脈大痹挾背行苦腸鳴馬刀俠癭者皆為勞得之夫馬刀俠癭足陽明之證也四肢為諸陽之本勞其四體則傷陽明而有是證故宜急治之以保胃氣發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死矣胸者膻中之分宗氣之所居也宗氣出於陽明故不早治則下入於腹而傷陽明胃氣胃氣傷則七日死矣發於膺名曰甘疽色青其狀如谷實𦸈𧁾常苦寒熱急治之去其寒熱十歲死死後出膿𦸈音括𧁾音樓膺乃足厥陰陽明之部分故疽發於此其名曰甘其色青也狀如谷實𦸈𧁾者如米穀如栝蔞之子實也陽明從太陰之化厥陰從少陽之化陰陽互交故往來寒熱也急治之以去其寒熱此疽至十年而後發乃死死後出膿者謂至將死之候然後出膿而死此即乳岩石癰之證也夫寒熱者厥陰陽明之氣病也如谷實𦸈𧁾者肝臟胃腑之郁毒留於脈絡之間即如竄瘻寒熱之毒其本在臟其末在脈故不易消而亦不即發也至十年之久臟腑之氣將衰則毒氣發而潰爛死矣發於脅名曰敗疵敗疵者女子之病也灸之其病大癰膿治之其中乃有生肉大如赤小豆銼䔖翹草根各一升以水一斗六升煮之竭為取三升則強飲厚衣坐於釜上令汗出至足已䔖蔆同脅在腋之下肺肝之部分也此亦發於皮膚故名曰敗疵夫肺主氣肝主血女子之生有餘於氣不足於血此因氣血不調而生故為女子之病其病大癰膿治之者謂如治大癰之法以灸之也其中乃有生肉大如赤小豆是雖名敗疽而不至於腐肉爛筋傷骨矣䔖乃水草翹連翹也銼二草根各一升煮之強飲厚衣坐於釜上令汗出至足乃已蓋水草能清熱發汗翹能解毒者也發於股脛名曰股脛疽其狀不甚變而癰膿搏骨不急治之三十日死矣發於股脛足少陰之毒也其狀不甚變者毒附於骨而不外發故皮膚不甚變為癰毒之狀也不急治之三十日死腎為水臟月為陰而應水故應月一周而死發於尻名曰銳疽其狀赤堅大急治之不治三十日死矣尻乃足太陽之部分太陽之上寒水主之故亦應月而死夫腎與膀胱為水髒水腑腎為陰而主骨故癰膿搏骨而不外發腑為陽而太陽之氣主於膚表故其狀赤堅而大夫陽毒起發於外而亦致死者太陽為諸陽主氣也噫能知臟腑陰陽營衛血氣表裡標本多能死中求生為瘍醫者可不知內經乎發於股陰名曰赤施不急治六十日死在兩股之內不治十日而當死股陰者足三陰之部分也以火毒而施於陰部故名曰赤施六十者水之成數也十日者陰數之終也閔士先曰股陰者足少陰之分也兩股之內者足太陰厥陰之分也發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石石之者死須其柔乃石之者生膝者筋之會足少陽之分也色不變者色與皮膚相同而不赤也其狀如大癰而色不變者毒在外內之間也蓋少陽主樞故其色狀如此而為寒為熱也如堅石者勿砭石之石之則死毒氣入於內也須其柔軟而石之者生毒氣出於外也蓋少陽主樞可內而可外也余伯榮曰堅石者毒氣尚未透發柔則發於外矣故有外內死生之分焉諸癰疽之發於節而相應者不可治也發於陽者百日死發於陰者三十日死此論癰疽之發於背也節者脊之二十一椎每椎有節之交神氣之所遊行出入者也相應者內應於五臟也發於陽者發於三椎而內應於肺臟發於四椎而內應於心主包絡發於五椎而內應於心臟也發於陰者發於七椎而內應於肝臟發於十一椎而內應於脾臟發於十四椎而內應於腎臟也百日死者日之終也三十日者月之終也余伯榮曰癰疽發於背而偏者或傷及臟腑之俞猶有可生之機正中者傷及督脈而況相應於五臟乎閔士先曰癰者壅也疽者阻也毒者癰疽之總名也上古以癰疽所發之處分陰陽而命名後世以發於背者即名曰發背發於臂者即名曰臂癰是以古今之命名各不同焉姚士因曰節之交骨空處也周身三百六十五節而四肢有十二大節皆髓孔易髓之處上文曰不當骨空不得泄瀉謂癰不當於骨空之處其傷骨消髓之熱邪無從而出若諸癰疽之發於節者正當邪熱所出之空非死徵也馬氏云其節之外廉為陽內廉為陰是發於四肢之內外廉者皆不治之死證耶噫經義淵微不易闡發豈可以粗疏之學貽誤後人發於脛名曰兔齧其狀赤至骨急治之不治害人也兔乃陰類發於脛名曰兔齧者發於陰脛也其狀赤至骨者從外而內也故曰急治之不治害人也猶言外賊之來害人也夫衝脈者十二經之海也與少陰之大絡起於腎下出於氣街循陰股內廉邪入膕中循脛骨內廉下入內踝之後此邪客於衝脈之中則血泣不通有如兔齧之微腫也發於內踝名曰走緩其狀癰也色不變數石其輸而止其寒熱不死此邪客於足少陰之脈而為腫也夫癰疽之變有病因於內而毒氣走於外者有腫見於外而毒氣走於內者此邪留於脈而不行故名曰走緩其狀若癰而色不赤也足少陰之脈起於小趾之下邪越足心出然谷之下循內踝之後以上端內故當數石其輸去其邪而止其寒熱蓋足少陰秉先天之水火故能為寒為熱也余伯榮曰鼠瘻寒熱病也發於少陰發於足上下名曰四淫其狀大癰急治之百日死四淫者邪氣行於左右之太少也少陽主初陽之生氣而發於腎臟太陽乃腎之腑而為諸陽主氣故當急治之不則陽氣傷而百日死矣發於足旁名曰厲癰其狀不大初如小指發急治之去其黑者不消輒益不治百日死此寒邪客於足陽明之脈而為癰也足陽明之脈起於足大趾次趾之厲兌故發於足旁名曰厲癰夫在地為水在天為寒黑者水之氣色也不急治之以去其黑則寒淫而土敗矣姚士英曰少陽太陽之氣生於下焦故邪客於下其狀大癰陽明之氣生於中焦故邪客於下其狀不大蓋經絡傷而氣未傷也閔士先曰初如小指發者謂初發如小指其狀腫而長乃邪在經絡之形也衛氣歸之則圓而墳起矣發於足趾名曰脫癰其狀赤黑死不治不赤黑不死不衰急斬之不則死矣此足少陰之毒從內而發於外故曰脫癰謂從陰而脫出於陽也發於足趾者發於足大趾也動輸篇曰足少陰之經下入內踝之後入足下其別者邪入踝出屬跗上入大趾之間注諸絡夫足少陰秉先天之水火其狀赤黑者水火之淫毒太盛故為不治之死證不赤黑者其毒氣少衰故為不死如癰腫不衰急斬去其趾不則毒氣注於諸經之絡而死矣黃帝曰夫子言癰疽何以別之岐伯曰營衛稽留於經脈之中則血泣而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐肉腐則為膿然不能陷骨髓不為焦枯五臟不為傷故命曰癰黃帝曰何謂疽岐伯曰熱氣淳盛下陷肌肉筋髓枯內連五臟血氣竭當其癰下筋骨良肉皆無餘故命曰疽疽者上之皮夭以堅上如牛領之皮癰者其皮上薄以澤此其候也上文分別部位之陰陽死生此總論癰疽之淺深輕重蓋人之血氣流行環轉出入而淫邪泮衍變易無常且氣秉有厚薄邪客有微甚是以死生成敗各不同焉按內經論癰疽所發有因於喜怒不測飲食不節臟腑不和則留積而為癰者有因於臟腑之寒熱相移而成癰者本篇只論外因之邪蓋以人之血氣流行與天同度與地合紀因息乃行不得休止少有留滯則為癰為痹矣是以聖人立九針之法配合三才之道以回造化之功立數十萬言傳之竹帛使天下後世子孫黎民不罹災眚之患同歸生長之門聖人之教化大矣
