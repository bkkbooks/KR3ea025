body:
  text: 卷二經脈第十雷公問於黃帝曰禁服之言凡刺之理經脈為始營其所行制其度量內次五臟外別六腑願盡聞其道黃帝曰人始生先成精精成而腦髓生骨為幹脈為營筋為剛肉為牆皮膚堅而毛髮長谷入於胃脈道以通血氣乃行雷公曰願卒聞經脈之始生黃帝曰經脈者所以能決死生處百病調虛實不可不通此篇論臟腑十二經脈之生始出入營血營行脈中六氣合於脈外始於手太陰肺終於足厥陰肝周而復始循度環轉之無端也人始生先成精者本於先天水火之精氣而先生兩腎腦為精髓之海腎精上注於腦而腦髓生骨為幹者骨生於水臟如木之干也營者猶營舍之所以藏血氣也筋為剛者言筋之強勁也肉為牆者肉生於土猶城牆之外衛也皮膚堅而毛髮長血氣之充盛也此言皮膚脈肉筋骨乃五臟之外合本於先天之精氣也谷入於胃脈道以通血氣乃行言榮衛氣血生於後天水穀之精也愚按血氣之生始出入陰陽之離合盛衰非神靈睿聖焉能洞鑑隔垣靈素二經敘君臣咨訪蓋欲證明斯道永垂金石然隱微之中惟帝所洞察故復指示於臣僚云西銘曰營氣篇論營血之生始循行亦出於帝論肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色變為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者則寸口反小於人迎也曰肺曰脈者乃有形之臟腑經脈曰太陰者無形之六氣也血脈內生於臟腑外合於六氣以脈氣分而論之病在六氣者見於人迎氣口病在氣而不在脈也病在臟腑者病在內而外見於臟腑所主之尺寸也合而論之臟腑經脈內合五行外合六氣五六相得而各有合也故曰肺手太陰之脈概臟腑經脈陰陽之氣而言也此篇論榮血榮行脈中始於手太陰肺終於足厥陰肝腹走手而手走頭頭走足而足走腹環轉無端終而復始六臟之脈屬臟絡腑六腑之脈屬腑絡臟臟腑相連陰陽相貫先為是動後及所生是動者病在三陰三陽之氣而動見於人迎氣口病在氣而不在經故曰盛則瀉之虛則補之不盛不虛以經取之謂陰陽之氣偏盛淺刺絕皮益深絕皮以瀉陰陽之盛致穀氣以補陰陽之虛此取皮腠之氣分而不及於經也如陰陽之氣不盛不虛而經脈不和者則當取之於經也所生者謂十二經脈乃臟腑之所生臟腑之病外見於經證也夫是動者病因於外所生者病因於內凡病有因於外者有因於內者有因於外而及於內者有因於內而及於外者有外內之兼病者本篇統論臟腑經氣故曰肺手太陰之脈曰是動曰所生治病者當隨其所見之證以別外內之因又不必先為是動後及所生而病證之畢具也膈者胸內之膈肉前連鳩尾後連脊之十一椎胸旁肋下謂之腋膊內肱處謂之臑臑盡處為肘肘以下為臂廉側也寸口兩寸尺之動脈處魚際掌中大指下高起之白肉有如魚腹因以為名榮氣之道內谷為實谷入於胃乃傳之肺故肺脈起於中焦之胃脘下絡大腸還循胃口而復上膈屬肺橫出腋下之中府雲門下循臑內歷天府俠白行於少陰心主之前下肘中抵尺澤循臂骨之下廉歷孔最列缺入寸口之經渠太淵以上魚出大指端之少商其旁而支行者從列缺分行於腕後循合谷上行於食指之端以交於手陽明大腸經之商陽是動則病肺脹膨膨而喘咳缺盆中痛瞀目垂貌甚則交兩手而瞀此為臂氣厥逆之所致蓋三陰三陽之氣各循於手足之經氣逆於外而病見於內也所生者肺臟所生之病而外見於經證夫五行之氣五臟所主而六腑為之合故在臟則曰主肺主脾主心主腎主肝在腑則曰主津主液主氣主血主骨主筋此皆臟腑所生之病而外見於經證也是主肺所生之病故咳嗽上氣渴而煩心肺主氣而為水之生原肺乃心之蓋也胸滿臑臂痛掌中熱皆經脈所循之部而為病也氣之盛虛者謂太陰之氣也肺俞在肩背因氣而痛於俞所謂氣傷痛也溺色變者氣虛而不化也夫三陰三陽之氣本於陽明胃腑所生從手陽明之五里而散行於膚表肺主氣而外主皮毛是以手太陰與手足陽明論氣之盛虛其餘諸經略而不論也夫三陰三陽之氣有因於本氣之盛虛有因於外感風寒以致氣之盛者故提於十二經之首曰風寒汗出中風蓋以申明三陰三陽之氣在表而合於天之六氣也為此是動所生諸病盛則瀉之虛則補之熱則疾出其針以瀉其熱寒則留之以俟針下熱也艾名冰臺舉冰向日能於冰中取火故氣陷下者灸之謂能起生陽之氣於陰中也如陰陽之氣無有盛虛而所生之經脈不調者則當取之於經矣經者肺手太陰之脈也所謂氣之盛者寸口大三倍於人迎虛者寸口反小於人迎也尚御公曰臟腑之氣候見於手太陰之寸關尺人迎氣口左右之寸口也候法不同各有分別故首提曰肺手太陰之脈復曰氣有盛虛曰人迎氣口書不盡言義已櫽括讀者當懌思之金西銘曰終始篇云少氣者脈口人迎俱少而不稱尺寸也言人迎氣口轉應於尺寸是尺寸與人迎氣口各有分別張玉師曰人迎氣口以左右分陰陽臟腑之脈以尺寸分陰陽附肺經諸穴歌照馬氏補輯手太陰十一穴中府雲門天府列俠白下尺澤孔最見列缺經渠太淵下魚際抵指少商如韭葉古離爪甲如韭今如米許分寸歌太陰肺兮出中府雲門之下一寸許雲門璇璣旁六寸巨骨之下二骨數天府腋下三寸求俠白肘上五寸主尺澤肘中約橫文孔最腕上七寸取列缺腕側一寸半經渠寸口陷中主太淵掌後橫紋頭魚際節後散脈舉少商大指端內側相去爪甲韭葉許雲門巨骨下挾氣戶旁二寸陷中去中行任脈六寸氣戶巨骨下俞府兩旁各二寸陷中去中行任脈四寸去膺窗四寸八分俞府巨骨下璇璣旁二寸陷中璇璣天突下一寸天突結喉下四寸宛宛中右挨穴之法自天突起至璇璣自璇璣至雲門其法甚簡後仿此大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之間循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒慄不復為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也髃牛口反鼽音求大指次指者手大指之次指名食指也合谷本經穴名俗名虎口肩端兩骨間為髃骨肩𩨹上處為天柱骨缺盆在結喉兩旁之高骨形圓而踝如缺盆然大腸手陽明之脈受手太陰之交起於次指之商陽井穴循二間三間之上廉出兩骨間之合谷穴上入兩筋間之陽谿循臂上廉之偏歷溫溜下廉上廉三里入肘外廉之曲池上循臑外之前廉歷肘髎五里以上肩之肩髃穴出髃骨之前廉循巨骨上行出於柱骨之會上下入缺盆絡肺下膈屬於大腸其支行者從缺盆上頸循天鼎扶突上貫於頰入下齒縫中還出挾口交人中之內左脈往右右脈往左上挾鼻孔循禾髎迎香而終以交於足陽明胃經也是動則病齒痛頸腫蓋氣傷痛形傷腫因氣以及形也大腸傳導水穀變化精微故主所生津液病則津液竭而火熱盛故為目黃口乾鼽衄喉痹諸證肩臑及大指之次指皆大腸經脈所循之部分如腑氣有餘則當脈所過之處熱腫腑氣虛則寒慄不復手陽明之主氣也為此是動所生諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也蓋申明盛虛者乃三陰三陽之氣如氣不盛虛則當取之於經附大腸經諸穴歌手陽明廿穴名循商陽二間三間而行歷合谷陽谿之俞過偏歷溫溜之濱下廉上廉三里而近曲池肘髎五里之程臂臑肩髃上於巨骨天鼎紆乎扶突禾髎唇連迎香鼻迫分寸歌商陽食指內側邊二間來尋本節前三間節後陷中取合谷虎口歧骨間陽谿上側腕中是偏歷腕後三寸安溫溜腕後去五寸池前五寸下廉看池前三寸上廉中池前二寸三里逢曲池屈骨紋頭盡肘髎大骨外廉近大筋中央尋五里肘上三寸行向里臂臑肘上七寸量肩臑肩端舉臂取巨骨肩尖端上行天鼎喉旁四寸真扶突天突旁五寸禾髎水溝旁五分迎香禾髎上一寸大腸經穴是分明左右共四十穴胃足陽明之脈起於鼻之交頞中旁約太陽之脈下循鼻外上入齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中趾內間其支者下廉三寸而別下入中趾外間其支者別跗上入大趾間出其端是動則病洒洒振寒善呻數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇胗頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中趾不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒慄胃中寒則脹滿為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也頞音遏髀音被臏音賓跗音撫賁音奔骭音䯒喎音呱胗音診鼻之兩旁為頞腮下為頷頷中為頤腮上為髮際髮際前為額顱股內為髀髀前膝上起肉處為伏兔伏兔後為髀關挾膝筋中為臏脛骨為骭足面為跗足陽明受手陽明之交起於鼻之兩旁迎香穴上行而左右相交於頞中過睛明之分下循鼻外歷承泣四白巨醪上入齒中還出挾口兩吻地倉環繞唇下左右相交於承漿卻循頤後下廉出大迎循頰車上耳前歷下關過客主人循髮際行懸釐頷厭之分經頭維會於額顱之神庭其支別者從大迎前下人迎循喉嚨歷水突氣舍入缺盆行足少陰俞府之外下膈當下脘中脘之分屬胃絡脾其直行者從缺盆而下下乳內廉循氣戶庫房屋翳膺窗乳中乳根不容承滿梁門關門太乙滑肉門下挾臍歷天樞外陵大巨水道歸來諸穴而入氣街中其支者自屬胃處起胃下口循腹裡過足少陰肓俞之外本經之裡下至氣街中與前之入氣街者合既相合於氣街中乃下髀關抵伏兔歷陰市梁丘下入膝臏中經犢鼻下循足面曰跗之衝陽陷谷入中趾外間之內庭至厲兌穴而終也其絡脈之支別者自膝下三寸循三里穴之外別下歷上廉條口下廉豐隆解谿衝陽陷谷以至內庭厲兌而合也又其支者別跗上衝陽穴別行入大趾間出足厥陰行間穴之外循大趾下出其端以交於足太陰也陽明之氣是動則病洒洒振寒蓋陽明者午也陽盛而陰氣加之故洒洒振寒也善呻者陽氣鬱而欲伸出之數欠者陽欲引而上也顏黑者陰氣加於上此病在陽明之氣也病至者病氣而至於經脈也陽明之脈病則惡聞人與火聞木音則惕然而驚胃絡上通於心故心欲動也陰陽相搏故欲獨閉戶牖而居陽盛則四肢實實則登高而歌熱盛於身故棄衣而走也陽明之脈下膈屬胃絡脾故賁響腹脹此陽明之氣厥逆於經而為此諸證故曰是為骭厥蓋陽明之經脈循脛骭而下也夫有病氣而不及於經者有病在氣而見經證者有經氣之兼病者有病氣而轉入於經者故曰可分而可合也本經曰谷入於胃脈道以通血氣乃行平脈篇曰水入於經而血乃成胃為水穀之海主生此榮血故是主血所生病者為狂為溫瘧汗出者胃氣熱而蒸發水液之汗也鼽衄者經氣熱也口喎唇胗頸腫喉痹腹腫膝痛膺股骭跗皆痛者陽明經脈之為病也如陽明氣盛於外則身以前皆熱盛於內則有餘於胃而消穀善飢溺色黃如氣不足則身以前皆寒慄胃中寒則脹滿經云三陽為經二陽為維一陽為遊部蓋陽明經氣維於身之前太陽經氣經於身之後少陽之氣為遊行出入之樞也為此是動所生諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不虛不實以經取之夫氣生於陽明而主於手太陰故在手太陰手足陽明論氣之有餘不足在諸經只論是動所生尚御公曰手太陰是動則病肺脹膨膨足陽明是動則惡人與火及賁響腹脹是病氣而及於經脈臟腑也肺胃大腸所生之病而為氣之盛虛是病臟腑經脈而及於陰陽之氣也蓋三陰三陽之氣本於臟腑之五行所生而外合於六經胃經諸穴歌足陽明四十五是承泣四白而數巨髎有地倉之積大迎乘頰車之夥下關頭維及人迎水突氣舍與缺盆氣戶兮庫房屋翳膺窗兮乳中乳根不容承滿梁門關門太乙滑肉天樞外陵大巨從水道歸來氣衝入髀關之境伏兔至陰市梁丘犢鼻自三里而行上巨虛兮條口下巨虛兮豐隆解谿衝陽入陷谷下內庭厲兌而終分寸歌胃之經兮足陽明承泣目下七分尋四白目下方一寸巨髎鼻孔旁八分地倉夾吻四分迎大迎頷下寸三分頰車耳下八分穴下關耳前動脈行頭維神庭旁四五神庭督脈穴在中行髮際上五分頭維去神庭四寸五分人迎喉旁寸五真水突筋前迎下在氣舍突下穴相乘氣舍在水突下缺盆舍下橫骨內各去中行寸半明氣戶璇璣旁四寸至乳六寸又四分庫房屋翳膺窗近乳中正在乳頭心次有乳根出乳下各一寸六不相侵自氣戶至乳根六穴上下相去各一寸六分去中行任脈各四寸卻去中行須四寸以前穴道與君陳不容巨闕旁三寸巨闕任脈穴在臍上六寸五分卻近幽門寸五新幽門腎經穴巨闕旁一寸五分在胃經任脈二脈之中其下承滿與梁門關門太乙滑肉門上下一寸無多少共去中行三寸尋天樞臍旁二寸間樞下一寸外陵安樞下二寸大巨穴樞下四寸水道全樞下六寸歸來好共去中行二寸邊氣衝鼠鼷上一寸鼠鼷橫骨盡處又去中行四寸專髀關膝上有尺二伏兔膝上六寸是陰市膝下方三寸梁丘膝上二寸記膝臏陷中犢鼻存膝下三寸三里至膝下六寸上廉穴膝下七寸條口位膝下八寸下廉看膝下九寸豐隆系卻是踝上八寸量比那下廉外邊綴解谿去庭六寸半庭內庭也衝陽庭後五寸換陷谷庭後二寸間內庭次趾外間現足大趾次趾外間陷中厲兌大趾次趾端去爪如韭胃井判左右各四十五穴共九十穴脾足太陰之脈起於大趾之端循趾內側白肉際過核骨後上內踝前廉上踹後循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大趾不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者寸口反小於人迎也踝葉瓦去聲核骨一作覈骨俗云孤拐骨足跟後兩旁起骨為踝骨腓腹為腨髀內為股臍上為腹咽以咽物居喉之前至胃長一尺六寸為胃之系舌本舌根也足太陰脾脈起於大趾端之隱白穴受足陽明之交循大趾內側白肉際大都穴過核骨後歷太白公孫商丘上內踝前廉之三陰交又上腨內循䯒骨後之漏谷上行二寸交出足厥陰之前至地機陰陵泉上循膝股前廉之血海箕門迤邐入腹經衝門府舍中極關元復循腹結大橫會下脘歷腹哀過日月期門之分循本經之裡下至中脘之際以屬脾絡胃又由腹哀上膈循食竇天溪胸鄉周榮曲折向下至大包又自大包外曲折向上會中府上行人迎之裡挾喉連舌本散舌下而終其支行者由腹哀別行再從胃部中脘穴之外上膈注於膻中之裡心之分以交於手少陰心經也是動則病氣而及於經從經而及於臟腑故為舌本強食則嘔胃脘病腹脹諸證善噫者脾氣上走心為噫得後與氣則快然如衰者厥逆從上下散也身體皆重太陰之氣逆也是主脾所生之經脈病者舌本痛蓋病太陰之氣則為舌本強食則嘔氣逆之為病也在脾臟所生之經脈病者則為舌本痛食不下經脈之為病也氣主呴之病在氣故身體皆重經脈者所以濡筋骨而利關節病在血脈故體不能動搖此太陰之是動脾臟之所生外內出入而見證之少有別也脾脈注心中故煩心心下急痛脾家實則為瘕泄水閉黃疸此臟病之在內也不能臥強立膝股內腫足大趾不用經病之在外也此太陰經脈脾臟之病外內出入之見證也明乎臟腑陰陽經氣出入之理本經大義思過半矣脾經諸穴歌足太陰脾中州二十一穴隱白遊赴大都兮瞻太白訪公孫兮至商丘越三陰之交而漏谷地機可接步陰陵之泉而血海箕門是求入衝門兮府舍軒豁解腹結兮大橫優遊腹哀食竇兮接天溪而同派胸鄉周榮兮綴大包而如鉤分寸歌大趾內側起隱白節後陷中求大都太白內側核骨下節後一寸公孫呼商丘內踝陷中遭踝上三寸三陰交踝上六寸漏谷是踝上五寸地機朝膝下內側陰陵泉血海膝臏上內廉箕門穴在魚腹取動脈應手越筋間衝門期下尺五分期門肝經穴巨闕旁四寸五分巨闕任脈穴臍上六寸五分府舍期下九寸判腹結期下六寸八大橫期下五寸半腹哀期下方二寸期門肝經穴道現巨闕之旁四寸五卻連脾穴休胡亂自此以上食竇穴天溪胸鄉周榮貫相去寸六無多寡又上寸六中府換肺經穴大包腋下有六寸淵液腋下三寸半左右共四十二穴心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下循臑內後廉行手太陰心主之後下肘內循臂內後廉抵掌後銳骨之端入掌內後廉循小指之內出其端是動則病咽乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之甚者寸口大再倍於人迎虛者反小於人迎也心系有二一則上與肺相通而入肺大葉間一則由肺葉而下曲折向後並脊裡細絡相連貫脊髓與腎相通正當七節之間蓋五臟系皆通於心而心通五臟系也手少陰經起於心循任脈之外屬心系下膈當臍上二寸之分絡小腸其支者從心系出任脈之外上行而挾咽系目也其直者復從心系直上至肺臟之分出循腋下抵極泉穴在臂內腋下筋間動脈入胸自極泉下循臑內後廉行手太陰心主兩筋之後歷青靈穴下肘內廉抵少海手腕下踝為兌骨自少海而下循臂內後廉歷靈道通里至掌後銳骨之端經陰郄神門入掌內廉至少府循小指端之少衝而終以交於手太陽也少陰之上君火主之故是動則病嗌乾心痛渴而欲飲少陰之氣盛也是主心所生病者目黃心系上繫於目心火盛故黃也臑臂掌中心脈所循之部分蓋心所生之病而外及於經脈也心經諸穴歌手少陰九穴成極泉青靈少海行自靈道通里而達過陰郄神門而迎抵於少府少衝可尋分寸歌少陰心起極泉中腋下筋間脈入胸臂內腋下筋間動脈入胸青靈肘上三寸取少海肘後五分容肘內廉節後大骨外去肘端五分屈節向頭得靈道掌後一寸半通里腕後一寸同陰郄腕後方半寸神門掌後兌骨隆少府節後勞宮直小指內側取少衝凡九穴左右共十八穴小腸手太陽之脈起於小指之端循手外側上腕出踝內直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴是動則病咽痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者反小於寸口也胛音甲䪼音掘折葉舌臂骨盡處為腕腕下兌骨為踝脊兩旁為膂膂上兩角為肩解肩解下成片骨為肩胛目外眥為銳眥目下為䪼目內角為內眥手太陽經起於小指少澤穴受手少陰心經之交也由是循外側之前谷後谿上腕出踝中歷腕骨陽谷養老穴直上循臂骨下廉支正出肘內側兩筋之間歷小海穴上循臑外廉行手陽明少陽之外上肩循肩貞臑俞天宗秉風曲垣肩外俞肩中俞諸穴乃上會大椎左右相交於兩肩之上自交肩上入缺盆循肩向腋下行當膻中之分絡心循胃系下膈過上腕抵胃下行任脈之外當臍上二寸之分屬小腸其支行者從缺盆循頸之天窗天容上頰抵顴髎上至目銳眥過瞳子髎卻入耳中循聽宮而終其支別者別循頰上䪼抵鼻至目內眥睛明穴以斜絡於顴而交於足太陽也是動則病嗌痛頷腫乃病氣而及於有形故復曰似拔似折皆形容氣逆之所致也小腸為受盛之官化水穀之精微故主液小腸所生病者為耳聾目黃頰腫頸項肘臂痛皆經脈所循之部分而為病也尚御公曰臟腑雌雄相合並受五行之化故在臟主藏以合五行在腑則以六腑所生之血氣津液筋骨而為病蓋病則所主之氣不足而病生於外矣小腸諸穴歌小腸穴十九中路從少澤步前谷後谿之隆道遵腕骨觀陽谷養老之崇得支正於小海逐肩貞以相從值臑俞兮遇天宗乘秉風兮曲垣中肩外俞兮肩中俞啟天窗兮見天容匪由顴髎曷造聽宮分寸歌小指端外為少澤前谷外側節前覓節後捏拳取後谿腕骨腕前骨陷側兌骨下陷陽谷討腕上一寸名養老支正腕後量五寸小海肘端五分好肩貞胛下兩骨解曲胛下兩骨解間肩髃後陷中臑俞大骨下陷保大骨下胛上廉舉臂取之天宗秉風后骨中秉風髎外舉有空天髎外肩上小髃後舉臂有空曲垣肩中曲胛陷外俞胛後一寸從即外肩俞肩胛上廉去脊三寸陷中肩中二寸大杼旁天窗扶突後陷詳頸大筋間前曲頰下扶突後動脈應手陷中天容耳下曲頰後顴髎面頄銳端量聽宮耳端大如菽耳中珠子大如赤小豆此為小腸手太陽左右共三十八穴膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔直絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從膊內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小趾外側是動則病沖頭痛目似銳項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癇疾頭囟項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小趾不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也臀音屯膕音國踹腨同目大角為內眥髮際前為額頭頂上為巔腦後為項肩後之下為肩膊椎骨為脊尻上橫骨為腰挾脊為膂挾腰臗骨兩旁為機機後為臀臀尻也腓腸上膝後曲處為膕膂內為胛即挾脊肉也股外為髀捷骨之下為髀樞腓腸為腨足太陽膀胱之脈起於目內眥睛明穴受手太陽之交也上額循攢竹過神庭歷曲差五處承光通天自通天斜行左右交於頂上之百會其支行者從巔至百會抵耳上角過率谷浮白竅陰穴所以散養於筋脈也其直行者由通天絡郄玉枕入絡腦復出下項以抵天柱又由天柱而下過大椎陶道卻循肩膊內挾脊兩旁相去各一寸半下行歷大杼風門肺俞厥陰俞心俞膈俞肝俞膽俞脾俞胃俞三焦俞腎俞大腸俞小腸俞膀胱俞中膂內俞白環俞由是抵腰中入循膂絡腎下屬膀胱其支別者從腰中循腰臗下挾脊歷上髎中髎次髎下髎會陽下貫臀至承扶殷門浮郄委陽入膕中之委中穴其支別者為挾脊兩旁第三行相去各三寸之諸穴自天柱而下從膊內左右別行下貫胛膂歷附分魄戶膏肓神堂譩譆膈關魂門揚綱意舍胃倉肓門志室胞肓秩邊下歷尻臀過髀樞又循髀樞之裡承扶之外一寸五分之間而下與前之入膕中者相合下行循合陽下貫腨內歷承筋承山飛揚附陽出外踝後之崑崙僕參申脈金門循京骨束骨通谷至小趾外側之至陰穴以交於足少陰腎經也太陽是動則病沖頭痛目似銳項似拔腰似折膕如結曰似曰如者病在太陽之氣而有似乎形證也太陽之氣生於膀胱水中而為諸陽主氣陽氣者柔則養筋故是主筋所生之病則為痔經云筋脈橫解腸澼為痔蓋太陽所主之筋膀胱所生之脈橫逆而為痔也經絡沉以內薄則為瘧厥逆於下則為癲為狂囟項鼽目腰背膕踹諸證皆經脈所循之部分而為病也尚御公曰傷寒論云太陽之為病脈浮頭項強痛而惡寒又曰太陽病頭痛至七日以上自愈者以行其經盡故也夫傷寒六經相傳七日來復於太陽只病三陰三陽之六氣而不涉於有形然頭項強痛又有似乎經證蓋氣舍於形未有病氣而不見於形證者也膀胱諸穴歌足太陽三十六睛明攢竹詣曲差五處之鄉承光通天見絡郄玉枕之行天柱高兮大杼抵風門開兮肺俞當厥陰心膈之俞肝膽脾胃之臟三焦腎兮大腸小腸膀胱俞兮中膂白環自從大杼至此去脊中寸半之旁又有上次中下四髎在腰四空以相將會陽居尻尾之側始了背中二行仍上肩胛而下附分二椎之旁三椎魄戶四椎膏肓神堂譩譆兮膈關魂門兮陽綱意舍兮胃倉肓門志室秩邊胞肓承扶浮郄與委陽殷門委中而合陽承筋承山到飛揚輔陽崑崙至僕參申脈金門探京骨之場束骨通谷抵至陰小趾之旁分寸歌足太陽兮膀胱經目內眥角始睛明眉頭陷中攢竹取曲差發際上五分五處發止一寸是承光發上二寸半通天絡郄玉枕穴相去寸五調勻看玉枕挾腦一寸三入發二寸枕骨現天柱項後髮際中大筋外廉陷中獻自此夾脊開寸五第一大杼二風門三椎肺俞厥陰四心俞五椎之下論膈七肝九十膽俞十一脾俞十二胃十三三焦十四腎大腸十六之下椎小腸十八膀十九中膂內俞二十椎白環廿一椎下當以上諸穴可排之更有上次中下髎一二三四腰空好會陽陰尾尻骨旁背部二行諸穴了又從脊上開三寸第二椎下為附分三椎魄戶四膏肓第五椎下神堂尊第六譩譆膈關七第九魂門陽綱十十一意舍之穴存十二胃倉穴已分十三肓門端正在十四志室不須論十九胞肓廿秩邊背部三行諸穴勻又從臀下陰文取承扶居於陷中主浮郄扶下方六分委陽扶下寸六數殷門扶下六寸長膕中外廉兩筋鄉委中膝骨約紋里此下三寸尋合陽承筋腳跟上七寸穴在腨腸之中央承山腨下分肉間外踝七寸上飛揚輔陽外踝上三寸崑崙後跟陷中央僕參亦在踝骨下申脈踝下五分張金門申脈下一寸京骨外側骨際量束骨本節後陷中通谷節前陷中強至陰卻在小趾側太陽之穴始周詳計六十三穴左右共一百二十六穴腎足少陰之脈起於小趾之下邪趨足心出於然谷之下循內踝之後別入跟中以上踹內出膕外廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中是動則病飢不欲食面如漆柴咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之灸則強食生肉緩帶披髮大杖重履而步盛者寸口大再倍於人迎虛者寸口反小於人迎也䀮音荒強上聲趨向也足少陰起足小趾之下斜趨足心之湧泉轉出內踝前起大骨下之然谷下循內踝後之太谿別入跟中之大鐘照海水泉乃折自大鐘之外上循內踝行厥陰太陰兩經之後經本經復溜交信穴過脾經之三陰交上腨內循築賓出膕內廉抵陰谷上股內後廉貫脊會於督脈之長強還出於前循橫骨大赫氣穴四滿中注肓俞當肓俞之所臍之左右屬腎下臍過任脈之關元中極而絡膀胱其直行者從肓俞屬腎處上行循商曲石關陰都通谷諸穴貫肝上循幽門上膈歷部廊入肺中循神封靈墟神藏彧中俞府而上循喉嚨並人迎挾舌本而終其支者自神藏別出繞心注胸之膻中以交於手厥陰心包絡經也少陰之上君火主之少陰是動為病則上下之氣不交故飢不欲食心如懸若飢狀氣不足於下則善恐不足於上心惕惕如人將捕之少陰屬腎腎上連肺而腎為生氣之原面如漆柴者少陰之氣不升也咳唾則有血喝喝而喘者少陰之生氣不上交於肺而肺氣上逆也坐而欲起者躁動之象少陰之氣厥於下而欲上也骨之精為瞳子目䀮䀮無所見者精氣不升也此少陰腎臟之生氣厥逆於下而為此諸病故為骨厥也夫腎主藏精如主腎所生之病則精液不能上滋而為口熱舌乾嗌痛煩心諸證蓋水不上濟則火盛於上矣氣逆於下則為痿厥諸證矣生當作牲周禮云始養之謂畜將用之謂牲又牛羊豕曰三牲夫羊為火畜牛為土畜豕為水畜其性躁善奔強食牲肉以助腎氣上升而與火土之相合也緩帶者取其伸舒也夫腎臟之精奉心神化赤而為血發乃血之餘也披髮者使神氣之下交也大杖重履者運筋骨之氣也夫陰陽之氣有厥於腎者有厥於骭者有厥於踝者有厥於骨者此章論少陰之氣厥逆於下而曰強食牲肉曰緩帶披髮蓋少陰為陰陽生氣之原也尚御公曰陷下者謂氣之下陷也少陰之上君火主之水火陰陽之氣發原於腎臟故於少陰腎經則曰強食生肉緩帶披髮拽杖步履蓋欲陰陽之生氣上升而環轉出入也是陰陽六氣本於臟腑五行之所生故曰是動者謂六氣運用於外應司天在泉上下升降動而不息所生者謂神機化運從內而生外內出入生化無窮是氣之生於內而運動於外也腎經諸穴歌足少陰兮廿七湧泉流於然谷太谿大鐘兮水泉緣照海復溜兮交信續從築賓兮上陰谷撩橫骨兮大赫麓氣穴四滿兮中注肓俞上通於商曲守石關兮陰都寧閉通谷兮幽門肅步廊神封而靈墟存神藏彧中而俞府足分寸歌足掌心中是湧泉然骨踝下一寸前內踝前一寸太谿踝後跟骨上大鐘跟後腫中邊足跟後腫中大骨上兩筋間也水泉溪下一寸覓照海踝下四寸安復溜踝上前二寸交信踝上二寸聯一穴止隔筋前後太陽之後少陽前前旁骨是復溜後旁骨是交信二穴止隔一條筋築賓內踝上踹分陰谷膝下曲漆間橫骨大赫並氣穴四滿中注亦相連各開中行只寸半上下相去一寸便上膈肓俞亦一寸肓俞臍旁半寸邊肓俞商曲石關來陰都通谷幽門闢各開中行五分挾六穴上下一寸裁步廊神封靈墟存神藏彧中俞府尊各開中行計二寸上下寸六六穴分俞府璇璣旁二寸取之得法自然真心主手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸中出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端是動則病心中熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也脅上際為腋小指次指乃小指之次指無名指也手厥陰心包絡之脈起於胸中出屬心下之包絡受足少陰腎經之交也由是下膈歷絡三焦歷者謂三焦各有部署在胃脘上中下之間其脈分絡於三焦也其支者自屬心包上循胸出脅下腋三寸天池穴上行抵腋下下循臑內之天泉以界手太陰肺經手少陰心經兩經之中間入肘中之曲澤穴又由肘中下臂行臂兩筋之間循郄門間使內關大陵入掌中勞宮循中指出其端之中衝其支別者從掌中循無名指出其端而交於手少陽三焦經也厥陰是動則病手心熱臂肘攣急腋腫經氣之病於外也甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休蓋甚則從外而內其有餘於內也心主血而包絡代君行令故主脈是主脈之包絡所生病者煩心心痛掌中熱蓋自內而外也脈口一盛而躁病在手厥陰故盛者寸口大一倍於人迎虛者寸口反小於人迎也心包絡諸穴歌手厥陰心包之脈計有九穴而終自天池天泉為始逐曲澤郄門而通間使行於內關大陵近乎勞宮既由掌握抵於中衝分寸歌心包起自天池間乳後一寸腋下三腋下三寸乳後一寸天泉曲腋下二寸曲澤屈肘陷中央郄門去腕方五寸掌後去腕五寸間使腕後三寸量內關去腕只二寸大陵掌後兩筋間勞宮屈中名指取屈中指無名指兩者之間取之中指之末中衝良三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目銳眥痛頰腫耳前肩臑肘臂外皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也焞音屯臂骨盡處為腕臑盡處為肘膊下對腋處為臑目下為䪼手少陽起於小指次指之端關衝穴第四指也上出歷液門中渚四指之間循手表腕之陽池出臂外兩骨之間至天井穴從天井上行循臂臑之外歷清冷淵消鑠行手太陽之裡手陽明之外上肩循臂臑會肩髎天髎交出足少陽之後過秉風肩井下入缺盆復由足陽明之外而會交於膻中之上焦散布絡繞於心包絡乃下膈入絡膀胱以約下焦附右腎而生其支行者從膻中而上出缺盆之外上項過大椎循天牖上耳後經翳風瘈脈顱囟直上出耳上角至角孫過懸釐頷厭及過陽白睛明屈曲耳頰至䪼會顴髎之分其又支者從耳後翳風穴入耳中過聽宮歷耳門和髎卻出至目銳眥合瞳子髎循絲竹空而交於足少陽膽經也少陽之上相火主之故是動則病耳聾渾渾焞焞嗌腫喉痹相火之有餘於上也少陽乃一陽初生之氣故主氣所生病者汗出陽加於陰則汗出也目銳眥痛頰腫耳後肩臑肘臂小指次指皆經脈所循之部分而為病也人迎一盛而躁病在手少陽故盛者人迎大一倍於寸口虛者人迎反小於寸口也三焦諸穴歌手少陽三焦之脈二十三穴之間關衝液門中渚陽池外關通連支溝會宗三陽絡四瀆天井清冷淵消鑠臑會肩髎相聯天髎處天牖之下翳風讓瘈脈居先顱囟定而角孫近耳絲竹空而和髎接焉耳門已畢經穴已全分寸歌無名之外端關衝液門小次指陷中中渚液下去一寸陽池腕上之陷中外關腕後方二寸腕後三寸支溝容腕後三寸內會宗空中有穴用心攻腕後四寸三陽絡四瀆肘前五寸著天井肘外大骨後骨罅中間一寸摸肘後二寸清冷淵消鑠對腋臂外落臑會肩前三寸量肩髎臑上陷中央天髎缺盆陷處上天牖天容之外旁天牖頸大筋外缺盆上天容後天柱前完骨下髮際上翳風耳後尖角陷耳後尖角陷中按之引耳中瘈脈耳後青脈現耳本後雞足青絡脈顱囟亦在青絡脈角孫耳廓中間上耳門耳前起肉中耳前起肉當耳缺陷中和髎耳前動脈張欲知絲竹空何在眉後陷中仔細量計二十三穴左右共四十六穴膽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下大迎合手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小趾次趾之間其支者別跗上入大趾之間循大趾歧骨內出其端還貫爪甲出三毛是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛脅下腫馬刀俠癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛小趾次趾不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也腋下為脅脅又名胠曲骨之外為毛際毛際兩旁動脈為氣衝捷骨之下為髀厭即髀樞也脅骨之下為季脅屬肝經穴名章門䯒骨為輔骨外踝以上為絕骨足面為跗足大趾本節後為歧骨大指爪甲後為三毛足少陽膽經起於目銳眥之瞳子髎由聽會過客主人上抵頭角循頷厭下懸顱懸釐由懸釐上循耳上髮際至曲鬢率谷由率谷外折下耳後循天衝浮白竅陰完骨又自完骨外折循本神過曲差下至陽白會睛明復從睛明上行循臨泣目窗正營承靈腦空風池至頸過天牖行手少陽之脈前下至肩上循肩井卻左右交出手少陽之後過大椎大杼秉風當秉風前入缺盆之外其支者從耳後顳顬間過翳風之分入耳中過聽宮復自聽宮至目銳眥瞳子髎之分其支者別自目外瞳子髎而下大迎合手少陽於䪼當顴髎之分下臨頰車下頸循本經之前與前之入缺盆者相合下胸中天池之外貫膈即期門之所絡肝下至日月之分屬於膽也自屬膽處循脅內章門之裡至氣衝繞毛際遂橫入髀厭中之環跳穴其直行者從缺盆下腋循胸歷淵液輒筋日月過季脅循京門帶脈五樞維道居髎入上髎中髎長強而下與前之入髀厭者相合乃下循髀外行太陽陽明之間歷中瀆陽關出膝外廉抵陽陵泉又自陽陵泉下於輔骨前歷陽交外丘光明直下抵絕骨之端循陽輔懸鐘而下出外踝之前至丘墟循足面之臨泣五會俠谿乃上入小趾次趾之間至竅陰而終其支別者自足跗面臨泣別行入大趾循歧骨內出大趾端還貫入爪甲出三毛以交於足厥陰肝經也是動則病口苦善太息心脅痛不能轉側少陽之氣不升也少陽主初陽之生氣故膽氣升十一臟腑之氣皆升經云精明五色者氣之華也平脈篇云陽氣長則其色鮮其顏光其聲商毛髮長少陽之動氣為病則厥逆而不升故甚則面有微塵體無膏澤少陽相火主氣足下反熱者火逆於下也是為陽氣厥逆之所致也少陽屬腎故主骨所生病者為頭痛頷痛目銳眥痛缺盆腋下胸脅髀膝脛踝皆痛乃足少陽經脈所循之部分而為病也血脈留滯則為馬刀俠癭陽加於陰則為汗出陽逆於下則為振寒少陽主骨故諸節皆痛也膽經諸穴歌足少陽兮四十三瞳子髎近聽會間客主人在頷厭集懸顱懸釐曲鬢前率谷天衝見浮白竅陰完骨本神連陽白臨泣目窗近正榮承靈腦空焉風池肩井兮淵液輒筋日月京門聯帶脈五樞而下維道居髎相沿環跳風市抵中瀆陽關之下陽陵泉陽交外丘光明穴陽輔懸鐘穴可瞻丘墟臨泣地五會俠谿竅陰膽經全分寸歌足少陽兮四十三頭上廿穴分三折起自瞳子至風池積數陳之次序說瞳子髎近眥五分耳前陷中聽會穴客主人名上關同耳前起骨開口空頷厭懸顱之二穴腦空上廉曲角下腦空即顳顬頷厭懸顱二穴在曲頰之下腦空之上懸釐之穴異於茲腦空下廉曲角上曲鬢耳上髮際隅耳上髮際曲隅陷中率谷耳上寸半安天衝耳後入發二耳後入髮際二寸浮白入發一寸間竅陰即是枕骨穴完骨之上有空連在完骨上枕骨下動搖有空完骨耳後入髮際量得四分須用記本神神庭旁二寸入發一寸耳上系陽白眉上方一寸發上五分臨泣是目上直入髮際五分陷中發上一寸當陽穴發上寸半目窗至正營發上二寸半承靈發上四寸諦腦空發上五寸半風池耳後發陷寄在耳後顳顬後腦空下發際陷中至此計二十穴分作三折向外而行始自瞳子髎至完骨是一折又自完骨外折上至陽白會睛明是一折又自睛明上行循臨泣風池是一折緣其穴曲折多難以分別故此作至二十次第言之歌曰一瞳子髎二聽會三主人兮頷厭四五懸顱兮六懸釐第七數兮曲鬢隨八率谷兮九天衝十浮白兮之穴從十一竅陰來相繼十二完骨一折終又自十三本神始十四陽白二折隨十五臨泣目下穴十六目窗之穴宜十七正榮十八靈十九腦戶廿風池依次細心量取之膽經頭上穴吾知肩井肩上陷中求大骨之前一寸半肩上陷中缺盆上大骨前一寸半以三指按取當中指陷中淵液腋下方三寸輒筋期下五分判期門卻是肝經穴相去巨闕四寸半日月期門下五分京骨監骨下腰絆監骨下腰下季脅本挾脊腎之募帶脈章門下寸八五樞章下寸八貫五樞去帶脈三寸季脅下四寸八分維道章下五寸三居髎章下八寸三章門緣是肝經穴下脘之旁九寸含環跳髀樞宛宛中髀樞中側臥屈上足伸下足以右手摸穴左搖撼取之屈上伸下取穴同風市垂手中指盡膝上五寸中瀆逢陽關陽陵上三寸陽陵膝下一寸從陽交外踝上七寸外丘踝上六寸容踝上五寸光明穴踝上四寸陽輔通踝上三寸懸鐘在丘墟踝前之陷中此去俠谿四寸五卻是膽經原穴功臨泣俠谿後寸半五會去溪一寸窮俠谿在趾歧骨內竅陰四五二趾中計四十三穴左右共八十六穴肝足厥陰之脈起於大趾叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循陰股入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺是動則為腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者反小於人迎也三毛後橫紋為叢毛髀內為股臍下為小腹目內深處為系頏顙齶上竅也足厥陰起於足大趾叢毛之大敦循足跗上廉歷行間太衝抵內踝前一寸之中封自中封上踝過三陰交歷蠡溝中都復上一寸交出太陰之後上膕內廉至膝關曲泉循股內之陰包五里陰廉遂當衝門府舍之分入陰毛中左右相交環繞陰器抵小腹而上會曲骨中極關元復循章門至期門之所挾胃屬肝下日月之分絡於膽也又自期門上貫膈行食竇之外大包之裡散布脅肋上雲門淵液之間人迎之外循喉嚨之後上出頏顙行大迎地倉四白陽白之外連目系上出額行臨泣之裡與督脈相會於巔頂之百會其支行者從目系下行任脈之外本經之裡下頰裡交環於唇口之內其又支者從期門屬肝處別貫膈行食竇之外本經之裡上注肺下行至中焦挾中脘之分以交於手太陰肺經也是在厥陰之動氣則病腰痛不可以俯仰甚則嗌乾面塵脫色蓋厥陰從少陽中氣之化厥陰之化氣病也丈夫㿉疝婦人少腹腫厥陰之本氣病也是主肝所生之病者胸滿嘔逆蓋食氣入胃散精於肝行氣於經肝所生病則肝氣厥逆不能行散穀精故胸滿嘔逆也肝主疏泄肝氣虛則飧泄遺溺實則閉癃狐疝隨經脈晝夜出入之疝也為此是動所生諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者反小於人迎也以上論榮氣生於中焦從肺脈循行於十二經脈之中外內上下相交始於手太陰肺終於足厥陰肝周而復始環轉之無端也肝經諸穴歌足厥陰一十三穴終起大敦於行間循太衝於中封蠡溝中都之會膝關曲泉之宮襲陰包於五里陰廉乃發尋羊矢於章門期門可攻分寸歌足大趾端名大敦內側為隱白外側為大敦行間大趾縫中存太衝本節後二寸跟前一寸號中封足內踝骨一寸筋里宛宛中蠡溝踝上五寸是內踝骨前上五寸中都踝後七寸中內踝上七寸䯒骨中膝關犢鼻下二寸曲泉曲膝盡橫紋陰包膝上方四寸股內廉兩筋間蜷足取之看膝內側必有槽中氣衝三寸下五里氣衝上三寸陰股中動脈應手陰廉衝下有二寸羊矢衝下一寸許氣衝卻是胃經穴鼠鼷之上一寸主鼠鼷橫骨端盡處相去中行四寸止章門下脘旁九寸肘尖盡處側臥取期門又在巨闕旁四寸五分無差矣附督脈歌經脈之循於身以前身以後者憑任督二脈以分上下左右督脈在背之中行二十七穴始長強舞腰俞兮歌陽關入命門兮懸樞當脊中束筋造至陽靈臺神道身柱詳陶道大椎至啞門風府腦戶強間分後項百會兮前項囟會上星兮神庭素髎水溝至於鼻下兌端交齦交於內唇分寸歌督脈齦交唇內鄉兌端正在唇端央水溝鼻下溝中索素髎宜向鼻端詳頭形北高面南下先以前後髮際量分為一尺又二寸發上五分神庭當發上一寸上星位發上二寸囟會良前項發上三寸半百會發上五寸央在頂中央旋毛中兩耳尖上可容爪甲性理北溪陳氏曰略近些北猶天之極星居北夫言一尺有二而其數只一尺一寸者何也蓋前後髮際無穴而必以前後髮際量起則有一寸在也會後寸半即後頂會後三寸強間明會後腦戶四寸半後發入寸風府行項後髮際入一寸大筋內宛宛中疾言其肉立起言休立止即百會後五寸半也發上五分啞門在後髮際上五分項中央宛宛中仰頭取之入系舌本神庭至此十穴真自此項骨下脊骶分為二十有四椎大椎上有項骨在約有三椎莫算之尾有長強亦不算中間廿一可排推大椎大骨為第一二椎節後陶道知第三椎間身柱在第五神道不須疑第六靈臺至陽七第九身內筋縮思十一脊中之穴在十二懸樞之穴奇十四命門腎俞並十六陽關自可知二十一椎即腰俞脊尾骨端長強隨共二十七穴附任脈歌任脈二十四穴行腹與胸會陰始兮曲骨從中極關元石門通氣海陰交會神關水分逢下脘建里兮中脘上脘巨闕鳩尾兮中庭膻中玉堂上紫宮華蓋璇璣上天突之宮飲彼廉泉承漿味融分寸歌任脈會陰兩陰間曲骨毛際陷中安中極臍下四寸取關元臍下三寸連臍下二寸石門穴臍下寸半氣海全臍下一寸陰交穴臍之中央號神闕臍上一寸為水分臍上二寸下脘列臍上三寸名建里中脘臍上四寸許臍上五寸上脘在巨闕臍上六寸五鳩尾蔽骨下五分中庭膻中寸六取膻中卻在兩乳間膻上寸六玉堂主膻上紫宮三寸二膻上華蓋四八舉四寸八分膻上璇璣五寸八璣上一寸天突起天突喉下約四寸廉泉頷下骨尖已承漿頤前唇稜下任脈中央行腹裡行腹中央共二十七穴手太陰氣絕則皮毛焦太陰者行氣溫於皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節者則爪枯毛折毛折者則毛先死丙篤丁死火勝金也此論三陰三陽之氣終也皮脈肉筋骨臟腑之外應也臟腑者雌雄之內合也陰陽六氣本於臟腑之五行所生氣先死於外而後臟腑絕於內也手太陰之氣主於皮毛是以太陰氣絕則皮毛焦手太陰主氣氣主熏膚澤毛故太陰者行氣溫於皮毛者也是以氣不榮則皮毛焦津液者隨三焦出氣以溫肌肉淖澤於骨節潤澤於皮膚氣不榮則津液去皮節矣津液去皮節則爪枯毛折矣毛先死者手太陰之氣先絕於外也丙篤丁死肺藏之氣死於內也尚御公曰按上古天元冊文丹黅蒼素元之天氣經於五方分野合化地之五行而地之五行上呈天之六氣五運行論曰神在天為風風生木木生酸酸生肝肝生筋筋生心是人之立形定氣本於五行所生故曰其生五其數三謂生於五行而終於三陰三陽之數是以所生病者臟腑五行之病生於內也是動者六氣之運動於外而為病也然是動所生之病皆終於三陰三陽之氣者臟腑五行之氣本於天之所化故天氣先絕而後臟腑之氣終也朱濟公曰夫人生於地懸命於天天地合氣命之曰人本經論人秉天地之氣所生配合天地陰陽五運六氣能明乎造化死生之道一點靈明與太虛同體萬劫常存本未嘗有生未嘗有死也張玉師曰形謂之器故曰無形無患蓋既成形器未有不損壞者也然此一靈真性雖千磨百鍊愈究愈精故佛老以真空見性靈素二經謂空中有真手少陰氣絕則脈不通脈不通則血不流血不流則髦色不澤故其面黑如漆柴者血先死壬篤癸死水勝火也心主血脈故手少陰氣絕則脈不通脈隨氣行者也脈不通則血不流血隨脈氣流行者也夫心之合脈也其榮色也髦者血氣之所生也故血脈不流則髦色不澤面如漆柴少陰氣絕則血先死壬篤癸死心臟之火氣滅也足太陰氣絕者則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則肉萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也足太陰之氣生於脾脾臟榮而外主肌肉是以太陰氣絕則脈不榮於肌肉矣脾開竅於口主為衛使之迎糧故唇舌為肌肉之本脈不榮則肉萎唇反太陰之生氣絕於外也甲篤乙死脾臟之氣死於內也足少陰氣絕則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟卻肉軟卻故齒長而垢發無澤發無澤者骨先死戊篤己死土勝水也足少陰之氣主骨故氣絕則骨枯冬脈者謂五臟之脈氣合四時而外濡於皮肉筋骨者也夫溪骨屬骨肉本於骨也故骨不濡則肉不能著於骨而骨肉不相親矣骨肉不相親則骨氣外脫而齒長矣夫腎主藏精而化血發者血之餘也發無澤者腎臟之精氣絕而骨先死矣足厥陰氣絕則筋絕厥陰者肝脈也肝者筋之合也筋者聚於陰氣而脈絡於舌本也故脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也足厥陰之氣主筋故氣絕則筋絕矣厥陰者肝脈肝者筋之合謂厥陰之氣合於肝脈肝臟之氣合於筋也聚於陰氣者筋氣之會於宗筋也筋聚於陰器而絡於舌本故脈不榮於筋則筋急而舌卷卵縮矣厥陰氣絕則筋先死庚篤辛死金勝木而肝臟之木氣絕也五陰氣俱絕則目系轉轉則目運目運者為志先死志先死則一日半死矣此總結五臟五行之氣本於先天之水火也心系上繫於目系目系轉者心氣將絕也火之精為神水之精為志神生於精火生於水故志死而神先絕所謂生則俱生急則俱死也天一生水地二生火一日半者一二日之間陰陽水火之氣終於天地始生之數也六陽氣絕則陰與陽相離離則腠理發泄絕汗乃出故旦占夕死夕占旦死此言六腑三陽之氣終也陰陽離合論曰未出地者命曰陰中之陰已出地者名曰陰中之陽蓋三陽之氣根於陰而出於陽是以六陽將絕則陰與陽相離矣離則陽氣外脫腠理發泄絕汗乃出而陽氣終也三陽者應天之氣是以旦占夕死夕占旦死不能終天運之一周尚御公曰此章與本經終始篇素問診要經終篇大義相同經脈十二者伏行分肉之間深而不見其常見者足太陰過於外踝之上無所隱故也諸脈之浮而常見者皆絡脈也六經絡手陽明少陽之大絡起於五指間上合肘中飲酒者衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平榮氣乃滿而經絡大盛脈之卒然盛者皆邪氣居之留於本末不動則熱不堅則陷且空不與眾同是以知其何脈之動也雷公曰何以知經脈之與絡脈異也黃帝曰經脈者常不可見也其虛實也以氣口知之脈之見者皆絡脈也此申明十二經脈之血氣與脈外皮膚之氣血皆生於胃腑水穀之精而各走其道經脈十二者六臟六腑手足三陰三陽之脈乃榮血之榮行伏行於分肉之內深而不見者也諸脈之浮而常見者皆絡脈也支而橫者為絡絡之別者為孫蓋胃腑所生之血氣精專者獨行於經隧榮行於十二經脈之中其出於孫絡皮膚者別走於經別經別者臟腑之大絡也蓋從大絡而出於絡脈皮膚下行者從足太陰之絡而出於足䟰之街故其常見者足太陰過於外踝之上無所隱故也上行者從手陽明少陽之絡注於尺膚以上魚而散於五指故曰手陽明少陽之大絡起於五指間上合肘中謂行於皮膚之氣血從手陽明少陽之大絡散於五指間復從五指之井溜於脈中而與脈中之血氣上合於肘中也夫陰陽六氣主於膚表經云太陰為之行氣於三陰陽明者表也亦為之行氣於三陽蓋手太陰主氣而外主皮毛手陽明為太陰之合故亦為之行氣於膚表也手少陽主氣為厥陰包絡之腑心主包絡主行血於脈中少陽主行血於脈外是以手陽明少陽之大絡主行胃腑所出之血氣而注於絡脈皮膚之間玉版篇曰胃者水穀血氣之海也海之所行雲氣者天下也胃之所出血氣者經隧也經隧者五臟六腑之大絡也繆刺篇曰邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病也是血氣之行於脈外者外內出入各有其道故復引飲酒者以證明之夫酒者水穀之悍液衛者水穀之悍氣故飲酒者液隨衛氣而先行皮膚是以面先赤而小便獨先下蓋先通調四布於外也津液隨衛氣先行皮膚先充絡脈絡脈先盛衛氣已平榮氣乃滿而經脈大盛此血氣之從皮膚而絡絡而脈脈而經蓋從外而內也如十二經脈之卒然盛者皆邪氣居於脈中也本末者謂十二經脈之有本標也如留於脈而不動則熱不留於脈則脈不堅而外陷於膚空矣此十二經脈之流行出入不與絡脈大絡之眾同也是以知何脈之動也以氣口知之氣口者手太陰之兩脈口也此言榮血之行於十二經脈中者乃伏行之經脈以手太陰之氣口知之血氣之行於皮膚而見於絡脈者候見於人迎氣口也此節凡四轉蓋以申明十二經脈之血氣與皮膚之氣血各有出入之道路再按十二經脈之始於手太陰肺終於足厥陰肝周而復始者乃榮血之行於脈中也十二經脈之皆出於井溜於滎行於經入於合者乃皮膚之氣血溜於脈中而與經脈之血氣合於肘膝之間本篇之所謂六經脈手陽明少陽之大絡起於五指間上合肘中者是也本經癰疽篇曰余聞腸胃受谷上焦出氣以溫分肉而養骨節通腠理中焦出氣如露上注谿谷而滲孫脈津液和調變化而赤為血血和則孫脈先滿溢乃注於絡脈皆盈乃注二經脈陰陽已張因息乃行行有經紀周有道理與天合同不得休止此水穀所生之津液隨三焦出氣以溫肌肉滲於孫絡化赤為血而溢於經脈本篇之所謂飲酒者衛氣先行皮膚先充絡脈絡脈先盛衛氣已平榮血乃滿而經脈大盛是也是脈外之氣血一從經隧而出於孫絡皮膚一隨三焦出氣以溫肌肉變化而赤是所出之道路有兩歧也其入於經也一從指井而溜於經滎一從皮膚而入於絡脈是所入之道路有兩歧也其經脈之血氣行於脈外從本標而出於氣街本篇之所謂留於本末不動則熱不堅則陷且空不與眾同是也此血氣出入之道路合於天地陰陽五運六氣乃本經之大關目故不厭煩贅而詳言之學者亦不可不用心參究者也夫血氣之從經隧而出於孫絡皮膚者海之所以行雲氣於天下也隨三焦出氣以溫肌肉者應司天在泉水隨氣而運行於膚表也膚表之氣血入於脈中應天運於地之外而復通貫於地中經脈之血氣行於皮膚之外猶地之百川流注於泉下而復運行於天表也此天地上下升降外內出入之相通也人合天地陰陽之道運行不息可以與天地相參如升降息則氣立狐危出入廢則神機化滅矣雷公曰細子無以明其然也黃帝曰諸絡脈皆不能經大節之間必行絕道而出入復合於皮中其會皆見於外故諸刺絡脈者必刺其結上甚血者雖無結急取之以瀉其邪而出其血留之發為痹也凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黑者留久痹也其有赤有黑有青者寒熱氣也其青短者少氣也凡刺寒熱者皆多血絡必間日而一取之血盡乃止乃調其虛實其青而短者少氣甚者瀉之則悶悶甚則僕不得言悶則急坐之也此復申明上文之義蓋假病刺以證血氣之生始出入下經曰先度其骨節大小廣狹而脈度定矣蓋十二經脈皆循於骨節間而為長短之度其絡脈皆不能經大節之間必行絕道而出入絕道者別道也蓋胃腑所出之血氣行於經別者從經別而出於絡脈復合於皮中其血氣色脈之會合皆見於外故刺諸絡脈者必刺其結上甚血者雖無結急取之以瀉其邪而出其血留之發為痹也經云病在陰者名為痹蓋皮膚絡脈之邪留而不瀉則入於分肉筋骨之間而為痹與邪居經脈之中留於本末不動則熱之不同也診視也凡診絡脈脈色青則寒赤則有熱蓋浮絡之血氣皆見於皮之部也胃中寒手魚之絡多青胃中熱魚際絡赤蓋皮絡之氣血本於胃腑所生從手陽明少陽注於尺膚而上魚也氣者三陰三陽之氣胃腑之所生也少氣甚者瀉之則悶氣益虛而不能行於外也悶甚則僕不能言者謂陰陽六氣生於胃腑水穀之精而本於先天之水火也少陰之氣厥於下則僕而不得言故悶則急坐之以啟少陰之氣即如上文之緩帶被髮大杖重履而步之一法也高士宗曰上節以十二經脈分別衛氣血氣之行於皮膚絡脈此節單論皮膚絡脈以復申明上文之義黃載華曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則淡滲皮膚生毫毛是脈外之氣血又從衝脈而散於皮毛故曰復合於皮中其會皆見於外謂經別所出之血氣與衝脈所出之血氣會合於皮中當知皮膚血氣所出之道有三徑也手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入於魚際其病實則手銳掌熱虛則欠㰦小便遺數取之去腕半寸別走陽明也㰦呿同數葉朔經別者五臟六腑之大絡也別者謂十二經脈之外別有經絡陽絡之走於陰陰絡之走於陽與經脈繆處而各走其道即繆刺篇之所謂大絡者左注右右注左與經相干而布於四末不入於經俞與經脈繆處者是也玉版論之所謂胃者水穀血氣之海也海之所行雲氣者天下也胃之所出血氣者經隧也經隧者五臟六腑之大絡也蓋胃腑所生之血氣其精專者獨行於經隧從手太陰肺脈而終於足厥陰肝經此榮血之循行於十二經脈之中一脈流通環轉不息者也其血氣之四布於皮膚者從臟腑之別絡而出雖與經相干與經並行而各走其道出於孫絡散於皮膚故手太陰之經別曰列缺手少陰之經別曰通里足太陽曰飛揚足少陽曰光明與手足之井滎輸經合穴不相干也曰太陰少陰曰太陽少陽與臟腑之經脈各繆處也此胃腑之血氣四布於膚表之陽分者從大絡而出於孫絡皮膚從絡脈而陰走於陽陽走於陰如江河之外別有江河江可通於河河可通於江與經脈之榮血一以貫通者不相同也故手太陰之別名曰列缺起於腕上分間分間者謂手太陰之經脈與經別之於此間而相分也並太陰之經者並太陰之經脈而行也散入於魚際謂入魚際而散於皮膚即上文之所謂諸絡脈必行絕道而出入復合於皮中其會見於外也實則手銳掌熱氣盛於外也虛則欠㰦小便遺數氣虛於內也蓋膚表之血氣由臟腑經隧之所生也當取之去腕半寸即列缺穴間別走陽明者陰絡之從此而別走於陽也尚御公曰此篇病證與繆刺篇之不同繆刺篇論邪客於皮膚孫絡溜於大絡而生奇病病從外而內也此篇論本氣之虛實病從內而外也故曰諸絡脈必行絕道而出入朱濟公曰如手太陰之列缺手陽明之偏歷雖非井滎輸經然亦系經脈之穴蓋經別之各走其道布於四末與經相干於列缺通里諸經之間復別而上行並經而入掌散於絡脈而合於皮中者也張玉師曰皮部論云欲知皮部以經脈為紀陽明之陽名曰害蜚視其上下有浮絡者皆陽明之絡也少陽之陽名曰樞持少陰之陰名曰樞儒凡十二經絡脈者皮之部也是皮部之絡脈雖以經脈為紀並循於十二經脈之部然從大絡而出別走其道與經脈繆處故有害蜚樞持之別名同學之士當於靈素二經細心合參其義始得手少陰之別名曰通里去腕一寸半別而上行循經入於心中系舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也手少陰之別絡與經相干名曰通里之間去腕一寸半別經而上行循經入於心中系舌本屬目系其氣實膈間若有所支而不暢虛則不能言蓋心主言而經別絡舌本也掌後一寸乃別走於太陽之絡脈處故取陰陽分行之處而刺之按心脈上挾咽系目系經別系舌本屬目系蓋經別並經而行也手心主之別名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡心系實則心痛虛則為頭強取之兩筋間也手心主之別絡與經相干於內關之間去腕二寸別經脈而出於兩筋之內循經並行上繫於心包絡心系實則心痛心系與包絡之相通也虛則為頭強蓋包絡主行血脈脈氣虛故頭強也按十二經別皆陽走陰而陰走陽此不曰別走少陽或簡脫也手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生疣小者如指痂疥取之所別也髃音偶疣音尤上腕五寸乃手太陽經之支正太陽之經別布於四末與經相干名曰支正之間內注於手少陰之別絡其別行者上走肘絡肩髃手太陽小腸主液實則津液留滯不能淖澤於骨是以節弛肘廢三因曰氣虛不行則生疣小者如指上之痂疥即齇痤之類氣鬱之所生也手陽明之別名曰偏歷去腕三寸別入太陰其別者上循臂乘肩𩩲上曲頰偏歷其別者入耳合於宗脈實則齲聾虛則齒寒痹隔取之所別也去腕三寸乃手陽明經之偏歷手陽明之別絡布於四末與經相干於偏歷之間而別入於太陰之經別其別行者上循臂乘肩髃上曲頰遍絡於齒又其別者入耳中合於宗脈實則氣滯而為齒痛耳聾虛則齒痹隔蓋手陽明主行血氣於皮膚以溫肌肉虛則不行於外故為齒寒而痹閉阻隔也尚御公曰取之別者為偏齒入耳之別絡非偏歷也十二絡皆同手少陽之別名曰外關去腕二寸外繞臂注胸中合心主病實則肘攣虛則不收取之所別也去腕二寸乃手少陽經之外關少陽之別絡布於四末與經相干於外關之間外行繞臂注胸中合心主之大絡病實則肘攣虛則不收少陽厥陰之主筋也足太陽之別名曰飛揚去踝七寸別走少陰實則鼽窒頭背痛虛則鼽衄取之所別也踝上七寸乃足太陽經之飛揚穴足太陽之別絡與經相干于飛揚之間不入於經俞別走於足少陰之絡實則鼽窒背痛虛則鼽衄蓋別絡並經而循於頭背也足少陽之別名曰光明去踝五寸別走厥陰下絡足跗實則厥虛則痿躄坐不能起取之所別也踝上五寸乃足少陽經之光明少陽之大絡與經相會於光明之間別走於厥陰之別絡下絡足跗少陽主初陽之氣實則膽氣不升而逆於下則為厥氣虛則為痿躄坐不能起足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹卒喑實則狂癲虛則足不收脛枯取之所別也去足踝八寸乃足陽明經之豐隆陽明之別絡與經相會於豐隆之間而別走於足太陰之別絡其別行者並經脈而循於脛骨外廉上絡頭項十五大絡之氣血皆本於胃腑水穀之所生是以足陽明之絡與諸經之氣相合其病氣逆則喉痹卒喑經別之絡於喉嗌也實則氣厥於下而為癲狂血氣虛則足不收脛枯取之所別也足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也去足大趾本節之後一寸乃足太陰之公孫穴太陰之別絡分布於足與經相干於公孫之間而別走於陽明之絡其別行者入絡腸胃厥氣上逆則為霍亂氣有餘而實則為腸中切痛不足而虛則為鼓脹當取之所別也足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別也當踝後繞跟處乃足少陰經之大鐘少陰之別絡與經相會於大鐘之間而別走於太陽其別行者並經而行上走於心包絡之下外貫腰脊其病氣逆則煩悶水氣上乘於心故煩悶實則閉癃別走太陽而膀胱之氣不化也虛則腰痛腰者腎之府也按手少陽三焦手厥陰包絡之氣皆本於腎臟之所生故並經上走於心包下蓋包絡之氣生於腎臟注於絡中並經而上也足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者經脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也去內踝五寸乃是厥陰經之蠡溝厥陰之別絡分布於足與經相干於蠡溝之間而別走於少陽之絡脛足䟰睪睪丸即陰子也莖陰莖乃前之宗筋挺即陰莖也取之所別者取別走少陽之絡所謂陽取陰而陰取陽左取右而右取左也任脈之別名曰尾翳下鳩尾散於腹實則腹皮痛虛則癢瘙取之所別也按任脈起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目所謂尾翳者即鳩尾之上蓋任脈之別絡出於下極並經而上復下於鳩尾以散於腹絡氣實則腹皮急虛則癢瘙當取之所別絡也督脈之別名曰長強挾脊上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重高搖之挾脊之有過者取之所別也按督脈起於少腹以下骨中央女子入系庭孔其孔溺孔之端也其絡循陰器合篡間繞篡後別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩膊內挾脊抵腰中上循膂絡腎其男子循莖下至篡與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央蓋督脈總督一身之陽應天道之繞地環轉是以下行而上者循莖至篡從少腹貫臍中央入喉上頤環唇系目其上行而下者起於目內眥上額交巔下項挾脊抵腰中而環轉於周身之前後也其督脈之別絡出於長強之分挾脊上行散於頭上是督脈之行於脊膂者從頭項而下行別絡之從下而上行於頭項也虛實者本氣之實虛有過者有過之脈邪氣之所客也尚御公曰以有過之脈總結於督脈之後蓋申明虛實者乃本氣之實虛非邪實也朱永年曰按任督之大絡與經脈交相逆順而行當知十二別絡雖循經並行亦往來逆順者也脾之大絡名曰大包出淵液下三寸布胸脅實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取之脾之大絡脈也大包乃脾經之穴名在足少陽膽經淵液之下三寸脾之大絡循脾經之大包而四布於胸脅實則身盡痛虛則百節盡皆縱羅絡之血者謂大絡之血氣散於周身之孫絡皮膚若羅紋之縱橫而絡於身也夫脾之有大絡者脾主為胃行其津液灌溉於五臟四旁從大絡而布於周身是以病則一身盡痛百節皆縱而血絡之若羅紋以絡於周身足太陰之大絡者只並經而行散血氣於本經之部分是以足太陰脾臟之有二絡也如曰脾足太陰之脈兼是動所生而言也曰足太陰之大絡曰脾之大絡分脾臟經氣而言也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也凡此十五大絡之血氣充實則外溢於孫絡皮膚故實則必見虛則下陷於內之大絡故視之不見也求之上下者謂絡脈之相交於上下陰陽之間病在上者求之下病在下者求之上病在陰者取之陽病在陽者取之陰也夫十五大絡雖與經相干而布於四末其氣無常處不入於經俞與經脈繆處故與人之經脈不同而絡脈異所別也尚御公曰經脈有經脈之絡脈經別有經別之絡脈故曰絡脈異所也經別第十一黃帝問於岐伯曰余聞人之合於天道也內有五臟以應五音五色五時五味五位也外有六腑以應六律六律建陰陽諸經而合之十二月十二辰十二節十二經水十二時十二經脈者此五臟六腑之所以應天道夫十二經脈者人之所以生病之所以成人之所以治病之所以起學之所始工之所止也粗之所易上之所難也請問其離合出入奈何岐伯稽首再拜曰明乎哉問也此粗之所過上之所息也請卒言之此論十二經脈十五大絡之外而又有經別也五位五方之定位六律建陰陽者建立六陰六陽以合諸經諸經者十二經脈十二大絡十二經別也六律分立陰陽是以合天之十二月十二節十二時合地之十二經水人之十二經脈此五臟六腑之所以應天道也夫六臟脈屬臟絡腑六腑脈屬腑絡臟此榮血之流行於十二經脈之中然經脈之外又有大絡大絡之外又有經別是以粗工為易而上工之所難也離合者謂三陽之經別離本經而合於三陰三陰之經別離本經而合於三陽此即繆刺篇所當巨刺之經左盛則右病右盛則左病如此者必巨刺之必中其經非絡脈也按上章之所謂別者言十二經脈之外而有別絡此章之所謂別者言十二經脈之外而又有別經此人之所以生此陰陽血氣病之所以成是動所生及大絡之奇病經別之移易治之所以分皮刺經刺繆刺巨刺也所生之經絡多歧所成之病證各別所治之刺法不同故上工之所難也尚御公曰五臟為陰六腑為陽陽者天氣也主外陰者地氣也主內本篇以六腑應六律以合陰陽諸經蓋五臟內合六腑六腑外合十二經脈故曰五臟六腑之所以應天道朱永年曰五運行論云在臟為肝在體為筋在臟為肺在體為皮是五臟之外合於皮肉筋骨也本臟篇曰肺合大腸大腸者皮其應心合小腸小腸者脈其應是五臟內合六腑六腑外合於皮肉筋骨也五臟六腑雌雄相合離合之道通變無窮高士宗曰太始天元冊文曰太虛寥廓肇基化元布氣真靈總統坤元蓋太始太虛者乃空玄無極之境由無極而生太極太極而分兩儀人雖本天地所生而統歸於天道足太陽之正別入於膕中其一道下尻五寸別入於肛屬於膀胱散之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經也足少陰之正至膕中別走太陽而合上至腎當十四椎出屬帶脈直者系舌本復出於項合於太陽此為一合成以諸陰之別皆為正也此足太陽與足少陰為一合也正者謂經脈之外別有正經非支絡也足太陽之正從經脈而別入於膕中其一道者經別之又分兩歧也尻肫也肛乃大腸之魄門別入於肛者別從肛門而入屬於膀胱散之腎復循脊膂上行當心而散其直行者從背膂上出於項復屬於太陽之經脈此為一經別也蓋從經而別行復屬於太陽之經脈故名經別謂經脈之別經也足少陰之正至膕中別走於太陽之部分而與太陽之正相合上行至腎當脊之十四椎處外出而屬於帶脈其直行者從腎上系舌本復出於項與太陽上出於項之經正相合於項間以為一合也陰陽離合論曰陽予之正陰為之主少陰之上名曰太陽太陰之前名曰陽明厥陰之表名曰少陽謂陽乃陰與之正而陰為之主陽本於陰之所生故曰成以諸陰之別謂三陽之經正合於三陰以成手足三陰之經別此三陽乃歸於三陰之正故曰皆為正也是以三陽之別外合於三陰之經而內合於五臟三陰之別只合三陽之經而不合於六腑也尚御公曰按十二經脈之榮氣流行六陰脈屬臟絡腑六陽脈屬腑絡臟本篇三陰之經別上至腎屬心走肺而皆不絡於六腑又如足太陽之脈循膂絡腎膀胱之經別則別入於肛屬膀胱散之腎足少陰腎脈貫脊屬腎絡膀胱其經別至膕中別走太陽而上至腎又出屬帶脈而復出於項手少陰心脈起於心中出絡心系下膈絡小腸其經別入於淵液兩筋之間屬於心手厥陰心包絡之脈起於胸中出屬心包下膈歷絡三焦而經別下淵液三寸入胸中別屬三焦手太陰肺脈起於中焦下絡大腸還循胃口上膈屬肺其經別入淵液少陰之前入走肺散之太陽此經脈與經別出入不同各走其道而馬氏以正為正經宜經脈篇之直行者相合別者為絡宜與經脈篇之其支者其別者相合噫經脈血氣之生始出入頭緒紛紜不易疏也足少陽之正繞髀入毛際合於厥陰別者入季脅之間循胸裡屬膽散之上肝貫心以上挾咽出頤頷中散於面系目系合少陽於目外眥足厥陰之正別跗上上至毛際合於少陽與別俱行此為二合也按足少陽之脈起於目銳眥循頭面而下行於足跗少陽之別繞髀上行至目銳眥而合於少陽之經是經脈與經別交相逆順而行者也足厥陰之正別行於跗上上至毛際而合少陽與少陽之別合而偕行此為二合也尚御公曰與陽俱行謂三陰之別合於三陽之別俱行而陽別成諸陰之別矣故曰成以諸陰之別諸語助辭足陽明之正上至髀入於腹裡屬胃散之脾上通於心上循咽出於口上額顱還系目系合於陽明也足太陰之正上至髀合於陽明與別俱行上結於咽貫舌中此為三合也股內為髀伏兔後為髀關足陽明之正從足跗而上至髀從腹胸而上行頭面合手陽明之經脈於目下承泣四白之間蓋亦與經脈相逆順而行也足太陰之正別經脈而走陽明之髀分與陽明之正相合而偕行上結於喉貫舌中此為三合也手太陽之正指地別於肩解入腋走心系小腸也手少陰之正別入於淵液兩筋之間屬於心上走喉嚨出於面合目內眥此為四合也陰陽系日月論曰天為陽地為陰日為陽月為陰其合於人也腰以上為天腰以下為地足之十二經脈以應十二月月生於水故在下者為陰手之十指以應十日日主火故在上者為陽手太陽之正指地者謂手之太陽下合於足太陽也蓋在臟腑十二經脈有手足之分論陰陽二氣只有三陰三陽而無分手與足矣故六腑皆出於足之三陽上合於手是以手少陰之正上出於面亦與足太陽相合於目內眥之睛明水火上下之相交也夫手太陽少陰皆屬於火天一生水地二生火火上水下陰陽互交故手太陽指地而下交於足手少陰上行而合於膀胱之經論天地水火有上下之相交歸於先天合為一氣故人之臟腑經脈所以應天道也手少陽之正指天別於巔入缺盆下走三焦散於胸中也手心主之正別下淵液三寸入胸中別屬三焦出循喉嚨出耳後合少陽完骨之下此為五合也少陽初陽也從陰而生自下而上故曰手少陽之正者謂手合於足也曰指天者謂足合於手也論少陽心主二經則為六合論陰陽之氣只三合矣巔乃督脈之會督脈應天道之環轉一周故從巔而別下入缺盆走三焦而散於胸中也淵液膽經穴在腋下三寸手心主之正別經脈而下行於淵液之分下淵液三寸以入胸中別屬三焦出循喉嚨上出耳後合少陽經別於完骨之下此為五合也手陽明之正從手循膺乳別於肩髃入柱骨下走大腸屬於肺上循喉嚨入缺盆合於陽明也手太陰之正別入淵液少陰之前入走肺散之太陽上出缺盆循喉嚨復合陽明此六合也手陽明之正從手之經脈循膺乳間而別行上於肩髃入柱骨下走大腸屬於肺復上循喉嚨出缺盆而與手陽明之經脈相合也手太陰之正別經脈於天府雲門之際入淵液之分行太陰之前入走肺於當心處散之太陽復上出缺盆循喉嚨與少陽之正相合此為六合也夫陰陽六合始於足太陽而終於手太陰復散之太陽蓋亦周而復始也尚御公曰肺主天膀胱為水府肺者太陰也皆積水也始於足太陽而終於手太陰周而復始應天道之司天在泉六氣環轉之不息經水第十二黃帝問於岐伯曰經脈十二者外合於十二經水而內屬於五臟六腑夫十二經水者其有大小深淺廣狹遠近各不同五臟六腑之高下小大受谷之多少亦不等相應奈何夫經水者受水而行之五臟者合神氣魂魄而藏之六腑者受谷而行之受氣而揚之經脈者受血而榮之合而以治奈何刺之淺深灸之壯數可得聞乎岐伯答曰善哉問也天至高不可度地至廣不可量此之謂也且夫人生於天地之間六合之內此天之高地之廣也非人力之所能度量而至也若夫八尺之士皮肉在此外可度量切循而得之其死可解剖而視之其臟之堅脆腑之大小谷之多少脈之長短血之清濁氣之多少十二經之多血少氣與其少血多氣與其皆多血氣與其皆少血氣皆有大數其治以針灸各調其經氣固其常有合乎此篇以十二經脈內屬於五臟六腑外合於十二經水經水有大小淺深廣狹遠近之不同臟腑有高下大小受谷多少之不等五臟主藏五臟之神志六腑主行水穀之精氣經脈受榮血以榮行帝問可以合一而為灸刺之治法乎伯曰天之高地之廣不可度量者也人生於天地六合之內亦猶此天之高地之廣非人力之所能度量若夫有形之皮肉筋骨外可度量切循內可解剖而視其於臟之堅脆腑之大小谷之多少脈之長短血之清濁氣之多少十二經之多血少氣多氣少血血氣皆多血氣皆少皆有大數大數者即本臟篇之五臟堅脆腸胃篇腑之大小絕谷篇谷之多少脈度篇脈之長短九針篇之多血少氣多氣少血皆有數推之其治以針艾調其經氣固其常有合於數者即下文之六分五分十呼七呼以至於二呼一呼此手足陰陽皆有合於數也按前二章論十二經脈應天之六氣五臟六腑應五音六律五色五時此復論臟腑經脈應地之十二經水是人合天地之道而不可度量者也黃帝曰余聞之快於耳不解於心願卒聞之岐伯答曰此人之所以參天地而應陰陽也不可不察足太陽外合於清水內屬於膀胱而通水道焉足少陽外合於渭水內屬於膽足陽明外合於海水內屬於胃足太陰外合於湖水內屬於脾足少陰外合於汝水內屬於腎足厥陰外合於澠水內屬於肝手太陽外合於淮水內屬於小腸而水道出焉手少陽外合於漯水內屬於三焦手陽明外合於江水內屬於大腸手太陰外合於河水內屬於肺手少陰外合於濟水內屬於心手心主外合於漳水內屬於心包澠音成漯託合切音沓夫三陰三陽合天之六氣手足經脈應地之經水十二經脈外合於六氣內屬於臟腑是以手足之三陰三陽外合於十二經水而經水又內屬於臟腑此人之所以參天地而應陰陽也清水乃黃河合淮處分流為清河肺屬天而主氣膀胱為津液之府受氣化而出六腑皆濁而膀胱之水獨清故足太陽外合於清水內屬於膀胱而通水道焉渭水出於雍州合涇汭漆沮沔水而渭水獨清諸陽皆濁而膽為中精之府獨受其清故足少陽外合於渭水內屬於膽海水汪洋於地之外而地居海之中陽明居中土為萬物之所歸又為水穀之海故足陽明外合於海水而內屬於胃湖水有五湖即洞庭彭澤震澤之類脾位中央而灌溉於四旁故足太陰外合於湖水而內屬於脾汝水發源於河南天息山河南居天地之中夫天居地上見者一百八十二度半強地下亦然北極出地上三十六度南極入地下亦三十六度而嵩正當天之中極蓋天氣包於地之外又從中而通貫於地中故名天息腎主天一之水而為生氣之原上應於喉以司呼吸故足少陰外合於汝水而內屬於腎澠水出於清州之臨淄而西入於淮天下之水皆從東去澠水自東而來故應足厥陰東方之肝木淮水自海水而入於淮泗小腸受盛胃之水液而濟泌於膀胱故手太陽外合於淮水內屬於小腸漯濟乃西北之大水漯合濟而入於兗豫諸州少陽為君主之相陰陽相合故手少陽合於漯水而內屬於三焦江水自西屬之岷山發源曲折萬里而東入於海大腸傳道水穀濟泌別汁迴腸十六折而滲入膀胱故手陽明外合於江水內屬於大腸河源發於星宿海自乾位而來千里一曲故曰黃河之水天上來肺屬乾金而主天為水之生源故手太陰外合於河水而內屬於肺濟水發源於王屋山截河而流水不混其清故名曰清濟潛流屢絕狀雖微而獨尊故居四瀆之一心為君主之官而獨尊故手少陰外合濟水內屬於心漳水有二一出於上黨沾懸大黽谷名為清漳一出上黨長子懸鹿谷山名為濁漳二漳異源而下流相合夫血者神氣陰中之清心所主也合厥陰包絡而流行於經脈之中猶二水之合流故手心主外合於漳水內屬於心包此人之所以參天地而應陰陽也愚按膀胱為水府主受藏津液津液隨三焦出氣以溫肌肉三焦下俞出於委陽並太陽之正入絡膀胱約下焦是中焦所生之津液即隨中焦之氣而出膀胱所藏之津液即隨下焦之氣而出運行於膚表以溫肌肉充皮膚故示從容論曰怯然少氣者是水道不行形氣消索也曰通水道者謂水道之上通於天非獨下出之溲便也凡此五臟六腑十二經水者外有源泉而內有所稟此皆內外相貫如環無端人經亦然故天為陽地為陰腰以上為天腰以下為地故海以北者為陰湖以北者為陰中之陰漳以南者為陽河以北至漳者為陽中之陰漯以南至江者為陽中之太陽此一隅之陰陽也所以人與天地相參也夫泉在地之下地居天之中水隨天氣上下環轉於地之外而復通貫於地中故曰外有源泉而內有所稟蓋地稟在泉之水而外為十二經水之源流內外相貫如環無端而人亦應之水熱穴論曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也是腎臟之精水膀胱之津水皆隨肺主之氣而運行於膚表故腰以上為天腰以下為地天地上下之皆有水也海以北者謂胃居中央以中胃之下為陰肝腎之所居也湖以北者乃脾土所居之分故為陰中之陰脾為陰中之至陰也漳以南者為陽乃心主包絡之上心肺之所居也蓋以上為天為陽為南下為地為陰為北也河以北至漳者謂從上焦而後行於背也漯以南至江者謂從中焦而前行於腹也此以人之面南而背北也蓋人生於天地之間六合之內以此身一隅之陰陽應天地之上下四旁所以與天地參也黃帝曰夫經水之應經脈也其遠近淺深水血之多少各不同合而以刺之奈何岐伯答曰足陽明五臟六腑之海也其脈大血多氣盛熱壯刺此者不深勿散不留不瀉也足陽明刺深六分留十呼足太陽深五分留七呼足少陽深四分留五呼足太陰深三分留四呼足少陰深二分留三呼足厥陰深一分留二呼手之陰陽其受氣之道近其氣之來疾其刺深者皆無過二分其留皆無過一呼其少長大小肥瘦以心撩之命曰法天之常灸之亦然灸而過此者得惡火則骨枯脈澀刺而過此者則脫氣撩料同此論灸刺之法以手足之陰陽血氣之多少合經水之淺深以應天之常數夫數出河圖始於一而終於十二乃陰之始十乃陰之終海水者至陰也故從陽明以至於厥陰厥陰者兩陰交盡陰極而陽生也天一生水地六成之從六分而至一分者法天之常也腰以上為天故手之陰陽受氣之道近其氣之來疾故宜淺刺而疾出也終始篇曰刺肥人者以秋冬之齊刺瘦人者以春夏之齊是以少長大小肥瘦以心撩之量其淺深疾徐所以法天時之常也灸法亦然若灸而過此法命曰惡火則骨為之枯脈為之澀刺而過此法則脫氣矣黃帝曰夫經脈之大小血之多少膚之厚薄肉之堅脆及膕之大小可為度量乎岐伯答曰其不為度量者取其中度也不甚脫肉而血氣不衰也若夫度之人消瘦而形肉脫者惡可以度量刺乎審切循捫按視其寒溫盛衰而調之是謂因適而為之真也尚御公曰適從也真正也夫天闕西北地陷東南至高之地冬氣常在至下之地秋氣常在而人亦應之是以五方之民有疏理致理肥脂瘦消之不同故可為度量者取其中度也中度者即瘦而不甚脫肉雖弱而血氣不衰是謂適其中而為度之正也莫云從曰上節法天之常此因地之理以適人之厚薄堅脆所以人與天地參也經筋第十三足太陽之筋起於足小趾上結於踝邪上結於膝其下循足外側結於踵上循跟結於膕其別者結於踹外上膕中內廉與膕中並上結於臀上挾脊上項其支者別入結於舌本其直者結於枕骨上頭下顏結於鼻其支者為目上輸下結於頄其支者從腋後外廉結於肩髃其支者入下上出缺盆上結於完骨其支者出缺盆邪上出於頄其病小趾支跟腫痛骨攣脊反折頸筋急肩不舉腋支缺盆中紐痛不可左右搖治在燔針劫刺以知為數以痛為輸名曰仲春痹也邪斜同臀音屯頄音仇髃音偶網當作綱輸與腧俞通用此篇論手足之筋亦如經脈之起於指井而經絡於形身之上下以應天之四時六氣十二辰十二月蓋亦秉三陰三陽之氣所生也足太陽之筋起於足小趾之至陰穴間循踝膝腨膕以上臀至項結於腦後枕骨而上頭至前復下於顏結於鼻而為目上之綱維此皆循脈而上經於頭其支者亦如經脈之支別從經筋而旁絡也故其病為小趾腫痛膕攣脊反折項筋急經筋之為病也肩不舉腋支缺盆中紐痛不可左右搖支筋之為病也燔針燒針也劫刺者如劫奪之勢刺之即去無迎隨出入之法知者血氣和而知其伸舒也以痛為輸者隨其痛處而即為所取之俞穴也夫在外者皮膚為陽筋骨為陰病在陰者名曰痹痹者血氣留閉而為痛也卯者二月主左右之太陽故為仲春之痹蓋手足陰陽之筋應天之四時歲之十二月故其為病亦應時而生非由外感也足少陽之筋起於小趾次趾上結外踝上循脛外廉結於膝外廉其支者別起外輔骨上走髀前者結於伏兔之上後者結於尻其直者上乘䏚季脅上走脅前廉繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維其病小趾次趾支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乘䏚季脅痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹺脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針劫刺以知為數以痛為輸名曰孟春痹也足少陽之筋起於小趾次趾相交之竅陰井穴而上循於頭目皆並脈而經於骨也維筋者陽維之筋也陽維之脈與足少陽之脈會於肩井風池腦空目窗承泣陽白於目之上下故從左之右則右目不開蓋春陽之氣從左而右維筋左右之交維也左絡於右故傷左角者病從左而右也右足不用者復從上而下也蓋維者為一身之綱維從左之右右之左下而上上而下左右上下交維故命曰筋維相交此足少陽之筋交於陽維之筋而為病也寅者正月之生陽也主左足之少陽故為孟春之痹足陽明之筋起於中三趾結於跗上邪外上加於輔骨上結於膝外廉直上結於髀樞上循脅屬脊其直者上循骭結於缺盆其支者結於外輔骨合少陽其直者上循伏兔上結於髀聚於陰器上腹而布至缺盆而結上頸上挾口合於鳩下結於鼻上合於太陽太陽為目上網陽明為目下網其支者從頰結於耳前其病足中趾支脛轉筋腳跳堅伏兔轉筋髀前腫潰疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑炭置之坎中高下以坐等以膏熨急頰且飲美酒噉美炙食不飲酒者自強也為之三拊而已治在燔針劫刺以知為數以痛為輸名曰季春痹也鉤音構足陽明之筋起於中三趾乃厲兌之外間循髀股而上經於頸結於口鼻耳目之間其病支脛伏兔轉筋腳跳而堅經筋之為病也潰疝腹中急者聚於陰器上布於腹也口僻口移者筋上挾口也目不開合者太陽為目上綱陽明為目下綱也太陽寒水主氣而為開故寒則筋急而目不合陽明燥熱主氣而為闔故熱則筋縱而目不開頰筋有寒則急引頰移口而為僻有熱則筋縱緩不收而為僻蓋左筋急則口僻於左左筋緩則口僻於右也馬膏者以馬之脂膏熬膏鉤構也以桑之鉤曲者而鉤架之高下如座之相等即以生炭置之坎中令坐於上如左頰筋急而口僻於左者以白酒和桂以塗其右頰之緩者以馬膏熨左之急頰左右之緩急更變即以其法易之且飲以美酒噉以炙食不飲酒者自強飲之為之三拊而止此治口頰喎僻之法也其轉筋潰疝諸證治在燔針劫刺以知為數以痛為輸辰者三月主左足之陽明故為季春之痹夫在足陽明飲以美酒噉以美食者諸筋皆由胃腑之津液以濡養故陽明主潤宗筋宗筋主束骨而利機關也尚御公曰在陽明有寒熱之開合在少陰有陰陽之俯仰此陽中有陰陰中有陽少陰主先天之陰陽陽明主後天之陰陽也足太陰之筋起於大趾之端內側上結於內踝其直者絡於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裡結於肋散於胸中其內者著於脊其病足大趾支內踝痛轉筋痛膝內輔骨痛陰股引髀而痛陰器紐痛下引臍兩脅痛引膺口脊內痛治在燔針劫刺以知為數以痛為輸命曰孟秋痹也孟當作仲足太陰之筋起於大趾內側之隱白間循膝股而上於胸腹其內者著於脊其病在筋經之部分而為痛酉者八月主左足之太陰故為仲秋之痹足少陰之筋起於小趾之下並足太陰之筋邪走內踝之下結於踵與太陽之筋合而上結於內輔之下並太陰之筋而上循陰股結於陰器循脊內挾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者生癇瘈及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰治在燔針劫刺以知為數以痛為輸在內者熨引飲藥此筋折紐紐發數甚者死不治名曰仲秋痹也數葉朔仲當作孟足少陰之筋起於足小趾之下斜趨湧泉上循陰股結於陰器循脊內挾於膂筋上至項結於枕骨與足太陽之筋相合此臟腑陰陽之筋氣相交也其病足下轉筋及所過而結者皆痛病在此所過所結者主癇瘈痙強此經筋之為病也在外在內者病陰陽之氣也少陰之上君火主之少陰為陰陽水火之主宰故有外內陰陽之見證陽外而陰內也紐折者癇瘈強痙也如紐發頻數而甚者死不治蓋少陰主藏津液所以濡筋骨而利關節陽氣者柔則養筋紐折數甚精陽之氣絕也申者七月之生陰也主左足之少陰故為孟秋之痹尚御公曰少陰之氣從本從標刺禁篇曰心部於表腎治於裡少陰本陰而標陽本內而標外也余伯榮曰足少陰之筋與足太陽之筋上合於頸項此臟腑陰陽之氣交也病在外在陽者病太陽之氣故腰反折不能俯在內在陰者病少陰之氣故不能仰如傷寒病在太陽則有反折之痙強在少陰則蜷臥矣足厥陰之筋起於大趾之上上結於內踝之前上循脛上結內輔之下上循陰股結於陰器絡諸筋其病足大趾支內踝之前痛內輔痛陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣其病轉筋者治在燔針劫刺以知為數以痛為輸命曰季秋痹也足厥陰之筋起於足大趾之大敦循脛股而結於陰器絡諸筋陰器乃宗筋之會厥陰主筋故連絡於三陰三陽之筋也其病乃筋之所過而結者為痛為轉筋為陰器不用傷於內則陰痿不用傷於寒則陰器縮入傷於熱則陰挺不收厥陰從中見少陽之火化故有寒熱之分夫金氣之下水氣治之復行一步木氣治之厥陰之木氣本於水故治在行水以清厥陰之氣其病在有形之筋而為轉筋者治在燔針劫刺矣尚御公曰兩陰交盡是為厥陰陰極而陽生厥陰本氣自有寒熱之化手太陽之筋起於小指之上結於腕上循臂內廉結於肘內銳骨之後彈之應小指之上入結於腋下其支者後走腋後廉上繞肩胛循頸出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥其病小指支肘內銳骨後廉痛循臂陰入腋下腋下痛腋後廉痛繞肩胛引頸而痛應耳中鳴痛引頷目瞑良久乃得視頸筋急則為筋痿頸腫寒熱在頸者治在燔針劫刺之以知為數以痛為輸其為腫者復而銳之本支者上曲牙循耳前屬目外眥上頷結於角其病當所過者支轉筋治在燔針劫刺以知為數以痛為輸名曰仲夏痹也手太陽之筋起於手小指之少澤循臂肘肩項而上結於耳頷目眥之間其在筋之所過而結者為痛為腫為筋痿其寒熱在頸者治在燔針劫刺頸腫者復以銳針刺之本支者本於直者而支行也本筋與支筋皆屬於目外眥筋之分行而復連絡也午者五月主於太陽故名曰仲夏痹也尚御公曰太陽之上寒氣主之少陰之上熱氣主之故在手太陽有寒熱之在頸在手少陰有陰陽之俯仰當知十二經筋應三陰三陽之六氣亦無分手與足也余伯榮曰太陽之為病頭項強痛而惡寒寒熱在頸者病太陽之氣非手太陽之筋證也手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸合手太陽其支者當曲頰入系舌本其支者上曲牙循耳前屬目外眥上乘頷結於角其病當所過者即支轉筋舌卷治在燔針劫刺以知為數以痛為輸名為季夏病也手少陽之筋起於小指次指端之關衝循腕臂肘臑而上肩頸當曲頰處入系舌本其支者上曲牙循耳前屬目外眥復上乘頷結於額角其病當所過之處即支分而轉筋舌卷治在燔針劫刺以知為度即以痛處為所取之俞穴未者六月乃少陽主氣故名曰季夏痹也手陽明之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃其支者繞肩胛挾脊直者從肩髃上頸其支者上頰結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔針劫刺以知為數以痛為輸名為孟夏痹也手陽明之筋起於食指之商陽穴間循腕臂肘臑而上肩頸結於頄絡於頷其病當所過所結之處支痛及轉筋肩不能舉頸不可以回顧治在燔針劫刺三月四月乃兩陽合明故名曰孟夏痹也手太陰之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑內廉入腋下出缺盆結肩前髃上結缺盆下結胸裡散貫賁合賁下抵季脅其病當所過者支轉筋痛甚成息賁脅急吐血治在燔針劫刺以知為數以痛為輸名曰仲冬痹也賁音奔手太陰之筋起於手大指端之少商間循臂肘上臑入腋下結於肩之前髃上結於缺盆下結於胸裡散貫於胃脘之賁門間合於賁門而下抵季脅其病當筋之所過者為支度轉筋而痛甚則成息賁脅急吐血蓋十二經筋合陰陽六氣氣逆則為喘急息奔血隨氣奔則為吐血子者十一月太陰主氣故名曰仲冬痹也手心主之筋起於中指與太陰之筋並行結於肘內廉上臂陰結腋下下散前後挾脅其支者入腋散胸中結於臂其病當所過者支轉筋前及胸痛息賁治在燔針劫刺以知為數以痛為輸名曰孟冬痹也臂當作賁賁葉臂手心主之筋起於手中指之中衝穴間與手太陰之筋並行循脅腋散胸中下結於胃脘之賁門間其病當筋之所過結處為轉筋而前及胸痛散於胸中結於賁門故成息奔也亥者十月主兩陰交盡故名曰孟冬痹也尚御公曰在足曰厥陰在手曰心主蓋三陰三陽之氣生於下而本於足足之六經上合於手者也手少陰之筋起於小指之內側結於銳骨上結肘內廉上入腋交太陰挾乳里結於胸中循臀下繫於臍其病內急心承伏梁下為肘網其病當所過者支轉筋筋痛治在燔針劫刺以知為數以痛為輸其成伏梁唾膿血者死不治經筋之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俯不伸焠刺者刺寒急也熱則筋縱不收無用燔針名曰季冬痹也手少陰之筋起於手小指側之少衝間循肘腋交於手太陰之筋挾乳里結於胸中循臂下繫於臍其病於內為內急為心承伏梁如梁之伏於心下而上承於心也其病在外當筋之所過者為轉筋筋痛治在燔針劫刺其成伏梁而唾膿血者此病在心臟故為死不治其病在氣而為筋經之病者寒則反折筋急熱則筋縱不收陽急則反折陰急則俯不能伸蓋少陰本陰而標陽故有寒熱陰陽之證少陰之從本從標也醜者十二月少陰主氣故為季冬之痹夫天為陽地為陰日為陽月為陰歲半以上天氣主之歲半以下地氣主之故三陽之氣主於春夏三陰之氣主於秋冬此陰陽之所以系天地日月而人亦應之尚御公曰腹為陰背為陽陽急則反折陰急則不伸手少陰之筋只循於胸腋臍腹而不經於背所謂陽急則反折者病足少陰之筋也足少陰之筋循脊內挾膂上至項此陰陽相合水火氣交故手足少陰皆有陰陽寒熱之俯仰張開之曰此下六篇論筋之所經骨脈之度量榮衛之循行只論筋有痹證者蓋假病以明筋之合於三陰三陽天之四時六氣足之陽明手之太陽筋急則口目為噼眥急不能卒視治皆如右方也噼僻同即口僻之義尚御公曰此申明手足陰陽之筋皆分循於左右故復以口目之喎僻以證之足陽明之筋上挾口為目下綱手太陽之筋結於頷屬目外眥故二經之左筋急則口僻於左而當刺其左右筋急則口僻於右而當取之右如左目不能卒視其病在左右目不能卒視其病在右如兩目皆急則左右皆病故治法皆如右方而其病則有左右之分也骨度第十四黃帝問於伯高曰脈度言經脈之長短何以立之伯高曰先度其骨節之大小廣狹長短而脈度定矣脈度葉肚先度葉鐸此言經脈之長短從骨節之大小廣狹長短而定其度數故曰骨為幹脈為營如藤蔓之營附於木干也黃帝曰願聞眾人之度人長七尺五寸者其骨節之大小長短各幾何伯高曰頭之大骨圍二尺六寸此言頭之大骨度數眾人謂天下之大眾長七尺五寸者上古適中之人也適中之人則頭骨亦適中矣頭骨適中通體之骨皆適中矣胸圍四尺五寸腰圍四尺二寸此胸骨腰骨圍轉一周之總數也發所覆者顱至項尺二寸發以下至頤長一尺君子終折此言頭顱前後上下之骨度發所覆者謂從前額顱之髮際上至巔頂以至後項之髮際計發所覆者度一尺二寸發以下至頤者謂從前額顱之髮際以下至於兩頤計長一尺君子終折者謂從髮際之始以至髮際之終可折中而度量蓋君子之人面方廣而髮際高發所覆者從顱至項度一尺一寸發以下至頤長一尺一寸也此言天下之眾有君子小人不同有太過不及不等結喉以下至缺盆中長四寸缺盆以下至𩩲骭長九寸過則肺大不滿則肺小𩩲骭以下至天樞長八寸過則胃大不及則胃小天樞以下至橫骨長六寸半過則迴腸廣長不滿則狹短橫骨長六寸半橫骨上廉以下至內輔之上廉長一尺八寸內輔之上廉以下至下廉長三寸半內輔下廉下至內踝長一尺三寸內踝以下至地長三寸膝膕以下至跗屬長一尺六寸跗屬以下至地長三寸故骨圍大則太過小則不及𩩲音吉骭葉扞踝葉瓦去聲此仰面之骨度也結喉下兩旁巨骨陷中為缺盆蓋形如缺盆因以為名𩩲骭骨名一名尾翳即鳩尾骨也自兩旁缺盆而下至𩩲骭計長九寸過則肺大不滿則肺小蓋𩩲骭之內心肺之所居也天樞在臍旁二寸乃足陽明之穴從兩旁𩩲骭而下至天樞計長八寸過則胃大不及則胃小蓋自鳩尾以至於臍胃腑之所居也橫骨在毛際橫紋中自天樞而下至於橫骨計長六寸半過則迴腸廣大不滿則狹短蓋自臍以至少腹大腸之部分也橫骨橫長亦六寸半內輔者內之輔骨也內輔之上廉長一尺八寸者在上之腿度也內輔之上廉以下至下廉長三寸半者膝之連骸一名膝蓋骨也內輔下廉下至內踝長一尺三寸者在下之腿度也曰內輔內踝者以足八字分立則內骨偏向於面也踝者下廉之腿骨與足骨相連之凹處在內者為內踝在外者為外踝內踝以下至地長三寸者足跟骨也膝膕者膝前下之腿骨跗者足面上之跗骨即足陽明之動脈處自膝前而下至於跗面計長一尺六寸也屬者概足面而言也跗屬以下至地長三寸者從足面而下至足底之骨也骨圍大者骨之粗大也小者骨之細小也角以下至柱骨長一尺行腹中不見者長四寸腋以下至季脅長一尺二寸季脅以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸此側身之骨度皆縱而數之也耳上之旁為角肩胛上之頸骨為柱骨自角以下至柱骨長一尺肋下臑內為腋自柱骨至腋中計長四寸脅骨之下為季脅自腋以下至季脅計長一尺二寸捷骨之下為髀樞一名髀厭在臀之兩旁即足少陽之環跳穴處自季脅以下至髀樞計長六寸髀樞以下至膝蓋骨內之中分計長一尺九寸即上之腿數也膝以下至外踝長一尺六寸即下之腿數也京骨足太陽膀胱經穴名在足外側大骨下赤白肉際陷中外踝骨以下至京骨長三寸京骨以下至地長一寸此側身之骨度也按脅骨名扁骨橫於脅下有滲理而無髓空此節不度脅骨之長短而只以腋下至季脅長一尺二寸者蓋以形身之度數概皮肉脈骨而量其長短經脈循骨度而直行於上下也耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸此頭側之橫度也耳後高骨為完骨入髮際四分廣者橫闊也耳後當完骨者從耳以至於腦後也耳前當耳門者從耳而至於鼻準也此頭側之橫度也兩顴之間相去七寸者此當面之橫度也按手足少陽陽明之脈縱橫經絡於頭面左右故復度頭面之廣數兩乳之間廣九寸半此形身前面之橫度也兩髀之間廣六寸半此形身背面之橫度也足長一尺二寸廣四寸半此兩足之縱橫數也肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸本節至節其末長四寸半此兩臂兩手之骨度也本節者指掌交接之骨節末者指尖也頭髮以下至背骨長二寸半膂骨以下至尾骶二十一節長三尺上節長一寸四分分之一奇分在下故上七節至於膂骨九寸八分分之七骶葉底此脊背之骨度也項發以下至背骨者自頂後之髮際至背骨之大椎計長二寸五分膂骨脊骨也自背骨之大椎循膂骨以下至於尾骶計二十一節共長三尺上節每節長一寸四分一釐其奇分之九釐在下節計算故膂骨以上計有七節每節長一寸四分一釐則七得七寸四七二寸八分共九寸八分又每節一釐共計九寸八分七釐故曰九寸八分分之七也玉師問曰脊椎二十一節只詳論上七節之度數何也曰七節之旁乃膈俞也臟腑之氣皆從內膈而出如逆傷臟氣則死刺傷腑氣皆為傷中故曰七節之旁中有小心而本經論五臟之背俞亦兼論七節之膈俞不可妄刺者也此眾人骨之度也所以立經脈之長短也是故視其經脈之在於身也其見浮而堅其見明而大者多血細而沉者多氣也此總結骨之度數定經脈之長短也經脈之浮而堅明而大者多血細而沉者多氣此篇論骨氣而結經脈之血氣者血脈資始於腎骨之精氣盛則經脈之血氣亦盛矣尚御公曰腎藏精氣而主骨血者神氣也此六篇論筋骨血脈本於少陰之陰陽張開之曰腎藏之精液奉心神化赤而為血氣者精氣也故浮為陽而主血沉為陰而主氣五十營第十五黃帝曰余願聞五十營奈何岐伯答曰天周二十八宿宿三十六分人氣行一周千八分日行二十八宿人經脈上下左右前後二十八脈周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺日行二分二百七十息氣行十六丈二尺氣行交通於中一周於身水下二刻日行二十五分五百四十息氣行再周於身水下四刻日行四十分二千七百息氣行十周於身水下二十刻日行五宿二十分一萬三千五百息氣行五十營於身水下百刻日行二十八宿漏水皆盡脈終矣所謂交通者並行一數也故五十營備得盡天地之壽矣凡行八百一十丈也此篇論宗氣營氣循行於脈中循脈度之十六丈二尺應呼吸漏下而為五十營也周天二十八宿而一面七星子午為經卯酉為緯房畢為緯虛張為經房至畢為陽昴至心為陰陽主晝陰主夜每宿約二十六分共乘一千零八分人氣晝夜五十營行二十八宿之一周計一千八分日麗天而繞地一周亦行二十八宿之度分人之經脈上下左右前後共計二十八脈蓋手之三陰三陽足之三陰三陽上下左右共計二十四脈並左右之兩蹺脈前之任脈後之督脈通共二十八脈周身十六丈二尺為五十營以應二十八宿以終漏下百刻以分晝夜故人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息則氣行六尺矣二百七十息氣行十六丈二尺交通於二十八脈之中為一周於身乃水下二刻而日行二十分有奇矣五百四十息氣行再周於身乃水下四刻日行四十分有奇矣二千七百息氣行十周於身乃水下二十刻而日行五宿二十分計二百分有奇矣一萬三千五百息氣行五十營於身乃水下百刻而日行二十八宿計一千零八分也漏水皆盡而脈終於五十營矣按邪客篇曰宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉營氣者泌其津液注之於脈化而為血以營四末內注五臟六腑以應刻數焉此宗氣上貫於心主之脈偕營氣營行於脈中以應呼吸漏下者也五味篇曰谷始入於胃其精微者出於胃之兩焦以溉五臟別出兩行營衛之道其大氣之摶而不行者積於胸中命曰氣海出於肺循喉嚨故呼則出吸則入夫肺主氣而主皮毛人一呼則八萬四千毛竅皆闔一吸則八萬四千毛竅皆開此宗氣之散於脈外之皮毛而行呼吸者也故所謂交通者謂皮膚經脈之宗氣外內交通而並行一百刻之數也夫天主氣地主血脈故五十營而外內之氣行周備斯得盡天地之壽矣凡經脈外內之宗營皆行八百一十丈也營氣第十六黃帝曰營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始是謂天地之紀故氣從太陰出注手陽明上行注足陽明下行至跗上注大趾間與太陰合上行抵髀從髀注心中循手少陰出腋下臂注小指合手太陽上行乘腋出䪼內注目內眥上巔下項合足太陽循脊下尻下行注小趾之端循足心注足少陰上行注腎從腎注心外散於胸中循心主脈出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行至膻中散於三焦從三焦注膽出脅注足少陽下行至跗上復從跗注大趾間合足厥陰上行至肝從肝上注肺上循喉嚨入頏顙之竅究於畜門其支別者上額循巔下項中循脊入骶是督脈也絡陰器上過毛中入臍中上循腹裡入缺盆下注肺中復出太陰此營氣之所行也逆順之常也此篇論營血營行於經隧之中始於手太陰肺終於足厥陰肝常營無已終而復始營血者中焦受氣取汁化而為血以奉生身莫貴於此故獨行於經隧名曰營氣蓋謂血之氣為營氣也流液於中布散於外者謂中焦所生之津液有流溢於中而為精奉心神化赤而為血從衝脈任脈布散於皮膚肌肉之外充膚熱肉生毫毛其精之專赤者行於經隧之中常營無已終而復始是謂天地之紀蓋布散於皮膚之外者應天氣之運行於膚表營於經脈之內者應地之十二經水也故營氣從手太陰肺脈出注於手大指之少商其支者注於次指之端以交於手陽明上行於鼻交頞中而注於足陽明胃脈下行至足跗上之衝陽注足大趾間與足太陰脾脈合於隱白上行抵髀從髀注心中循手少陰之脈出腋下之極泉循臂注小指之少衝合手太陽於小指外側之少澤上行乘腋出䪼內注目內眥而交於足太陽之睛明上巔下項循脊下尻下行注足小趾之至陰循足心之湧泉注足少陰之經上行注腎從腎注心散於胸中而交於心主包絡循心主之脈出腋下臂出兩筋之間入掌中出中指端之中衝還注小指次指端之關衝而合於手少陽之脈上行注膻中散於三焦從三焦注膽出脅注足少陽之脈下行至跗上復從跗注大趾間之大敦合足厥陰之脈上行至肝從肝復上注於肺上循喉嚨入頏顙之竅究於畜門頏顙鼻之內竅畜門鼻之外竅究終也其支別者從肝脈上額循巔與督脈會於巔頂復下項中循脊入骶是督脈也督脈之行於前者絡陰器上過毛中入臍中上循腹裡入缺盆下注肺中復出循於太陰之脈此營氣之所行外內逆順之常也逆順者謂經脈內外之血氣交相逆順而行也夫營衛者精氣也乃中焦水穀之精生此營衛二氣清氣行於脈中濁氣行於脈外此營氣與宗氣偕行於二十八脈之中以應呼吸漏下者也中焦之汁化赤而為血以奉生身命曰營氣此獨行於經隧之血而名營氣營於十二經脈之中始於手太陰肺終於足厥陰肝此與營衛之營氣循度應漏之不同也是以本篇論營氣之行外營於十二經脈內營於五臟六腑其支者行於督脈復注於肺中而任脈及兩蹺不與焉其營氣宗氣行於脈中以應呼吸漏下者行於二十四脈並任督兩蹺共二十八脈以應二十八宿者也尚御公曰營氣宗氣行於脈中者應呼吸漏下晝夜而為五十營也營衛相將偕行於皮膚肌腠之間者日行陽二十五度夜行陰二十五度外內出入者也本篇之營氣營於脈中始於手太陰肺終於足厥陰肝晝夜只環轉一周是謂天地之紀蓋天道運行於地之外晝夜只環轉一周而過一度者也再按平脈篇曰營衛不能相將三焦無所仰夫榮行脈中衛行脈外乃各走其道外內逆順而行者也相將而行者乃脈外之營與衛氣偕行於肌腠之間故曰三焦無所仰蓋腠者肌肉之紋理乃三焦通會之處三焦之氣仰藉營衛而遊行也金西銘問曰營血之不營於任脈兩蹺者何也曰任脈起於胞中陽蹺乃足太陽之別脈陰蹺乃足少陰之別脈胞中為血海膀胱乃津液之府腎主藏精皆有流溢於中之精血貫通故營血不營焉又問曰營氣之不行於衝脈帶脈陽維陰維者何也曰衝任二脈雖並起於胞中任脈統任一身之陰與督脈交通陰陽環轉者也衝脈上循背裡為經絡之海其浮而外者循腹上行至胸中而散充膚熱肉生毫毛蓋主行胞中之血充溢於經脈皮膚之外內不與經脈循度環轉越人曰陽維陰維者維絡於身溢蓄不能環流灌溉諸經者也故陽維起於諸陽之會陰維起於諸陰之交帶脈者有如束帶圍繞於腰統束諸脈此皆不與經脈貫通故不循度環轉莫云從問曰臟腑之氣本於五運六氣之所生營氣之行始於手太陰肺終於足厥陰肝與五行逆順之理不相符合請詳示之曰血脈生於後天之水穀始於先天之陰陽肺屬天而主脈其脈環循胃口是以胃腑所生之精血先從肺脈而行腹走手而手走頭頭走足而足走腹臟腑相傳外內相貫此後天之道也以先天論之腎主天一之水心包絡主地二之火肝主天三之木肺主地四之金脾主天五之土是以腎傳之包絡包絡傳之肝肝傳之肺肺傳之脾脾復傳於少陰少陰之上君火主之君火出於先天之水中後天之太陽也故復從手少陰心而傳於足少陰腎腎主先天之水肺主後天之氣督脈環繞於前後上下應天運之包乎地外血脈之生始出入咸從天氣以流行故人之所以合於天道也脈度第十七黃帝曰願聞脈度岐伯答曰手之六陽從手走頭長五尺五六三丈手之六陰從手至胸中三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足上至頭八尺六八四丈八尺足之六陰從足至胸中六尺五寸六六三丈六尺五六三尺合三丈九尺蹺脈從足至目七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各四尺五寸二四八尺二五一尺合九尺凡都合一十六丈二尺此氣之大經隧也五十營章論氣之流行此章論脈之度數故曰此氣之大經隧謂營氣宗氣所容行之大隧故維脈不與焉手足六陽六陰者經脈分循於兩手兩足三陰三陽分而為六也蹺脈亦分循左右而上故合一丈五尺夫背為陽腹為陰督脈主陽起於目內眥上額交巔入絡腦還出別下項挾脊抵腰中下循膂絡腎任脈主陰起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目任脈從會陰之分而上行至目督脈從目繞頭而下至脊之十四椎故各長四尺五寸蓋氣行於任督二脈陰陽通貫而行也尚御公曰督脈圍繞於周身之前後上下只言四尺五寸與任脈相等者二十八脈皆分陰陽而行故蹺脈之陰陽男子數其陽女子數其陰經脈為里支而橫者為絡絡之別者為孫盛而血者疾誅之盛者瀉之虛者飲藥以補之此承上文而言脈度之十六丈二尺只以經脈為數支而橫者絡脈孫絡也夫經脈內營於臟腑外絡於形身浮而見於皮部者皆絡脈也盛而血者邪盛於外血留於絡脈故當疾誅之盛者邪客於外故當瀉之虛者本虛於內故當飲藥以補之蓋言血氣本於臟腑之所生也五臟常內閱於上七竅也故肺氣通於鼻肺和則鼻能知香臭矣心氣通於舌心和則舌能知五味矣肝氣通於目肝和則目能辨五色矣脾氣通於口脾和則口能知五穀矣腎氣通於耳腎和則耳能聞五音矣五臟不和則七竅不通六腑不和則留為癰故邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰脈不利陰脈不利則血留之血留之則陰氣盛矣陰氣太盛則陽氣不能營也故曰關陽氣太盛則陰氣弗能營也故曰格陰陽俱盛不得相營故曰關格關格者不得盡期而死也夫手足之六陽內通於六腑六陰內通於六臟十二經脈之血氣由臟腑之所生故虛者飲藥以補之是臟腑之氣營於脈內者也此復論臟腑之氣通於脈外之皮膚七竅以應天地之紀閱歷也五臟常內閱於七竅是以五臟不和則七竅不通矣在內者六腑為陽在外者皮膚為陽本經曰陽氣有餘營氣不行乃發為癰是以六腑不和則血氣留滯於皮腠而為癰此病從內而外也故邪在腑者謂邪在於表陽則陽脈不和謂左之人迎不和也陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰脈不利謂右之氣口不利也陰脈不利則血留之血留之則陰氣盛矣陰氣太盛則陽氣不能營也故曰關謂關陰於內陽氣不得以和之陽氣太盛則陰氣弗能營也故曰格謂格陽於外陰氣不得以和之如是則陰陽俱盛不得相營故曰關格關格者不得盡期而死也此病因於外也夫五臟六腑應天地之五運六氣有升降出入之神機上節論出入於脈中此論運行於脈外玉師曰不得盡期者不得盡天地之壽此注當合五十營注參看黃帝曰蹺脈安起安止何氣營水岐伯答曰蹺脈者少陰之別起於然谷之後上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入頄屬目內眥合於太陽陽蹺而上行氣並相還則為濡目氣不營則目不合此節論流溢之精氣從蹺脈而布散於脈外脈外之血氣從蹺脈而通貫於脈中氣並相還內外交通者也夫腎為水臟受藏水穀之精水者流溢於腎臟之精水也何氣營水者謂陰蹺之脈乃足少陰之別直上循陰股入於腎陰脈內之營氣宗氣營運腎臟之水上循胸裡交於手少陰之心神而化赤上注於目內眥合於太陽陽蹺而上行陰蹺陽蹺之氣相併經脈外內之氣交相往還則為濡目如氣不營則目不合謂流溢於脈外之氣不營於目也再按本經大惑篇曰病有不得臥者衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故不瞑矣病有不得視者衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉也此脈外之衛氣復內通於蹺脈外內之血氣相併而往還也尚御公曰脈外之陰氣虛則目不瞑氣不營則目不合者脈外之陰氣不營於目也此節始論蹺脈之起止而復曰氣不營則目不合謂脈內之陰氣流溢於脈外者也夫脈度者乃營氣宗氣行於脈中以應呼吸漏下若夫營血之流行始於手太陰肺終於足厥陰肝其支者只環轉督脈一周而蹺脈不與焉蓋蹺脈主營運腎臟之精水於脈中而為血者也舉足行高曰蹺蓋取其從下行上之義黃帝曰氣獨行五臟不營六腑何也岐伯答曰氣之不得無行也如水之流如日月之行不休故陰脈營其臟陽脈營其腑如環之無端莫知其紀終而復始其流溢之氣內溉五臟外濡腠理此承上文復申明經脈外內之氣營於脈中濡於脈外也按衛氣之行日行於陽二十五周夜行於陰二十五周周於五臟其始入於陰常從足少陰入於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎為一周脈外之血氣相將婦隨夫轉是隻營於五臟而不營於六腑上文論脈外之血氣則為濡目故帝有此問伯言氣之不得無行於六腑也營於脈中者如水之流運於脈外者如日月之行隨天道之運行無息故陰脈營其臟陽脈營其腑如環之無端莫知其紀終而復始其流溢之氣內溉五臟外濡腠理腠理者皮膚肌肉之紋理五臟募原之肉理也玉師曰營氣之行腎傳於心包絡包絡傳之肝肝傳之肺肺傳之脾脾傳之心水火木金土先天之五行也衛氣之行腎注於心心注於肺肺注於肝肝注於脾脾復注於腎交相勝制後天之五行也故曰此逆順之常也蓋脈內之氣順行脈外之氣逆行有順有逆斯成天地之紀黃帝曰蹺脈有陰陽何脈當其數岐伯答曰男子數其陽女子數其陰當數者為經不當數者為絡也其數之數去聲余上聲陰蹺之脈後足上行應地氣之上升故女子數其陰陰蹺屬目內眥合陽蹺而上行是陽蹺受陰蹺之氣復從髮際而下行至足應天氣之下降故男子數其陽尚御公曰陰蹺乃足少陰之別陽蹺乃足太陽之別男子之宗營注於太陽之陽蹺女子之宗營注於少陰之陰蹺氣之所注者故為大經隧氣不營者為絡脈也上節論少陰之精水從陰蹺而上並於陽蹺此節論營氣宗氣之行於蹺脈有男女陰陽之分二節是當分看營衛生會篇第十八黃帝問於岐伯曰人焉受氣陰陽焉會何氣為營何氣為衛營安從生衛於焉會老壯不同氣陰陽異位願聞其會岐伯答曰人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣其清者為營濁者為衛營在脈中衛在脈外營周不休五十而復大會陰陽相貫如環無端衛氣行於陰二十五度行於陽二十五度分為晝夜故氣至陽而起至陰而止故曰日中而陽隴為重陽夜半而陰隴為重陰故太陰主內太陽主外各行二十五度分為晝夜夜半為陰隴夜半後而為陰衰平旦陰盡而陽受氣矣日中而陽隴日西而陽衰日入陽盡而陰受氣矣夜半而大會萬民皆臥命曰合陰平旦陰盡而陽受氣如是無已與天地同紀此章論營衛之生始會合因以名篇首節論營衛之所生而各走其道下節論營衛之會合相將而行外內出入此陰陽離合之道也谷入於胃以傳於肺五臟六腑皆以受氣者此營血之營於五臟六腑十二經脈也其清者為營濁者為衛乃別出兩行營衛之道營在脈中衛在脈外營周不休晝夜五十營而復大會於手太陰陰陽相貫如環無端此營氣之行於脈中循度環轉以應呼吸漏下者也衛氣夜行於陰二十五度日行於陽二十五度分為晝夜故氣至陽則臥起而目張至陰則休止而目瞑日中陽氣隴而衛氣正行於陽故為重陽夜半陰氣隴而衛正行於陰故為重陰太陰主地太陽主天衛氣日行於太陽之膚表而夜行於五臟之募原乃太陰所主之地中也外內各行二十五度分為晝夜此衛氣之所行也夜半為陰隴夜半後為陰衰平旦陰盡而陽受氣矣日中而陽隴日西而陽衰日入陽盡而陰受氣矣夜半而陰陽大會天下萬民皆臥命曰合陰此天氣夜行於陰而與陰氣會合天道晝夜之陰陽也平旦衛氣行陰陰盡而表陽復受此衛氣如是晝夜出入之無已與天地陰陽之同紀也黃帝曰老人之不夜瞑者何氣使然少壯之人不晝瞑者何氣使然岐伯答曰壯者之氣血盛其肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澀五臟之氣相搏其營氣衰少而衛氣內伐故晝不精夜不瞑此論營與衛合偕行於皮膚肌腠之間分為晝夜而外內出入者也血氣者充膚熱肉淡滲皮毛之血氣肌肉者在外皮膚之肌肉在內募原之肌肉氣道者肌肉之紋理三焦通會元真之處營衛之所遊行出入者也故肌肉滑利氣道疏通則榮衛之行不失其出入之常度故晝精明而夜瞑合如肌肉乾枯氣道澀滯則五臟之氣相搏而不能通調於外內矣夫營血者五臟之精氣也五臟不和則營氣衰少營氣衰則不能外營於肌肉而衛氣內伐矣衛氣內伐而不得循行五臟故晝不精而夜不瞑也此言營衛相將衛隨營行者也夫經言營行脈中衛行脈外者論營衛二氣分陰陽清濁之道路也平脈篇曰營為血衛為氣本經曰化而為血命曰營氣蓋經脈之外有充膚熱肉之血氣皆為營氣當知脈外有營與衛氣相將出入者也是以本經論營衛之生始離合計五篇有奇第十五之五十營篇論營氣之行於脈中第七十六之衛氣行篇論衛氣之行於脈外第十六之營氣篇論營血之營於五臟六腑十二經脈此篇論營衛之生各有所從來各走其道而復會合於皮膚肌腠之間營衛相將偕行出入第五十二之衛氣篇論脈內之血氣從氣街而出於膚表故與衛氣相合而偕行夫脈內之血氣順行則脈外之氣血逆轉此陰陽離合外內逆順之常也陰陽之道通變無窮千古而下皆礙於營行脈中衛行脈外之句而不會通於全經以致聖經大義矇昧久矣黃帝曰願聞營衛之所行皆何道從來岐伯答曰營出中焦衛氣出於下焦下當作上帝承上文之義復問營衛相將之所行皆何道從來而行於脈外也夫清者為營濁者為衛此入胃水穀之精氣別出兩行營衛之道營行脈中衛行脈外乃精氣也中焦受氣取汁化而為血以奉生身莫貴於此故獨行於經隧命曰營氣此血之氣名營氣故曰營出中焦與精氣之少有別也決氣篇曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣五味篇曰辛入於胃其氣走於上焦上焦者受氣而營諸陽者也衛者陽明水穀之悍氣從上焦而出衛於表陽故曰衛出上焦夫充膚熱肉之血乃中焦水穀之津液隨三焦出氣以溫肌肉充皮膚故癰疽章曰腸胃受谷上焦出氣以溫分肉而養骨節通腠理中焦出氣如露上注谿谷而滲孫脈津液和調變化而赤為血血和孫脈先滿溢乃注於絡脈皆盈乃注於經脈陰陽已張因息乃行行有經紀周有道理與天合同不得休止夫谿谷者肌肉之分會也是津液先和調於分肉孫絡之間變化而赤為血血和而後孫絡滿溢注於絡脈經脈故中焦之津液化而為血以奉生身者謂血營於身形之肌肉也獨行於經隧命曰營氣謂血注於孫脈經脈也此血之氣命曰營氣與應呼吸漏下之營氣少別故外與衛氣相將晝夜出入內注於經脈因息乃行與天道之運行於外而復通貫於中之合同也余伯榮曰此論營衛出於兩焦下節論上焦與營俱行中焦蒸化營氣此節乃承上啟下之文黃帝曰願聞三焦之所出岐伯答曰上焦出於胃上口並咽以上貫膈而布胸中走腋循太陰之分而行還至陽明上至舌下足陽明常與營俱行於陽二十五度行於陰亦二十五度一周也故五十度而復大會於手太陰矣此復論三焦之所出兼證營衛之生會上焦出於胃上口者上焦所歸之部署也並胃咽以上貫膈而布胸中出走腋下循太陰之雲門中府之分而行還至陽明之天鼎扶突而上至舌復下於足陽明之分常與營俱行於陽二十五度行於陰亦二十五度一周也故五十度而復大會於手太陰蓋從胸腋太陰之分而出行故復大會於太陰也夫手之三陰從臟走手足之三陰從足走臟營氣行於二十八脈之中二百七十息以應漏下二刻為一周則陰陽外內經脈臟腑俱已循行蓋以一日分為晝夜而為五十營非日行於陽而夜行於陰也凡日行於陽二十五度行於陰亦二十五度乃營衛之行於脈外陰陽出入者也越人首設問難即將經義混淆而後人非之後人又以營在脈中行陽二十五度行陰二十五度是猶百步五十步相笑之故智耳按金匱要略曰若五臟元真通暢人即安和病則無由入其腠理腠者是三焦通會元真之處為血氣所注理者是皮膚臟腑之紋理也蓋三焦乃初陽之氣運行於上下通合於肌腠不入於經俞是以上焦之氣常與營俱行陽二十五度行陰二十五度者與充膚熱肉之營血間行於皮膚臟腑之紋理也上焦出胃上口上貫膈布胸中走腋下至陽明上至舌此論上焦氣之所出與經脈之循臂肘上肩胛入缺盆出耳頰之不同也再按三焦乃少陽之相火生於腎陰從下而上通會於周身之腠理臟腑之募原總屬一氣耳歸於有形之部署始分而為三氣之在上者即歸於上部主宣五穀之氣味即從上而出熏膚充身澤毛氣之在中者即歸於中部主蒸化水穀之津液而為營血即從中而出以奉生身氣之在下者即歸於下部主濟泌別汁即從下而出以行決瀆此氣由陰而生從下而上歸於上中下之三部即從上中下而分布流行馬氏復以下焦之氣升於中上上焦之氣降於中下此緣不明經理而強為臆說也黃帝曰人有熱飲食下胃其氣未定汗即出或出於面或出於背或出於身半其不循衛氣之道而出何也岐伯曰此外傷於風內開腠理毛蒸理泄衛氣走之故不得循其道此氣慓悍滑疾見開而出故不得從其道故命曰漏泄此申明衛氣出於上焦從上焦之氣而分布於周身者也上焦出於胃上口上貫膈布胸中由腋而出於太陰之分至手陽明之扶突下足陽明之人迎而後布散於皮腠常與營俱行陽而行陰衛氣從上焦之氣而出所出之道路從來上未至於面後未至於背今飲食下胃其營衛宗氣未有定分而先汗出於面或出於背此衛氣之不循道而出也衛氣布於周身無所不被其澤若汗出於身半此衛氣之偏沮也蓋衛氣者水穀之悍氣其性慓悍滑疾如腠理不密即見開而出故不得從其道此假風邪汗出以證明衛氣循上焦之道路而出上焦與營俱行而營與衛又相將出入於外內者也故曰上焦如霧謂氣之遊行於膚表熏膚充身澤毛若霧露之溉張開之曰此章論衛氣始出之從來第七十六篇論衛氣晝夜出入之道路所行不同各宜體析黃帝曰願聞中焦之所出岐伯答曰中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸精液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣此論營出於中焦中焦亦並胃中在胃中脘之分中焦所歸之部署也此所受氣者主泌水穀之糟粕蒸精液化其精微上注於肺脈奉心神化赤而為血以奉生身莫貴於此故獨得行於經隧命曰營氣此津液化血而名營氣也黃帝曰夫血之與氣異名同類何謂也岐伯答曰營衛者精氣也血者神氣也故血之與氣異名同類焉故奪血者無汗奪汗者無血故人生有兩死而無兩生此承上文而言營衛生於水穀之精皆由氣之宣發營衛者水穀之精氣也血者中焦之精汁奉心神而化赤神氣之所化也血與營衛皆生於精故異名而同類焉汗乃血之液氣化而為汗故奪其血者則無汗奪其汗者則無血無血者死無汗者亦死故人有兩死而無兩生者謂營衛血汗總屬於水穀之精也此言中焦之精汁皆由氣之所化而為營為衛為血為汗有如水中之漚氣發於水中則為漚泡氣散則漚亦破泄矣黃帝曰願聞下焦之所出岐伯答曰下焦者別迴腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉下焦之部署在胃之下口別走於迴腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕而俱下於大腸就下焦之氣濟泌別汁循下焦之經而滲入膀胱氣化則出矣黃帝曰人飲酒酒亦入胃谷未熟而小便獨先下何也岐伯答曰酒者熟谷之液也其氣悍以清故後谷而入先谷而液出焉黃帝曰善余聞上焦如霧中焦如漚下焦如瀆此之謂也飲酒者先行皮膚則水津四布而下輸膀胱矣三焦下俞出於委陽並太陽之正入絡膀胱約下焦氣化而出故小便獨先下此承上文而言下焦之氣主決瀆水液故帝曰善余素聞云上焦如霧中焦如漚下焦如瀆此之謂也按此篇論營衛之生會夫水穀之精氣清者為營濁者為衛營在脈中衛在脈外此營衛之生也陰陽異位又何焉會故復論三焦之所出以明其會焉衛出上焦而上焦常與營俱行陽二十五度行陰亦二十五度營出中焦而中焦之津液隨三焦出氣以溫肌肉化赤為血以奉生身營衛之行不失其常此營衛之會也故獨得行於經隧命曰營氣言與衛相將於脈外而又獨得行於經隧之中是肌腠經脈之外內皆有此營也陰陽血氣之離合出入非熟讀諸經細心體會不易悉也
